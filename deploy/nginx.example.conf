# Ferd: nginx server block.
#
# Static files are served directly by nginx from the repo root. /api/* is
# proxied to the Python API on 127.0.0.1:8091. Put TLS, HSTS, gzip, etc. at
# this layer.
#
# Replace /srv/ferd, ferd.example.com, and the cert paths as appropriate.

server {
    listen 80;
    server_name ferd.example.com;
    # Permanent redirect to HTTPS. Drop this block if running plain HTTP
    # on a private network (Tailscale, LAN).
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ferd.example.com;

    ssl_certificate     /etc/letsencrypt/live/ferd.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ferd.example.com/privkey.pem;

    # Block size; GPX uploads are capped at 10 MiB by the API. 12 MiB gives
    # headroom for headers without letting a runaway client buffer endlessly.
    client_max_body_size 12m;

    root /srv/ferd;
    index index.html;

    # Rate-limit login attempts at the proxy level. The API also rate-limits
    # internally, but defense in depth is cheap.
    limit_req_zone $binary_remote_addr zone=ferd_login:10m rate=10r/m;

    location = /api/login {
        limit_req zone=ferd_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static site.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Data files. These are loaded by the static site at runtime.
    # Keep them gitignored; place them next to index.html or symlink to your
    # own store (e.g. a Syncthing folder).
    location = /places.json { default_type application/json; }
    location = /routes.json { default_type application/json; }
    location /gpx/        { default_type application/gpx+xml; }

    # Don't expose the SQLite DB or local config to the world.
    location ~ ^/tools/(ferd\.db|config\.json) { deny all; return 404; }
}
