# Ferd - Docker Compose deployment.
#
# Quickstart:
#   mkdir -p data
#   cp site-config.example.json data/site-config.json
#   cp .env.example .env  # adjust values as needed
#   docker compose up -d
#   # open http://localhost:8090 and register the first account
#
# See docs/docker.md for the full walk-through.

services:
  ferd:
    build: .
    image: ferd:local
    container_name: ferd
    restart: unless-stopped
    ports:
      - "${FERD_HOST_PORT:-8090}:8090"
    volumes:
      - ./data:/data
    environment:
      FERD_SECURE_COOKIES: "${FERD_SECURE_COOKIES:-false}"
      FERD_INITIAL_USER: "${FERD_INITIAL_USER:-}"
      FERD_INITIAL_PASSWORD: "${FERD_INITIAL_PASSWORD:-}"
      FERD_REQUIRE_SETUP_TOKEN: "${FERD_REQUIRE_SETUP_TOKEN:-false}"
      # Leave PUID/PGID unset to let the entrypoint auto-adopt the owner
      # of ./data. Override here (or in .env) only for unusual setups.
      PUID: "${PUID:-}"
      PGID: "${PGID:-}"
