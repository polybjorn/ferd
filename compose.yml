# Atlas - Docker Compose deployment.
#
# Quickstart:
#   mkdir -p data
#   cp site-config.example.json data/site-config.json
#   cp .env.example .env  # adjust values as needed
#   docker compose up -d
#   # open http://localhost:8090 and register the first account
#
# See docs/docker.md for the full walk-through.

services:
  atlas:
    build: .
    image: atlas:local
    container_name: atlas
    restart: unless-stopped
    ports:
      - "${ATLAS_HOST_PORT:-8090}:8090"
    volumes:
      - ./data:/data
    environment:
      ATLAS_SECURE_COOKIES: "${ATLAS_SECURE_COOKIES:-false}"
      ATLAS_INITIAL_USER: "${ATLAS_INITIAL_USER:-}"
      ATLAS_INITIAL_PASSWORD: "${ATLAS_INITIAL_PASSWORD:-}"
      ATLAS_REQUIRE_SETUP_TOKEN: "${ATLAS_REQUIRE_SETUP_TOKEN:-false}"
      # Leave PUID/PGID unset to let the entrypoint auto-adopt the owner
      # of ./data. Override here (or in .env) only for unusual setups.
      PUID: "${PUID:-}"
      PGID: "${PGID:-}"
