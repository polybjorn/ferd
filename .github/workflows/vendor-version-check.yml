name: Vendor version check

# Runs weekly to flag upstream version bumps for the libraries vendored
# under `vendor/`. Opens (or updates) a single tracking issue when drift
# is detected; the issue body is the full report from the check script.

on:
  schedule:
    - cron: "0 9 * * 1"  # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run check
        id: check
        run: |
          set +e
          REPORT=$(python3 scripts/check-vendor-versions.py)
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          {
            echo 'report<<EOF'
            echo "$REPORT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "$REPORT"
          exit 0

      - name: Open or update tracking issue
        if: steps.check.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.check.outputs.report }}
        run: |
          TITLE="Vendor deps: upstream bumps available"
          BODY=$(printf '%s\n\n```\n%s\n```\n\n_Last run: %s_' \
            "Run \`python3 scripts/check-vendor-versions.py\` locally to reproduce. Bumping a vendored dep means re-downloading the file into \`vendor/\`, updating \`scripts/vendor-versions.json\`, and bumping \`CACHE_VERSION\` in \`sw.js\`." \
            "$REPORT" \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)")

          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number,title \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((i['number'] for i in d if i['title']==\"$TITLE\"), ''))")

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body "$BODY"
            echo "Updated issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
