name: Release APK

# On a version tag, build the signed release APK and attach it to the GitHub
# Release for that tag (Obtainium installs from release assets). Requires repo
# secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS,
# ANDROID_KEY_PASSWORD. Without them the build is unsigned and the job fails the
# verify step, so a misconfigured release never ships an unsigned APK.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the version task can count commits

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set" && exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/ferd-release.jks"

      - name: Build signed release APK
        working-directory: android
        env:
          FERD_KEYSTORE_FILE: ${{ runner.temp }}/ferd-release.jks
          FERD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          FERD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          FERD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify the APK is signed
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          test -f "$APK" || { echo "::error::release APK not found"; exit 1; }
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --verbose "$APK"

      - name: Attach APK to the release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
