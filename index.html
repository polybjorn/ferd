    // Bucket key for "Group by letter". Keep the first character as-is for any
    // Unicode letter (no folding) so non-Latin scripts get their own buckets
    // alongside Latin ones. Non-letter starts (digits, punctuation) go in "#".
    function letterBucket(name) {
      const raw = (name || '').charAt(0);
      if (!raw) return '#';
      return /\p{L}/u.test(raw) ? raw.toUpperCase() : '#';
    }
    // Locale-agnostic sort. Browser-default locale gives each user the
    // ordering they expect (Norwegian: Æ Ø Å after Z; Swedish: Å Ä Ö; etc.).
    // "#" bucket always last.
    const NAME_COLLATOR = new Intl.Collator(undefined, { sensitivity: 'base' });
    function compareLetterKeys(a, b) {
      if (a === '#' && b === '#') return 0;
      if (a === '#') return 1;
      if (b === '#') return -1;
      return NAME_COLLATOR.compare(a, b);
    }

    function renderPlaceList(query) {

      const wantCat = catEl ? catEl.value : 'all';
      const wantCountry = countryEl ? countryEl.value : 'all';
      const catalogEl = document.getElementById('filter-catalog');
      const wantCatalog = catalogEl ? catalogEl.value : 'all';
      const filtered = state.places.filter(p => {
        if (q && !(
          p.name.toLowerCase().includes(q) ||
          (p.note && p.note.toLowerCase().includes(q)) ||
          p.category.toLowerCase().includes(q) ||
          (p.country && p.country.toLowerCase().includes(q))
        )) return false;
        if (wantStatus === 'visited' && !p.visited) return false;
        if (wantStatus === 'want' && p.visited) return false;
        if (wantCat !== 'all' && p.category !== wantCat) return false;
        if (wantCountry !== 'all' && p.country !== wantCountry) return false;
        if (wantCatalog === 'from-catalog' && !p.from_catalog) return false;
        if (wantCatalog === 'not-from-catalog' && p.from_catalog) return false;
        if (wantCatalog === 'updates-available' && !findCatalogUpdate(p)) return false;
        return true;
      });
      const grouped = {};
      for (const p of filtered) {
        const key = byCategory ? p.category
                  : byLetter   ? letterBucket(p.name)
                  :              (p.country || 'Other');
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(p);
      }
      // Alphabetical within each bucket (Norwegian locale: Æ/Ø/Å after Z).
      for (const key in grouped) {
        grouped[key].sort((a, b) => NAME_COLLATOR.compare(a.name, b.name));
      }
      const keys = byLetter
        ? Object.keys(grouped).sort(compareLetterKeys)
        : Object.keys(grouped).sort();
      let html = '';
      for (const key of keys) {
        const items = grouped[key];
        const keyVisited = items.filter(p => p.visited).length;

          html += '<span class="group-color-dot" style="background:' + dotColor + '"></span>';
        }
        html += nameSpan;
        html += '<span class="place-count">(' + keyVisited + '/' + items.length + ')</span>';
        html += '</div>';
        html += '<div class="place-grid">';
        for (const p of items) {
          const statusClass = p.visited ? 'visited' : 'want';
          const href = focusHash('place', p._slug || p.name);
          html += '<div class="place-card" data-place-name="' + escapeHtml(p.name) + '" data-place-slug="' + escapeHtml(p._slug || '') + '" onclick="location.hash=\'' + href.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\'">';
          html += '<span class="status-dot ' + statusClass + '"></span>';
          html += '<div class="place-text">';
          html += '<div class="name">' + escapeHtml(p.name) + '</div>';
          if (p.note && getShowField('note')) html += '<div class="note">' + escapeHtml(p.note) + '</div>';
          html += '</div>';
          if (p.from_catalog) {
            const upd = findCatalogUpdate(p);

            const title = upd

              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>' +

      html += '<div class="region-grid" id="trails-list-mount"></div>';
      app.innerHTML = html;
      const addTrailBtn = document.getElementById('add-route-btn');

      const searchInput = document.getElementById('search-input');
      const statusSel = document.getElementById('filter-status');
      const regionSel = document.getElementById('filter-region');
      const diffSel = document.getElementById('filter-difficulty');

      const filterClear = document.getElementById('filter-clear');

      const filterSels = [statusSel, regionSel, diffSel, ratingSel, tagSel].filter(Boolean);
      function updateFilterBtnLabel() {

          filterBtn.textContent = n > 0 ? 'Filters (' + n + ')' : 'Filters';
          filterBtn.classList.toggle('has-active', n > 0);

      // Flatten once: each entry pairs a route with its parent region name.
      const flatRoutes = regions.flatMap(r => r.routes.map(rt => ({route: rt, region: r.name})));
      function routeMatches(entry, q, wantStatus, wantRegion, wantDiff, wantRating, wantTag) {

        if (wantStatus === 'planned' && route.completed) return false;

        if (wantTag !== 'all') {
          const tags = Array.isArray(route.tags) ? route.tags.map(t => String(t).toLowerCase()) : [];
          if (!tags.includes(wantTag)) return false;
        }
        return true;
      }
      function renderTrailsList() {
        const q = (searchInput && searchInput.value.trim().toLowerCase()) || '';

        let inner = '';

            const regionName = found.region.name;
            const items = [];
            items.push({ label: 'Open on map', onClick: function() { location.hash = '#/?focus=route:' + encodeURIComponent(route.key); } });
            items.push({ label: 'Open detail', onClick: function() { location.hash = '#/routes/route/' + encodeURIComponent(route.key); } });
            if (route.source) {
              items.push({ label: 'Open source', onClick: function() { window.open(route.source, '_blank', 'noopener'); } });
            }
            if (!isReadOnly() && state.auth && state.auth.authenticated) {
              items.push({ label: 'Edit', onClick: function() { openEditTrailMetadataModal(route, regionName); } });
            }
            if (!isReadOnly() && state.auth && state.auth.authenticated) {
              items.push(null);
              items.push({ label: 'Delete', danger: true, onClick: function() {
                openConfirmModal({
                  title: 'Delete route',
                  body: 'Delete "' + route.name + '" (' + displayRegion(regionName) + ')? This removes the GPX file.',
                  confirmLabel: 'Delete',
                  danger: true,
                }).then(function(ok) {
                  if (!ok) return;
                  api('DELETE', '/gpx', { region: regionName, name: route.name })
                    .then(() => refreshRoutes())
                    .then(() => renderTrailsList())
                    .catch(err => alert('Delete failed: ' + err.message));
                });
              }});
            }
            return items;
          });
        });
        mountEl.querySelectorAll('.section-link[data-filter-region]').forEach(function(label) {
          label.addEventListener('click', function() {
            const r = label.dataset.filterRegion;
            const allRegions = regions.map(x => x.name);
            state.hiddenRegions = new Set(allRegions.filter(x => x !== r));
            // Strong intent: "show only this region". Hide all places too;
            // user can re-enable from the filter panel.
            const allCats = Object.keys(state.categoryColors);
            state.hiddenCategories = new Set(allCats);
            state.showCompleted = true;
            state.showPlanned = true;
            location.hash = '#/';
          });
        });
        updateFilterBtnLabel();
      }
      if (searchInput) searchInput.addEventListener('input', function() {
        state.trailFilters.search = this.value;
        renderTrailsList();
      });
      const trailFilterKeyById = { 'filter-status': 'status', 'filter-region': 'region', 'filter-difficulty': 'difficulty', 'filter-rating': 'rating', 'filter-tag': 'tag' };
      filterSels.forEach(s => s.addEventListener('change', function() {
        const k = trailFilterKeyById[s.id];
        if (k) state.trailFilters[k] = s.value;
        renderTrailsList();
      }));
      if (groupBySel) groupBySel.addEventListener('change', function() {
        state.trailsGroupBy = this.value;
        setPref('trails-group-by', this.value);
        renderTrailsList();
      });
      if (filterBtn && filterPop) {
        filterBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const open = filterPop.hidden;
          filterPop.hidden = !open;
          filterBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        document.addEventListener('click', function(e) {
          if (!filterPop.hidden && !filterPop.contains(e.target) && e.target !== filterBtn) {
            filterPop.hidden = true;
            filterBtn.setAttribute('aria-expanded', 'false');
          }
        });
        filterPop.addEventListener('click', function(e) { e.stopPropagation(); });
      }
      if (filterClear) filterClear.addEventListener('click', function() {
        const hasSearch = searchInput && searchInput.value !== '';
        const hasFilter = filterSels.some(s => s.value !== 'all');
        if (!hasSearch && !hasFilter) return;
        filterSels.forEach(s => { s.value = 'all'; });
        state.trailFilters.status = 'all';
        state.trailFilters.region = 'all';
        state.trailFilters.difficulty = 'all';
        state.trailFilters.rating = 'all';
        state.trailFilters.tag = 'all';
        if (searchInput) searchInput.value = '';
        state.trailFilters.search = '';
        renderTrailsList();
      });
      renderTrailsList();

      // Warm the SW cache so clicking a route from the list gets an
      // already-cached GPX response and renders the polyline immediately.
      // Fire immediately (not on idle) since the most common interaction
      // is a fast click within a few hundred ms of the list rendering;
      // the 4-at-a-time limiter in fetchGpxText keeps the burst polite.
      for (const route of allRoutes) {
        fetchGpxText(gpxUrlFor(route.file)).catch(function () { /* ignore */ });
      }
    }

    // ----- Route detail (elevation) -----
    function parseGpxTracks(xmlText) {
      const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
      let tracks = doc.getElementsByTagNameNS(GPX_NS, 'trk');
      if (tracks.length === 0) tracks = doc.getElementsByTagName('trk');
      const result = [];
      for (let i = 0; i < tracks.length; i++) {
        const trk = tracks[i];
        const nameEl = trk.getElementsByTagNameNS(GPX_NS, 'name')[0] || trk.getElementsByTagName('name')[0];
        const name = nameEl ? nameEl.textContent : 'Track ' + (i + 1);
        const points = [];
        let trkpts = trk.getElementsByTagNameNS(GPX_NS, 'trkpt');
        if (trkpts.length === 0) trkpts = trk.getElementsByTagName('trkpt');
        for (let j = 0; j < trkpts.length; j++) {
          const pt = trkpts[j];
          const lat = parseFloat(pt.getAttribute('lat'));
          const lon = parseFloat(pt.getAttribute('lon'));
          const eleEl = pt.getElementsByTagNameNS(GPX_NS, 'ele')[0] || pt.getElementsByTagName('ele')[0];
          const ele = eleEl ? parseFloat(eleEl.textContent) : null;
          points.push({ lat, lon, ele });
        }
        result.push({ name, points });
      }
      return result;
    }

    function parseGpxWaypoints(xmlText) {
      const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
      let wpts = doc.getElementsByTagNameNS(GPX_NS, 'wpt');
      if (wpts.length === 0) wpts = doc.getElementsByTagName('wpt');
      const out = [];
      for (let i = 0; i < wpts.length; i++) {
        const w = wpts[i];
        const lat = parseFloat(w.getAttribute('lat'));
        const lon = parseFloat(w.getAttribute('lon'));
        if (!isFinite(lat) || !isFinite(lon)) continue;
        // Only render waypoints with an explicit <sym>; waypoints without
        // are typically routing artifacts from tools like gpx.studio or
        // Google Maps (geocoded via-points), not user-marked POIs.
        const symEl = w.getElementsByTagNameNS(GPX_NS, 'sym')[0] || w.getElementsByTagName('sym')[0];
        const sym = symEl ? symEl.textContent.trim() : '';
        if (!sym) continue;
        const nameEl = w.getElementsByTagNameNS(GPX_NS, 'name')[0] || w.getElementsByTagName('name')[0];
        const descEl = w.getElementsByTagNameNS(GPX_NS, 'desc')[0] || w.getElementsByTagName('desc')[0];
        out.push({
          lat, lon, sym,
          name: nameEl ? nameEl.textContent : '',
          desc: descEl ? descEl.textContent : '',
        });
      }
      return out;
    }

    // Skip waypoints within this radius (m) of the route's start/end so
    // they don't visually collide with the start/end markers (common for
    // loop routes where the GPX records the start point as a waypoint).
    const WAYPOINT_ENDPOINT_SUPPRESS_M = 75;
    function addGpxWaypoints(map, waypoints, startLatLng, endLatLng) {
      for (const w of waypoints) {
        const ll = L.latLng(w.lat, w.lon);
        if (startLatLng && ll.distanceTo(startLatLng) < WAYPOINT_ENDPOINT_SUPPRESS_M) continue;
        if (endLatLng && ll.distanceTo(endLatLng) < WAYPOINT_ENDPOINT_SUPPRESS_M) continue;
        const m = L.marker(ll, { icon: makeWaypointIcon() });
        const body = '<b>' + escapeHtml(w.name) + '</b>' + (w.desc ? '<br>' + escapeHtml(w.desc) : '');
        m.bindPopup(body, { closeButton: false });
        m.addTo(map);
      }
    }

    function computeTrackStats(points) {
      let distance = 0, gain = 0, loss = 0, maxEle = -Infinity;
      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1], curr = points[i];
        distance += L.latLng(prev.lat, prev.lon).distanceTo(L.latLng(curr.lat, curr.lon));
        if (curr.ele !== null && prev.ele !== null) {
          const diff = curr.ele - prev.ele;
          if (diff > 0) gain += diff; else loss -= diff;
          if (curr.ele > maxEle) maxEle = curr.ele;
        }
      }
      if (points.length > 0 && points[0].ele !== null && points[0].ele > maxEle) maxEle = points[0].ele;
      return { distance, gain, loss, maxEle };
    }

    function trackToGeoJSON(track) {
      return {
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: track.points.map(p => [p.lon, p.lat, p.ele]) },
        properties: {},
      };
    }

    function populateStats(s) {
      const items = [{ l: 'Dist', v: formatDistance(s.dist) }];
      if (s.tracks) items.unshift({ l: 'Tracks', v: s.tracks });
      if (s.gain !== undefined) {
        const hours = (s.dist / 1000) / 5 + s.gain / 600;
        const h = Math.floor(hours), m = Math.round((hours - h) * 60);
        items.push({ l: 'Gain', v: '+' + formatElevation(s.gain) });
        items.push({ l: 'Loss', v: '-' + formatElevation(s.loss) });
        items.push({ l: 'Peak', v: formatElevation(s.max) });
        items.push({ l: 'Est.', v: h > 0 ? h + 'h ' + m + 'min' : m + 'min' });
      }
      const navEl = document.getElementById('nav-stats-dynamic');
      if (navEl) navEl.innerHTML = items.map(i => '<div class="nav-stat"><span class="label">' + i.l + '</span><span class="value">' + i.v + '</span></div>').join('');
      const mobEl = document.getElementById('mobile-stats');
      if (mobEl) {
        const dataHtml = items.map(i => '<div class="stat"><span class="label">' + i.l + '</span><span class="value">' + i.v + '</span></div>').join('');
        let sourceHtml = '';
        if (state._routeSourceHref) {
          sourceHtml = '<div class="stats-source"><a href="' + escapeHtml(state._routeSourceHref) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(state._routeSourceDomain) + ' &#x2197;</a></div>';
        }
        mobEl.innerHTML = '<div class="stats-data">' + dataHtml + '</div>' + sourceHtml;
      }
    }

    function renderTrailDetail(routeKey) {
      setActiveTab('routes');
      cleanupMap();
      const app = document.getElementById('app');
      if (!state.manifest) { app.innerHTML = '<div class="loading">Loading routes...</div>'; return; }

      let route = null, regionName = '';
      for (const region of state.manifest.regions) {
        for (const r of region.routes) {
          if (r.key === routeKey) { route = r; regionName = region.name; break; }
        }
        if (route) break;
      }
      if (!route) { setCrumb('Not found', true); app.innerHTML = '<div class="loading">Route not found</div>'; return; }

      setCrumb(route.name, true);

      const color = ROUTE_COLOR;
      const statusLabel = route.completed ? 'Completed' : 'Planned';

      let routeSourceHref = '';
      if (route.source) {
        try {
          const u = new URL(route.source, location.href);
          if (u.protocol === 'http:' || u.protocol === 'https:') routeSourceHref = u.href;
        } catch {}
      }
      state._routeSourceHref = routeSourceHref;
      state._routeSourceDomain = routeSourceHref ? domainFromUrl(route.source) : '';

      const facts = [];
      facts.push('<span class="fact"><span class="dot" style="background:' + (route.completed ? 'var(--completed)' : 'var(--planned)') + '"></span>' + statusLabel + '</span>');
      facts.push('<span class="fact">' + escapeHtml(displayRegion(regionName)) + '</span>');
      if (route.difficulty) facts.push('<span class="fact">' + escapeHtml(DIFFICULTY_LABELS[route.difficulty] || route.difficulty) + '</span>');
      if (route.rating && getShowField('rating')) facts.push('<span class="fact" title="' + route.rating + '/5">' + ratingStarsText(route.rating) + '</span>');
      if (route.date_completed && getShowField('date')) facts.push('<span class="fact">' + escapeHtml(route.date_completed) + '</span>');

      const showActions = state.auth.authenticated && !isReadOnly();
      const hasTags = route.tags && route.tags.length;
      const hasNotes = !!route.notes && getShowField('note');
      let metaHtml = '';
      if (facts.length || hasTags || hasNotes) {
        metaHtml = '<div class="route-meta-panel">';
        metaHtml += '<div class="route-meta-header">';
        metaHtml += '<div class="route-meta-line">' + facts.join('<span class="sep">&middot;</span>') + '</div>';
        if (hasTags) {
          metaHtml += '<div class="route-meta-tags">' + route.tags.map(t => '<span class="tag">#' + escapeHtml(t) + '</span>').join('') + '</div>';
        }
        metaHtml += '</div>';
        if (hasNotes) {
          metaHtml += '<div class="route-meta-notes"><span class="route-meta-notes-label">Notes</span>' + escapeHtml(route.notes) + '</div>';
        }
        metaHtml += '</div>';
      }

      const navActionsEl = document.getElementById('nav-actions');
      if (navActionsEl) {
        navActionsEl.innerHTML = showActions
          ? '<button type="button" id="route-edit-btn" class="nav-action-btn">Edit</button>'
          : '';
      }

      const isMultiTrack = route.trackCount && route.trackCount > 1;

      let html = '<div class="detail-layout">';
      html += '<div id="map"></div>';
      html += '<div class="mobile-stats" id="mobile-stats"></div>';
      if (isMultiTrack) {
        html += '<div id="track-legend"></div>';
        // Reserve the populated height up-front (one expanded chart plus
        // a header per collapsed track) so the map doesn't shrink when
        // the panels render. trackCount comes from the manifest.
        const trackHeaderPx = 30;
        const expandedChartPx = 200;
        const reservedPx = expandedChartPx + Math.max(0, (route.trackCount || 1) - 1) * trackHeaderPx;
        html += '<div id="multi-elevation-container" style="min-height:' + reservedPx + 'px"></div>';
      } else {
        if (route.hasElevation) html += '<div class="elevation-wrap" id="elevation-container"></div>';
        else html += '<div class="no-elevation-notice">No elevation data available for this route</div>';
      }
      html += metaHtml;
      html += '</div>';
      app.innerHTML = html;

      const editBtn = document.getElementById('route-edit-btn');
      if (editBtn) editBtn.addEventListener('click', function(e) {
        e.preventDefault();
        openEditTrailMetadataModal(route, regionName);
      });

      const dvt = state.config.default_view_routes || DEFAULT_CONFIG.default_view_routes;
      const map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
        maxBounds: [[-90, -200], [90, 200]],
        maxBoundsViscosity: 1.0,
        markerZoomAnimation: false,
        // Continuous wheel/trackpad zoom (vendor/leaflet-smoothwheelzoom).
        // Disable Leaflet's stepped scrollWheelZoom in favor of the
        // smooth handler, which animates zoom level continuously via rAF.
        scrollWheelZoom: false,
        smoothWheelZoom: true,
        smoothSensitivity: 1.5,
        renderer: L.svg()
      });
      // Fit to the route's bbox up-front so the initial tile load is near
      // the route instead of the routes-default view (Norway), avoiding a
      // visible jump when GPX-driven fitBounds settles a moment later.
      // Also stashes the bbox as state._lastTrailBounds so the GPX-load
      // handlers and the ResizeObserver skip their own fitBounds (the
      // manifest bbox includes waypoints, while gpx.getBounds() doesn't,
      // and reconciling produces a perceptible re-zoom).
      if (route.bbox && route.bbox.length === 4) {
        const bb = L.latLngBounds([route.bbox[0], route.bbox[1]], [route.bbox[2], route.bbox[3]]);
        map.fitBounds(bb, { padding: [40, 40] });
        state._lastTrailBounds = bb;
      } else {
        map.setView(dvt.center, dvt.zoom);
      }
      L.control.attribution({ prefix: false }).addTo(map);
      state.currentMap = map;
      // Map container shrinks asynchronously as the elevation chart and
      // other detail-view widgets settle. Sync Leaflet's known size and
      // force a polyline repaint so the route stays drawn, but leave the
      // viewport alone — refitting against the new size would zoom-jump
      // a moment after the initial bbox fit, which is jarring.
      if (typeof ResizeObserver !== 'undefined') {
        const ro = new ResizeObserver(function() {
          map.invalidateSize();
          map.eachLayer(function(l) { if (typeof l.redraw === 'function') l.redraw(); });
          adjustTrailStrokes();
        });
        ro.observe(map.getContainer());
        state._currentMapResizeObserver = ro;
      }
      // Counter-scale route stroke widths during zoom. 'zoom' covers
      // mobile pinch (fires per frame); zoomanim kicks off a brief rAF
      // loop to cover the desktop 250ms CSS animation where 'zoom'
      // doesn't fire until the end.
      // 'move' fires after all 'zoom' listeners on each _move() call, so
      // by the time we run, the SVG renderer has already applied its new
      // CSS scale transform - we read the freshest value to counter-scale
      // against. Also covers pan-only frames.
      map.on('move', adjustTrailStrokes);
      map.on('zoomend moveend', adjustTrailStrokes);
      map.on('zoomanim', function() {
        const start = performance.now();
        const tick = () => {
          if (!state.currentMap) return;
          adjustTrailStrokes();
          if (performance.now() - start < 270) {
            requestAnimationFrame(tick);
          }
        };
        requestAnimationFrame(tick);
      });
      addTileLayersToMap(map);

      // Show the on-map elevation position marker only while an elevation
      // chart is hovered or touched. Uses pointer events so a single code
      // path covers mouse, touch, and pen; the corresponding CSS rule
      // hides .height-focus when .elev-hover is absent.
      const mapEl = map.getContainer();
      ['elevation-container', 'multi-elevation-container'].forEach(function(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const show = function() { mapEl.classList.add('elev-hover'); };
        const hide = function() { mapEl.classList.remove('elev-hover'); };
        el.addEventListener('pointerenter', show);
        el.addEventListener('pointerdown', show);
        el.addEventListener('pointerleave', hide);
        el.addEventListener('pointerup', hide);
        el.addEventListener('pointercancel', hide);
      });

      // Expand-map toggle: hides the elevation chart and metadata panel.
      const layoutEl = document.querySelector('.detail-layout');
      const ExpandControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function() {
          const btn = L.DomUtil.create('a', 'leaflet-bar leaflet-control map-expand-btn');
          btn.href = '#';
          btn.title = 'Expand map';
          btn.setAttribute('role', 'button');
          btn.setAttribute('aria-label', 'Expand map');
          btn.innerHTML =
            '<svg class="icon-expand" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
            + '<polyline points="2,6 2,2 6,2"/><polyline points="14,6 14,2 10,2"/><polyline points="2,10 2,14 6,14"/><polyline points="14,10 14,14 10,14"/>'
            + '</svg>'
            + '<svg class="icon-collapse" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
            + '<polyline points="6,2 6,6 2,6"/><polyline points="10,2 10,6 14,6"/><polyline points="6,14 6,10 2,10"/><polyline points="10,14 10,10 14,10"/>'
            + '</svg>';
          L.DomEvent.disableClickPropagation(btn);
          L.DomEvent.on(btn, 'click', function(e) {
            L.DomEvent.preventDefault(e);
            const expanded = layoutEl.classList.toggle('map-expanded');
            btn.title = expanded ? 'Collapse map' : 'Expand map';
            btn.setAttribute('aria-label', btn.title);
            const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (reduce) {
              map.invalidateSize();
            } else {
              const start = performance.now();
              const tick = function(now) {
                map.invalidateSize({ animate: false, pan: false });
                if (now - start < 320) requestAnimationFrame(tick);
              };
              requestAnimationFrame(tick);
            }
          });
          return btn;
        }
      });
      map.addControl(new ExpandControl());

      if (route.plannedFile && route.completed) {
        const plannedLayer = new L.GPX(gpxUrlFor(route.plannedFile), {
          async: true,
          polyline_options: { color: ROUTE_COLOR, opacity: 0.35, weight: 4 * getTrailWeightFactor(), dashArray: '8 6' },
          markers: { startIcon: null, endIcon: null, wptIcons: { '': WAYPOINT_PLACEHOLDER_ICON } },
        });
        attachWaypointHandlers(plannedLayer);
        plannedLayer.on('loaded', function(e) {
          applyNonScalingStroke(e.target);
        }).addTo(map);
      }

      if (isMultiTrack) renderMultiTrack(map, route);
      else renderSingleTrack(map, route, color);
    }

    function renderSingleTrack(map, route, color) {
      let elevationControl = null;
      if (route.hasElevation) {
        elevationControl = L.control.elevation(Object.assign({
          theme: 'custom-theme',
          detached: true,
          elevationDiv: '#elevation-container',
          height: 200,
          imperial: isImperial(),
          slope: false, speed: false, acceleration: false, time: false,
          legend: false, summary: false, ruler: false, downloadLink: false,
          almostOver: false, distanceMarkers: false, autofitBounds: false, fitBounds: false,
          polyline: { color: color, opacity: 0.9, weight: 5 * getTrailWeightFactor() },
        }, ELEVATION_VENDOR_URLS)).addTo(map);
        state.currentElevation = elevationControl;
      }

      const gpxUrl = gpxUrlFor(route.file);
      const singleGpx = new L.GPX(gpxUrl, {
        async: true,
        polyline_options: { color: color, opacity: 0.9, weight: 5 * getTrailWeightFactor() },
        markers: { startIcon: null, endIcon: null, wptIcons: { '': WAYPOINT_PLACEHOLDER_ICON } },
      });
      attachWaypointHandlers(singleGpx);
      singleGpx.on('loaded', function(e) {
        const gpx = e.target;
        const bounds = gpx.getBounds();
        if (bounds.isValid() && !state._lastTrailBounds) {
          state._lastTrailBounds = bounds;
          map.fitBounds(bounds, { padding: [40, 40] });
        }
        applyNonScalingStroke(gpx);
        // Polylines may be in the SVG DOM with correct coords but unpainted
        // until the renderer next ticks. Force a redraw, then renormalize
        // stroke widths in case adjustTrailStrokes ran mid-zoom-animation
        // and left them counter-scaled against a now-stale scale value.
        gpx.eachLayer(function(l) { if (typeof l.redraw === 'function') l.redraw(); });
        adjustTrailStrokes();

        const layers = [];
        gpx.eachLayer(function(layer) { if (layer.getLatLngs) layers.push(layer); });
        if (layers.length > 0) {
          const latlngs = layers[0].getLatLngs();
          const flat = Array.isArray(latlngs[0]) ? latlngs.flat() : latlngs;
          if (flat.length > 1) {
            const startLL = flat[0];
            const endLL = flat[flat.length - 1];
            addStartEndMarkers(map, startLL, endLL);
            // Drop waypoints that are routing artifacts (no <sym>) or sit
            // on top of the start/end markers.
            gpx.eachLayer(function(layer) {
              if (!layer.options || layer.options.type !== 'waypoint' || !layer.getLatLng) return;
              if (!layer._ferdSym) { gpx.removeLayer(layer); return; }
              const ll = layer.getLatLng();
              if (ll.distanceTo(startLL) < WAYPOINT_ENDPOINT_SUPPRESS_M
                  || ll.distanceTo(endLL) < WAYPOINT_ENDPOINT_SUPPRESS_M) {
                gpx.removeLayer(layer);
              }
            });
          }
        }

        const dist = gpx.get_distance();
        const stats = { dist: dist, status: route.completed ? 'Completed' : 'Planned', completed: route.completed, region: route.key.split('/')[0] };
        if (route.hasElevation) {
          stats.gain = gpx.get_elevation_gain();
          stats.loss = gpx.get_elevation_loss();
          stats.max = gpx.get_elevation_max();
        }
        populateStats(stats);
      }).on('addline', function(e) {
        if (elevationControl) elevationControl.addData(e.line);
      }).addTo(map);
    }

    function renderMultiTrack(map, route) {
      fetch(gpxUrlFor(route.file))
        .then(r => r.text())
        .then(function(xmlText) {
          const tracks = parseGpxTracks(xmlText);
          if (tracks.length === 0) return;
          {
            const firstPt = tracks[0].points[0];
            const last = tracks[tracks.length - 1];
            const lastPt = last.points[last.points.length - 1];
            const startLL = firstPt ? L.latLng(firstPt.lat, firstPt.lon) : null;
            const endLL = lastPt ? L.latLng(lastPt.lat, lastPt.lon) : null;
            addGpxWaypoints(map, parseGpxWaypoints(xmlText), startLL, endLL);
          }

          const elevHeight = 200;
          const elevControls = [];
          const allStats = [];
          const bounds = L.latLngBounds();

          const container = document.getElementById('multi-elevation-container');
          if (container) {
            let panelsHtml = '';
            for (let i = 0; i < tracks.length; i++) {
              const tc = TRACK_COLORS[i % TRACK_COLORS.length];
              const collapsed = i > 0 ? ' collapsed' : '';
              panelsHtml += '<div class="elevation-track-panel' + collapsed + '" style="--track-color:' + tc + '">';
              panelsHtml += '<div class="elevation-track-label" onclick="var p=this.parentElement;if(p.classList.contains(\'collapsed\')){p.parentElement.querySelectorAll(\'.elevation-track-panel:not(.collapsed)\').forEach(function(s){s.classList.add(\'collapsed\')});p.classList.remove(\'collapsed\')}else{p.classList.add(\'collapsed\')}"><span class="color-dot" style="background:' + tc + '"></span>' + escapeHtml(tracks[i].name) + '</div>';
              panelsHtml += '<div class="elevation-track-chart" id="elevation-track-' + i + '"></div>';
              panelsHtml += '</div>';
            }
            container.innerHTML = panelsHtml;
          }

          for (let i = 0; i < tracks.length; i++) {
            const track = tracks[i];
            const tc = TRACK_COLORS[i % TRACK_COLORS.length];
            const stats = computeTrackStats(track.points);
            allStats.push(stats);
            for (const p of track.points) bounds.extend([p.lat, p.lon]);
            const latlngs = track.points.map(p => [p.lat, p.lon]);
            L.polyline(latlngs, { color: tc, opacity: 0.9, weight: 5 * getTrailWeightFactor() }).addTo(map);
            const hasEle = track.points.some(p => p.ele !== null);
            if (hasEle && container) {
              const ctrl = L.control.elevation(Object.assign({
                theme: 'custom-theme', detached: true,
                elevationDiv: '#elevation-track-' + i,
                height: elevHeight,
                imperial: isImperial(),
                slope: false, speed: false, acceleration: false, time: false,
                legend: false, summary: false, ruler: false, downloadLink: false,
                almostOver: false, distanceMarkers: false, autofitBounds: false, fitBounds: false,
                polyline: false,
              }, ELEVATION_VENDOR_URLS)).addTo(map);
              ctrl.addData(trackToGeoJSON(track));
              elevControls.push(ctrl);
            }
          }
          state.currentElevation = elevControls;
          if (bounds.isValid() && !state._lastTrailBounds) {
            state._lastTrailBounds = bounds;
            map.fitBounds(bounds, { padding: [40, 40] });
          }
          map.eachLayer(function(l) { if (typeof l.redraw === 'function') l.redraw(); });
          adjustTrailStrokes();
          const firstTrack = tracks[0];
          const lastTrack = tracks[tracks.length - 1];
          if (firstTrack.points.length > 0 && lastTrack.points.length > 0) {
            const sp = firstTrack.points[0];
            const ep = lastTrack.points[lastTrack.points.length - 1];
            addStartEndMarkers(map, L.latLng(sp.lat, sp.lon), L.latLng(ep.lat, ep.lon));
          }
          const legendEl = document.getElementById('track-legend');
          if (legendEl) {
            let legendHtml = '';
            for (let i = 0; i < tracks.length; i++) {
              const tc = TRACK_COLORS[i % TRACK_COLORS.length];
              const s = allStats[i];
              legendHtml += '<div class="track-legend-item">';
              legendHtml += '<span class="track-legend-color" style="background:' + tc + '"></span>';
              legendHtml += '<span class="track-name">' + escapeHtml(tracks[i].name) + '</span>';
              legendHtml += '<span class="track-stat">' + formatDistance(s.distance) + '</span>';
              if (s.gain > 0) legendHtml += '<span class="track-stat">+' + formatElevation(s.gain) + '</span>';
              legendHtml += '</div>';
            }
            legendEl.innerHTML = legendHtml;
          }
          const totals = allStats.reduce((acc, s) => ({
            distance: acc.distance + s.distance, gain: acc.gain + s.gain, loss: acc.loss + s.loss, maxEle: Math.max(acc.maxEle, s.maxEle)
          }), { distance: 0, gain: 0, loss: 0, maxEle: -Infinity });
          const ps = { dist: totals.distance, tracks: tracks.length, status: route.completed ? 'Completed' : 'Planned', completed: route.completed, region: route.key.split('/')[0] };
          if (totals.gain > 0) { ps.gain = totals.gain; ps.loss = totals.loss; ps.max = totals.maxEle; }
          populateStats(ps);
        });
    }

    // ----- Router -----
    function focusHash(type, slug) { return '#/' + type + '/' + slug; }

    function parseFocus(hash) {
      const base = hash.split('?')[0];
      if (base.startsWith('#/place/')) {
        const slug = decodeURIComponent(base.slice('#/place/'.length));
        const place = (state.places || []).find(p => p._slug === slug || p.name === slug);
        return { type: 'place', name: place ? place.name : slug, slug: place ? place._slug : slug };
      }
      if (base.startsWith('#/route/')) {
        const slug = decodeURIComponent(base.slice('#/route/'.length));
        if (state.manifest && state.manifest.regions) {
          for (const r of state.manifest.regions) {
            for (const route of r.routes) {
              if (route._slug === slug || route.key === slug) return { type: 'route', name: route.key };
            }
          }
        }
        return { type: 'route', name: slug };
      }
      // Legacy: #/?focus=type:id
      const q = hash.split('?')[1];
      if (q) {
        const params = new URLSearchParams(q);
        const focus = params.get('focus');
        if (focus) {
          const colon = focus.indexOf(':');
          if (colon !== -1) return { type: focus.slice(0, colon), name: decodeURIComponent(focus.slice(colon + 1)) };
        }
      }
      return null;
    }

    function router() {
      const navActions = document.getElementById('nav-actions');
      if (navActions) navActions.innerHTML = '';
      const hash = location.hash || '#/';
      const base = hash.split('?')[0];
      if (base.startsWith('#/place/') || base.startsWith('#/route/')) return renderUnifiedMap(parseFocus(hash));
      if (base === '#/' || base === '#' || base === '#/map') return renderUnifiedMap(parseFocus(hash));
      if (base === '#/places') {
        if (!placesEnabled()) { location.hash = '#/'; return; }
        return renderPlacesIndex();
      }
      if (base === '#/routes') {
        if (!routesEnabled()) { location.hash = '#/'; return; }
        return renderTrailsIndex();
      }
      if (base.startsWith('#/routes/route/')) {
        if (!routesEnabled()) { location.hash = '#/'; return; }
        const key = decodeURIComponent(base.replace('#/routes/route/', ''));
        return renderTrailDetail(key);
      }
      renderUnifiedMap(null);
    }
    window.addEventListener('hashchange', router);

    // ----- Theme -----
    const THEMES = ['catppuccin', 'dracula', 'gruvbox', 'nord', 'rose-pine', 'solarized', 'tokyo-night'];
    const MODES = ['dark', 'light', 'system'];
    (function migrateTheme() {
      try {
        const old = localStorage.getItem('theme');
        if (old && MODES.includes(old)) {
          localStorage.setItem('mode', old);
          localStorage.setItem('theme', 'nord');
        } else if (old && !THEMES.includes(old)) {
          localStorage.setItem('theme', 'nord');
        }
      } catch {}
    })();
    function getStoredTheme() {
      try {
        const v = localStorage.getItem('theme');
        return THEMES.includes(v) ? v : 'nord';
      } catch { return 'nord'; }
    }
    function getStoredMode() {
      try {
        const v = localStorage.getItem('mode');
        return MODES.includes(v) ? v : 'system';
      } catch { return 'system'; }
    }
    function applyTheme(theme, mode) {
      const eff = mode === 'system'
        ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        : mode;
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-mode', eff);
      _routeColorCache = null;
      // Canvas clusters read theme CSS variables on each draw; force a
      // redraw so the new theme's cluster colors apply immediately.
      if (state && state._placeClusterGroup && state._placeClusterGroup.redraw) {
        state._placeClusterGroup.redraw();
      }
    }
    const PIN_STYLES = ['ring', 'pin', 'dot', 'tag'];
    function getPinStyle() {
      try {
        const v = localStorage.getItem('pin-style');
        return PIN_STYLES.includes(v) ? v : 'ring';
      } catch { return 'ring'; }

    const MARKER_SIZES = { small: 14, default: 18, large: 24 };
    const ROUTE_WEIGHT_FACTORS = { thin: 0.7, default: 1, thick: 1.4 };
    const TILE_FILTERS = ['none', 'muted', 'grayscale', 'sepia', 'contrast'];
    function getMarkerSizeKey() {
      try {
        const v = localStorage.getItem('marker-size');
        return MARKER_SIZES[v] ? v : 'default';
      } catch { return 'default'; }
    }
    function getMarkerSize() { return MARKER_SIZES[getMarkerSizeKey()]; }
    function getTrailWeightKey() {
      try {
        const v = localStorage.getItem('route-weight');
        return ROUTE_WEIGHT_FACTORS[v] ? v : 'default';
      } catch { return 'default'; }
    }
    function getTrailWeightFactor() { return ROUTE_WEIGHT_FACTORS[getTrailWeightKey()]; }
    function getTileFilter() {
      try {
        const v = localStorage.getItem('tile-filter');

      } catch { return 'none'; }

    // ----- Auth + API client -----
    function apiUrl(path) {
      const base = (state.config.api_base || '/api').replace(/\/$/, '');
      return base + path;
    }

    function api(method, path, body) {
      const opts = { method, credentials: 'same-origin', headers: {} };
      if (body !== undefined && !(body instanceof Blob)) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      } else if (body instanceof Blob) {
        opts.body = body;
      }
      return fetch(apiUrl(path), opts).then(async r => {
        let data = null;
        try { data = await r.json(); } catch {}
        if (!r.ok) {
          const err = new Error((data && data.error) || ('HTTP ' + r.status));
          err.status = r.status;
          err.body = data;
          throw err;
        }
        return data;
      }, (netErr) => {
        const err = new Error(navigator.onLine ? 'Network error' : "You're offline. Changes not saved.");
        err.offline = !navigator.onLine;
        err.cause = netErr;
        throw err;
      });
    }

    function refreshAuthState() {
      return fetch(apiUrl('/state'), { credentials: 'same-origin' })
        .then(r => r.ok ? r.json() : null)

        .catch(() => { renderAuthWidget(); });

    function renderAuthWidget() {
      const el = document.getElementById('auth-widget');
      if (!el) return;
      if (!state.auth.authenticated) {
        el.innerHTML = '<button id="auth-signin">Sign in</button>';
        document.getElementById('auth-signin').addEventListener('click', openSignInModal);
        return;
      }
      const isAdmin = !!state.auth.is_admin;
      el.innerHTML =
        '<button id="auth-menu-btn" title="Account menu">Menu</button>' +
        '<div class="auth-menu" id="auth-menu" hidden>' +
          '<div class="auth-menu-header">Signed in as<strong>' + escapeHtml(state.auth.username) + '</strong></div>' +
          '<button data-action="settings">Settings</button>' +
          (isAdmin ? '<button data-action="logs">Logs</button>' : '') +
          '<button data-action="about">About</button>' +
          '<button class="auth-menu-signout" data-action="signout">Sign out</button>' +
        '</div>';
      const btn = document.getElementById('auth-menu-btn');
      const menu = document.getElementById('auth-menu');
      // Outside-click closer is added on open and removed on close. We use the
      // capture phase because Leaflet stops propagation on map-container clicks,
      // which would otherwise leave the menu open when clicking the map.
      function outsideCloser(ev) {
        if (!el.contains(ev.target)) closeMenu();
      }
      function closeMenu() {
        menu.hidden = true;
        document.removeEventListener('mousedown', outsideCloser, true);
        document.removeEventListener('touchstart', outsideCloser, true);
      }
      function openMenu() {
        menu.hidden = false;
        document.addEventListener('mousedown', outsideCloser, true);
        document.addEventListener('touchstart', outsideCloser, true);
      }
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (menu.hidden) openMenu(); else closeMenu();
      });
      menu.addEventListener('click', function(e) {
        const action = e.target.closest('button[data-action]');
        if (!action) return;
        closeMenu();
        switch (action.dataset.action) {
          case 'settings': openSettingsModal(); break;
          case 'logs':     openLogsModal(); break;
          case 'about':    openAboutModal(); break;
          case 'signout':  confirmSignOut(); break;
        }
      });
    }

    function deviceLabel(ua) {
      if (!ua) return 'Unknown device';
      const s = ua.toLowerCase();
      if (s.includes('iphone')) return 'iPhone';
      if (s.includes('ipad')) return 'iPad';
      if (s.includes('android')) return 'Android';
      if (s.includes('mac os x') || s.includes('macintosh')) return 'macOS';
      if (s.includes('windows')) return 'Windows';
      if (s.includes('linux')) return 'Linux';
      if (s.startsWith('curl/')) return 'curl';
      return ua.slice(0, 32) + (ua.length > 32 ? '…' : '');
    }
    function timeAgo(unixSec) {
      const d = Math.max(0, Math.floor(Date.now() / 1000) - unixSec);
      if (d < 60) return d + 's ago';
      if (d < 3600) return Math.floor(d / 60) + 'm ago';
      if (d < 86400) return Math.floor(d / 3600) + 'h ago';
      if (d < 86400 * 30) return Math.floor(d / 86400) + 'd ago';
      const dt = new Date(unixSec * 1000);
      return dt.toISOString().slice(0, 10);
    }

    function slugifyCategory(s) {
      return (s || '').toLowerCase().trim()
        .replace(/[^a-z0-9_-]+/g, '-')
        .replace(/^-+|-+$/g, '')
