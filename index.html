    }

    function openManageCategoriesModal() {
      const labels = state.config.category_labels || {};
      // Uncategorized ('') isn't a manageable slug — drop it.
      const slugsFromPlaces = state.places ? [...new Set(state.places.map(p => p.category).filter(Boolean))] : [];
      const allSlugs = [...new Set([...Object.keys(labels), ...slugsFromPlaces])];
      // Stored `order` (if any) wins; entries without one fall to the end,
      // ordered alphabetically by slug so the modal stays deterministic.
      allSlugs.sort((a, b) => {
        const oa = labels[a] && typeof labels[a].order === 'number' ? labels[a].order : Infinity;
        const ob = labels[b] && typeof labels[b].order === 'number' ? labels[b].order : Infinity;
        if (oa !== ob) return oa - ob;
        return a.localeCompare(b);
      });
      const placeCountBySlug = {};
      if (state.places) {
        for (const p of state.places) {
          if (!p.category) continue;
          placeCountBySlug[p.category] = (placeCountBySlug[p.category] || 0) + 1;
        }
      }
      const rows = allSlugs.map((slug, i) => {
        const display = (labels[slug] && labels[slug].label) || '';
        // Color index: explicit stored value, or fall back to whatever the
        // current palette assignment is for this slug (so the dot shows the
        // color the user actually sees on the map).
        let color = (labels[slug] && typeof labels[slug].color === 'number') ? labels[slug].color : -1;
        if (color < 0) {
          const cur = state.categoryColors && state.categoryColors[slug];
          color = cur ? COLORS.indexOf(cur) : 0;
          if (color < 0) color = 0;
        }
        return { slug, display, original: display, color, originalColor: color, originalOrder: i, count: placeCountBySlug[slug] || 0 };
      });

      openModal(
        '<h2>Manage categories<button class="modal-close">&times;</button></h2>' +
        '<h3 class="settings-h" style="margin-top:0.75rem">Add</h3>' +
        '<div class="row" style="margin-top:0.25rem">' +
          '<input type="text" id="cat-new-display" placeholder="e.g. Waterfalls">' +
          '<button type="button" class="primary" id="cat-add" style="flex:0 0 auto">Add</button>' +
        '</div>' +
        '<div class="hint" id="cat-new-slug-preview" hidden></div>' +
        '<div class="modal-error" id="cat-error"></div>' +
        '<h3 class="settings-h" style="margin-top:1.25rem">Categories</h3>' +
        '<div id="cat-rows"></div>' +
        '<div class="modal-actions" style="margin-top:1rem;display:flex;align-items:center;gap:0.6rem">' +
          '<button type="button" class="row-notes-toggle" id="cat-reset-colors">Reset colors</button>' +
          '<div id="cat-clear-warning" class="action-warning" style="flex:1;margin:0" hidden></div>' +
          '<button type="button" class="primary" id="cat-save" hidden>Save</button>' +
        '</div>',
        function() {
          const inUse = new Set(slugsFromPlaces);
          const pendingClears = new Set();  // in-use slugs the user removed; will bulk-clear on Save
          const initialRowKeys = new Set(rows.map(r => r.slug));
          function hasChanges() {
            if (pendingClears.size) return true;
            // Added, label-edited, color-edited, or reordered?
            if (rows.length !== initialRowKeys.size) return true;
            for (let i = 0; i < rows.length; i++) {
              const r = rows[i];
              if (!initialRowKeys.has(r.slug)) return true;
              if (r.display !== r.original) return true;
              if (r.color !== r.originalColor) return true;
              if (r.originalOrder !== i) return true;
            }
            return false;
          }
          let openSwatchIdx = -1;
          function refreshSaveBtn() {
            const btn = document.getElementById('cat-save');
            if (btn) btn.hidden = !hasChanges();
          }
          function refreshClearWarning() {
            const banner = document.getElementById('cat-clear-warning');
            if (!banner) return;
            if (!pendingClears.size) { banner.hidden = true; return; }
            const slugs = [...pendingClears];
            const total = state.places.filter(p => slugs.includes(p.category)).length;
            const slugList = slugs.map(s => '"' + s + '"').join(', ');
            banner.textContent = 'On Save: ' + total + ' place' + (total === 1 ? '' : 's') + ' will lose their category (' + slugList + ').';
            banner.hidden = false;
          }
          function rerender() {
            const container = document.getElementById('cat-rows');
            if (!rows.length) {
              container.innerHTML = '<div class="hint">No categories yet.</div>';
              return;
            }
            container.innerHTML = rows.map((r, i) => {
              const labelDirty = r.display !== r.original;
              const colorDirty = r.color !== r.originalColor;
              const orderDirty = r.originalOrder !== i;
              const dirty = labelDirty || colorDirty || orderDirty;
              const dotColor = COLORS[r.color % COLORS.length];
              const open = openSwatchIdx === i;
              const swatchGrid = '<div class="cat-swatches' + (open ? ' open' : '') + '">' + COLORS.map((c, ci) =>
                '<button type="button" class="cat-swatch' + (ci === r.color ? ' active' : '') + '" data-i="' + i + '" data-ci="' + ci + '" style="background:' + c + '" title="Color ' + (ci + 1) + '"></button>'
              ).join('') + '</div>';
              const innerTag = dirty ? '<span class="row-tag in-input dirty">edited</span>'
                              : r.count === 0 ? '<span class="row-tag in-input">unused</span>'
                              : '<span class="row-tag in-input"></span>';
              return '<div class="cat-row" data-i="' + i + '" style="margin-top:0.5rem">' +
                '<div style="display:flex;gap:0.6rem;align-items:center">' +
                  '<button type="button" class="cat-drag btn-x" data-i="' + i + '" aria-label="Drag to reorder" title="Drag to reorder" style="flex:0 0 auto;cursor:grab;touch-action:none">&#x2630;</button>' +
                  '<button type="button" class="cat-color-dot' + (open ? ' open' : '') + '" data-i="' + i + '" title="Change color" style="background:' + dotColor + '"></button>' +
                  '<span class="cat-input-wrap" style="position:relative;flex:1;min-width:0;display:block">' +
                    '<input type="text" data-i="' + i + '" class="cat-display' + (labelDirty ? ' dirty' : '') + '" value="' + escapeHtml(r.display) + '" placeholder="(falls back to title case)" title="' + escapeHtml('slug: ' + r.slug) + '" style="width:100%">' +
                    innerTag +
                  '</span>' +
                  '<button type="button" data-i="' + i + '" class="cat-remove btn-x" aria-label="Remove" title="Remove" style="flex:0 0 auto">&times;</button>' +
                '</div>' +
                swatchGrid +
              '</div>';
            }).join('');
            container.querySelectorAll('.cat-color-dot').forEach(btn => {
              btn.addEventListener('click', function() {
                const i = +this.dataset.i;
                const willOpen = openSwatchIdx !== i;
                // Close any previously-open grid so only one is expanded at a time.
                container.querySelectorAll('.cat-swatches.open, .cat-color-dot.open')
                  .forEach(el => el.classList.remove('open'));
                if (willOpen) {
                  const row = this.closest('div').parentElement;
                  row.querySelector('.cat-swatches').classList.add('open');
                  this.classList.add('open');
                }
                openSwatchIdx = willOpen ? i : -1;
              });
            });
            container.querySelectorAll('.cat-swatch').forEach(btn => {
              btn.addEventListener('click', function() {
                const i = +this.dataset.i;
                const ci = +this.dataset.ci;
                const r = rows[i];
                r.color = ci;
                openSwatchIdx = -1;
                // Animate the grid closed and update the dot color in place,
                // without re-rendering the whole list (which would skip the
                // closing transition).
                const row = this.closest('.cat-swatches').parentElement;
                row.querySelectorAll('.cat-swatch.active').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                row.querySelector('.cat-swatches').classList.remove('open');
                const dot = row.querySelector('.cat-color-dot');
                dot.style.background = COLORS[ci];
                dot.classList.remove('open');
                // Reflect dirty state in the row's tag without a full rerender.
                const labelDirty = r.display !== r.original;
                const colorDirty = r.color !== r.originalColor;
                const dirty = labelDirty || colorDirty;
                const tagEl = row.querySelector('.row-tag');
                if (tagEl) {
                  tagEl.classList.toggle('dirty', dirty);
                  tagEl.textContent = dirty ? 'edited'
                    : r.count === 0 ? 'unused'
                    : '';
                }
                refreshSaveBtn();
              });
            });
            container.querySelectorAll('.cat-display').forEach(inp => {
              inp.addEventListener('input', function() {
                const i = +this.dataset.i;
                const r = rows[i];
                r.display = this.value;
                const dirty = r.display !== r.original;
                this.classList.toggle('dirty', dirty);
                // Update the tag in this row without a full rerender (avoids
                // stealing focus while typing).
                const tagEl = this.parentElement.querySelector('.row-tag');
                if (!tagEl) return;
                if (dirty) {
                  tagEl.textContent = 'edited';
                  tagEl.classList.add('dirty');
                } else {
                  tagEl.classList.remove('dirty');
                  tagEl.textContent = r.count === 0 ? 'unused' : '';
                }
                refreshSaveBtn();
              });
            });
            container.querySelectorAll('.cat-remove').forEach(btn => {
              btn.addEventListener('click', function() {
                if (this.disabled) return;
                const i = +this.dataset.i;
                const slug = rows[i].slug;
                if (inUse.has(slug)) pendingClears.add(slug);
                rows.splice(i, 1);
                rerender();
                refreshClearWarning();
                refreshSaveBtn();
              });
            });
            container.querySelectorAll('.cat-drag').forEach(handle => {
              handle.addEventListener('pointerdown', function(ev) {
                ev.preventDefault();
                const startIdx = +this.dataset.i;
                const rowEls = Array.from(container.querySelectorAll('.cat-row'));
                const rowEl = rowEls[startIdx];
                if (!rowEl) return;
                const startRect = rowEl.getBoundingClientRect();
                const offsetY = ev.clientY - startRect.top;
                let curIdx = startIdx;
                openSwatchIdx = -1;
                rowEl.classList.add('dragging');
                rowEl.style.position = 'relative';
                rowEl.style.zIndex = '5';
                rowEl.style.pointerEvents = 'none';
                rowEl.style.opacity = '0.85';
                this.style.cursor = 'grabbing';
                document.body.style.cursor = 'grabbing';
                function onMove(e) {
                  // Reorder check first (compare cursor against the adjacent
                  // non-dragged neighbor's center).
                  let newIdx = curIdx;
                  if (curIdx > 0) {
                    const prev = rowEls[curIdx - 1].getBoundingClientRect();
                    if (e.clientY < prev.top + prev.height / 2) newIdx = curIdx - 1;
                  }
                  if (newIdx === curIdx && curIdx < rowEls.length - 1) {
                    const next = rowEls[curIdx + 1].getBoundingClientRect();
                    if (e.clientY > next.top + next.height / 2) newIdx = curIdx + 1;
                  }
                  if (newIdx !== curIdx) {
                    // FLIP-animate the displaced neighbor(s): record old top,
                    // do the DOM swap, set inverse transform, clear on next
                    // frame to animate.
                    const lo = Math.min(curIdx, newIdx);
                    const hi = Math.max(curIdx, newIdx);
                    const affected = [];
                    for (let k = lo; k <= hi; k++) {
                      if (k === curIdx) continue;
                      affected.push({ el: rowEls[k], oldTop: rowEls[k].getBoundingClientRect().top });
                    }
                    const ref = newIdx > curIdx ? rowEls[newIdx].nextSibling : rowEls[newIdx];
                    container.insertBefore(rowEl, ref);
                    rowEls.splice(curIdx, 1);
                    rowEls.splice(newIdx, 0, rowEl);
                    curIdx = newIdx;
                    for (const a of affected) {
                      const newTop = a.el.getBoundingClientRect().top;
                      const dy = a.oldTop - newTop;
                      if (!dy) continue;
                      a.el.style.transition = 'none';
                      a.el.style.transform = 'translateY(' + dy + 'px)';
                      requestAnimationFrame(() => {
                        a.el.style.transition = '';
                        a.el.style.transform = '';
                      });
                    }
                  }
                  // Re-anchor the dragged row under the cursor. Done AFTER any
                  // DOM reorder so there's no paint-frame gap where the row
                  // sits in its new slot without the lift transform.
                  rowEl.style.transform = '';
                  const natural = rowEl.getBoundingClientRect();
                  rowEl.style.transform = 'translateY(' + (e.clientY - offsetY - natural.top) + 'px)';
                }
                function onUp() {
                  document.removeEventListener('pointermove', onMove);
                  document.removeEventListener('pointerup', onUp);
                  document.removeEventListener('pointercancel', onUp);
                  document.body.style.cursor = '';
                  if (curIdx !== startIdx) {
                    const [moved] = rows.splice(startIdx, 1);
                    rows.splice(curIdx, 0, moved);
                  }
                  rerender();
                  refreshSaveBtn();
                }
                document.addEventListener('pointermove', onMove);
                document.addEventListener('pointerup', onUp);
                document.addEventListener('pointercancel', onUp);
              });
            });
          }
          rerender();
          refreshSaveBtn();

          const newDisplay = document.getElementById('cat-new-display');
          const slugPreview = document.getElementById('cat-new-slug-preview');
          newDisplay.addEventListener('input', function() {
            const s = slugifyCategory(this.value);
            if (s) {
              slugPreview.innerHTML = 'Will be saved as slug <code>' + escapeHtml(s) + '</code>.';
              slugPreview.hidden = false;
            } else {
              slugPreview.hidden = true;
            }
          });

          document.getElementById('cat-add').addEventListener('click', function() {
            const display = newDisplay.value.trim();
            const err = document.getElementById('cat-error');
            err.classList.remove('visible');
            if (!display) { err.textContent = 'Display label required'; err.classList.add('visible'); return; }
            const slug = slugifyCategory(display);
            if (!slug) { err.textContent = 'Display label has no usable letters or digits for a slug'; err.classList.add('visible'); return; }
            if (rows.some(r => r.slug === slug)) { err.textContent = 'A category with slug "' + slug + '" already exists'; err.classList.add('visible'); return; }
            rows.push({ slug, display, original: '', color: 0, originalColor: 0, originalOrder: rows.length, count: 0 });
            newDisplay.value = '';
            slugPreview.hidden = true;
            rerender();
            refreshSaveBtn();
          });

          document.getElementById('cat-reset-colors').addEventListener('click', function() {
            // Assign 0..n-1 mod palette length in current display order, so
            // reordering rows lets the user pick which category gets which
            // palette slot.
            rows.forEach((r, i) => { r.color = i % COLORS.length; });
            openSwatchIdx = -1;
            rerender();
            refreshSaveBtn();
          });

          document.getElementById('cat-save').addEventListener('click', function() {
            const submit = this;
            submit.disabled = true;
            const payload = {};
            rows.forEach((r, i) => {
              const label = r.display.trim();
              if (!label) return;
              payload[r.slug] = { label, color: r.color, order: i };
            });
            // Bulk-clear any in-use slugs the user removed, then PUT labels.
            // Clear failures abort the save so the label map and place data
            // don't get out of sync.
            const clears = [...pendingClears].map(slug =>
              api('POST', '/places/clear-category', { category: slug })
            );
            Promise.all(clears)
              .then(() => api('PUT', '/me/category-labels', { category_labels: payload }))
              .then(res => {
                state.config.category_labels = res.category_labels || payload;
                if (pendingClears.size && state.places) {
                  // The server cleared `category` for these slugs; mirror it
                  // locally so we don't have to refetch and rebuild markers.
                  for (const p of state.places) {
                    if (pendingClears.has(p.category)) p.category = '';
                  }
                }
                refreshPlacesPresentation();
                closeTopModal();
              })
              .catch(err => {
                submit.disabled = false;
                const e = document.getElementById('cat-error');
                e.textContent = err.message;
                e.classList.add('visible');
              });
          });
        }
      );
    }

    function openManageRegionsModal() {
      const regions = (state.manifest && state.manifest.regions) ? state.manifest.regions : [];
      // Exclude the synthetic no-region group; it's not a renamable directory.
      const rows = regions
        .filter(r => r.name)
        .map(r => ({ name: r.name, original: r.name, count: r.routes.length }))
        .sort((a, b) => a.name.localeCompare(b.name));
      // Empty regions: Save calls delete-region. Non-empty regions: Save calls
      // clear-region, which moves the routes to "No region" and removes the dir.
      const pendingDeletes = new Set();   // empty regions removed by X
      const pendingClears = new Set();    // non-empty regions removed by X

      openModal(
        '<h2>Manage regions<button class="modal-close">&times;</button></h2>' +
        '<h3 class="settings-h" style="margin-top:0.75rem">Regions</h3>' +
        '<div id="rgn-rows"></div>' +
        '<div id="rgn-empty" class="hint" hidden>No regions yet. Upload a route with a region to create one.</div>' +
        '<div class="modal-error" id="rgn-error"></div>' +
        '<div class="modal-actions" style="margin-top:1rem">' +
          '<div id="rgn-clear-warning" class="action-warning" hidden></div>' +
          '<button type="button" class="primary" id="rgn-save" hidden>Save</button>' +
        '</div>',
        function() {
          function hasChanges() {
            if (pendingDeletes.size || pendingClears.size) return true;
            for (const r of rows) if (r.name !== r.original) return true;
            return false;
          }
          function refreshSaveBtn() {
            const btn = document.getElementById('rgn-save');
            if (btn) btn.hidden = !hasChanges();
          }
          function refreshClearWarning() {
            const banner = document.getElementById('rgn-clear-warning');
            if (!banner) return;
            if (!pendingClears.size) { banner.hidden = true; return; }
            const slugs = [...pendingClears];
            const total = slugs.reduce((n, name) => {
              const region = regions.find(x => x.name === name);
              return n + (region ? region.routes.length : 0);
            }, 0);
            const slugList = slugs.map(s => '"' + s + '"').join(', ');
            banner.textContent = 'On Save: ' + total + ' route' + (total === 1 ? '' : 's') +
              ' will move to No region (' + slugList + ').';
            banner.hidden = false;
          }
          function rerender() {
            const container = document.getElementById('rgn-rows');
            const emptyMsg = document.getElementById('rgn-empty');
            if (!rows.length) {
              container.innerHTML = '';
              emptyMsg.hidden = false;
              return;
            }
            emptyMsg.hidden = true;
            container.innerHTML = rows.map((r, i) => {
              const dirty = r.name !== r.original;
              const empty = r.count === 0;
              const tag = dirty ? '<span class="row-tag dirty">edited</span>'
                        : empty ? '<span class="row-tag">empty</span>'
                        : '<span class="row-tag">' + r.count + ' route' + (r.count === 1 ? '' : 's') + '</span>';
              const xTitle = empty ? 'Remove empty region' : 'Remove region (routes will move to No region)';
              return '<div style="display:flex;gap:0.6rem;align-items:center;margin-top:0.5rem">' +
                '<input type="text" data-i="' + i + '" class="rgn-name' + (dirty ? ' dirty' : '') + '" value="' + escapeHtml(r.name) + '" style="flex:1;min-width:0">' +
                tag +
                '<button type="button" data-i="' + i + '" class="rgn-remove btn-x" aria-label="Remove" title="' + xTitle + '" style="flex:0 0 auto">&times;</button>' +
              '</div>';
            }).join('');
            container.querySelectorAll('.rgn-name').forEach(inp => {
              inp.addEventListener('input', function() {
                const i = +this.dataset.i;
                const r = rows[i];
                r.name = this.value;
                const dirty = r.name !== r.original;
                this.classList.toggle('dirty', dirty);
                const tagEl = this.parentElement.querySelector('.row-tag');
                if (!tagEl) return;
                if (dirty) {
                  tagEl.textContent = 'edited';
                  tagEl.classList.add('dirty');
                } else {
                  tagEl.classList.remove('dirty');
                  tagEl.textContent = r.count === 0 ? 'empty' : (r.count + ' route' + (r.count === 1 ? '' : 's'));
                }
                refreshSaveBtn();
              });
            });
            container.querySelectorAll('.rgn-remove').forEach(btn => {
              btn.addEventListener('click', function() {
                if (this.disabled) return;
                const i = +this.dataset.i;
                const r = rows[i];
                if (r.count === 0) pendingDeletes.add(r.original);
                else pendingClears.add(r.original);
                rows.splice(i, 1);
                rerender();
                refreshSaveBtn();
                refreshClearWarning();
              });
            });
          }
          rerender();
          refreshSaveBtn();

          document.getElementById('rgn-save').addEventListener('click', function() {
            const submit = this;
            submit.disabled = true;
            const err = document.getElementById('rgn-error');
            err.classList.remove('visible');

            // Build the list of renames. Reject if any new name collides with
            // an existing (non-renamed) region or with another rename target.
            const renames = [];
            const seen = new Set(rows.map(r => r.name.trim().toLowerCase()));
            if (seen.size !== rows.length) {
              err.textContent = 'Two regions have the same name.';
              err.classList.add('visible');
              submit.disabled = false;
              return;
            }
            for (const r of rows) {
              const trimmed = r.name.trim();
              if (!trimmed) {
                err.textContent = 'Region name cannot be empty.';
                err.classList.add('visible');
                submit.disabled = false;
                return;
              }
              if (trimmed !== r.original) renames.push({ from: r.original, to: trimmed });
            }

            // Run clears + deletes first so a rename can reuse a freed name.
            const clears = [...pendingClears].map(name =>
              api('POST', '/regions/clear', { name })
            );
            const deletes = [...pendingDeletes].map(name =>
              api('POST', '/regions/delete', { name })
            );
            Promise.all([...clears, ...deletes])
              .then(() => Promise.all(renames.map(r => api('POST', '/regions/rename', r))))
              .then(() => refreshRoutes())
              .then(() => { wrappedRouter(); closeTopModal(); })
              .catch(e => {
                submit.disabled = false;
                err.textContent = e.message;
                err.classList.add('visible');
              });
          });
        }
      );
    }

    function renderSessions() {
      const el = document.getElementById('s-sessions');
      if (!el) return;
      api('GET', '/sessions').then(data => {
        const others = data.sessions ? data.sessions.filter(s => !s.current) : [];
        const revokeOthersBtn = document.getElementById('s-revoke-others');
        if (revokeOthersBtn) revokeOthersBtn.hidden = others.length === 0;
        if (!data.sessions || !data.sessions.length) {
          el.innerHTML = '<div class="hint">No sessions.</div>';
          return;
        }
        el.innerHTML = '<ul class="session-list">' + data.sessions.map(s => {
          const label = escapeHtml(deviceLabel(s.user_agent));
          const ip = s.ip ? escapeHtml(s.ip) : '?';
          const ago = escapeHtml(timeAgo(s.last_seen_at || s.created_at));
          const current = s.current ? '<span class="session-current">This device</span>' : '';
          const revoke = s.current ? '' : '<button class="session-revoke" data-id="' + escapeHtml(s.id) + '">Revoke</button>';
          const sub = s.current ? ip : (ip + ' &middot; ' + ago);
          return '<li class="session-row">' +
            '<div class="session-meta">' +
              '<div class="session-device">' + label + ' ' + current + '</div>' +
              '<div class="session-sub">' + sub + '</div>' +
            '</div>' +
            revoke +
          '</li>';
        }).join('') + '</ul>';
        el.querySelectorAll('.session-revoke').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = this.dataset.id;
            this.disabled = true;
            api('POST', '/sessions/revoke', { id: id })
              .then(renderSessions)
              .catch(err => { this.disabled = false; alert('Failed: ' + err.message); });
          });
        });
      }).catch(() => {
        el.innerHTML = '<div class="hint">Could not load sessions.</div>';
      });
    }

    function formatBytes(n) {
      if (!n || n < 1024) return (n || 0) + ' B';
      const units = ['KB', 'MB', 'GB', 'TB'];
      let v = n / 1024;
      let i = 0;
      while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
      return (v >= 10 ? v.toFixed(0) : v.toFixed(1)) + ' ' + units[i];
    }

    function renderAdminStats() {
      const el = document.getElementById('s-admin-stats');
      if (!el) return;
      api('GET', '/admin/stats').then(s => {
        const tiles = [
          ['Users', s.users],
          ['Published', s.published_users],
          ['Places', s.places],
          ['Routes', s.routes],
          ['Files', formatBytes(s.data_bytes)],
          ['Database', formatBytes(s.db_bytes)],
        ];
        el.innerHTML = tiles.map(([lbl, v]) =>
          '<div class="stat-card"><div class="stat-val">' + escapeHtml(String(v)) + '</div>' +
          '<div class="stat-lbl">' + escapeHtml(lbl) + '</div></div>'
        ).join('');
      }).catch(() => {
        el.innerHTML = '<div class="hint" style="grid-column:1/-1">Could not load stats.</div>';
      });
    }

    function renderAdminUsers() {
      const el = document.getElementById('s-admin-users');
      if (!el) return;
      api('GET', '/admin/users').then(data => {
        const users = data.users || [];
        if (!users.length) {
          el.innerHTML = '<div class="hint">No users.</div>';
          return;
        }
        const meName = state.auth.username;
        // Sort: current user first, then other admins, then everyone else by id.
        users.sort((a, b) => {
          if (a.username === meName) return -1;
          if (b.username === meName) return 1;
          if (a.is_admin !== b.is_admin) return a.is_admin ? -1 : 1;
          return a.id - b.id;
        });
        const admins = users.filter(u => u.is_admin);
        const members = users.filter(u => !u.is_admin);
        const renderRow = u => {
          const isSelf = u.username === meName;
          return '<li class="user-row' + (isSelf ? ' self' : '') + '" data-uid="' + u.id + '" data-uname="' + escapeHtml(u.username) + '">' +
            '<span class="user-name">' +
              escapeHtml(u.username) +
              (u.published ? '<span class="user-flag on">Public</span>' : '') +
            '</span>' +
            '<div class="user-actions">' +
              (u.published ? '<button data-act="unpublish">Unpublish</button>' : '') +
              (u.sessions ? '<button data-act="revoke">Revoke</button>' : '') +
              (isSelf ? '' : '<button data-act="role" data-promote="' + (u.is_admin ? '0' : '1') + '">' + (u.is_admin ? 'Demote' : 'Promote') + '</button>') +
              (isSelf ? '' : '<button data-act="delete" class="danger-btn">Delete</button>') +
            '</div>' +
            '<div class="user-counts">' +
              '<span><b>' + u.sessions + '</b>sessions</span>' +
              '<span><b>' + u.places + '</b>places</span>' +
              '<span><b>' + u.routes + '</b>routes</span>' +
            '</div>' +
          '</li>';
        };
        let html = '';
        if (admins.length) {
          html += '<div class="user-group-h">Admins</div>' +
            '<ul class="user-list">' + admins.map(renderRow).join('') + '</ul>';
        }
        if (members.length) {
          html += '<div class="user-group-h">Members</div>' +
            '<ul class="user-list">' + members.map(renderRow).join('') + '</ul>';
        }
        el.innerHTML = html;
        el.querySelectorAll('button[data-act]').forEach(btn => {
          btn.addEventListener('click', () => handleAdminUserAction(btn));
        });
      }).catch(() => {
        el.innerHTML = '<div class="hint">Could not load users.</div>';
      });
    }

    function formatLogRow(r) {
      const d = r.details || {};
      const actor = r.actor ? '<span class="log-name">' + escapeHtml(r.actor) + '</span>' : '<span class="log-name muted">anon</span>';
      const target = r.target ? '<span class="log-name">' + escapeHtml(r.target) + '</span>' : '';
      const plural = (n, w) => n + ' ' + w + (n === 1 ? '' : 's');
      const reason = d.reason === 'no_such_user' ? 'unknown user'
                   : d.reason === 'bad_password' ? 'wrong password'
                   : (d.reason || '').replace(/_/g, ' ');
      let msg, detail = '';
      switch (r.action) {
        case 'auth.login_success':
          msg = actor + ' signed in';
          detail = d.ip || '';
          break;
        case 'auth.login_failure':
          msg = 'Failed sign-in for ' + (target || '<span class="log-name muted">unknown</span>');
          detail = [reason, d.ip].filter(Boolean).join(' · ');
          break;
        case 'auth.register':
          msg = actor + ' registered' + (d.first_user ? ' (first user)' : '');
          detail = d.ip || '';
          break;
        case 'user.publish_toggle':
          msg = actor + (d.published ? ' made map public' : ' made map private');
          break;
        case 'user.import':
          msg = actor + ' imported ' + (d.places || 0) + ' places, ' + (d.gpx || 0) + ' routes';
          detail = d.mode + ' mode';
          break;
        case 'admin.user_role_change':
          msg = actor + ' ' + (d.is_admin ? 'promoted ' : 'demoted ') + target;
          break;
        case 'admin.user_force_unpublish':
          msg = actor + ' force-unpublished ' + target;
          break;
        case 'admin.user_revoke_sessions':
          msg = actor + ' revoked ' + plural(d.removed || 0, 'session') + ' for ' + target;
          break;
        case 'admin.user_delete':
          msg = actor + ' deleted ' + target;
          detail = d.cleanup_warning || '';
          break;
        case 'admin.unpublish_all':
          msg = actor + ' force-unpublished all users';
          detail = plural(d.affected || 0, 'user') + ' affected';
          break;
        case 'admin.publishing_gate':
          msg = actor + ' ' + (d.mode === 'open' ? 'opened' : 'closed') + ' publishing';
          break;
        case 'admin.registration_gate':
          msg = actor + ' ' + (d.mode === 'open' ? 'opened' : 'closed') + ' registration';
          break;
        case 'admin.logs_clear':
          msg = actor + ' cleared the audit log';
          break;
        default:
          msg = escapeHtml(r.action) + (r.actor ? ' by ' + actor : '');
          try { detail = JSON.stringify(d); } catch (_) {}
      }
      return { msg, detail };
    }

    function renderAdminLogs(beforeId) {
      const el = document.getElementById('s-admin-logs');
      if (!el) return;
      const append = beforeId != null;
      const qs = '?limit=100' + (beforeId != null ? '&before_id=' + beforeId : '');
      api('GET', '/admin/logs' + qs).then(data => {
        const logs = data.logs || [];
        if (!append && !logs.length) {
          el.innerHTML = '<div class="hint">No events recorded yet.</div>';
          return;
        }
        const rowHtml = logs.map(r => {
          const isFail = r.action === 'auth.login_failure';
          const parts = formatLogRow(r);
          return '<li class="log-row' + (isFail ? ' log-fail' : '') + '">' +
            '<div class="log-head">' +
              '<span class="log-msg">' + parts.msg + '</span>' +
              '<span class="log-time" title="' + new Date(r.ts * 1000).toISOString() + '">' + timeAgo(r.ts) + '</span>' +
            '</div>' +
            (parts.detail ? '<div class="log-details">' + escapeHtml(parts.detail) + '</div>' : '') +
          '</li>';
        }).join('');
        if (append) {
          const list = el.querySelector('.log-list');
          if (list) list.insertAdjacentHTML('beforeend', rowHtml);
        } else {
          el.innerHTML = '<ul class="log-list">' + rowHtml + '</ul>';
        }
        const oldBtn = el.querySelector('.log-more');
        if (oldBtn) oldBtn.remove();
        if (data.next_before_id) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'log-more';
          btn.textContent = 'Load older';
          btn.addEventListener('click', () => {
            btn.disabled = true;
            renderAdminLogs(data.next_before_id);
          });
          el.appendChild(btn);
        }
      }).catch(() => {

              const eyeOff = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>';
              list.innerHTML = '<ul class="user-list">' + items.map(e => {

                const action = shipped

    function openCatalogPicker() {
      const own = Array.isArray(state.places) ? state.places : [];
      if (!own.length) {
        alert('You have no places to promote yet. Add some first.');
        return;
      }
      api('GET', '/catalog').then(catalog => {
        const inCatalog = new Set((Array.isArray(catalog) ? catalog : []).map(e => e && e.name).filter(Boolean));
        const places = own.filter(p => !inCatalog.has(p.name));
        if (!places.length) {
          alert('All your places are already in the catalog.');
          return;
        }
        places.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        renderCatalogPicker(places);
      }).catch(err => alert('Could not load catalog: ' + err.message));
    }

    function renderCatalogPicker(places) {
      const rows = places.map((p, i) => {
        const meta = [p.category, p.country].filter(Boolean).join(' · ');
        const name = escapeHtml(p.name || '(unnamed)');
        const note = (p.note || '').trim();
        return '<label class="browse-row" data-idx="' + i + '" style="display:flex;align-items:flex-start;gap:0.6rem;padding:0.45rem 0;border-bottom:1px solid var(--border);cursor:pointer">' +
          '<input type="checkbox" class="cat-pick" data-idx="' + i + '" style="margin-top:0.2rem">' +
          '<span style="flex:1;min-width:0">' +
            '<span title="' + name + '" style="display:block;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + name + '</span>' +
            (meta ? '<span style="display:block;font-size:0.72rem;color:var(--muted)">' + escapeHtml(meta) + '</span>' : '') +
            (note ? '<span class="row-note">' + escapeHtml(note) + '</span>' : '') +
          '</span>' +
        '</label>';
      }).join('');
      openModal(
        '<button class="modal-close modal-close-floating" aria-label="Close">&times;</button>' +
        '<h2>Add to catalog</h2>' +
        '<input type="text" id="cat-filter" placeholder="Filter…" style="margin-bottom:0.5rem">' +
        '<div id="cat-list" style="overflow-y:auto">' + rows + '</div>' +
        '<div class="modal-error" id="add-error"></div>' +
        '<div class="modal-actions" style="display:flex;align-items:center;gap:0.6rem">' +
          '<button type="button" class="row-notes-toggle" id="cat-notes-toggle">Show notes</button>' +
          '<span id="cat-status" style="font-size:0.75rem;color:var(--muted);flex:1"></span>' +
          '<button type="button" id="cat-add-all">Add all</button>' +
          '<button type="button" class="primary" id="cat-submit" disabled>Add selected</button>' +
        '</div>',
        function() {
          const filter = document.getElementById('cat-filter');
          const list = document.getElementById('cat-list');
          const submit = document.getElementById('cat-submit');
          const addAll = document.getElementById('cat-add-all');
          const status = document.getElementById('cat-status');
          // state.places carries runtime annotations (`_slug`, normalized empty
          // `category`) that aren't part of the server-side place schema; only
          // forward the documented fields.
          const ALLOWED = ['name', 'lat', 'lon', 'category', 'country', 'visited', 'note', 'sources', 'local_name', 'date_visited', 'rating'];
          function visibleRows() {
            return Array.from(list.querySelectorAll('.browse-row')).filter(r => r.style.display !== 'none');
          }
          function cleanPlace(p) {
            const out = {};
            for (const k of ALLOWED) {
              if (p[k] === '' && k === 'category') continue;
              if (p[k] !== undefined && p[k] !== null) out[k] = p[k];
            }
            return out;
          }
          function updateBtns() {
            const checked = list.querySelectorAll('.cat-pick:checked').length;
            submit.disabled = checked === 0;
            submit.textContent = checked ? 'Add ' + checked + ' selected' : 'Add selected';
            const v = visibleRows().length;
            addAll.disabled = v === 0;
            addAll.textContent = 'Add all' + (v && v < places.length ? ' (' + v + ')' : '');
          }
          list.addEventListener('change', updateBtns);
          filter.addEventListener('input', function() {
            const q = this.value.trim().toLowerCase();
            list.querySelectorAll('.browse-row').forEach(row => {
              row.style.display = (!q || row.textContent.toLowerCase().includes(q)) ? 'flex' : 'none';
            });
            updateBtns();
          });
          function submitPicks(picks) {
            if (!picks.length) return;
            submit.disabled = true;
            addAll.disabled = true;
            status.textContent = 'Adding…';
            const errEl = document.getElementById('add-error');
            if (errEl) errEl.classList.remove('visible');
            return api('POST', '/admin/catalog/add', { entries: picks })
              .then(r => {
                state._catalogCache = null;
                closeModal();
                renderAdminCatalog();
                if (r.skipped) {
                  // Surface skip count so the admin knows dedup happened.
                  alert('Added ' + r.added + ', skipped ' + r.skipped + ' (already in catalog).');
                }
              })
              .catch(err => {
                submit.disabled = false;
                status.textContent = '';
                updateBtns();
                const e = document.getElementById('add-error');
                if (e) { e.textContent = err.message; e.classList.add('visible'); }
              });
          }
          submit.addEventListener('click', function() {
            const picks = Array.from(list.querySelectorAll('.cat-pick:checked'))
              .map(cb => places[parseInt(cb.dataset.idx, 10)])
              .filter(Boolean)
              .map(cleanPlace);
            submitPicks(picks);
          });
          addAll.addEventListener('click', function() {
            const picks = visibleRows()
              .map(r => places[parseInt(r.dataset.idx, 10)])
              .filter(Boolean)
              .map(cleanPlace);
            submitPicks(picks);
          });
          const notesToggle = document.getElementById('cat-notes-toggle');
          notesToggle.addEventListener('click', function() {
            list.classList.add('notes-anim');
            const on = list.classList.toggle('show-notes');
            this.textContent = on ? 'Hide notes' : 'Show notes';
          });
          updateBtns();
        }
      );
    }

    function handleAdminUserAction(btn) {
      const row = btn.closest('.user-row');
      const uid = row.dataset.uid;
      const uname = row.dataset.uname;
      const act = btn.dataset.act;
      const refresh = () => { renderAdminUsers(); renderAdminStats(); };
      const fail = err => alert('Failed: ' + err.message);
      if (act === 'unpublish') {
        openConfirmModal({
          title: 'Force unpublish ' + uname,
          body: uname + '\'s map will no longer be reachable at the public URL. They can republish if global publishing is on.',
          confirmLabel: 'Unpublish',
        }).then(ok => {
          if (!ok) return;
          btn.disabled = true;
          api('POST', '/admin/users/' + uid + '/unpublish').then(refresh).catch(fail);
        });
      } else if (act === 'revoke') {
        openConfirmModal({
          title: 'Revoke sessions for ' + uname,
          body: 'Signs ' + uname + ' out on every device they are currently signed in on.',
          confirmLabel: 'Revoke',
        }).then(ok => {
          if (!ok) return;
          btn.disabled = true;
          api('POST', '/admin/users/' + uid + '/revoke-sessions').then(refresh).catch(fail);
        });
      } else if (act === 'role') {
        const promote = btn.dataset.promote === '1';
        openConfirmModal({
          title: (promote ? 'Promote ' : 'Demote ') + uname,
          body: promote
            ? uname + ' will get full admin access, including this Admin tab and the ability to delete other users.'
            : uname + ' will lose admin access on their next request.',
          confirmLabel: promote ? 'Promote' : 'Demote',
        }).then(ok => {
          if (!ok) return;
          btn.disabled = true;
          api('POST', '/admin/users/' + uid + '/role', { is_admin: promote }).then(refresh).catch(fail);
        });
      } else if (act === 'delete') {
        openConfirmModal({
          title: 'Delete user ' + uname,
          body: 'Permanently removes ' + uname + ', all their sessions, and their data folder (places, routes, preferences). This cannot be undone.',
          confirmLabel: 'Delete user',
          danger: true,
        }).then(ok => {
          if (!ok) return;
          btn.disabled = true;
          api('DELETE', '/admin/users/' + uid).then(resp => {
            if (resp && resp.cleanup_warning) {
              alert('User deleted, but data folder cleanup incomplete: ' + resp.cleanup_warning);
            }
            refresh();
          }).catch(fail);
        });
      }
    }

    // Generic floating context menu. Pass `items` as an array of
    // { label, onClick, danger? } objects, or `null` to insert a divider.
    // Auto-closes on click outside, Escape, scroll, or window blur.
    let _ctxMenuEl = null;
    function closeContextMenu() {
      if (_ctxMenuEl) { _ctxMenuEl.remove(); _ctxMenuEl = null; }
    }
    function copyShareLink(type, slug) {
      const url = location.origin + location.pathname + focusHash(type, slug);
      const fallback = () => prompt('Copy this link:', url);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).catch(fallback);
      } else {
        fallback();
      }
    }

    function openContextMenu({ x, y, items }) {
      closeContextMenu();
      const menu = document.createElement('div');
      menu.className = 'context-menu';
      for (const item of items) {
        if (item === null) {
          const sep = document.createElement('div');
          sep.className = 'ctx-divider';
          menu.appendChild(sep);
          continue;
        }
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = item.label;
        if (item.danger) btn.className = 'danger';
        btn.addEventListener('click', function() {
          closeContextMenu();
          try { item.onClick(); } catch (e) { console.error(e); }
        });
        menu.appendChild(btn);
      }
      document.body.appendChild(menu);
      // Clamp to viewport (measure after mount).
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const rect = menu.getBoundingClientRect();
      const left = Math.min(x, vw - rect.width - 8);
      const top  = Math.min(y, vh - rect.height - 8);
      menu.style.left = Math.max(8, left) + 'px';
      menu.style.top  = Math.max(8, top) + 'px';
      _ctxMenuEl = menu;
      // Dismissal listeners (next tick so the opening click doesn't fire them).
      setTimeout(function() {
        document.addEventListener('click', _ctxOutsideClick, true);
        document.addEventListener('contextmenu', _ctxOutsideClick, true);
        document.addEventListener('keydown', _ctxKey, true);
        window.addEventListener('scroll', closeContextMenu, true);
        window.addEventListener('blur', closeContextMenu);
      }, 0);
    }
    function _ctxOutsideClick(e) {
      if (!_ctxMenuEl) return;
      if (_ctxMenuEl.contains(e.target)) return;
      closeContextMenu();
      _ctxTeardown();
    }
    function _ctxKey(e) {
      if (e.key === 'Escape') { closeContextMenu(); _ctxTeardown(); }
    }
    function _ctxTeardown() {
      document.removeEventListener('click', _ctxOutsideClick, true);
      document.removeEventListener('contextmenu', _ctxOutsideClick, true);
      document.removeEventListener('keydown', _ctxKey, true);
      window.removeEventListener('scroll', closeContextMenu, true);
      window.removeEventListener('blur', closeContextMenu);
    }

    // Wire contextmenu (desktop right-click) and long-press (touch) on an
    // element to invoke `buildItems(event)` and open a context menu.
    function attachContextMenu(el, buildItems) {
      el.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        const items = buildItems(e);
        if (items && items.length) openContextMenu({ x: e.clientX, y: e.clientY, items });
      });
      // Touch long-press (~400ms). Suppress the click that follows.
      let pressTimer = null;
      let pressX = 0, pressY = 0;
      let firedLongPress = false;
      el.addEventListener('touchstart', function(e) {
        if (!e.touches || !e.touches[0]) return;
        firedLongPress = false;
        pressX = e.touches[0].clientX;
        pressY = e.touches[0].clientY;
        pressTimer = setTimeout(function() {
          firedLongPress = true;
          const items = buildItems(e);
          if (items && items.length) openContextMenu({ x: pressX, y: pressY, items });
        }, 400);
      }, { passive: true });
      const cancelLongPress = function() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      };
      el.addEventListener('touchmove', cancelLongPress, { passive: true });
      el.addEventListener('touchend', cancelLongPress);
      el.addEventListener('touchcancel', cancelLongPress);
      // Swallow the synthetic click that follows a long-press.
      el.addEventListener('click', function(e) {
        if (firedLongPress) { e.preventDefault(); e.stopPropagation(); firedLongPress = false; }
      }, true);
    }

    function openConfirmModal({ title, body, confirmLabel, danger }) {
      return new Promise(resolve => {
        let settled = false;
        let onEnter = null;
        const finish = ok => {
          if (settled) return;
          settled = true;
          if (onEnter) document.removeEventListener('keydown', onEnter, true);
          closeTopModal();
          resolve(ok);
        };
        const html =
          '<h2>' + escapeHtml(title) + '<button class="modal-close">&times;</button></h2>' +
          '<div class="modal-desc" style="font-size:0.85rem">' + escapeHtml(body) + '</div>' +
          '<div class="modal-actions">' +
            '<button type="button" data-role="cancel">Cancel</button>' +
            '<button type="button" class="' + (danger ? 'danger-btn' : 'primary') + '" data-role="ok">' + escapeHtml(confirmLabel || 'Confirm') + '</button>' +
          '</div>';
        openModal(html, backdrop => {
          const modal = backdrop.querySelector('.modal');
          if (modal) modal.style.maxWidth = '380px';
          backdrop.querySelector('[data-role="ok"]').addEventListener('click', () => finish(true));
          backdrop.querySelector('[data-role="cancel"]').addEventListener('click', () => finish(false));
          // Enter to confirm: only while this confirm is the topmost modal.
          onEnter = e => {
            if (e.key !== 'Enter') return;
            if (modalStack[modalStack.length - 1] && modalStack[modalStack.length - 1].backdrop !== backdrop) return;
            e.preventDefault();
            finish(true);
          };
          document.addEventListener('keydown', onEnter, true);
        }, () => finish(false));
      });
    }

    function refreshPlaces() {
      return fetchJson(dataUrl('places'), []).then(data => {
        state.places = Array.isArray(data) ? data : [];
        assignPlaceSlugs(state.places);
        const cc = assignCategoryColors(state.places);
        state.categoryColors = cc.dark;
        state.categoryColorsLight = cc.light;
      });

    function refreshRoutes() {
      return fetchJson(dataUrl('routes'), null).then(data => {
        if (!data || !Array.isArray(data.regions)) return;
        data.regions.sort((a, b) => a.name.localeCompare(b.name));
        for (const region of data.regions) region.routes.sort((a, b) => a.name.localeCompare(b.name));
        state.manifest = data;
        assignTrailSlugs(state.manifest);
      });
    }

    // ----- Modal infrastructure -----
    // Modals form a stack: each open call appends a new backdrop, each close
    // removes the topmost. This avoids the race that the innerHTML-replace
    // approach had (closeModal in-flight while openModal mounts the next one)
    // and lets confirm dialogs sit on top of an existing modal without
    // wiping its listeners.
    const MODAL_CLOSE_MS = 100;
    const modalStack = [];

    function openModal(html, onMount, onClose) {
      const root = document.getElementById('modal-root');
      const wrap = document.createElement('div');
      wrap.innerHTML = '<div class="modal-backdrop"><div class="modal">' + html + '</div></div>';
      const backdrop = wrap.firstElementChild;
      // Each modal lives a notch above the one below it so stacking is
      // explicit (the .modal-backdrop CSS rule has z-index: 2000).
      backdrop.style.zIndex = 2000 + modalStack.length * 10;
      root.appendChild(backdrop);
      const entry = { backdrop, onClose: null };
      // Default close behavior: tear down this backdrop. onClose overrides
      // run instead and may call closeModal()/closeTopModal() themselves.
      entry.onClose = onClose
        ? () => onClose()
        : () => closeTopModal();
      modalStack.push(entry);
      backdrop.addEventListener('click', e => { if (e.target === backdrop) entry.onClose(); });
      backdrop.querySelectorAll('.modal-close').forEach(el => el.addEventListener('click', () => entry.onClose()));
      if (modalStack.length === 1) document.addEventListener('keydown', escClose);
      if (onMount) onMount(backdrop);
      return backdrop;
    }

    function closeTopModal() {
      const entry = modalStack.pop();
      if (!entry) return;
      entry.backdrop.classList.add('closing');
      setTimeout(() => {
        if (entry.backdrop.parentElement) entry.backdrop.parentElement.removeChild(entry.backdrop);
      }, MODAL_CLOSE_MS);
      if (modalStack.length === 0) document.removeEventListener('keydown', escClose);
    }

    // Public alias preserved for the many callers in this file.
    function closeModal() { closeTopModal(); }

    function escClose(e) {
      if (e.key !== 'Escape') return;
      const top = modalStack[modalStack.length - 1];
      if (top) top.onClose();
    }
    function showModalError(msg) {
      const el = document.querySelector('.modal-error');
      if (el) { el.textContent = msg; el.classList.add('visible'); }
    }

    function bindSignInForm(opts) {
      let mode = state.auth.has_users ? 'login' : 'register';
      setMode(mode);
      document.querySelectorAll('#auth-tabs button[data-mode]').forEach(b => {
        b.addEventListener('click', function() { setMode(this.dataset.mode); });
      });
      document.getElementById('auth-form').addEventListener('submit', function(e) {
        e.preventDefault();
        submit();
      });
      document.getElementById('auth-username').focus();

      function setMode(m) {
        mode = m;
        document.querySelectorAll('#auth-tabs button[data-mode]').forEach(b => {
          b.classList.toggle('active', b.dataset.mode === m);
        });
        document.getElementById('modal-title').textContent = m === 'register' ? 'Register' : 'Sign in';
        document.getElementById('auth-submit').textContent = m === 'register' ? 'Register' : 'Sign in';
        document.getElementById('auth-password').setAttribute('autocomplete', m === 'register' ? 'new-password' : 'current-password');
        document.getElementById('auth-hint').textContent = m === 'register' ? 'Password must be at least 12 characters.' : '';
        const tokenRow = document.getElementById('setup-token-row');
        const tokenInput = document.getElementById('auth-setup-token');
        const needsToken = m === 'register' && state.auth.requires_setup_token;
        tokenRow.hidden = !needsToken;
        if (tokenInput) tokenInput.required = needsToken;
      }
      function submit() {
        const u = document.getElementById('auth-username').value.trim();
        const p = document.getElementById('auth-password').value;
        const payload = { username: u, password: p };
        if (mode === 'register' && state.auth.requires_setup_token) {
          payload.setup_token = document.getElementById('auth-setup-token').value.trim();
        }
        const submitBtn = document.getElementById('auth-submit');
        submitBtn.disabled = true;
        api('POST', '/' + mode, payload)
          .then(() => refreshAuthState())
          .then(() => loadSyncedPrefs())
          .then(() => { if (opts.onSuccess) return opts.onSuccess(); })
          .catch(err => { submitBtn.disabled = false; showModalError(err.message); });
      }
    }

    function renderSignInPage() {
      const app = document.getElementById('app');

      // Surface any published maps as a collapsible list inside the

      fetchJson(apiUrl('/public-maps'), { usernames: [] }).then(function(resp) {

                  '<a class="public-maps-item" href="/u/' + encodeURIComponent(u) + '/">' + escapeHtml(u) + '</a>'
                ).join('') +
              '</div>' +
            '</div>' +
          '</div>';
        const toggle = box.querySelector('.signin-public-toggle');
        const list = document.getElementById('signin-public-collapsible');
        toggle.addEventListener('click', function() {
          const expanded = list.classList.toggle('expanded');

    // ----- Add place / GPX modal -----
    function openAddModal(prefillCoords, initialTab) {
      const showPlaces = placesEnabled();
      const showTrails = routesEnabled();
      if (!showPlaces && !showTrails) return;
      // Entry-point determines which tabs the modal exposes:
      //   'place' (Places list Add)  -> [Place, Browse]
      //   'route' (Routes list Add)  -> just the GPX form, no tabs
      //   null    (map FAB)          -> [Place, Route, Browse], filtered by enabled features
      let tabs;
      if (initialTab === 'route') {
        tabs = ['route'];
      } else if (initialTab === 'place') {
        tabs = showPlaces ? ['place', 'browse'] : ['route'];
      } else {
        tabs = [];
        if (showPlaces) tabs.push('place');
        if (showTrails) tabs.push('route');
        if (showPlaces) tabs.push('browse');
      }
      let tab = tabs[0];
      const tabLabels = { place: 'Place', route: 'Route', browse: 'Browse' };
      openModal(
        '<button class="modal-close modal-close-floating" aria-label="Close">&times;</button>' +
        (tabs.length > 1 ?
          '<div class="modal-tabs" id="add-tabs">' +
            tabs.map(t => '<button data-tab="' + t + '"' + (t === tab ? ' class="active"' : '') + '>' + tabLabels[t] + '</button>').join('') +
          '</div>'
          : '') +
        '<div id="add-body"></div>',
        function() {
          document.querySelectorAll('#add-tabs button[data-tab]').forEach(b => {
            b.addEventListener('click', function() {
              tab = this.dataset.tab;
              document.querySelectorAll('#add-tabs button[data-tab]').forEach(x => x.classList.toggle('active', x.dataset.tab === tab));
              renderTab();
            });
          });
          renderTab();
        }
      );

      function renderTab() {
        const body = document.getElementById('add-body');
        const firstRender = body.dataset.rendered !== '1';
        const oldH = firstRender ? 0 : body.offsetHeight;
        body.innerHTML = tab === 'place' ? placeFormHtml()
          : tab === 'route' ? gpxFormHtml()
          : browseFormHtml();
        if (tab === 'place') wirePlaceForm();
        else if (tab === 'route') wireGpxForm();
        else wireBrowseForm();
        body.dataset.rendered = '1';
        if (firstRender) return;
        if (tab === 'browse') {
          // Browse content is async (loads after the catalog fetch lands), so
          // animating to the "Loading..." height first and snapping to the
          // list afterwards looks twitchy. Skip the height transition here.
          body.style.height = 'auto';
          return;
        }
        // Measure the new content size, then animate from old to new height.
        // After the transition completes, release back to auto so the form can
        // grow naturally (e.g. when the Completed extras expand).
        body.style.height = 'auto';
        const newH = body.offsetHeight;
        body.style.height = oldH + 'px';
        body.offsetHeight;  // force reflow so the transition catches the change
        body.style.height = newH + 'px';
        const onEnd = function(e) {
          if (e.target !== body || e.propertyName !== 'height') return;
          body.style.height = 'auto';
          body.removeEventListener('transitionend', onEnd);
        };
        body.addEventListener('transitionend', onEnd);
      }
