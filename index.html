        '<option value=""' + (currentRegion === '' ? ' selected' : '') + '>(No region)</option>',
        ...allRegions.map(r =>
          '<option value="' + escapeHtml(r) + '"' + (r === currentRegion ? ' selected' : '') + '>' + escapeHtml(r) + '</option>'
        ),
        '<option value="__new__">(Add new region&hellip;)</option>',
      ].join('');
      openModal(
        '<h2>Edit trail<button class="modal-close">&times;</button></h2>' +
        '<form id="trail-meta-form">' +
          '<label for="tm-name">Name</label>' +
          '<input type="text" id="tm-name" required maxlength="64" value="' + escapeHtml(route.name) + '">' +
          (getShowField('native-name') ?
            '<label for="tm-local-name">Native name (optional)</label>' +
            '<input type="text" id="tm-local-name" placeholder="e.g. 金閣寺路" value="' + escapeHtml(route.local_name || '') + '">'
          : '') +
          '<label for="tm-region">Region</label>' +
          '<select id="tm-region">' + regionOptions + '</select>' +
          '<input type="text" id="tm-region-new" placeholder="New region name" maxlength="64" hidden>' +
          '<label for="tm-difficulty">Difficulty</label>' +
          radioPillsHtml('tm-difficulty', [['', 'None'], ['easy', 'Easy'], ['moderate', 'Moderate'], ['hard', 'Hard'], ['expert', 'Expert']], route.difficulty || '') +
          '<label for="tm-tags">Tags (comma-separated, lowercase)</label>' +
          '<input type="text" id="tm-tags" value="' + escapeHtml((route.tags || []).join(', ')) + '" placeholder="summit, panorama, via-ferrata">' +
          (getShowField('note') ?
            '<label for="tm-notes">Notes</label>' +
            '<textarea id="tm-notes" maxlength="2000">' + escapeHtml(route.notes || '') + '</textarea>'
          : '') +
          '<label for="tm-source">Source URL (optional)</label>' +
          '<input type="url" id="tm-source" value="' + escapeHtml(route.source || '') + '" placeholder="https://example.com/trail">' +
          '<div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem">' +
            '<input type="checkbox" class="settings-toggle" id="tm-completed"' + (route.completed ? ' checked' : '') + '>' +
            '<label for="tm-completed" style="margin:0">I&rsquo;ve completed this trail</label>' +
          '</div>' +
          ((getShowField('date') || getShowField('rating')) ?
            '<div class="collapsible' + (route.completed ? ' expanded' : '') + '" id="tm-completed-extras">' +
              '<div class="collapsible-inner">' +
                (getShowField('date') ?
                  '<label for="tm-date">Date hiked</label>' +
                  '<input type="date" id="tm-date" value="' + escapeHtml(route.date_hiked || '') + '">'
                : '') +
                (getShowField('rating') ?
                  '<label for="tm-rating">Rating</label>' +
                  starRatingHtml('tm-rating', route.rating || '')
                : '') +
              '</div>' +
            '</div>'
          : '') +
          '<div class="modal-error" id="tm-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="button" class="session-revoke" id="tm-delete">Delete</button>' +
            '<span style="flex:1"></span>' +
            '<button type="submit" class="primary" id="tm-submit">Save</button>' +
          '</div>' +
        '</form>',
        function() {
          wireStarRating('tm-rating');
          const regionSel = document.getElementById('tm-region');
          const regionNewInput = document.getElementById('tm-region-new');
          regionSel.addEventListener('change', function() {
            const adding = this.value === '__new__';
            regionNewInput.hidden = !adding;
            if (adding) regionNewInput.focus();
          });
          const tmCompletedCb = document.getElementById('tm-completed');
          const tmCompletedExtras = document.getElementById('tm-completed-extras');
          if (tmCompletedCb && tmCompletedExtras) {
            tmCompletedCb.addEventListener('change', function() {
              tmCompletedExtras.classList.toggle('expanded', this.checked);
            });
          }
          document.getElementById('tm-delete').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            deleteTrail(route, regionName).then(function(deleted) {
              if (deleted) { closeModal(); wrappedRouter(); }
              else { btn.disabled = false; }
            });
          });
          document.getElementById('trail-meta-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const get = id => { const el = document.getElementById(id); return el ? el.value : ''; };
            const dateVal = get('tm-date').trim();
            const ratingRaw = readStarRating('tm-rating');
            const difficulty = (document.querySelector('input[name="tm-difficulty"]:checked') || {}).value || '';
            const tagsRaw = get('tm-tags');
            const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
            const source = get('tm-source').trim();
            const notes = get('tm-notes');
            const localName = get('tm-local-name').trim();
            const metadata = {};
            if (dateVal) metadata.date_hiked = dateVal;
            if (ratingRaw) metadata.rating = parseInt(ratingRaw, 10);
            if (difficulty) metadata.difficulty = difficulty;
            if (tags.length) metadata.tags = tags;
            if (source) metadata.source = source;
            if (notes.trim()) metadata.notes = notes;
            if (localName) metadata.local_name = localName;
            const newName = get('tm-name').trim();
            if (!newName) {
              showModalError('Name is required');
              return;
            }
            const targetRegion = regionSel.value === '__new__'
              ? regionNewInput.value.trim()
              : regionSel.value;
            if (regionSel.value === '__new__' && !targetRegion) {
              showModalError('Enter a new region name');
              return;
            }
            const needsMove = targetRegion !== currentRegion || newName !== route.name;
            const newCompleted = tmCompletedCb ? tmCompletedCb.checked : !!route.completed;
            const needsCompletedFlip = newCompleted !== !!route.completed;
            const submit = document.getElementById('tm-submit');
            submit.disabled = true;
            let chain = Promise.resolve(key);
            if (needsCompletedFlip) {
              chain = chain.then(k => api('POST', '/gpx/set-completed', { key: k, completed: newCompleted }).then(() => k));
            }
            if (needsMove) {
              chain = chain.then(k => api('POST', '/gpx/move', { key: k, new_region: targetRegion, new_name: newName }).then(r => r.new_key));
            }
            chain
              .then(finalKey => api('PUT', '/metadata', { key: finalKey, metadata: metadata }))
              .then(() => refreshRoutes())
              .then(() => { closeModal(); wrappedRouter(); })
              .catch(err => { submit.disabled = false; showModalError(err.message); });
          });
        }
      );
    }

    function addStartEndMarkers(map, startLatLng, endLatLng) {
      const startIcon = L.divIcon({ className: 'marker-start', html: '<svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="6" fill="#00e05a" stroke="#fff" stroke-width="2"/></svg>', iconSize: [16, 16], iconAnchor: [8, 8] });
      const endIcon = L.divIcon({ className: 'marker-end', html: '<svg viewBox="0 0 32 32" width="32" height="32"><rect x="4" y="2" width="2" height="28" rx="1" fill="#fff" stroke="#2d333b" stroke-width="0.5"/><path d="M6 3h12c1 0 1.5.5 1 1.5L17 8l2 3.5c.5 1 0 1.5-1 1.5H6V3z" fill="#fff" stroke="#2d333b" stroke-width="0.5"/><rect x="7" y="4" width="4.5" height="4" fill="#2d333b"/><rect x="11.5" y="4" width="4.5" height="4" fill="#fff"/><rect x="7" y="8" width="4.5" height="4" fill="#fff"/><rect x="11.5" y="8" width="4.5" height="4" fill="#2d333b"/></svg>', iconSize: [32, 32], iconAnchor: [5, 30] });
      L.marker(startLatLng, { icon: startIcon }).bindPopup('Start').addTo(map);
      L.marker(endLatLng, { icon: endIcon }).bindPopup('End').addTo(map);
    }

    // ----- Unified map -----
    function renderUnifiedMap(focus) {
      setActiveTab('map');
      setCrumb('', false);
      document.getElementById('nav-info').innerHTML = '';
      const prevView = state.currentMap
        ? { center: state.currentMap.getCenter(), zoom: state.currentMap.getZoom() }
        : null;
      // If any filter is active, ignore the persisted "remember last view" so
      // the initial fit zooms to the filtered subset instead of restoring an
      // unrelated location.
      const anyFilterActive = (state.hiddenRegions && state.hiddenRegions.size > 0)
        || (state.hiddenCategories && state.hiddenCategories.size > 0)
        || !state.showVisited || !state.showWant
        || !state.showCompleted || !state.showPlanned;
      const storedView = (!prevView && getRememberView() && !anyFilterActive) ? loadStoredView() : null;
      cleanupMap();

      const app = document.getElementById('app');
      app.innerHTML = '<div id="map"></div>';

      const dv = prevView || storedView || ((!placesEnabled() && trailsEnabled())
        ? (state.config.default_view_trails || DEFAULT_CONFIG.default_view_trails)
        : (state.config.default_view || DEFAULT_CONFIG.default_view));
      const map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
        maxBounds: [[-90, -200], [90, 200]],
        maxBoundsViscosity: 1.0,
        preferCanvas: true,
        markerZoomAnimation: false
      }).setView(dv.center, dv.zoom);
      L.control.attribution({ prefix: false }).addTo(map);
      state.currentMap = map;
      // Mark the container as "zooming" for the entire pinch gesture so
      // CSS can hide expensive panes (.leaflet-container.zooming rules).
      map.on('zoomstart', () => map.getContainer().classList.add('zooming'));
      map.on('zoomend', () => map.getContainer().classList.remove('zooming'));
      addTileLayersToMap(map);

      if (getRememberView()) {
        map.on('moveend zoomend', function() {
          const c = map.getCenter();
          saveStoredView({ center: [c.lat, c.lng], zoom: map.getZoom() });
        });
      }

      // Places
      const clusterGroup = createPlaceLayerGroup();

      const placeMarkers = [];
      const placeBounds = L.latLngBounds();
      let focusPlace = null;

      // Build markers regardless of the Visible-features toggle so that the
      // toggle can flip layer visibility without forcing a map rebuild. The
      // cluster group is only added to the map by applyMapFilters when
      // placesEnabled() is true.
      if (state.places) {
        for (const p of state.places) {
          const marker = createPlaceMarker(p);
          placeMarkers.push(marker);
          if (placesEnabled()) {
            const filteredOut = state.hiddenCategories.has(p.category)
              || (p.visited && !state.showVisited)
              || (!p.visited && !state.showWant);
            if (!filteredOut) placeBounds.extend([p.lat, p.lon]);
          }
          if (focus && focus.type === 'place' && focus.name === p.name) focusPlace = marker;
        }
      }

      state._placeMarkers = placeMarkers;
      state._placeClusterGroup = clusterGroup;

      // Trails: two groups by status
      const groupCompleted = L.featureGroup();
      const groupPlanned = L.featureGroup();
      const trailLayers = [];
      const trailBounds = L.latLngBounds();
      let focusTrailKey = (focus && focus.type === 'trail') ? focus.name : null;
      let focusTrailLayer = null;

      // Same rationale as places: always build the GPX layers; visibility is
      // controlled by applyMapFilters.
      if (state.manifest) {
        for (const region of state.manifest.regions) {
          for (const route of region.routes) {
            const color = trailStatusColor(route.completed);
            const parent = route.completed ? groupCompleted : groupPlanned;
            const gpxUrl = gpxUrlFor(route.file);
            // Use the manifest-supplied bbox synchronously so initial map
            // bounds reflect filtered trails without waiting on GPX async load.
            const visibleStatus = route.completed ? state.showCompleted : state.showPlanned;
            if (route.bbox && route.bbox.length === 4
                && !state.hiddenRegions.has(region.name)
                && visibleStatus) {
              trailBounds.extend([route.bbox[0], route.bbox[1]]);
              trailBounds.extend([route.bbox[2], route.bbox[3]]);
            }
            const gpxLayer = new L.GPX(gpxUrl, {
              async: true,
              polyline_options: { color: color, opacity: 0.85, weight: 4 * getTrailWeightFactor() },
              markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
            });
            gpxLayer.on('loaded', function(e) {
              const b = e.target.getBounds();
              if (b.isValid()) trailBounds.extend(b);
              if (focusTrailKey && route.key === focusTrailKey) {
                focusTrailLayer = e.target;
                if (b.isValid()) map.fitBounds(b, { padding: [40, 40] });
              }
            }).bindPopup(
              trailPopupHtml(route, region, color),
              { closeButton: false }
            ).on('click', (function(slug) {
              return function() { history.replaceState(null, '', focusHash('trail', slug)); };
            })(route._slug || route.key));
            parent.addLayer(gpxLayer);
            trailLayers.push({ route, region: region.name, layer: gpxLayer, completed: route.completed });
          }
        }
      }

      state._trailLayers = trailLayers;
      state._trailGroupCompleted = groupCompleted;
      state._trailGroupPlanned = groupPlanned;

      applyMapFilters();

      // Initial bounds: places + trails, prefer focus
      if (focusPlace) {
        setTimeout(function() { revealPlaceMarker(map, focusPlace); }, 300);
      } else if (!focusTrailKey && !prevView && !storedView) {
        const combined = L.latLngBounds();
        if (placeBounds.isValid()) combined.extend(placeBounds);
        if (trailBounds.isValid()) combined.extend(trailBounds);
        if (combined.isValid()) map.fitBounds(combined, { padding: [40, 40] });
      }

      // Filter panel
      const PanelControl = L.Control.extend({
        options: { position: 'bottomleft' },
        onAdd: function() {
          const div = L.DomUtil.create('div', 'map-panel');
          div.id = 'map-panel';
          const searchPlaceholder = placesEnabled() && trailsEnabled()
            ? 'Search places + trails...'
            : (placesEnabled() ? 'Search places...' : 'Search trails...');
          div.innerHTML =
            '<div class="panel-search" id="map-search">' +
            '<input type="text" id="map-search-input" placeholder="' + searchPlaceholder + '">' +
            '<div class="map-search-results" id="map-search-results"></div>' +
            '</div>' +
            (placesEnabled() ? panelSectionHtml('places', 'Places') : '') +
            (trailsEnabled() ? panelSectionHtml('trails', 'Trails') : '');
          L.DomEvent.disableClickPropagation(div);
          L.DomEvent.disableScrollPropagation(div);
          return div;
        }
      });
      if (placesEnabled() || trailsEnabled()) {
        map.addControl(new PanelControl());
        bindFilterPanel();
        refreshFilterPanel();
        initUnifiedSearch(map);
      }
      bindPopupActions(map);

      // Nav summary
      const placeCount = state.places ? state.places.length : 0;
      const trailCount = state.manifest ? state.manifest.regions.reduce((n, r) => n + r.routes.length, 0) : 0;
      let stats = '';
      if (placesEnabled()) stats += '<div class="nav-stat"><span class="value">' + placeCount + ' places</span></div>';
      if (trailsEnabled()) stats += '<div class="nav-stat"><span class="value">' + trailCount + ' trails</span></div>';
      document.getElementById('nav-info').innerHTML = '<div class="nav-group">' + stats + '</div>';
    }

    function refreshFilterPanel() {
      const placesBody = document.getElementById('places-body');
      if (placesBody) {
        const cats = sortedCategorySlugs(Object.keys(state.categoryColors));
        let html = '<div class="legend-cats">';
        for (const cat of cats) {
          const color = state.categoryColors[cat];
          const hidden = state.hiddenCategories.has(cat);
          html += '<div class="legend-item' + (hidden ? ' disabled' : '') + '" data-cat="' + escapeHtml(cat) + '">';
          html += '<span class="legend-dot" style="background:' + color + '"></span>';
          html += escapeHtml(displayCategory(cat));
          html += '</div>';
        }
        html += '</div>';
        html += '<div class="legend-status">';
        html += '<div class="status-chip' + (state.showVisited ? ' active' : '') + '" data-filter="visited">Visited</div>';
        html += '<div class="status-chip' + (state.showWant ? ' active' : '') + '" data-filter="want">Want</div>';
        html += '</div>';
        placesBody.innerHTML = html;
      }

      const trailsBody = document.getElementById('trails-body');
      if (trailsBody) {
        let html = '<div class="legend-cats" style="grid-template-columns:1fr">';
        html += '<div class="legend-item' + (state.showCompleted ? '' : ' disabled') + '" data-trail-status="completed">';
        html += '<span class="legend-line completed"></span>Completed';
        html += '</div>';
        html += '<div class="legend-item' + (state.showPlanned ? '' : ' disabled') + '" data-trail-status="planned">';
        html += '<span class="legend-line planned"></span>Planned';
        html += '</div>';
        html += '</div>';
        const regions = state.manifest && state.manifest.regions ? state.manifest.regions.map(r => r.name) : [];
        if (regions.length) {
          html += '<div class="legend-cats" style="margin-top:0.4rem">';
          for (const r of regions) {
            const hidden = state.hiddenRegions.has(r);
            html += '<div class="legend-item' + (hidden ? ' disabled' : '') + '" data-region="' + escapeHtml(r) + '">';
            html += escapeHtml(displayRegion(r));
            html += '</div>';
          }
          html += '</div>';
        }
        trailsBody.innerHTML = html;
      }
    }

    function bindFilterPanel() {
      // Section collapse
      document.querySelectorAll('.panel-section-header').forEach(function(h) {
        h.addEventListener('click', function(e) {
          if (e.target.closest('.panel-action')) return;
          document.getElementById(this.dataset.section).classList.toggle('collapsed');
        });
      });

      // Toggle-all (places)
      const placesToggle = document.getElementById('places-toggle-all');
      if (placesToggle) placesToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const cats = Object.keys(state.categoryColors);
        const allOn = state.hiddenCategories.size === 0 && state.showVisited && state.showWant;
        if (allOn) {
          cats.forEach(c => state.hiddenCategories.add(c));
          state.showVisited = false; state.showWant = false;
        } else {
          state.hiddenCategories.clear();
          state.showVisited = true; state.showWant = true;
        }
        refreshFilterPanel();
        applyMapFilters();
      });

      // Toggle-all (trails) - mirrors Places: covers regions + completed/planned.
      const trailsToggle = document.getElementById('trails-toggle-all');
      if (trailsToggle) trailsToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const regions = state.manifest ? state.manifest.regions.map(r => r.name) : [];
        const allOn = state.hiddenRegions.size === 0 && state.showCompleted && state.showPlanned;
        if (allOn) {
          regions.forEach(r => state.hiddenRegions.add(r));
          state.showCompleted = false; state.showPlanned = false;
        } else {
          state.hiddenRegions.clear();
          state.showCompleted = true; state.showPlanned = true;
        }
        refreshFilterPanel();
        applyMapFilters();
      });

      // Delegated clicks on the body elements (survive innerHTML refresh)
      const placesBody = document.getElementById('places-body');
      if (placesBody) placesBody.addEventListener('click', function(e) {
        const cat = e.target.closest('.legend-item[data-cat]');
        if (cat) {
          const c = cat.dataset.cat;
          if (state.hiddenCategories.has(c)) { state.hiddenCategories.delete(c); cat.classList.remove('disabled'); }
          else { state.hiddenCategories.add(c); cat.classList.add('disabled'); }
          pulseChip(cat);
          applyMapFilters();
          return;
        }
        const chip = e.target.closest('.status-chip[data-filter]');
        if (chip) {
          if (chip.dataset.filter === 'visited') state.showVisited = !state.showVisited;
          else state.showWant = !state.showWant;
          chip.classList.toggle('active');
          pulseChip(chip);
          applyMapFilters();
        }
      });

      const trailsBody = document.getElementById('trails-body');
      if (trailsBody) trailsBody.addEventListener('click', function(e) {
        const item = e.target.closest('.legend-item[data-trail-status]');
        if (item) {
          const s = item.dataset.trailStatus;
          if (s === 'completed') state.showCompleted = !state.showCompleted;
          else state.showPlanned = !state.showPlanned;
          item.classList.toggle('disabled');
          pulseChip(item);
          applyMapFilters();
          return;
        }
        const region = e.target.closest('.legend-item[data-region]');
        if (region) {
          const r = region.dataset.region;
          if (state.hiddenRegions.has(r)) { state.hiddenRegions.delete(r); region.classList.remove('disabled'); }
          else { state.hiddenRegions.add(r); region.classList.add('disabled'); }
          pulseChip(region);
          applyMapFilters();
        }
      });
    }

    function bindPopupActions(map) {
      // Delegated click on popup contents. Leaflet popups are rendered into the
      // map container, so a single delegated handler covers all of them.
      map.getContainer().addEventListener('click', function(e) {
        const edit = e.target.closest('.popup-edit');
        if (edit) {
          e.preventDefault();
          const name = edit.dataset.place;
          const place = state.places.find(p => p.name === name);
          if (place) {
            map.closePopup();
            openEditPlaceModal(place);
          }
          return;
        }
        const trailEdit = e.target.closest('.popup-trail-edit');
        if (trailEdit) {
          e.preventDefault();
          const found = findRouteByKey(trailEdit.dataset.key);
          if (found) {
            map.closePopup();
            openEditTrailMetadataModal(found.route, found.region.name);
          }
          return;
        }
        const share = e.target.closest('.popup-share');
        if (share) {
          e.preventDefault();
          const type = share.dataset.type;
          const id = share.dataset.id;
          const url = location.origin + location.pathname + focusHash(type, id);
          const done = () => {
            const original = share.getAttribute('title') || '';
            share.setAttribute('title', 'Copied!');
            share.classList.add('copied');
            setTimeout(() => { share.setAttribute('title', original); share.classList.remove('copied'); }, 1500);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(done, () => prompt('Copy this link:', url));
          } else {
            prompt('Copy this link:', url);
          }
          return;
        }
      });
    }

    // ----- Edit place modal -----
    function openEditPlaceModal(place) {
      // Exclude the uncategorized bucket ('') from the picker — "no category"
      // is the default state of the empty option, not a pickable category.
      const cats = sortedCategorySlugs(Object.keys(state.categoryColors).filter(c => c !== ''));
      const sourcesText = (place.sources || []).join('\n');
      openModal(
        '<h2>Edit place<button class="modal-close">&times;</button></h2>' +
        '<form id="edit-place-form">' +
          '<label for="e-name">Name</label>' +
          '<input type="text" id="e-name" required value="' + escapeHtml(place.name) + '">' +
          (getShowField('native-name') ?
            '<label for="e-local-name">Native name (optional)</label>' +
            '<input type="text" id="e-local-name" placeholder="e.g. 東京" value="' + escapeHtml(place.local_name || '') + '">'
          : '') +
          '<div class="row">' +
            '<div><label for="e-lat">Latitude</label><input type="number" id="e-lat" step="any" required value="' + place.lat + '"></div>' +

    // Pan/zoom to a place marker and open its popup. With clustering on, a plain
    // setView+openPopup leaves the marker buried inside an unexpanded cluster;
    // zoomToShowLayer breaks the cluster apart first.
    function revealPlaceMarker(map, marker) {
      const p = marker._placeData;
      const cg = state._placeClusterGroup;
      if (cg && typeof cg.zoomToShowLayer === 'function' && cg.hasLayer(marker)) {
        cg.zoomToShowLayer(marker, function() { marker.openPopup(); });
      } else {
        map.setView([p.lat, p.lon], Math.max(map.getZoom(), 12));
        marker.openPopup();
      }
    }

    // Force a style recalc so a class change is observed as a transition start
    // rather than batched away. Used for entry animations and for restarting
    // a keyframe animation on repeated triggers.
    function forceReflow(el) { void el.offsetWidth; }

    // Append `cls` then strip it on the next tick so the element animates
    // from the .cls state to its base state. Caller-controlled CSS transition.
    function playEnter(el, cls) {
      if (!el) return;
      el.classList.add(cls);
      forceReflow(el);
      el.classList.remove(cls);
    }

    // Add `cls` (typically a transform/opacity off state), call `done` after
    // either the resulting transition ends or `fallbackMs` elapses, whichever
    // is first. Guarantees `done` runs exactly once.
    function playLeave(el, cls, done, fallbackMs) {
      if (!el) { done(); return; }
      el.classList.add(cls);
      let fired = false;
      const fire = () => { if (fired) return; fired = true; done(); };
      el.addEventListener('transitionend', fire, { once: true });
      setTimeout(fire, fallbackMs || 300);
    }

    function pulseChip(el) {
      if (!el) return;
      el.classList.remove('pulse');
      // Force reflow so the animation restarts on repeated clicks.
      forceReflow(el);
      el.classList.add('pulse');
      el.addEventListener('animationend', () => el.classList.remove('pulse'), { once: true });
    }

    function createPlaceLayerGroup() {
      const useClusters = getClusterPlaces();
      const group = useClusters
        ? L.markerClusterGroup({
            maxClusterRadius: 40,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
            chunkedLoading: true,
            animate: false,
            animateAddingMarkers: false,
          })
        : L.featureGroup();
      if (useClusters) {
        group.on('clustermouseover', function(e) {
          const names = e.layer.getAllChildMarkers().map(m => m._placeData.name).sort().slice(0, 10);
          const total = e.layer.getChildCount();
          let label = names.join('\n');
          if (total > 10) label += '\n+' + (total - 10) + ' more';
          e.layer.bindTooltip(label, { direction: 'top', sticky: true }).openTooltip();
        });
      }
      return group;
    }

    // Swap the place layer group in place when the clustering preference flips,
    // so the toggle doesn't force a full map rebuild (which scrolls the view).
    // Brief opacity fade on the marker pane softens the otherwise-instant swap.
    function swapPlaceClusterGroup() {
      const map = state.currentMap;
      const old = state._placeClusterGroup;
      if (!map || !old) return;
      const pane = map.getPane('markerPane');
      const reducedMotion = window.matchMedia
        && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const swap = () => {
        if (map.hasLayer(old)) map.removeLayer(old);
        old.clearLayers();
        state._placeClusterGroup = createPlaceLayerGroup();
        applyMapFilters();
        if (pane && !reducedMotion) {
          requestAnimationFrame(() => { pane.style.opacity = '1'; });
        }
      };
      if (pane && !reducedMotion) {
        pane.style.transition = 'opacity 120ms ease-out';
        pane.style.opacity = '0';
        setTimeout(swap, 120);
      } else {
        swap();
      }
    }

    function applyMapFilters() {
      const map = state.currentMap;
      if (!map) return;

      // Places
      const cg = state._placeClusterGroup;
      if (cg) {
        cg.clearLayers();
        if (placesEnabled() && state._placeMarkers) {
          for (const m of state._placeMarkers) {
            const p = m._placeData;
            if (state.hiddenCategories.has(p.category)) continue;
            if (p.visited && !state.showVisited) continue;
            if (!p.visited && !state.showWant) continue;
            cg.addLayer(m);
          }
        }
        if (placesEnabled()) {
          if (!map.hasLayer(cg)) map.addLayer(cg);
        } else if (map.hasLayer(cg)) {
          map.removeLayer(cg);
        }
      }

      // Trails
      const gc = state._trailGroupCompleted;
      const gp = state._trailGroupPlanned;
      if (gc && gp && state._trailLayers) {
        gc.clearLayers();
        gp.clearLayers();
        if (trailsEnabled()) {
          for (const t of state._trailLayers) {
            if (state.hiddenRegions.has(t.region)) continue;
            if (t.completed && !state.showCompleted) continue;
            if (!t.completed && !state.showPlanned) continue;
            (t.completed ? gc : gp).addLayer(t.layer);
          }
          if (!map.hasLayer(gc)) map.addLayer(gc);
          if (!map.hasLayer(gp)) map.addLayer(gp);
        } else {
          if (map.hasLayer(gc)) map.removeLayer(gc);
          if (map.hasLayer(gp)) map.removeLayer(gp);
        }
      }
    }

    function initUnifiedSearch(map) {
      const input = document.getElementById('map-search-input');
      const results = document.getElementById('map-search-results');

      function render(q) {
        if (!q) { results.classList.remove('visible'); results.innerHTML = ''; return; }
        const lower = q.toLowerCase();
        const placeMatches = state.places ? state.places.filter(p =>
          p.name.toLowerCase().includes(lower)
          || (p.note && p.note.toLowerCase().includes(lower))
          || p.category.toLowerCase().includes(lower)
          || (p.country && p.country.toLowerCase().includes(lower))
        ).slice(0, 6) : [];
        const trailMatches = state.manifest ? state.manifest.regions.flatMap(r =>
          r.routes.filter(route => route.name.toLowerCase().includes(lower) || r.name.toLowerCase().includes(lower)).map(route => ({ route, region: r.name }))
        ).slice(0, 6) : [];

        if (!placeMatches.length && !trailMatches.length) {
          results.classList.remove('visible');
          results.innerHTML = '';
          return;
        }

        let html = '';
        for (const p of placeMatches) {
          const color = state.categoryColors[p.category];
          html += '<div class="map-search-result" data-type="place" data-name="' + escapeHtml(p.name) + '">';
          html += '<span class="result-dot" style="background:' + color + '"></span>';
          html += escapeHtml(p.name);
          html += '<span class="result-meta">' + escapeHtml(p.country || '') + '</span></div>';
        }
        for (const t of trailMatches) {
          const statusClass = t.route.completed ? 'completed' : 'planned';
          html += '<div class="map-search-result" data-type="trail" data-key="' + escapeHtml(t.route.key) + '">';
          html += '<span class="result-line ' + statusClass + '"></span>';
          html += escapeHtml(t.route.name);
          html += '<span class="result-meta">' + escapeHtml(t.region) + '</span></div>';
        }
        results.innerHTML = html;
        results.classList.add('visible');
      }

      input.addEventListener('input', function() { render(this.value.trim()); });

      results.addEventListener('click', function(e) {
        const row = e.target.closest('.map-search-result');
        if (!row) return;
        if (row.dataset.type === 'place') {
          const name = row.dataset.name;
          const marker = state._placeMarkers.find(m => m._placeData.name === name);
          if (marker) {
            revealPlaceMarker(map, marker);
            history.replaceState(null, '', '#/?focus=place:' + encodeURIComponent(name));
          }
        } else {
          const key = row.dataset.key;
          const entry = state._trailLayers.find(t => t.route.key === key);
          if (entry) {
            // Find inner polyline bounds via the GPX layer
            const layers = [];
            entry.layer.eachLayer(l => { if (l.getBounds) layers.push(l); });
            if (layers.length) {
              const b = layers[0].getBounds();
              if (b.isValid()) map.fitBounds(b, { padding: [40, 40] });
              if (entry.layer.openPopup) entry.layer.openPopup(b.getCenter());
            }
            history.replaceState(null, '', '#/?focus=trail:' + encodeURIComponent(key));
          }
        }
        input.value = '';
        results.classList.remove('visible');
        results.innerHTML = '';
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('#map-search')) results.classList.remove('visible');
      });
    }

      const filterSels = [statusSel, catSel, countrySel].filter(Boolean);
      function updateFilterBtnLabel() {
        const n = filterSels.reduce((acc, s) => acc + (s.value !== 'all' ? 1 : 0), 0);
        if (filterBtn) {
          filterBtn.textContent = n > 0 ? 'Filters (' + n + ')' : 'Filters';
          filterBtn.classList.toggle('has-active', n > 0);
        }
      }
      function rerender() {
        renderPlaceList(placesSearchInput ? placesSearchInput.value : '');
        updateFilterBtnLabel();

      if (placesSearchInput) placesSearchInput.addEventListener('input', rerender);
      filterSels.forEach(s => s.addEventListener('change', rerender));
      const groupBySel = document.getElementById('filter-group-by');
      if (groupBySel) groupBySel.addEventListener('change', function() {
        state.groupBy = this.value;

        document.addEventListener('click', function(e) {

            filterPop.hidden = true;

      }

        filterSels.forEach(s => { s.value = 'all'; });
        rerender();
      });

    function renderPlaceList(query) {
      const q = query.toLowerCase().trim();
      const byCategory = state.groupBy === 'category';
      const statusEl = document.getElementById('filter-status');
      const catEl = document.getElementById('filter-category');
      const countryEl = document.getElementById('filter-country');
      const wantStatus = statusEl ? statusEl.value : 'all';
      const wantCat = catEl ? catEl.value : 'all';
      const wantCountry = countryEl ? countryEl.value : 'all';
      const filtered = state.places.filter(p => {
        if (q && !(
          p.name.toLowerCase().includes(q) ||
          (p.note && p.note.toLowerCase().includes(q)) ||
          p.category.toLowerCase().includes(q) ||
          (p.country && p.country.toLowerCase().includes(q))
        )) return false;
        if (wantStatus === 'visited' && !p.visited) return false;
        if (wantStatus === 'want' && p.visited) return false;
        if (wantCat !== 'all' && p.category !== wantCat) return false;
        if (wantCountry !== 'all' && p.country !== wantCountry) return false;
        return true;
      });
      const grouped = {};
      for (const p of filtered) {
        const key = byCategory ? p.category : (p.country || 'Other');
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(p);
      }
      const keys = Object.keys(grouped).sort();
      let html = '';
      for (const key of keys) {
        const items = grouped[key];
        const keyVisited = items.filter(p => p.visited).length;
        html += '<div class="category-group fade-in">';
        // Only category grouping wires the label as a map filter today; country
        // grouping isn't a filterable axis yet.
        const labelClass = 'category-label' + (byCategory ? ' clickable' : '');
        const labelAttrs = byCategory ? ' data-filter-cat="' + escapeHtml(key) + '" title="Show only this category on the map"' : '';
        html += '<div class="' + labelClass + '"' + labelAttrs + '>';
        html += escapeHtml(byCategory ? displayCategory(key) : key);
        html += '<span class="place-count">(' + keyVisited + '/' + items.length + ')</span>';
        html += '</div>';
        html += '<div class="place-grid">';
        for (const p of items) {
          const statusClass = p.visited ? 'visited' : 'want';
          const href = '#/?focus=place:' + encodeURIComponent(p.name);
          html += '<div class="place-card" onclick="location.hash=\'' + href.replace(/'/g, "\\'") + '\'">';
          html += '<span class="status-dot ' + statusClass + '"></span>';
          html += '<div class="place-text">';
          html += '<div class="name">' + escapeHtml(p.name) + '</div>';
          if (p.note) html += '<div class="note">' + escapeHtml(p.note) + '</div>';
          html += '</div></div>';
        }
        html += '</div></div>';
      }
      if (!html) html = '<div class="loading">No matches</div>';
      const listEl = document.getElementById('place-list');
      listEl.innerHTML = html;
      listEl.querySelectorAll('.category-label.clickable').forEach(function(label) {
        label.addEventListener('click', function() {
          const cat = label.dataset.filterCat;
          const allCats = Object.keys(state.categoryColors);
          state.hiddenCategories = new Set(allCats.filter(c => c !== cat));
          // Strong intent: "show only this category". Hide all trails too;
          // user can re-enable from the filter panel.
          const allRegions = state.manifest ? state.manifest.regions.map(r => r.name) : [];
          state.hiddenRegions = new Set(allRegions);
          state.showVisited = true;
          state.showWant = true;
          location.hash = '#/';
        });
      });
    }

        html += '<div class="route-grid">';
        for (const route of region.routes) {
          const href = '#/trails/route/' + encodeURIComponent(route.key);
          const statusClass = route.completed ? 'completed' : 'planned';
          const diffAttr = route.difficulty ? ' data-route-difficulty="' + escapeHtml(route.difficulty) + '"' : '';
          const ratingAttr = route.rating ? ' data-route-rating="' + Number(route.rating) + '"' : '';
          const tagAttr = (Array.isArray(route.tags) && route.tags.length) ? ' data-route-tags="' + escapeHtml(route.tags.map(t => String(t).toLowerCase()).join(',')) + '"' : '';
          const regionAttr = ' data-route-region="' + escapeHtml(region.name.toLowerCase()) + '"';
          html += '<div class="route-card" data-route-search="' + escapeHtml(route.name.toLowerCase()) + '" data-route-status="' + statusClass + '"' + regionAttr + diffAttr + ratingAttr + tagAttr + ' onclick="location.hash=\'' + href.replace(/'/g, "\\'") + '\'">';
          html += '<span class="status-dot ' + statusClass + '"></span>';
          html += '<span class="name">' + escapeHtml(route.name) + '</span>';
          html += '</div>';
        }
        html += '</div></div>';
      }
      html += '</div>';
      app.innerHTML = html;
      const addTrailBtn = document.getElementById('add-trail-btn');
      if (addTrailBtn) addTrailBtn.addEventListener('click', function() { openAddModal(null, 'trail'); });
      const searchInput = document.getElementById('search-input');
      const statusSel = document.getElementById('filter-status');
      const regionSel = document.getElementById('filter-region');
      const diffSel = document.getElementById('filter-difficulty');
      const ratingSel = document.getElementById('filter-rating');
      const tagSel = document.getElementById('filter-tag');
      const filterBtn = document.getElementById('filter-btn');
      const filterPop = document.getElementById('filter-popover');
      const filterClear = document.getElementById('filter-clear');
      const filterSels = [statusSel, regionSel, diffSel, ratingSel, tagSel].filter(Boolean);
      function updateFilterBtnLabel() {
        const n = filterSels.reduce((acc, s) => acc + (s.value !== 'all' ? 1 : 0), 0);
        if (filterBtn) {
          filterBtn.textContent = n > 0 ? 'Filters (' + n + ')' : 'Filters';
          filterBtn.classList.toggle('has-active', n > 0);
        }
      }
      function applyTrailFilters() {
        const q = (searchInput && searchInput.value.trim().toLowerCase()) || '';
        const wantStatus = statusSel ? statusSel.value : 'all';
        const wantRegion = regionSel ? regionSel.value : 'all';
        const wantDiff = diffSel ? diffSel.value : 'all';
        const wantRating = ratingSel ? ratingSel.value : 'all';
        const wantTag = tagSel ? tagSel.value : 'all';
        app.querySelectorAll('.region-group').forEach(function(group) {
          const regionMatch = !q || group.dataset.regionSearch.includes(q);
          let visibleCount = 0;
          group.querySelectorAll('.route-card').forEach(function(card) {
            const textMatch = !q || regionMatch || card.dataset.routeSearch.includes(q);
            const statusMatch = wantStatus === 'all' || card.dataset.routeStatus === wantStatus;
            const regionOk = wantRegion === 'all' || card.dataset.routeRegion === wantRegion;
            const diffMatch = wantDiff === 'all' || card.dataset.routeDifficulty === wantDiff;
            const ratingOk = wantRating === 'all'
              || (wantRating === 'unrated' && !card.dataset.routeRating)
              || (card.dataset.routeRating === wantRating);
            const tagOk = wantTag === 'all'
              || (card.dataset.routeTags && card.dataset.routeTags.split(',').includes(wantTag));
            const match = textMatch && statusMatch && regionOk && diffMatch && ratingOk && tagOk;
            card.style.display = match ? '' : 'none';
            if (match) visibleCount++;
          });
          group.style.display = visibleCount > 0 ? '' : 'none';
        });
        updateFilterBtnLabel();
      }
      if (searchInput) searchInput.addEventListener('input', applyTrailFilters);
      filterSels.forEach(s => s.addEventListener('change', applyTrailFilters));
      if (filterBtn && filterPop) {
        filterBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          const open = filterPop.hidden;
          filterPop.hidden = !open;
          filterBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        document.addEventListener('click', function(e) {
          if (!filterPop.hidden && !filterPop.contains(e.target) && e.target !== filterBtn) {
            filterPop.hidden = true;
            filterBtn.setAttribute('aria-expanded', 'false');
          }
        });
        filterPop.addEventListener('click', function(e) { e.stopPropagation(); });
      }
      if (filterClear) filterClear.addEventListener('click', function() {
        filterSels.forEach(s => { s.value = 'all'; });
        applyTrailFilters();
      });
      updateFilterBtnLabel();
      app.querySelectorAll('.region-label.clickable').forEach(function(label) {
        label.addEventListener('click', function() {
          const r = label.dataset.filterRegion;
          const allRegions = regions.map(x => x.name);
          state.hiddenRegions = new Set(allRegions.filter(x => x !== r));
          // Strong intent: "show only this region". Hide all places too;
          // user can re-enable from the filter panel.
          const allCats = Object.keys(state.categoryColors);
          state.hiddenCategories = new Set(allCats);
          state.showCompleted = true;
          state.showPlanned = true;
          location.hash = '#/';
        });
      });
    }

    // ----- Trail detail (elevation) -----
    function parseGpxTracks(xmlText) {
      const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
      let tracks = doc.getElementsByTagNameNS(GPX_NS, 'trk');
      if (tracks.length === 0) tracks = doc.getElementsByTagName('trk');
      const result = [];
      for (let i = 0; i < tracks.length; i++) {
        const trk = tracks[i];
        const nameEl = trk.getElementsByTagNameNS(GPX_NS, 'name')[0] || trk.getElementsByTagName('name')[0];
        const name = nameEl ? nameEl.textContent : 'Track ' + (i + 1);
        const points = [];
        let trkpts = trk.getElementsByTagNameNS(ns, 'trkpt');
        if (trkpts.length === 0) trkpts = trk.getElementsByTagName('trkpt');
        for (let j = 0; j < trkpts.length; j++) {
          const pt = trkpts[j];
          const lat = parseFloat(pt.getAttribute('lat'));
          const lon = parseFloat(pt.getAttribute('lon'));
          const eleEl = pt.getElementsByTagNameNS(ns, 'ele')[0] || pt.getElementsByTagName('ele')[0];
          const ele = eleEl ? parseFloat(eleEl.textContent) : null;
          points.push({ lat, lon, ele });
        }
        result.push({ name, points });
      }
      return result;
    }

    function computeTrackStats(points) {
      let distance = 0, gain = 0, loss = 0, maxEle = -Infinity;
      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1], curr = points[i];
        distance += L.latLng(prev.lat, prev.lon).distanceTo(L.latLng(curr.lat, curr.lon));
        if (curr.ele !== null && prev.ele !== null) {
          const diff = curr.ele - prev.ele;
          if (diff > 0) gain += diff; else loss -= diff;
          if (curr.ele > maxEle) maxEle = curr.ele;
        }
      }
      if (points.length > 0 && points[0].ele !== null && points[0].ele > maxEle) maxEle = points[0].ele;
      return { distance, gain, loss, maxEle };
    }

    function trackToGeoJSON(track) {
      return {
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: track.points.map(p => [p.lon, p.lat, p.ele]) },
        properties: {},
      };
    }

    function populateStats(s) {
      const items = [{ l: 'Dist', v: formatDistance(s.dist) }];
      if (s.tracks) items.unshift({ l: 'Tracks', v: s.tracks });
      if (s.gain !== undefined) {
        const hours = (s.dist / 1000) / 5 + s.gain / 600;
        const h = Math.floor(hours), m = Math.round((hours - h) * 60);
        items.push({ l: 'Gain', v: '+' + formatElevation(s.gain) });
        items.push({ l: 'Loss', v: '-' + formatElevation(s.loss) });
        items.push({ l: 'Peak', v: formatElevation(s.max) });
        items.push({ l: 'Est.', v: h > 0 ? h + 'h ' + m + 'min' : m + 'min' });
      }
      const navEl = document.getElementById('nav-stats-dynamic');
      if (navEl) navEl.innerHTML = items.map(i => '<div class="nav-stat"><span class="label">' + i.l + '</span><span class="value">' + i.v + '</span></div>').join('');
      const mobEl = document.getElementById('mobile-stats');
      if (mobEl) {
        const dataHtml = items.map(i => '<div class="stat"><span class="label">' + i.l + '</span><span class="value">' + i.v + '</span></div>').join('');
        let sourceHtml = '';
        if (state._routeSourceHref) {
          sourceHtml = '<div class="stats-source"><a href="' + escapeHtml(state._routeSourceHref) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(state._routeSourceDomain) + ' &#x2197;</a></div>';
        }
        mobEl.innerHTML = '<div class="stats-data">' + dataHtml + '</div>' + sourceHtml;
      }
    }

    function renderTrailDetail(routeKey) {
      setActiveTab('trails');
      cleanupMap();
      const app = document.getElementById('app');
      if (!state.manifest) { app.innerHTML = '<div class="loading">Loading routes...</div>'; return; }

      let route = null, regionName = '';
      for (const region of state.manifest.regions) {
        for (const r of region.routes) {
          if (r.key === routeKey) { route = r; regionName = region.name; break; }
        }
        if (route) break;
      }
      if (!route) { setCrumb('Not found', true); app.innerHTML = '<div class="loading">Route not found</div>'; return; }

      setCrumb(route.name, true);

      const color = ROUTE_COLOR;
      const statusLabel = route.completed ? 'Completed' : 'Planned';

      document.getElementById('nav-info').innerHTML = '';
      let routeSourceHref = '';
      if (route.source) {
        try {
          const u = new URL(route.source, location.href);
          if (u.protocol === 'http:' || u.protocol === 'https:') routeSourceHref = u.href;
        } catch {}
      }
      state._routeSourceHref = routeSourceHref;
      state._routeSourceDomain = routeSourceHref ? domainFromUrl(route.source) : '';

      const facts = [];
      facts.push('<span class="fact"><span class="dot" style="background:' + (route.completed ? 'var(--completed)' : 'var(--planned)') + '"></span>' + statusLabel + '</span>');
      facts.push('<span class="fact">' + escapeHtml(displayRegion(regionName)) + '</span>');
      if (route.difficulty) facts.push('<span class="fact">' + escapeHtml(DIFFICULTY_LABELS[route.difficulty] || route.difficulty) + '</span>');
      if (route.rating) facts.push('<span class="fact" title="' + route.rating + '/5">' + ratingStarsText(route.rating) + '</span>');
      if (route.date_hiked) facts.push('<span class="fact">' + escapeHtml(route.date_hiked) + '</span>');

      const showActions = state.auth.authenticated && !isReadOnly();
      const hasTags = route.tags && route.tags.length;
      const hasNotes = !!route.notes;
      let metaHtml = '';
      if (facts.length || hasTags || hasNotes) {
        metaHtml = '<div class="trail-meta-panel">';
        metaHtml += '<div class="trail-meta-header">';
        metaHtml += '<div class="trail-meta-line">' + facts.join('<span class="sep">&middot;</span>') + '</div>';
        if (hasTags) {
          metaHtml += '<div class="trail-meta-tags">' + route.tags.map(t => '<span class="tag">#' + escapeHtml(t) + '</span>').join('') + '</div>';
        }
        metaHtml += '</div>';
        if (hasNotes) {
          metaHtml += '<div class="trail-meta-notes"><span class="trail-meta-notes-label">Notes</span>' + escapeHtml(route.notes) + '</div>';
        }
        metaHtml += '</div>';
      }

      const navActionsEl = document.getElementById('nav-actions');
      if (navActionsEl) {
        navActionsEl.innerHTML = showActions
          ? '<button type="button" id="trail-edit-btn" class="nav-action-btn">Edit</button>'
          : '';
      }

      const isMultiTrack = route.trackCount && route.trackCount > 1;

      let html = '<div class="detail-layout">';
      html += '<div id="map"></div>';
      html += '<div class="mobile-stats" id="mobile-stats"></div>';
      if (isMultiTrack) {
        html += '<div id="track-legend"></div>';
        html += '<div id="multi-elevation-container"></div>';
      } else {
        if (route.hasElevation) html += '<div class="elevation-wrap" id="elevation-container"></div>';
        else html += '<div class="no-elevation-notice">No elevation data available for this route</div>';
      }
      html += metaHtml;
      html += '</div>';
      app.innerHTML = html;

      const editBtn = document.getElementById('trail-edit-btn');
      if (editBtn) editBtn.addEventListener('click', function(e) {
        e.preventDefault();
        openEditTrailMetadataModal(route, regionName);
      });

      const dvt = state.config.default_view_trails || DEFAULT_CONFIG.default_view_trails;
      const map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
        maxBounds: [[-90, -200], [90, 200]],
        maxBoundsViscosity: 1.0,
        preferCanvas: true,
        markerZoomAnimation: false
      }).setView(dvt.center, dvt.zoom);
      L.control.attribution({ prefix: false }).addTo(map);
      state.currentMap = map;
      // Mark the container as "zooming" for the entire pinch gesture so
      // CSS can hide expensive panes (.leaflet-container.zooming rules).
      map.on('zoomstart', () => map.getContainer().classList.add('zooming'));
      map.on('zoomend', () => map.getContainer().classList.remove('zooming'));
      addTileLayersToMap(map);

      // Show the on-map elevation position marker only while an elevation chart is hovered.
      const mapEl = map.getContainer();
      ['elevation-container', 'multi-elevation-container'].forEach(function(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('mouseenter', function() { mapEl.classList.add('elev-hover'); });
        el.addEventListener('mouseleave', function() { mapEl.classList.remove('elev-hover'); });
      });

      // Expand-map toggle: hides the elevation chart and metadata panel.
      const layoutEl = document.querySelector('.detail-layout');
      const ExpandControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function() {
          const btn = L.DomUtil.create('a', 'leaflet-bar leaflet-control map-expand-btn');
          btn.href = '#';
          btn.title = 'Expand map';
          btn.setAttribute('role', 'button');
          btn.setAttribute('aria-label', 'Expand map');
          btn.innerHTML =
            '<svg class="icon-expand" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
            + '<polyline points="2,6 2,2 6,2"/><polyline points="14,6 14,2 10,2"/><polyline points="2,10 2,14 6,14"/><polyline points="14,10 14,14 10,14"/>'
            + '</svg>'
            + '<svg class="icon-collapse" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
            + '<polyline points="6,2 6,6 2,6"/><polyline points="10,2 10,6 14,6"/><polyline points="6,14 6,10 2,10"/><polyline points="10,14 10,10 14,10"/>'
            + '</svg>';
          L.DomEvent.disableClickPropagation(btn);
          L.DomEvent.on(btn, 'click', function(e) {
            L.DomEvent.preventDefault(e);
            const expanded = layoutEl.classList.toggle('map-expanded');
            btn.title = expanded ? 'Collapse map' : 'Expand map';
            btn.setAttribute('aria-label', btn.title);
            const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (reduce) {
              map.invalidateSize();
            } else {
              const start = performance.now();
              const tick = function(now) {
                map.invalidateSize({ animate: false, pan: false });
                if (now - start < 320) requestAnimationFrame(tick);
              };
              requestAnimationFrame(tick);
            }
          });
          return btn;
        }
      });
      map.addControl(new ExpandControl());

      if (route.plannedFile && route.completed) {
        new L.GPX(gpxUrlFor(route.plannedFile), {
          async: true,
          polyline_options: { color: ROUTE_COLOR, opacity: 0.35, weight: 4 * getTrailWeightFactor(), dashArray: '8 6' },
          markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
        }).addTo(map);
      }

      if (isMultiTrack) renderMultiTrack(map, route);
      else renderSingleTrack(map, route, color);
    }

    function renderSingleTrack(map, route, color) {
      let elevationControl = null;
      if (route.hasElevation) {
        elevationControl = L.control.elevation({
          theme: 'custom-theme',
          detached: true,
          elevationDiv: '#elevation-container',
          height: 200,
          imperial: isImperial(),
          slope: false, speed: false, acceleration: false, time: false,
          legend: false, summary: false, ruler: false, downloadLink: false,
          almostOver: false, distanceMarkers: false,
          polyline: { color: color, opacity: 0.9, weight: 5 * getTrailWeightFactor() },
        }).addTo(map);
        state.currentElevation = elevationControl;
      }

      const gpxUrl = gpxUrlFor(route.file);
      new L.GPX(gpxUrl, {
        async: true,
        polyline_options: { color: color, opacity: 0.9, weight: 5 * getTrailWeightFactor() },
        markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
      }).on('loaded', function(e) {
        const gpx = e.target;
        const bounds = gpx.getBounds();
        if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });

        const layers = [];
        gpx.eachLayer(function(layer) { if (layer.getLatLngs) layers.push(layer); });
        if (layers.length > 0) {
          const latlngs = layers[0].getLatLngs();
          const flat = Array.isArray(latlngs[0]) ? latlngs.flat() : latlngs;
          if (flat.length > 1) addStartEndMarkers(map, flat[0], flat[flat.length - 1]);
        }

        const dist = gpx.get_distance();
        const stats = { dist: dist, status: route.completed ? 'Completed' : 'Planned', completed: route.completed, region: route.key.split('/')[0] };
        if (route.hasElevation) {
          stats.gain = gpx.get_elevation_gain();
          stats.loss = gpx.get_elevation_loss();
          stats.max = gpx.get_elevation_max();
        }
        populateStats(stats);
      }).on('addline', function(e) {
        if (elevationControl) elevationControl.addData(e.line);
      }).addTo(map);
    }

    function renderMultiTrack(map, route) {
      fetch(gpxUrlFor(route.file))
        .then(r => r.text())
        .then(function(xmlText) {
          const tracks = parseGpxTracks(xmlText);
          if (tracks.length === 0) return;

          const elevHeight = 200;
          const elevControls = [];
          const allStats = [];
          const bounds = L.latLngBounds();

          const container = document.getElementById('multi-elevation-container');
          if (container) {
            let panelsHtml = '';
            for (let i = 0; i < tracks.length; i++) {
              const tc = TRACK_COLORS[i % TRACK_COLORS.length];
              const collapsed = i > 0 ? ' collapsed' : '';
              panelsHtml += '<div class="elevation-track-panel' + collapsed + '" style="--track-color:' + tc + '">';
              panelsHtml += '<div class="elevation-track-label" onclick="var p=this.parentElement;if(p.classList.contains(\'collapsed\')){p.parentElement.querySelectorAll(\'.elevation-track-panel:not(.collapsed)\').forEach(function(s){s.classList.add(\'collapsed\')});p.classList.remove(\'collapsed\')}else{p.classList.add(\'collapsed\')}"><span class="color-dot" style="background:' + tc + '"></span>' + escapeHtml(tracks[i].name) + '</div>';
              panelsHtml += '<div class="elevation-track-chart" id="elevation-track-' + i + '"></div>';
              panelsHtml += '</div>';
            }
            container.innerHTML = panelsHtml;
          }

          for (let i = 0; i < tracks.length; i++) {
            const track = tracks[i];
            const tc = TRACK_COLORS[i % TRACK_COLORS.length];
            const stats = computeTrackStats(track.points);
            allStats.push(stats);
            for (const p of track.points) bounds.extend([p.lat, p.lon]);
            const latlngs = track.points.map(p => [p.lat, p.lon]);
            L.polyline(latlngs, { color: tc, opacity: 0.9, weight: 5 * getTrailWeightFactor() }).addTo(map);
            const hasEle = track.points.some(p => p.ele !== null);
            if (hasEle && container) {
              const ctrl = L.control.elevation({
                theme: 'custom-theme', detached: true,
                elevationDiv: '#elevation-track-' + i,
                height: elevHeight,
                imperial: isImperial(),
                slope: false, speed: false, acceleration: false, time: false,
                legend: false, summary: false, ruler: false, downloadLink: false,
                almostOver: false, distanceMarkers: false,
                polyline: false,
              }).addTo(map);
              ctrl.addData(trackToGeoJSON(track));
              elevControls.push(ctrl);
            }
          }
          state.currentElevation = elevControls;
          if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });
          const firstTrack = tracks[0];
          const lastTrack = tracks[tracks.length - 1];
          if (firstTrack.points.length > 0 && lastTrack.points.length > 0) {
            const sp = firstTrack.points[0];
            const ep = lastTrack.points[lastTrack.points.length - 1];
            addStartEndMarkers(map, L.latLng(sp.lat, sp.lon), L.latLng(ep.lat, ep.lon));
          }
          const legendEl = document.getElementById('track-legend');
          if (legendEl) {
            let legendHtml = '';
            for (let i = 0; i < tracks.length; i++) {
              const tc = TRACK_COLORS[i % TRACK_COLORS.length];
              const s = allStats[i];
              legendHtml += '<div class="track-legend-item">';
              legendHtml += '<span class="track-legend-color" style="background:' + tc + '"></span>';
              legendHtml += '<span class="track-name">' + escapeHtml(tracks[i].name) + '</span>';
              legendHtml += '<span class="track-stat">' + formatDistance(s.distance) + '</span>';
              if (s.gain > 0) legendHtml += '<span class="track-stat">+' + formatElevation(s.gain) + '</span>';
              legendHtml += '</div>';
            }
            legendEl.innerHTML = legendHtml;
          }
          const totals = allStats.reduce((acc, s) => ({
            distance: acc.distance + s.distance, gain: acc.gain + s.gain, loss: acc.loss + s.loss, maxEle: Math.max(acc.maxEle, s.maxEle)
          }), { distance: 0, gain: 0, loss: 0, maxEle: -Infinity });
          const ps = { dist: totals.distance, tracks: tracks.length, status: route.completed ? 'Completed' : 'Planned', completed: route.completed, region: route.key.split('/')[0] };
          if (totals.gain > 0) { ps.gain = totals.gain; ps.loss = totals.loss; ps.max = totals.maxEle; }
          populateStats(ps);
        });
    }

    // ----- Router -----
    function focusHash(type, slug) { return '#/' + type + '/' + slug; }

    function parseFocus(hash) {
      const base = hash.split('?')[0];
      if (base.startsWith('#/place/')) {
        const slug = decodeURIComponent(base.slice('#/place/'.length));
        const place = (state.places || []).find(p => p._slug === slug || p.name === slug);
        return { type: 'place', name: place ? place.name : slug };
      }
      if (base.startsWith('#/trail/')) {
        const slug = decodeURIComponent(base.slice('#/trail/'.length));
        if (state.manifest && state.manifest.regions) {
          for (const r of state.manifest.regions) {
            for (const route of r.routes) {
              if (route._slug === slug || route.key === slug) return { type: 'trail', name: route.key };
            }
          }
        }
        return { type: 'trail', name: slug };
      }
      // Legacy: #/?focus=type:id
      const q = hash.split('?')[1];
      if (q) {
        const params = new URLSearchParams(q);
        const focus = params.get('focus');
        if (focus) {
          const colon = focus.indexOf(':');
          if (colon !== -1) return { type: focus.slice(0, colon), name: decodeURIComponent(focus.slice(colon + 1)) };
        }
      }
      return null;
    }

    function router() {
      const navActions = document.getElementById('nav-actions');
      if (navActions) navActions.innerHTML = '';
      const hash = location.hash || '#/';
      const base = hash.split('?')[0];
      if (base.startsWith('#/place/') || base.startsWith('#/trail/')) return renderUnifiedMap(parseFocus(hash));
      if (base === '#/' || base === '#' || base === '#/map') return renderUnifiedMap(parseFocus(hash));
      if (base === '#/places') {
        if (!placesEnabled()) { location.hash = '#/'; return; }
        return renderPlacesIndex();
      }
      if (base === '#/trails') {
        if (!trailsEnabled()) { location.hash = '#/'; return; }
        return renderTrailsIndex();

      if (base.startsWith('#/trails/route/')) {
        if (!trailsEnabled()) { location.hash = '#/'; return; }
        const key = decodeURIComponent(base.replace('#/trails/route/', ''));
        return renderTrailDetail(key);
      }
      renderUnifiedMap(null);

    // ----- Auth + API client -----
    function apiUrl(path) {
      const base = (state.config.api_base || '/api').replace(/\/$/, '');
      return base + path;
    }

    function api(method, path, body) {
      const opts = { method, credentials: 'same-origin', headers: {} };
      if (body !== undefined && !(body instanceof Blob)) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      } else if (body instanceof Blob) {
        opts.body = body;
      }
      return fetch(apiUrl(path), opts).then(async r => {
        let data = null;
        try { data = await r.json(); } catch {}
        if (!r.ok) {
          const err = new Error((data && data.error) || ('HTTP ' + r.status));
          err.status = r.status;
          err.body = data;
          throw err;
        }
        return data;
      }, (netErr) => {
        const err = new Error(navigator.onLine ? 'Network error' : "You're offline. Changes not saved.");
        err.offline = !navigator.onLine;
        err.cause = netErr;
        throw err;
      });
    }

    function deviceLabel(ua) {
      if (!ua) return 'Unknown device';
      const s = ua.toLowerCase();
      if (s.includes('iphone')) return 'iPhone';
      if (s.includes('ipad')) return 'iPad';
      if (s.includes('android')) return 'Android';
      if (s.includes('mac os x') || s.includes('macintosh')) return 'macOS';
      if (s.includes('windows')) return 'Windows';
      if (s.includes('linux')) return 'Linux';
      if (s.startsWith('curl/')) return 'curl';
      return ua.slice(0, 32) + (ua.length > 32 ? '…' : '');
    }
    function timeAgo(unixSec) {
      const d = Math.max(0, Math.floor(Date.now() / 1000) - unixSec);
      if (d < 60) return d + 's ago';
      if (d < 3600) return Math.floor(d / 60) + 'm ago';
      if (d < 86400) return Math.floor(d / 3600) + 'h ago';
      if (d < 86400 * 30) return Math.floor(d / 86400) + 'd ago';
      const dt = new Date(unixSec * 1000);
      return dt.toISOString().slice(0, 10);
    }
