        const completedExtras = document.getElementById('g-completed-extras');
        if (completedCb && completedExtras) {
          completedCb.addEventListener('change', function() {
            completedExtras.classList.toggle('expanded', this.checked);
          });
        }
        document.getElementById('gpx-form').addEventListener('submit', function(e) {
          e.preventDefault();
          const file = document.getElementById('g-file').files[0];
          const region = readSelectOrNew('g-region');
          const name = document.getElementById('g-name').value.trim();
          if (!file) { showModalError('Pick a GPX file first.'); return; }
          const stripPii = document.getElementById('g-strip-pii').checked;
          const completed = document.getElementById('g-completed').checked;
          // Default is "planned": file lands as <name>.planned.gpx, rendered as a
          // dashed overlay. Toggling "completed" saves the walked variant.
          const storedName = completed ? name : (name + '.planned');

          // Optional metadata. date_completed + rating only apply to completed routes.
          // Each field may be hidden by user preference; guard with optional chaining.
          const get = id => { const el = document.getElementById(id); return el ? el.value : ''; };
          const source = get('g-source').trim();
          const notes = get('g-notes');
          const localName = get('g-local-name').trim();
          const difficulty = (document.querySelector('input[name="g-difficulty"]:checked') || {}).value || '';
          const tags = get('g-tags').split(',').map(t => t.trim()).filter(Boolean);
          const metadata = {};
          if (source) metadata.source = source;
          if (notes.trim()) metadata.notes = notes;
          if (localName) metadata.local_name = localName;
          if (difficulty) metadata.difficulty = difficulty;
          if (tags.length) metadata.tags = tags;
          if (completed) {
            const dateVal = get('g-date').trim();
            const ratingRaw = readStarRating('g-rating');
            if (dateVal) metadata.date_completed = dateVal;
            if (ratingRaw) metadata.rating = parseInt(ratingRaw, 10);
          }
          const metaKey = region ? region + '/' + name : name;

          const submitBtn = document.getElementById('gpx-submit');
          submitBtn.disabled = true;
          let qs = (region ? '?region=' + encodeURIComponent(region) + '&' : '?') + 'name=' + encodeURIComponent(storedName);
          if (stripPii) qs += '&strip_pii=true';
          fetch(apiUrl('/gpx') + qs, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/gpx+xml' },
            body: file,
          }).then(async r => {
            const data = await r.json().catch(() => null);
            if (!r.ok) throw new Error((data && data.error) || 'HTTP ' + r.status);
            return data;
          })
          .then(() => {
            if (Object.keys(metadata).length === 0) return null;
            return api('PUT', '/metadata', { key: metaKey, metadata: metadata });
          })
          .then(() => refreshRoutes())
          .then(() => { closeModal(); router(); })
          .catch(err => { submitBtn.disabled = false; showModalError(err.message); });
        });
      }

      function browseFormHtml() {
        return '<div id="browse-body">' +
          '<div style="font-size:0.78rem;color:var(--muted);padding:0.5rem 0">Loading catalogue&hellip;</div>' +
          '</div>';
      }

      function wireBrowseForm() {
        const body = document.getElementById('browse-body');
        // Cache the catalog across tab switches so reopening Browse renders
        // instantly instead of flashing "Loading..." -> content. Admin mutations
        // invalidate `state._catalogCache` in renderAdminCatalog / picker / mgr.
        if (Array.isArray(state._catalogCache)) {
          renderBrowse(state._catalogCache);
          return;
        }
        api('GET', '/catalog')
          .then(entries => {
            state._catalogCache = Array.isArray(entries) ? entries : [];
            renderBrowse(state._catalogCache);
          })
          .catch(err => { body.innerHTML = '<div class="modal-error" style="display:block">' + escapeHtml(err.message) + '</div>'; });

        function renderBrowse(rawEntries) {
          // Hide entries the user has already imported (tracked via the
          // `from_catalog` field set on import). Re-imports skip silently.
          const imported = new Set((state.places || []).map(p => p && p.from_catalog).filter(Boolean));
          const entries = (rawEntries || []).filter(e => !imported.has(e && e.name));
          if (!entries.length) {
            const allHidden = (rawEntries || []).length > 0;
            body.innerHTML = '<div style="font-size:0.78rem;color:var(--muted);padding:0.5rem 0">' +
              (allHidden
                ? "You've imported everything in the catalogue."
                : 'No catalogue entries available yet. An admin can add some from Settings &rsaquo; Admin &rsaquo; Catalog.') +
              '</div>';
            return;
          }
          const rows = entries.map((e, i) => {
            const meta = [e.category, e.country].filter(Boolean).join(' · ');
            const name = escapeHtml(e.name || '(unnamed)');
            const note = (e.note || '').trim();
            const firstSource = Array.isArray(e.sources) ? e.sources.find(s => typeof s === 'string' && s.trim()) : null;
            const sourceLink = firstSource
              ? '<a href="' + escapeHtml(firstSource) + '" target="_blank" rel="noopener" class="row-src">Source</a>'
              : '';
            return '<label class="browse-row" data-idx="' + i + '" style="display:flex;align-items:flex-start;gap:0.6rem;padding:0.45rem 0;border-bottom:1px solid var(--border);cursor:pointer">' +
              '<input type="checkbox" class="browse-pick" data-idx="' + i + '" style="margin-top:0.2rem">' +
              '<span style="flex:1;min-width:0;display:block">' +
                '<span style="display:flex;align-items:center;gap:0.5rem;width:100%">' +
                  '<span title="' + name + '" style="flex:1;min-width:0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + name + '</span>' +
                  sourceLink +
                '</span>' +
                (meta ? '<span style="display:block;font-size:0.72rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(meta) + '</span>' : '') +
                (note ? '<span class="row-note">' + escapeHtml(note) + '</span>' : '') +
              '</span>' +
            '</label>';
          }).join('');
          body.innerHTML =
            '<input type="text" id="browse-filter" placeholder="Filter&hellip;" style="margin-bottom:0.5rem">' +
            '<div id="browse-list" style="max-height:50vh;overflow-y:auto">' + rows + '</div>' +
            '<div class="modal-error" id="add-error"></div>' +
            '<div class="modal-actions" style="display:flex;align-items:center;gap:0.6rem">' +
              '<button type="button" class="row-notes-toggle" id="browse-notes-toggle">Show notes</button>' +
              '<button type="button" class="row-notes-toggle" id="browse-select-all">Select all</button>' +
              '<button type="button" class="primary" id="browse-add" disabled style="margin-left:auto">Add selected</button>' +
            '</div>';

          const filter = document.getElementById('browse-filter');
          const list = document.getElementById('browse-list');
          const addBtn = document.getElementById('browse-add');
          const selectAllBtn = document.getElementById('browse-select-all');

          function visibleRows() {
            return Array.from(list.querySelectorAll('.browse-row'))
              .filter(r => r.style.display !== 'none');
          }
          function updateBtn() {
            const n = list.querySelectorAll('.browse-pick:checked').length;
            addBtn.disabled = n === 0;
            addBtn.textContent = n ? 'Add ' + n + ' selected' : 'Add selected';
            const vis = visibleRows();
            const visChecked = vis.filter(r => r.querySelector('.browse-pick').checked).length;
            selectAllBtn.textContent = (vis.length && visChecked === vis.length) ? 'Clear selection' : 'Select all';
            selectAllBtn.disabled = vis.length === 0;
          }
          list.addEventListener('change', updateBtn);

          selectAllBtn.addEventListener('click', function() {
            const vis = visibleRows();
            const allChecked = vis.length && vis.every(r => r.querySelector('.browse-pick').checked);
            vis.forEach(r => { r.querySelector('.browse-pick').checked = !allChecked; });
            updateBtn();
          });

          filter.addEventListener('input', function() {
            const q = this.value.trim().toLowerCase();
            list.querySelectorAll('.browse-row').forEach(row => {
              row.style.display = (!q || row.textContent.toLowerCase().includes(q)) ? 'flex' : 'none';
            });
            updateBtn();
          });

          // Source links sit inside a <label>; without this they'd toggle the
          // row's checkbox as a side effect of the label's default behavior.
          list.querySelectorAll('.row-src').forEach(a => {
            a.addEventListener('click', function(ev) { ev.stopPropagation(); });
          });

          const notesToggle = document.getElementById('browse-notes-toggle');
          notesToggle.addEventListener('click', function() {
            list.classList.add('notes-anim');
            const on = list.classList.toggle('show-notes');
            this.textContent = on ? 'Hide notes' : 'Show notes';
          });

          addBtn.addEventListener('click', function() {
            const picked = Array.from(list.querySelectorAll('.browse-pick:checked'))
              .map(cb => entries[parseInt(cb.dataset.idx, 10)])
              .filter(Boolean)
              // _source is a server-side UI tag; the place schema rejects it.
              // Tag the imported place with its catalog source so Browse can
              // hide it on re-open and a future "Update from catalog" knows
              // the lineage.
              .map(e => { const { _source, ...rest } = e; return Object.assign({}, rest, { from_catalog: e.name }); });
            if (!picked.length) return;
            addBtn.disabled = true;
            const prevColors = Object.assign({}, state.categoryColors);
            let done = 0;
            const errors = [];
            (function next() {
              if (done >= picked.length) {
                refreshPlaces().then(() => {
                  syncPlacesOnMap(prevColors);
                  if (errors.length) {
                    updateBtn();
                    showModalError(errors.length + ' of ' + picked.length + ' failed: ' + errors.join('; '));
                  } else {
                    closeModal();
                  }
                }).catch(err => { updateBtn(); showModalError(err.message); });
                return;
              }
              addBtn.textContent = 'Adding ' + (done + 1) + ' of ' + picked.length + '…';
              api('POST', '/places', picked[done])
                .catch(err => errors.push((picked[done].name || '?') + ': ' + err.message))
                .then(() => { done++; next(); });
            })();
          });
        }
      }
    }

    // ----- Pick coordinates on the map -----
    // onPick is called with the chosen latlng. If omitted, the default
    // behavior opens the Add modal pre-filled with those coordinates.
    function enterPickCoordsMode(onPick) {
      // Make sure we're on the unified map. If not, navigate there first.
      const base = (location.hash || '#/').split('?')[0];
      const onMapView = base === '#/' || base === '#/map' || base === '#'
        || base.startsWith('#/place/') || base.startsWith('#/route/');
      if (!onMapView) {
        location.hash = '#/';
        setTimeout(function() { enterPickCoordsMode(onPick); }, 250);
        return;
      }
      const banner = document.createElement('div');
      banner.className = 'pick-coords-banner';
      banner.textContent = 'Click on the map to set coordinates (or click here to cancel)';
      banner.addEventListener('click', cleanup);
      document.body.appendChild(banner);
      const map = state.currentMap;
      if (!map) { cleanup(); return; }
      function onClick(e) {
        cleanup();
        if (typeof onPick === 'function') onPick(e.latlng);
        else openAddModal(e.latlng);
      }
      function cleanup() {
        map.off('click', onClick);
        if (banner.parentNode) banner.parentNode.removeChild(banner);
        if (map.getContainer()) map.getContainer().style.cursor = '';
      }
      map.getContainer().style.cursor = 'crosshair';
      map.once('click', onClick);
    }

    // Floating "+" button on the unified map view, when authed.
    function maybeMountFab() {
      const app = document.getElementById('app');
      const existing = app.querySelector('.fab-add:not(.fab-leave)');
      const base = (location.hash || '#/').split('?')[0];
      const onMapView = base === '#/' || base === '#' || base === '#/map'
        || base.startsWith('#/place/') || base.startsWith('#/route/');
      const shouldShow = state.auth.authenticated
        && !isReadOnly()
        && getShowMapAddButton()
        && onMapView
        && (placesEnabled() || routesEnabled());
      const fabTitle = placesEnabled() && routesEnabled()
        ? 'Add place or route'
        : (placesEnabled() ? 'Add place' : 'Add route');
      if (shouldShow && existing) {
        existing.title = fabTitle;
        return;
      }
      if (!shouldShow && existing) {
        playLeave(existing, 'fab-leave', () => existing.remove());
        return;
      }
      if (!shouldShow) return;
      const fab = document.createElement('button');
      fab.className = 'fab-add';
      fab.title = fabTitle;
      fab.setAttribute('aria-label', fabTitle);
      fab.addEventListener('click', function() { openAddModal(null); });
      app.appendChild(fab);
      playEnter(fab, 'fab-enter');
    }

    // Hook into router so the FAB re-mounts on each view change.
    const _origRouter = typeof router !== 'undefined' ? router : null;
    function wrappedRouter() {
      if (_origRouter) _origRouter(); else router();
      maybeMountFab();
    }
    window.removeEventListener('hashchange', router);
    window.addEventListener('hashchange', wrappedRouter);

    // Spacebar: toggle map chrome (FAB, filter panel, leaflet controls).
    document.addEventListener('keydown', function(e) {
      if (e.key !== ' ' && e.code !== 'Space') return;
      if (!state.currentMap) return;
      if (document.getElementById('modal-root').children.length) return;
      const t = e.target;
      const tag = t && t.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || (t && t.isContentEditable)) return;
      e.preventDefault();
      document.body.classList.toggle('map-chrome-hidden');
    });

    // 'S': focus the search input on list pages, or the map search on the
    // index map. If the map filter panel is hidden by user preference, the
    // panel is force-shown while the search input is focused and restored
    // on blur.
    document.addEventListener('keydown', function(e) {
      if (e.key !== 's' && e.key !== 'S') return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (document.getElementById('modal-root').children.length) return;
      const t = e.target;
      const tag = t && t.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || (t && t.isContentEditable)) return;
      const listInput = document.getElementById('search-input');
      if (listInput && listInput.offsetParent !== null) {
        e.preventDefault();
        listInput.focus();
        listInput.select();
        return;
      }
      const mapInput = document.getElementById('map-search-input');
      if (mapInput) {
        e.preventDefault();
        const wasForced = !document.body.classList.contains('force-show-map-filter');
        if (wasForced) document.body.classList.add('force-show-map-filter');
        mapInput.focus();
        mapInput.select();
        if (!wasForced) return;
        // Restore on click outside the panel or on Escape. Using input
        // 'blur' would fire as soon as the user mousedowns a search
        // result (which takes focus from the input), hiding the panel
        // before the click actually registers on the row.
        const restore = function() {
          document.body.classList.remove('force-show-map-filter');
          document.removeEventListener('mousedown', onOutside, true);
          mapInput.removeEventListener('keydown', onEsc);
        };
        const onOutside = function(ev) {
          if (ev.target.closest && ev.target.closest('.map-panel')) return;
          restore();
        };
        const onEsc = function(ev) {
          if (ev.key === 'Escape') { mapInput.blur(); restore(); }
        };
        document.addEventListener('mousedown', onOutside, true);
        mapInput.addEventListener('keydown', onEsc);
      }
    });

    // Long-press on the map (touch only): same toggle as spacebar.
    let lastPointerType = 'mouse';
    document.addEventListener('pointerdown', function(e) { lastPointerType = e.pointerType; }, true);
    document.addEventListener('contextmenu', function(e) {
      if (lastPointerType !== 'touch' && lastPointerType !== 'pen') return;
      if (!state.currentMap) return;
      if (document.getElementById('modal-root').children.length) return;
      const t = e.target;
      if (!t.closest('.leaflet-container')) return;
      if (t.closest('.leaflet-marker-icon, .leaflet-control, .leaflet-popup, .map-panel')) return;
      e.preventDefault();
      document.body.classList.toggle('map-chrome-hidden');
      if (navigator.vibrate) navigator.vibrate(15);
    });

    // ----- Init -----
    function applyConfig(cfg) {
      state.config = Object.assign({}, DEFAULT_CONFIG, cfg || {});
      state.config.features = Object.assign({}, DEFAULT_CONFIG.features, (cfg && cfg.features) || {});
      document.title = state.config.brand || 'Ferd';
      const brandEl = document.getElementById('nav-brand-text');
      if (brandEl) brandEl.textContent = state.config.brand || 'Ferd';
      refreshTabVisibility();
    }

    function loadDataAndRender() {
      const v = state.viewer;
      const placesP = placesAvailable()
        ? fetchJson(dataUrl('places'), null).catch(() => null)
        : Promise.resolve(null);
      const routesP = routesAvailable()
        ? fetchJson(dataUrl('routes'), null).catch(() => null)
        : Promise.resolve(null);
      const labelsP = placesAvailable()
        ? fetchJson(categoryLabelsUrl(), null).catch(() => null)
        : Promise.resolve(null);
      return Promise.all([placesP, routesP, labelsP]).then(function([places, routes, labels]) {
        if (labels && labels.category_labels) {
          state.config.category_labels = labels.category_labels;
        }
        if (Array.isArray(places)) {
          // Normalize: missing/empty category is the "uncategorized" bucket
          // (key ''), so the rest of the UI can treat p.category as a plain
          // string without sprinkling null checks everywhere.
          for (const p of places) { if (p.category == null) p.category = ''; }
          state.places = places;
          assignPlaceSlugs(state.places);
          const cc = assignCategoryColors(places);
          state.categoryColors = cc.dark;
          state.categoryColorsLight = cc.light;
        }
        if (routes && Array.isArray(routes.regions)) {
          routes.regions.sort((a, b) => a.name.localeCompare(b.name));
          for (const region of routes.regions) region.routes.sort((a, b) => a.name.localeCompare(b.name));
          state.manifest = routes;
          assignTrailSlugs(state.manifest);
        }
        refreshTabVisibility();
        if ((placesAvailable() && !state.places) && (routesAvailable() && !state.manifest)) {
          if (v.mode === 'public') {
            document.getElementById('app').innerHTML = '<div class="loading">Map not found, or owner has not published it.</div>';
            return;
          }
          document.getElementById('app').innerHTML = '<div class="loading">Failed to load data</div>';
          return;
        }
        wrappedRouter();
        // Warm the catalog cache in the background so the Browse tab in the
        // Add modal renders instantly the first time it's opened, instead of
        // flashing the Loading placeholder. Authed users only.
        if (state.auth && state.auth.authenticated && !isReadOnly() && state._catalogCache == null) {
          api('GET', '/catalog').then(entries => {
            state._catalogCache = Array.isArray(entries) ? entries : [];
            // If the user is sitting on the Places list when this lands,
            // re-render so the "update available" badges reflect the cache.
            if ((location.hash || '#/').startsWith('#/places')) wrappedRouter();
          }).catch(() => {});
        }
      });
    }

    fetchJson(DATA_FILES.siteConfig, null)
      .then(function(cfg) {
        applyConfig(cfg);
        return fetch(apiUrl('/state'), { credentials: 'same-origin' })
          .then(r => r.ok ? r.json() : null).catch(() => null);
      })
      .then(function(authState) {
        if (authState) state.auth = authState;
        renderAuthWidget();
        const v = state.viewer;
        if (v.mode === 'owner' && !state.auth.authenticated) {
          renderSignInPage();
          return;
        }
        return loadSyncedPrefs().then(() => loadDataAndRender());
      });

    // PWA: offline indicator + service worker registration + update toast.
    (function() {
      const offlineBanner = document.getElementById('pwa-offline-banner');
      const updateBanner = document.getElementById('pwa-update-banner');
      const updateBtn = document.getElementById('pwa-update-btn');

      function syncOnline() {
        offlineBanner.classList.toggle('visible', !navigator.onLine);
      }
      window.addEventListener('online', syncOnline);
      window.addEventListener('offline', syncOnline);
      syncOnline();

      if (!('serviceWorker' in navigator)) return;

      // After a hard-refresh the browser loads without an SW controller,
      // and the worker then takes over a moment later. That first
      // takeover fires 'controllerchange' too, but it's not an update -
      // reloading on it caused a spurious second refresh.
      let hadController = !!navigator.serviceWorker.controller;
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        if (!hadController) { hadController = true; return; }
        refreshing = true;
        window.location.reload();
      });

      let pendingReg = null;
      function promptUpdate(reg) {
        pendingReg = reg;
        updateBanner.classList.add('visible');
      }
      updateBtn.onclick = () => {
        // Re-resolve the waiting worker at click time. A captured worker
        // reference goes stale if the browser swapped or terminated it,
        // which left Reload doing nothing.
        const worker = (pendingReg && (pendingReg.waiting || pendingReg.installing)) || null;
        if (worker) worker.postMessage({ type: 'SKIP_WAITING' });
        // Safety net: if no controllerchange fires within 2s (no waiting
        // worker, message ignored, etc.), reload anyway - the user asked.
        setTimeout(() => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        }, 2000);
      };

      navigator.serviceWorker.register('/sw.js').then((reg) => {
        if (reg.waiting) promptUpdate(reg);
        reg.addEventListener('updatefound', () => {
          const worker = reg.installing;
          if (!worker) return;
          worker.addEventListener('statechange', () => {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              promptUpdate(reg);
            }
          });
        });
        // Force an update check on every page load. Firefox especially is
        // lazy about checking for new SW versions otherwise, and our
        // content-hash CACHE_VERSION means sw.js bytes can change on any
        // shell-file edit; users shouldn't have to unregister manually.
        try { reg.update(); } catch (_) {}
      }).catch(() => { /* registration failed; app still works online */ });
    })();
  </script>
</body>
</html>
