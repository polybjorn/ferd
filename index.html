    .leaflet-div-icon { background: transparent; border: none; }
    /* Selector targets .leaflet-tile-container so it applies to both the
       <img> tiles and the per-level <canvas> created by the NoGap plugin. */
    [data-tile-filter="muted"] .leaflet-tile-container { filter: saturate(0.35) brightness(0.95) contrast(0.95); }
    [data-tile-filter="grayscale"] .leaflet-tile-container { filter: grayscale(1); }
    [data-tile-filter="sepia"] .leaflet-tile-container { filter: sepia(0.7); }
    [data-tile-filter="contrast"] .leaflet-tile-container { filter: contrast(1.15) saturate(1.1); }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-weight: 300;
      -webkit-tap-highlight-color: transparent;
    }


    a { color: var(--accent); text-decoration: none; }
    a:hover { opacity: 0.8; }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 1rem;
      padding: 0 1.5rem;
      height: 50px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-self: end;
    }

    .nav-brand {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.05em;
      white-space: nowrap;
      justify-self: start;
    }
    .nav-brand a { color: var(--text); text-decoration: none; }
    #nav-home { white-space: nowrap; }
    #nav-back { display: none; opacity: 0.5; vertical-align: middle; margin-right: 0.3rem; }
    #nav-back svg { width: 1.1em; height: 1.1em; vertical-align: middle; }
    #nav-crumb { color: var(--muted); white-space: nowrap; }


    .nav-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-group + .nav-group {
      margin-left: 0.5rem;
      padding-left: 1.25rem;
      border-left: 1px solid var(--border);
    }

    .nav-stat { display: flex; align-items: center; gap: 0.3rem; }
    .nav-stat .label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav-stat .value { font-weight: 300; color: var(--text); }
    .nav-stat a { color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
    .nav-stat a:hover { text-decoration: underline; }

    /* View tabs */
    .view-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      flex-shrink: 0;
      justify-self: center;
    }
    .view-tabs a {
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      padding: 0.4rem 0.7rem;
      transition: background 0.15s, color 0.15s;
    }
    .view-tabs a + a { border-left: 1px solid var(--border); }
    .view-tabs a:hover { color: var(--text); opacity: 1; }
    .view-tabs a.active { background: var(--surface2); color: var(--text); }

    .nav-actions { display: flex; align-items: center; gap: 0.5rem; }
    .nav-actions:empty { display: none; }
    .nav-action-btn {
      font: inherit;
      font-size: 0.7rem;
      padding: 0.4rem 0.8rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .nav-action-btn:hover { filter: brightness(1.1); }

    /* App container */
    #app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      height: calc(100vh - 50px);
      overflow-y: overlay;
      padding: 2rem 1.5rem 2rem;
      box-sizing: border-box;
    }

    #app:has(#map),
    #app:has(.detail-layout) {
      overflow: hidden;
      padding: 0;
      position: relative;
      max-width: none;
    }

    /* Index grids (places + routes) */
    .category-grid,
    .region-grid {
      columns: 2;
      column-gap: 1.5rem;
    }
    /* Empty-state message must span both columns; otherwise it sits in one
       column with the other empty, which looks like off-center alignment. */
    .category-grid > .loading,
    .region-grid > .loading { column-span: all; }

    .category-group,
    .region-group {
      margin-bottom: 1.5rem;
      break-inside: avoid;
    }

    .category-group:only-child,
    .region-group:only-child { column-span: all; }

    .category-label,
    .region-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-link { cursor: pointer; }
    .section-link:hover { color: var(--accent); }
    .group-color-dot {
      display: inline-block;
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .place-count,
    .route-count {
      font-size: 0.65rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .category-grid, .region-grid { columns: 1; }
    }

    /* Places index */
    .index-controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      align-items: center;
    }

    .index-controls input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 0.6rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 300;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .index-controls input[type="text"]::placeholder { color: var(--muted); }
    .index-controls input[type="text"]:focus { border-color: var(--accent); }
    .index-controls select {
      flex-shrink: 0;
      padding: 0.55rem 0.7rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    .index-controls select:focus { border-color: var(--accent); }
    .filter-dropdown { position: relative; flex-shrink: 0; }
    .filter-dropdown .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .filter-dropdown .filter-btn:hover { border-color: var(--border-hover); }
    .filter-dropdown .filter-btn.has-active { border-color: var(--accent); color: var(--accent); }
    .filter-popover {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 100;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .filter-popover[hidden] { display: none; }
    .filter-popover label { display: block; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-popover select { width: 100%; padding: 0.45rem 0.6rem; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.85rem; font-family: inherit; cursor: pointer; outline: none; }
    .filter-popover select:focus { border-color: var(--accent); }
    .filter-popover .filter-clear {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.75rem;
      font-family: inherit;
      letter-spacing: 0.05em;
      padding: 0.45rem 0.6rem;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      transition: background-color 0.15s ease, color 0.15s ease;
    }
    .filter-popover .filter-clear:hover { background: var(--accent); color: var(--fab-text); }
    .filter-popover .filter-divider { height: 1px; background: var(--border); margin: 0.2rem -0.25rem; }

    .context-menu {
      position: fixed;
      z-index: 5000;
      min-width: 120px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.3rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px var(--shadow);
      font-size: 0.85rem;
    }
    .context-menu[hidden] { display: none; }
    .context-menu button {
      background: transparent;
      border: none;
      color: var(--text);
      text-align: left;

      padding: 0.5rem 0.75rem;
      cursor: pointer;
    }
    .signin-public-toggle:hover { color: var(--text); border-color: var(--border-hover); }
    .signin-public-chevron { transition: transform 0.2s ease; font-size: 0.55rem; }
    .signin-public-toggle.expanded .signin-public-chevron { transform: rotate(180deg); }
    #signin-public-collapsible.expanded .collapsible-inner { padding-top: 0.5rem; max-height: 40vh; overflow-y: auto; }
    .public-maps-list { display: flex; flex-direction: column; gap: 0.4rem; }
    .public-maps-item {
      display: block;
      padding: 0.55rem 0.85rem;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 0.85rem;
    }
    .public-maps-item:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Leaflet overrides */
    .leaflet-bar { border-radius: var(--radius) !important; }
    .leaflet-bar a:first-child { border-radius: var(--radius) var(--radius) 0 0 !important; }
    .leaflet-bar a:last-child { border-radius: 0 0 var(--radius) var(--radius) !important; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

    .leaflet-top .leaflet-control, .leaflet-bottom .leaflet-control { margin: 5px !important; }
    .leaflet-control-attribution {
      background: var(--attribution-bg) !important;
      color: var(--muted) !important;
      font-size: 0.6rem !important;
      border-radius: var(--radius) !important;
    }
    .leaflet-control-attribution a { color: var(--accent) !important; }

    .leaflet-tooltip {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      font-size: 0.8rem;
      font-weight: 300;
      white-space: pre;
      box-shadow: 0 2px 8px var(--shadow) !important;
    }
    .leaflet-tooltip-top::before { border-top-color: var(--border) !important; }
    .leaflet-tooltip-bottom::before { border-bottom-color: var(--border) !important; }

    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 2px 8px var(--shadow) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { font-size: 0.8rem; font-weight: 300; margin: 10px 14px; position: relative; min-width: 220px; }
    .leaflet-popup-content a { color: var(--accent); }
    .leaflet-popup-content .popup-name {
      font-weight: 400;
      font-size: 0.85rem;
      margin-bottom: 0.25rem;
      padding-right: 1.6rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      column-gap: 0.4rem;
    }
    .leaflet-popup-content a.popup-name-link { color: var(--text); text-decoration: none; }
    .leaflet-popup-content a.popup-name-link:hover { color: var(--accent); }
    .leaflet-popup-content .popup-source-link {
      position: absolute;
      top: 0;
      right: 0;
      width: 1.1rem;
      height: 1.1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: inherit;
      cursor: pointer;
      opacity: 0.55;
      text-decoration: none;
      transition: opacity 0.15s ease, color 0.15s ease;
    }
    .leaflet-popup-content .popup-source-link:hover { opacity: 1; color: var(--accent); }
    .leaflet-popup-content .popup-source-link svg { width: 0.95rem; height: 0.95rem; display: block; }
    .leaflet-popup-content .popup-local { font-size: 0.75rem; color: var(--muted); font-weight: 300; font-style: italic; white-space: nowrap; }
    .leaflet-popup-content .cat-text { color: var(--c); }
    [data-mode="light"] .leaflet-popup-content .cat-text { color: var(--cl); }
    .leaflet-popup-content .popup-image {
      display: block; width: 100%; max-width: 280px; aspect-ratio: 16 / 10;
      object-fit: cover; border-radius: var(--radius); margin: 0.4rem auto;
      background: var(--surface2);
    }
    .leaflet-popup-content .popup-note { color: var(--text); font-size: 0.75rem; margin-top: 0.3rem; }
    .leaflet-popup-content .popup-summary {
      color: var(--text);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
    }
    .leaflet-popup-content .popup-summary > span { justify-self: start; }
    .leaflet-popup-content .popup-summary > span:nth-child(2) { justify-self: center; }
    .leaflet-popup-content .popup-summary > span:last-child { justify-self: end; }
    .leaflet-popup-content .popup-tags { color: var(--text); font-size: 0.7rem; margin-top: 0.25rem; text-align: center; }
    .leaflet-popup-content .popup-sources { font-size: 0.65rem; margin-top: 0.3rem; }
    .leaflet-popup-content .popup-sources-center { text-align: center; }
    .leaflet-popup-content .popup-sources a { color: var(--accent); }
    .leaflet-popup-content .popup-meta {
      margin-top: 0.5rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .leaflet-popup-content .popup-meta > * { justify-self: start; white-space: nowrap; }
    .leaflet-popup-content .popup-meta > :nth-child(2) { justify-self: center; }
    .leaflet-popup-content .popup-meta > :last-child { justify-self: end; }
    .leaflet-popup-content .popup-meta a { color: inherit; cursor: pointer; text-transform: none; letter-spacing: normal; font-size: 0.7rem; }
    .leaflet-popup-content .popup-meta a:hover { color: var(--accent); }

    .leaflet-control-layers { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; color: var(--text) !important; padding: 0 !important; }
    .leaflet-control-layers-toggle { width: 36px !important; height: 36px !important; padding: 6px !important; background-size: 24px 24px !important; }
    .leaflet-control-layers label { color: var(--text); }
    .leaflet-control-layers-separator { border-color: var(--border) !important; }

    /* Pointer cursor over the route "near-tap" zone, so hovering near a
       polyline reads as interactive even when not directly on the stroke. */
    .leaflet-container.route-near-cursor { cursor: pointer; }

    /* Elevation control */
    .elevation-control .background { fill: var(--surface); }
    .elevation-control .area { fill: var(--accent); fill-opacity: 0.35; stroke: var(--accent); }
    .elevation-control .axis text { fill: var(--text); font-size: 10px; text-shadow: none; paint-order: normal; stroke: none; }
    .elevation-control .axis line, .elevation-control .axis path { stroke: var(--border); }
    .elevation-control .mouse-focus-line { stroke: var(--text); }
    .elevation-detached:not(:hover) .mouse-focus-line,
    .elevation-detached:not(:hover) .mouse-focus-label { display: none; }
    /* Hide leaflet-elevation's on-map position marker when no elevation chart is hovered.
       The library leaves it dangling at the last hovered point after mouseleave. */
    .leaflet-container:not(.elev-hover) .height-focus,
    .leaflet-container:not(.elev-hover) .height-focus-marker,
    .leaflet-container:not(.elev-hover) .height-focus-label,
    .leaflet-container:not(.elev-hover) .leaflet-marker-pane > .height-focus { display: none !important; }
    .leaflet-elevation-pane .elevation-summary { background: var(--surface) !important; color: var(--text) !important; }
    .elevation-control .close-button, .elevation-control .elevation-toggle-icon, .elevation-detached .leaflet-close { display: none !important; }
    .leaflet-overlay-pane .leaflet-interactive { filter: drop-shadow(0 0 3px rgba(0,0,0,0.5)); }
    .marker-start, .marker-end { background: none !important; border: none !important; }
    .gpx-waypoint-icon {
      background: var(--surface);
      border: 1.5px solid var(--text);
      border-radius: 50%;
      box-shadow: 0 0 2px rgba(0,0,0,0.4);
    }

    @media (max-width: 900px) {
      #app { padding: 1rem 1rem 3rem; }
      .place-grid, .route-grid { grid-template-columns: 1fr; }
      .detail-layout { padding: 0; }
      nav { padding: 0.5rem 0.75rem; gap: 0.5rem; }
      nav .view-tabs a { font-size: 0.8rem; padding: 0.55rem 0.85rem; }
      nav .auth-widget button, nav .auth-widget a { font-size: 0.8rem; padding: 0.55rem 0.85rem; }
      .nav-group { gap: 0.4rem; }
      .nav-group + .nav-group { padding-left: 0.4rem; }
      .nav-stat .label { font-size: 0.5rem; }
      #track-legend { gap: 0.4rem; padding: 0.4rem 0.5rem; }
      .track-legend-item .track-stat { display: none; }
      #multi-elevation-container { max-height: 40vh; }
      .map-panel { max-width: calc(100vw - 40px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }

    /* Auth widget in nav */
    .auth-widget {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      font-size: 0.7rem;
      position: relative;
    }
    .auth-widget button, .auth-widget a {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 400;
      line-height: inherit;
      letter-spacing: 0.03em;
      padding: 0.4rem 0.7rem;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .auth-widget button:hover, .auth-widget a:hover {
      color: var(--text);
      border-color: var(--border-hover);
      opacity: 1;
    }
    .auth-widget { position: relative; }
    .auth-menu {
      position: absolute;
      top: calc(100% + 0.4rem);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      min-width: 180px;
      z-index: 1500;
      padding: 0.25rem;
    }
    .auth-menu[hidden] { display: none; }
    .auth-menu .auth-menu-header {
      padding: 0.5rem 0.7rem 0.4rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.25rem;
    }
    .auth-menu .auth-menu-header strong {
      color: var(--text);
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.8rem;
      display: block;
      margin-top: 0.15rem;
    }
    .auth-menu button {
      display: flex;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.75rem;
      text-align: left;
      padding: 0.5rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      justify-content: flex-start;
    }
    .auth-menu button:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: transparent;
    }
    .auth-menu button.auth-menu-signout {
      margin-top: 0.25rem;
      padding-top: 0.55rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      border-radius: 0 0 4px 4px;
    }
    .auth-menu button.auth-menu-signout:hover { color: var(--text); }
    .about-body { text-align: center; padding: 0.5rem 0 0.25rem; }
    .about-logo {
      width: 64px;
      height: 64px;
      display: block;
      margin: 0 auto 0.5rem;
    }
    .about-brand {
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 0.15rem;
    }
    .about-version {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .about-tagline {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 1rem;
    }
    .about-links { font-size: 0.7rem; color: var(--muted); }
    .about-links a { color: var(--accent); text-decoration: none; }
    .about-links a:hover { text-decoration: underline; }
    .about-sep { margin: 0 0.4rem; }

    /* Floating add button */
    .fab-add {
      position: absolute;
      bottom: 2rem;
      right: 0.75rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: transparent;
      border: none;
      font-size: 0;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--shadow);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center;
      transition: transform 0.18s ease-out, opacity 0.18s ease-out;
    }
    .fab-add::before,
    .fab-add::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      background: var(--fab-text);
      border-radius: 1px;
    }
    .fab-add::before { width: 14px; height: 2px; transform: translate(-50%, -50%); }
    .fab-add::after  { width: 2px; height: 14px; transform: translate(-50%, -50%); }
    .fab-add.fab-enter { transform: scale(0.4); opacity: 0; }
    .fab-add.fab-leave { transform: scale(0.4); opacity: 0; pointer-events: none; }

    /* Tile-picker (Leaflet layers control) enter/leave animation */
    .leaflet-control-layers {
      transform-origin: top right;
      transition: transform 0.18s ease-out, opacity 0.18s ease-out;
    }
    .leaflet-control-layers.tile-pick-enter,
    .leaflet-control-layers.tile-pick-leave {
      transform: scale(0.5);
      opacity: 0;
    }
    .fab-add:hover { transform: scale(1.05); }

    /* Spacebar / long-press hides map UI but leaves the tile attribution
       visible - Esri / OSM / OpenTopoMap terms require attribution to
       remain on screen while their tiles are. */
    body.map-chrome-hidden .leaflet-control-container .leaflet-control:not(.leaflet-control-attribution),
    body.map-chrome-hidden .fab-add,
    body.map-chrome-hidden .map-panel { display: none !important; }
    /* Per-control persistent toggles (Settings > Appearance > On-map controls).
       Animate opacity/transform rather than display:none so the toggle is
       visible. The spacebar (.map-chrome-hidden) above still hard-hides. */
    .map-panel { transform-origin: bottom left; transition: transform 0.18s ease-out, opacity 0.18s ease-out; }
    .leaflet-control-zoom { transform-origin: top left; transition: transform 0.18s ease-out, opacity 0.18s ease-out; }
    body.hide-map-filter .map-panel,
    body.hide-map-zoom .leaflet-control-zoom {
      opacity: 0;
      transform: scale(0.5);
      pointer-events: none;
    }
    /* 'S' keyboard shortcut force-shows the map filter panel even when the
       user has set it to hidden, so the search input is reachable. */
    body.force-show-map-filter .map-panel {
      opacity: 1 !important;
      transform: none !important;
      pointer-events: auto !important;
    }

    /* "Pick on map" inline button for the Add Place form */
    .pick-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.4rem;
    }
    .pick-row button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      padding: 0.35rem 0.7rem;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .pick-row button:hover { color: var(--text); border-color: var(--border-hover); }

    /* "Add new" toggle for category/region selects */
    .select-or-new { display: flex; flex-direction: column; gap: 0.4rem; }
    .select-or-new .new-input[hidden] { display: none; }

    /* Settings modal sub-sections */
    .modal h3.settings-h {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-hover, var(--border));
    }
    .modal [data-panel] > h3.settings-h:first-child {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    /* Toggle switch: stylized checkbox with a sliding knob.
       Markup: <input type="checkbox" class="settings-toggle"> */
    .modal input[type="checkbox"].settings-toggle {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      width: 36px;
      height: 20px;
      margin: 0;
      background: var(--border);
      border: 1px solid var(--border-hover, var(--border));
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex: 0 0 auto;
    }
    .modal input[type="checkbox"].settings-toggle::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      width: 16px;
      height: 16px;
      background: var(--surface);
      border-radius: 50%;
      transition: transform 0.15s, background 0.15s;
    }
    .modal input[type="checkbox"].settings-toggle:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .modal input[type="checkbox"].settings-toggle:checked::after {
      transform: translateX(16px);
      background: var(--surface);
    }
    .modal input[type="checkbox"].settings-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .settings-inline-row > .settings-toggle { justify-self: start; }

    .session-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .session-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
    }
    .session-meta { flex: 1; min-width: 0; }
    .session-device { font-size: 0.78rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    .session-current {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      border: 1px solid rgba(40,202,65,0.3);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }
    .session-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; }
    .session-revoke {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--red);
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
    }
    .session-revoke:hover:not(:disabled) { border-color: var(--red); }
    .session-revoke:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-x {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 1.6rem;
      height: 1.6rem;
      padding: 0;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-x:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
    .btn-x:disabled { opacity: 0.4; cursor: not-allowed; }
    .catalog-eye-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); width: 1.9rem; height: 1.9rem;
      padding: 0; border-radius: var(--radius); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .catalog-eye-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border-hover); }
    .catalog-eye-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .modal input.dirty { border-color: var(--accent); }
    .row-tag {
      font-size: 0.7rem;
      color: var(--muted);
      flex: 0 0 5rem;
      text-align: right;
    }
    .row-tag.dirty {
      color: var(--accent);
      animation: rowTagIn 0.2s ease-out;
    }
    .row-tag.in-input {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      flex: none;
      background: var(--surface2);
      padding: 0 0.25rem;
    }
    .cat-row:not(.dragging) { transition: transform 160ms ease-out; }
    @media (prefers-reduced-motion: reduce) {
      .cat-row { transition: none !important; }
    }
    .row-tag.in-input:empty { display: none; }
    /* The base .row-tag.dirty animation uses translateX(6px) which would wipe
       the translateY(-50%) that vertical-centers the in-input badge, causing
       it to flash from the lower-right corner. Use a paired-axis keyframe. */
    .row-tag.in-input.dirty { animation: rowTagInInside 0.2s ease-out; }
    @keyframes rowTagInInside {
      from { opacity: 0; transform: translate(6px, -50%); }
      to   { opacity: 1; transform: translate(0, -50%); }
    }
    .cat-input-wrap > .cat-display { padding-right: 4rem; transition: padding-right 120ms ease-out; }
    /* While the input is focused, give it full width and snap-hide the badge
       so the user only sees "edited" after they leave the field. */
    .cat-input-wrap:has(.cat-display:focus) > .cat-display { padding-right: 0.7rem; }
    .cat-input-wrap:has(.cat-display:focus) .row-tag.in-input { display: none; }
    @keyframes rowTagIn {
      from { opacity: 0; transform: translateX(6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .radio-row {
      display: flex;
      row-gap: 0.4rem;
      column-gap: 1rem;
      flex-wrap: wrap;
    }
    /* Two-column row pairing two selects (or two columns of settings) side-by-side. */
    .settings-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1rem;
      align-items: end;
    }
    .settings-grid-2 > * { margin: 0; }
    .settings-grid-2 > label { margin-top: 0.75rem; margin-bottom: 0.3rem; }
    /* Inline label + control row: label left (fixed width), control fills the rest.
       Wraps on narrow viewports so the control drops under the label. */
    .settings-inline-row {
      display: grid;

      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.15s;
    }
    button.primary:hover:not(:disabled) { opacity: 0.9; }
    button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .modal button.primary:not(h2 .modal-close) {
      background: var(--accent);
      color: var(--fab-text);
      border-color: var(--accent);
    }
    .modal button:not(.modal-close):hover:not(:disabled) { color: var(--text); border-color: var(--border-hover); }
    .modal button.primary:hover { opacity: 0.9; color: var(--fab-text); }
    .modal button:not(.modal-close):disabled { opacity: 0.4; cursor: not-allowed; }
    .modal .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }
    .pick-coords-banner {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: var(--fab-text);
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.75rem;
      z-index: 1500;
      box-shadow: 0 2px 8px var(--shadow);
      cursor: pointer;
    }
    .pwa-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 50px;
      z-index: 999;
    }
    .pwa-banner.visible { display: flex; }
    .pwa-banner.offline { background: #fff3cd; color: #663c00; border-bottom-color: #f0d27a; }
    /* Floating "Update available" toast: detached from the sticky stack,
       centered with side padding so it doesn't reach edges, and slides
       down on appear. */
    .pwa-update-toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.5rem 0.5rem 1rem;
      max-width: calc(100vw - 2rem);
      font-size: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      z-index: 1500;
    }
    .pwa-update-toast.visible {
      display: flex;
      animation: pwa-update-toast-in 220ms ease-out;
    }
    @keyframes pwa-update-toast-in {
      from { opacity: 0; transform: translate(-50%, 16px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pwa-update-toast.visible { animation: none; }
      .modal button:not(.modal-close) { transition: none; }
    }
    .pwa-banner button,
    .pwa-update-toast button {
      padding: 0.3rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: var(--bg);
      border-radius: 999px;
      cursor: pointer;
    }
    .pwa-banner button:hover,
    .pwa-update-toast button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">
      <a href="#/" id="nav-home"><span id="nav-back" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg></span><span id="nav-brand-text">Ferd</span></a><span id="nav-crumb"></span>
    </span>
    <div class="view-tabs">
      <a href="#/places" data-view="places" id="tab-places">Places</a>
      <a href="#/routes" data-view="routes" id="tab-routes">Routes</a>
    </div>
    <div class="nav-right">
      <div class="nav-actions" id="nav-actions"></div>
      <div class="auth-widget" id="auth-widget"></div>
    </div>
  </nav>
  <div id="pwa-offline-banner" class="pwa-banner offline">You're offline. Read-only mode.</div>
  <div id="pwa-update-banner" class="pwa-update-toast">
    <span>Update available.</span>
    <button id="pwa-update-btn" type="button">Reload</button>
  </div>
  <div id="app"><div class="loading">Loading...</div></div>
  <div id="modal-root"></div>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/vendor/leaflet-smoothwheelzoom/SmoothWheelZoom.js"></script>
  <script src="/vendor/leaflet-tilelayer-nogap/L.TileLayer.NoGap.js"></script>
  <script src="/vendor/supercluster/supercluster.min.js"></script>
  <script src="/vendor/leaflet-gpx/gpx.js"></script>
  <script src="/vendor/leaflet-elevation/leaflet-elevation.js"></script>
  <script>
    // ----- Shared -----
    // Tableau 20 categorical palette, reordered: indices 0-9 are the saturated
    // hues in hue-spread order (blue, orange, green, red, teal, purple, gold,
    // pink, brown, gray) so the first N categories get maximally different
    // colors. Indices 10-19 are the paler siblings of the same hues in the
    // same order, used as fallback once 10+ categories accumulate.
    // COLORS_LIGHT are HSL-darkened to L=30% for legibility on light surfaces;
    // saturation preserved so gray stays gray.
    const COLORS       = ['#3e78b7', '#ff8e1f', '#4eaf41', '#f93f42', '#3ba6a0', '#b971a5', '#cea715', '#e46190', '#a87355', '#7b6f6c', '#93cdf5', '#ffbe7d', '#83e06e', '#ff9d9a', '#7dc5bd', '#dc9ecc', '#ffd555', '#ffbad0', '#e0b29d', '#bdafa8'];
    const COLORS_LIGHT = ['#274c72', '#994c00', '#327029', '#950407', '#29706e', '#673258', '#8b700e', '#83163d', '#654534', '#514948', '#0e598b', '#994c00', '#2d7e1b', '#990500', '#2f6a64', '#70295d', '#997400', '#990031', '#743d25', '#574942'];
    if (COLORS.length !== COLORS_LIGHT.length) console.warn('COLORS and COLORS_LIGHT length mismatch');
    const TRACK_COLORS = COLORS;
    const ROUTE_COLOR = '#6aaeee';
    const GPX_NS = 'http://www.topografix.com/GPX/1/1';
    const DATA_FILES = { siteConfig: 'site-config.json' };

    // viewer mode: 'public' when the URL is /u/<username>/..., else 'owner'
    // (read+write against /api/places etc. for the signed-in user).
    function detectViewer() {
      const m = (location.pathname || '/').match(/^\/u\/([A-Za-z0-9_-]+)(?:\/|$)/);
      if (m) return { mode: 'public', username: m[1] };
      return { mode: 'owner', username: null };
    }

    function dataUrl(kind) {
      // kind: 'places' | 'routes' | 'metadata'
      const v = state.viewer;
      if (v && v.mode === 'public') return apiUrl('/u/' + encodeURIComponent(v.username) + '/' + kind);
      return apiUrl('/' + kind);
    }

    function categoryLabelsUrl() {
      const v = state.viewer;
      if (v && v.mode === 'public') return apiUrl('/u/' + encodeURIComponent(v.username) + '/category-labels');
      return apiUrl('/me/category-labels');
    }

    function gpxUrlFor(file) {
      const v = state.viewer;
      if (v && v.mode === 'public') return apiUrl('/u/' + encodeURIComponent(v.username) + '/gpx/' + file);
      return apiUrl('/gpx/' + file);
    }

    function isReadOnly() {
      return !!(state.viewer && state.viewer.mode === 'public');
    }

    let _routeColorCache = null;
    function routeStatusColor(completed) {
      // Cache both values per theme; applyTheme() invalidates. Avoids one
      // getComputedStyle (and forced style recalc) per polyline draw.
      if (!_routeColorCache) {
        const cs = getComputedStyle(document.documentElement);
        _routeColorCache = {
          completed: cs.getPropertyValue('--completed').trim() || '#a3be8c',
          planned:   cs.getPropertyValue('--planned').trim()   || '#bf616a',
        };
      }
      return completed ? _routeColorCache.completed : _routeColorCache.planned;
    }

    function fetchJson(url, fallback) {
      return fetch(url).then(r => r.ok ? r.json() : fallback).catch(() => fallback);
    }

    // Pill-style radio group: each option renders as a single-select pill.
    function radioPillsHtml(name, options, selected) {
      return '<div class="radio-row radio-pills">' +
        options.map(([v, l]) =>
          '<label><input type="radio" name="' + name + '" value="' + v + '"' + (selected === v ? ' checked' : '') + '>' + l + '</label>'
        ).join('') + '</div>';
    }

    // Clickable 1-5 star widget. Reads/writes value via dataset on the wrapper.
    function starRatingHtml(name, current) {
      const val = current ? String(current) : '';
      let html = '<div class="star-rating" data-name="' + name + '" data-value="' + escapeHtml(val) + '">';
      for (let i = 1; i <= 5; i++) {
        const filled = current && i <= current;
        // ★ for filled, ☆ for empty — distinct glyphs make the state obvious
        // regardless of color contrast in the active theme.
        html += '<span class="star' + (filled ? ' filled' : '') + '" data-v="' + i + '">' + (filled ? '&#9733;' : '&#9734;') + '</span>';
      }
      html += '<a href="#" class="star-clear">clear</a>';
      html += '</div>';
      return html;
    }
    function wireStarRating(name) {
      const wrap = document.querySelector('.star-rating[data-name="' + name + '"]');
      if (!wrap) return;
      const stars = wrap.querySelectorAll('.star');
      const FILLED = '★';
      const EMPTY = '☆';
      // Set both class and glyph so the state is unmistakable.
      const setStar = (s, on, preview) => {
        s.classList.toggle('filled', on && !preview);
        s.classList.toggle('preview', !!preview);
        s.innerHTML = (on || preview) ? FILLED : EMPTY;
      };
      const paint = (n, preview) => stars.forEach(s => {
        setStar(s, !preview && (+s.dataset.v) <= n, preview && (+s.dataset.v) <= n);
      });
      const repaint = () => {
        const cur = parseInt(wrap.dataset.value, 10) || 0;
        stars.forEach(s => setStar(s, (+s.dataset.v) <= cur, false));
      };
      stars.forEach(star => {
        star.addEventListener('mouseenter', function() { paint(+this.dataset.v, true); });
        star.addEventListener('mouseleave', repaint);
        star.addEventListener('click', function() {
          const v = +this.dataset.v;
          wrap.dataset.value = (wrap.dataset.value == String(v) ? '' : String(v));
          repaint();
        });
      });
      const clear = wrap.querySelector('.star-clear');
      if (clear) clear.addEventListener('click', function(e) {
        e.preventDefault();
        wrap.dataset.value = '';
        repaint();
      });
    }
    function readStarRating(name) {
      const wrap = document.querySelector('.star-rating[data-name="' + name + '"]');
      return wrap ? wrap.dataset.value : '';
    }

    function selectOrNewHtml(id, options, current, labelFn, emptyLabel, newPlaceholder) {
      const labelOf = labelFn || (v => v);
      // When emptyLabel is set, an empty-string option is allowed at the top
      // and `required` is dropped from the select (the field is optional).
      const hasEmpty = emptyLabel != null;
      const isEmpty = current == null || current === '';
      const inList = !isEmpty && options.includes(current);
      const opts = options.map(v =>
        '<option value="' + escapeHtml(v) + '"' + (v === current ? ' selected' : '') + '>' + escapeHtml(labelOf(v)) + '</option>'
      ).join('');
      const newSelected = (!isEmpty && !inList) ? ' selected' : '';
      const inputValue = (!isEmpty && !inList) ? escapeHtml(current) : '';
      const inputHidden = isEmpty || inList;
      // The empty option exists so "no selection" is a valid state, but it's
      // hidden from the dropdown list — the select just shows blank when it's
      // selected. Picking a real option replaces the placeholder.
      const emptyOpt = hasEmpty
        ? '<option value="" hidden' + (isEmpty ? ' selected' : '') + '>' + escapeHtml(emptyLabel) + '</option>'
        : '';
      const requiredAttr = hasEmpty ? '' : ' required';
      return '<div class="select-or-new" data-id="' + id + '">' +
        '<select id="' + id + '"' + requiredAttr + '>' + emptyOpt + opts +
          '<option value="__new__"' + newSelected + '>+ Add new</option>' +
        '</select>' +
        '<input type="text" class="new-input" id="' + id + '-new" placeholder="' + escapeHtml(newPlaceholder || 'New value') + '" value="' + inputValue + '"' + (inputHidden ? ' hidden' : '') + '>' +
      '</div>';
    }

    function wireSelectOrNew(id) {
      const sel = document.getElementById(id);
      const input = document.getElementById(id + '-new');
      if (!sel || !input) return;
      const sync = () => {
        input.hidden = sel.value !== '__new__';
        input.required = sel.value === '__new__';
      };
      sel.addEventListener('change', sync);
      sync();
    }

    function readSelectOrNew(id) {
      const sel = document.getElementById(id);
      const input = document.getElementById(id + '-new');
      if (!sel) return '';
      if (sel.value === '__new__') return (input.value || '').trim();
      return sel.value;
    }

    function readPlaceFormFields(prefix) {
      const $ = id => document.getElementById(prefix + '-' + id);
      const val = id => { const el = $(id); return el ? el.value : ''; };
      const category = readSelectOrNew(prefix + '-category');
      const sourcesRaw = val('sources').trim();
      const sources = sourcesRaw ? sourcesRaw.split('\n').map(s => s.trim()).filter(Boolean) : null;
      const rawLat = parseFloat(val('lat'));
      const rawLon = parseFloat(val('lon'));
      if (Number.isNaN(rawLat) || Number.isNaN(rawLon)) {
        return { error: 'Pick a location on the map (or enter coordinates manually).' };
      }
      // Round to 5 decimals (~1 m). Anything beyond is JS float noise and
      // pollutes the stored JSON; the marker is a 30-px dot anyway.
      const lat = Math.round(rawLat * 1e5) / 1e5;
      const lon = Math.round(rawLon * 1e5) / 1e5;
      const payload = {
        name: val('name').trim(),
        lat,
        lon,
        visited: $('visited').checked,
      };
      if (category) payload.category = category;
      const country = val('country').trim();
      const note = val('note').trim();
      const localName = val('local-name').trim();
      const image = val('image').trim();
      const dateVisited = val('date-visited').trim();
      const ratingRaw = readStarRating(prefix + '-rating');
      if (country) payload.country = country;
      if (note) payload.note = note;
      if (localName) payload.local_name = localName;
      if (image) payload.image = image;
      if (sources && sources.length) payload.sources = sources;
      // Visit-only metadata: ignore if the visited toggle is off.
      if (payload.visited) {
        if (dateVisited) payload.date_visited = dateVisited;
        if (ratingRaw) payload.rating = parseInt(ratingRaw, 10);
      }
      return { payload };
    }

    function panelSectionHtml(id, label) {
      return '<div class="panel-section collapsed" id="' + id + '-section">' +
        '<div class="panel-section-header" data-section="' + id + '-section">' + label +
        '<span class="panel-section-actions">' +
        '<span class="panel-action" id="' + id + '-toggle-all">Toggle</span>' +
        '<span class="section-arrow">&#x25BC;</span>' +
        '</span></div>' +
        '<div class="panel-section-body" id="' + id + '-body"></div>' +
        '</div>';
    }

    const DEFAULT_CONFIG = {
      brand: 'Ferd',
      features: { places: true, routes: true },
      default_view: { center: [45, 10], zoom: 4 },
      default_view_routes: { center: [59.5, 6.5], zoom: 10 },
      category_labels: {},
      api_base: '/api',
    };

    function placesAvailable() { return state.config.features.places !== false; }
    function routesAvailable() { return state.config.features.routes !== false; }
    function getHiddenFeatures() {
      try {
        const raw = localStorage.getItem('hidden-features');
        return raw ? new Set(JSON.parse(raw)) : new Set();
      } catch { return new Set(); }
    }
    function setFeatureHidden(name, hidden) {
      const s = getHiddenFeatures();
      if (hidden) s.add(name); else s.delete(name);
      try { localStorage.setItem('hidden-features', JSON.stringify([...s])); } catch {}
    }
    function placesEnabled() { return placesAvailable() && !getHiddenFeatures().has('places'); }
    function routesEnabled() { return routesAvailable() && !getHiddenFeatures().has('routes'); }

    // One-shot rename of the per-browser "show local name field" toggle, which
    // used the legacy `show-native-name` key before 1.1.0. Copy the old value
    // over to the new key and drop the stale entry. Safe to leave indefinitely
    // (no-op once both keys are absent); remove after a future release once
    // we're confident no browsers carry the old key anymore.
    try {
      const oldKey = 'show-native-name';
      const newKey = 'show-local-name';
      const oldVal = localStorage.getItem(oldKey);
      if (oldVal !== null && localStorage.getItem(newKey) === null) {
        localStorage.setItem(newKey, oldVal);
      }
      if (oldVal !== null) localStorage.removeItem(oldKey);
    } catch {}

    function getPref(key, def) {
      try { const v = localStorage.getItem(key); return v === null ? def : v; }
      catch { return def; }
    }
    const SYNCED_PREF_KEYS = new Set(['theme', 'mode', 'pin-style', 'marker-size', 'route-weight', 'tile-filter']);
    function setPref(key, val) {
      try { localStorage.setItem(key, val); } catch {}
      if (SYNCED_PREF_KEYS.has(key) && state.auth && state.auth.authenticated) {
        state.serverPrefs[key] = val;
        fetch(apiUrl('/me/prefs'), {
          method: 'PUT',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(state.serverPrefs),
        }).catch(() => {});
      }
    }
    function loadSyncedPrefs() {
      if (!state.auth || !state.auth.authenticated) return Promise.resolve();
      return fetch(apiUrl('/me/prefs'), { credentials: 'same-origin' })
        .then(r => r.ok ? r.json() : null)
        .then(prefs => {
          if (!prefs || typeof prefs !== 'object') return;
          state.serverPrefs = Object.assign({}, prefs);
          for (const key of SYNCED_PREF_KEYS) {
            if (key in prefs) {
              try { localStorage.setItem(key, prefs[key]); } catch {}
            }
          }
          try { applyTheme(getStoredTheme(), getStoredMode()); } catch {}
        })
        .catch(() => {});
    }
    function bindRadioPref(name, prefKey, onChange) {
      document.querySelectorAll('input[name="' + name + '"]').forEach(r => {
        r.addEventListener('change', function() {
          if (!this.checked) return;
          setPref(prefKey, this.value);
          if (onChange) onChange(this.value);
        });
      });
    }
    function getDefaultTileLayer() { return getPref('tile-layer', 'Satellite'); }
    function getShowTilePicker() { return getPref('tile-picker', 'true') !== 'false'; }
    function getShowMapAddButton() { return getPref('map-add-button', 'true') !== 'false'; }
    function getShowFilterPanel() { return getPref('map-filter', 'true') !== 'false'; }
    function getShowZoomControls() { return getPref('map-zoom', 'true') !== 'false'; }
    function applyControlVisibility() {
      document.body.classList.toggle('hide-map-filter', !getShowFilterPanel());
      document.body.classList.toggle('hide-map-zoom', !getShowZoomControls());
    }
    function getRememberView() { return getPref('remember-view', 'true') !== 'false'; }
    function getUnits() { return getPref('units', 'metric'); }
    function getClusterPlaces() { return getPref('cluster-places', 'true') !== 'false'; }
    // Optional form fields — let the user hide ones they never use. All default ON.
    function getShowField(name) { return getPref('show-' + name, 'true') !== 'false'; }
    function isImperial() { return getUnits() === 'imperial'; }
    function loadStoredView() {
      try {
        const raw = localStorage.getItem('last-view');
        if (!raw) return null;
        const v = JSON.parse(raw);
        return (v && Array.isArray(v.center) && typeof v.zoom === 'number') ? v : null;
      } catch { return null; }
    }
    function saveStoredView(view) {
      try { localStorage.setItem('last-view', JSON.stringify(view)); } catch {}
    }

    function refreshTabVisibility() {
      const tabPlaces = document.getElementById('tab-places');
      const tabTrails = document.getElementById('tab-routes');
      if (tabPlaces) {
        tabPlaces.style.display = placesEnabled() ? '' : 'none';
        const n = Array.isArray(state.places) ? state.places.length : null;
        tabPlaces.textContent = n == null ? 'Places' : 'Places (' + n + ')';
      }
      if (tabTrails) {
        tabTrails.style.display = routesEnabled() ? '' : 'none';
        const n = state.manifest
          ? state.manifest.regions.reduce(function (s, r) { return s + r.routes.length; }, 0)
          : null;
        tabTrails.textContent = n == null ? 'Routes' : 'Routes (' + n + ')';
      }
    }

    // Skip tile loads during zoom animations. Default true is wasteful:
    // each zoom level transition requests its own batch of tiles while
    // the gesture is still in flight, competing with the animation.
    if (window.L && L.TileLayer && L.TileLayer.mergeOptions) {
      // NoGap (dumpToCanvas) fixes Android tile seams but causes a small
      // visible reshuffle at zoomend on desktop. Only enable it where the
      // seam issue actually shows up: coarse-pointer (touch) devices.
      const _isTouch = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
      L.TileLayer.mergeOptions({
        updateWhenZooming: false,
        dumpToCanvas: _isTouch,
      });
    }

    const state = {
      config: DEFAULT_CONFIG,
      auth: { authenticated: false, username: null, is_admin: false, published: false, registration_open: true, publishing_open: true, catalog_baseline_open: true, has_users: false, requires_setup_token: false },
      serverPrefs: {},
      viewer: detectViewer(),
      currentMap: null,
      currentElevation: null,
      // data
      places: null,
      manifest: null,
      categoryColors: {},
      categoryColorsLight: {},
      // browse-list state
      groupBy: (function(){ try { return localStorage.getItem('places-group-by') || 'category'; } catch { return 'category'; } })(),
      trailsGroupBy: (function(){ try { return localStorage.getItem('trails-group-by') || 'region'; } catch { return 'region'; } })(),
      // Filter values are kept in memory only — they survive in-page re-renders
      // (catalog refresh, CRUD writes) but reset on a full page reload.
      placeFilters: { search: '', status: 'all', category: 'all', country: 'all', catalog: 'all' },
      trailFilters: { search: '', status: 'all', region: 'all', difficulty: 'all', rating: 'all', tag: 'all' },
      // unified-map filter state
      hiddenCategories: new Set(),
      hiddenRegions: new Set(),
      showVisited: true,
      showWant: true,
      showCompleted: true,
      showPlanned: true,
      showPlaces: true,
      showTrails: true,
      // unified-map layer refs
      _placeRecords: null,
      _placeClusterGroup: null,
      _routeLayers: null,        // [{ route, layer, completed }]
      _routeGroupCompleted: null,
      _routeGroupPlanned: null,
    };

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function categoryFallbackLabel(slug) {
      return slug.replace(/-/g, ' ').replace(/^./, function(c) { return c.toUpperCase(); });
    }

    function displayCategory(cat) {
      if (!cat) return 'Uncategorized';
      const labels = (state.config && state.config.category_labels) || {};
      const entry = labels[cat];
      if (entry && entry.label) return entry.label;
      return categoryFallbackLabel(cat);
    }

    function displayRegion(name) {
      return name || 'No region';
    }

    function domainFromUrl(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); }
      catch { return url; }
    }

    function slugify(s) {
      if (!s) return '';
      const cleaned = s
        .toLowerCase()
        .replace(/æ/g, 'ae').replace(/ø/g, 'o').replace(/å/g, 'a')
        .replace(/ä/g, 'a').replace(/ö/g, 'o').replace(/ü/g, 'u').replace(/ß/g, 'ss')
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');

          const base = region._slug + '/' + slugify(route.name);
          let slug = base;
          let n = 2;

    function assignCategoryColors(places) {
      // Colors are stable per slug: stored alongside the label in
      // category-labels.json. Unstored slugs get the next free index
      // (highest stored + 1, mod palette length) so adding a new category
      // never reshuffles the existing ones.
      const cats = [...new Set(places.map(p => p.category))]
        .filter(c => c !== '').sort();
      const labels = (state.config && state.config.category_labels) || {};
      let nextIdx = 0;
      for (const slug in labels) {
        const c = labels[slug] && labels[slug].color;
        if (typeof c === 'number' && c + 1 > nextIdx) nextIdx = c + 1;
      }
      const dark = {}, light = {};
      const newAssignments = {};
      for (const c of cats) {
        const entry = labels[c];
        let idx;
        if (entry && typeof entry.color === 'number') {
          idx = entry.color;
        } else {
          idx = nextIdx % COLORS.length;
          nextIdx += 1;
          newAssignments[c] = idx;

        dark[c] = COLORS[idx];
        light[c] = COLORS_LIGHT[idx];

    function persistAssignedCategoryColors(newAssignments) {
      if (isReadOnly()) return;

      const labels = state.config.category_labels = state.config.category_labels || {};
      const payload = {};
      for (const slug in labels) {
        const lbl = (labels[slug] && labels[slug].label) || categoryFallbackLabel(slug);
        payload[slug] = { label: lbl };
        if (typeof labels[slug].color === 'number') payload[slug].color = labels[slug].color;
        if (typeof labels[slug].order === 'number') payload[slug].order = labels[slug].order;
      }
      for (const slug in newAssignments) {
        const existing = labels[slug] || {};
        const existingLabel = existing.label || categoryFallbackLabel(slug);
        const merged = { label: existingLabel, color: newAssignments[slug] };
        if (typeof existing.order === 'number') merged.order = existing.order;
        labels[slug] = merged;

    // XHR path entirely and keeps the network polite.
    const GPX_CONCURRENCY = 4;

        // than the path's current stroke-width attribute. If a route
        // happens to load while the SVG is mid-CSS-scale (stepped zoom
        // anim or fitBounds), getAttribute returns the counter-scaled
        // value, which then becomes the frozen "orig" - and every later
        // adjustTrailStrokes call restores it to that wrong width.
        if (layer.options && typeof layer.options.weight === 'number'
            && !layer._path.dataset.origStrokeWidth) {

      // renderer's _update so the SVG container's viewBox, position,
      // and child path d's all reflect the new map state with CSS
      // scale held at 1. Bypasses the compositor-vs-main-thread race

      // compositor while stroke-width goes through main-thread paint,
      // briefly diverging mid-gesture). Costs more CPU than CSS-only
      // but keeps strokes constant and positions sticky.
      if (!state.currentMap || !state._routeLayers) return;

        if (typeof layer.eachLayer === 'function') {

      for (const t of state._routeLayers) visit(t.layer);
      if (state._routeRenderer && state._routeRenderer._update) {

      }
