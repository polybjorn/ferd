    .leaflet-div-icon { background: transparent; border: none; }
    /* Selector targets .leaflet-tile-container so it applies to both the
       <img> tiles and the per-level <canvas> created by the NoGap plugin. */
    /* Hide overlay/shadow panes during pinch-zoom; keep marker-pane
       visible so pins/clusters remain on screen. The class is toggled
       by zoomstart/zoomend listeners in the boot script. */
    .leaflet-container.zooming .leaflet-overlay-pane,
    .leaflet-container.zooming .leaflet-shadow-pane {
      visibility: hidden;
    }
    [data-tile-filter="muted"] .leaflet-tile-container { filter: saturate(0.35) brightness(0.95) contrast(0.95); }
    [data-tile-filter="grayscale"] .leaflet-tile-container { filter: grayscale(1); }
    [data-tile-filter="sepia"] .leaflet-tile-container { filter: sepia(0.7); }
    [data-tile-filter="contrast"] .leaflet-tile-container { filter: contrast(1.15) saturate(1.1); }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-weight: 300;
      -webkit-tap-highlight-color: transparent;
    }


    a { color: var(--accent); text-decoration: none; }
    a:hover { opacity: 0.8; }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
      padding: 0 1.5rem;
      height: 50px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-self: end;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.05em;
      white-space: nowrap;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      justify-self: start;
    }
    .nav-brand a { color: var(--text); text-decoration: none; }
    #nav-back { display: none; opacity: 0.5; margin-right: 0.4rem; }
    #nav-crumb { color: var(--muted); }

    .nav-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 0;
      white-space: nowrap;
      justify-self: center;
    }

    .nav-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-group + .nav-group {
      margin-left: 0.5rem;
      padding-left: 1.25rem;
      border-left: 1px solid var(--border);
    }

    .nav-stat { display: flex; align-items: center; gap: 0.3rem; }
    .nav-stat .label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav-stat .value { font-weight: 300; color: var(--text); }
    .nav-stat a { color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
    .nav-stat a:hover { text-decoration: underline; }

    /* View tabs */
    .view-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      flex-shrink: 0;
      justify-self: end;
    }
    .view-tabs a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      padding: 0.4rem 0.7rem;
      transition: background 0.15s, color 0.15s;
    }
    .view-tabs a + a { border-left: 1px solid var(--border); }
    .view-tabs a:hover { color: var(--text); opacity: 1; }
    .view-tabs a.active { background: var(--surface2); color: var(--text); }

    .nav-actions { display: flex; align-items: center; gap: 0.5rem; }
    .nav-actions:empty { display: none; }
    .nav-action-btn {
      font: inherit;
      font-size: 0.7rem;
      padding: 0.4rem 0.8rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .nav-action-btn:hover { filter: brightness(1.1); }

    /* App container */
    #app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      height: calc(100vh - 50px);
      overflow-y: overlay;
      padding: 2rem 1.5rem 2rem;
      box-sizing: border-box;
    }

    #app:has(#map),
    #app:has(.detail-layout) {
      overflow: hidden;
      padding: 0;
      position: relative;
      max-width: none;
    }

    /* Index grids (places + trails) */
    .category-grid,
    .region-grid {
      columns: 2;
      column-gap: 1.5rem;
    }

    .category-group,
    .region-group {
      margin-bottom: 1.5rem;
      break-inside: avoid;
    }

    .category-group:only-child,
    .region-group:only-child { column-span: all; }

    .category-label,
    .region-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .category-label.clickable, .region-label.clickable { cursor: pointer; }
    .category-label.clickable:hover, .region-label.clickable:hover { color: var(--accent); border-bottom-color: var(--accent); }

    .place-count,
    .route-count {
      font-size: 0.65rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .category-grid, .region-grid { columns: 1; }
    }

    /* Places index */
    .index-controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      align-items: center;
    }

    .index-controls input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 0.6rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 300;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .index-controls input[type="text"]::placeholder { color: var(--muted); }
    .index-controls input[type="text"]:focus { border-color: var(--accent); }
    .index-controls select {
      flex-shrink: 0;
      padding: 0.55rem 0.7rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    .index-controls select:focus { border-color: var(--accent); }
    .filter-dropdown { position: relative; flex-shrink: 0; }
    .filter-dropdown .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .filter-dropdown .filter-btn:hover { border-color: var(--border-hover); }
    .filter-dropdown .filter-btn.has-active { border-color: var(--accent); color: var(--accent); }
    .filter-popover {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      z-index: 100;
      min-width: 200px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .filter-popover[hidden] { display: none; }
    .filter-popover label { display: block; font-size: 0.7rem; color: var(--muted); margin-bottom: 0.2rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-popover select { width: 100%; padding: 0.45rem 0.6rem; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.85rem; font-family: inherit; cursor: pointer; outline: none; }
    .filter-popover select:focus { border-color: var(--accent); }
    .filter-popover .filter-clear { background: transparent; border: none; color: var(--muted); font-size: 0.75rem; cursor: pointer; padding: 0; text-align: left; }
    .filter-popover .filter-clear:hover { color: var(--text); text-decoration: underline; }
    .filter-popover .filter-divider { height: 1px; background: var(--border); margin: 0.2rem -0.25rem; }

    .group-toggle {
      display: flex;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .group-toggle button {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 400;
      font-family: inherit;
      padding: 0.55rem 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.03em;
    }

    @media (max-width: 900px) {

      .place-grid, .route-grid { grid-template-columns: 1fr; }
      .detail-layout { padding: 0; }
      nav { padding: 0.6rem 1rem; gap: 0.5rem; }
      .nav-info { gap: 0.4rem; flex-wrap: wrap; }
      .nav-group { gap: 0.4rem; }
      .nav-group + .nav-group { padding-left: 0.4rem; }
      .nav-stat .label { font-size: 0.5rem; }
      #nav-stats-dynamic { display: none; }
      #track-legend { gap: 0.4rem; padding: 0.4rem 0.5rem; }
      .track-legend-item .track-stat { display: none; }
      #multi-elevation-container { max-height: 40vh; }
      .map-panel { max-width: calc(100vw - 40px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }

    /* Auth widget in nav */
    .auth-widget {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      font-size: 0.7rem;
      position: relative;
    }
    .auth-widget button, .auth-widget a {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      padding: 0.35rem 0.6rem;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .auth-widget button:hover, .auth-widget a:hover {
      color: var(--text);
      border-color: var(--border-hover);
      opacity: 1;
    }
    .auth-menu {
      position: absolute;
      top: calc(100% + 0.4rem);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      min-width: 160px;
      z-index: 1500;
      padding: 0.25rem;
    }
    .auth-menu[hidden] { display: none; }
    .auth-menu .auth-menu-header {
      padding: 0.5rem 0.7rem 0.4rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.25rem;
    }
    .auth-menu .auth-menu-header strong { color: var(--text); font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 0.8rem; display: block; margin-top: 0.15rem; }
    .auth-menu button {
      display: flex;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.75rem;
      text-align: left;
      padding: 0.5rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      justify-content: flex-start;
    }
    .auth-menu button:hover { background: var(--surface2); color: var(--text); border-color: transparent; }

    /* Floating add button */
    .fab-add {
      position: absolute;
      bottom: 2rem;
      right: 0.75rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: transparent;
      border: none;
      font-size: 0;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--shadow);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center;
      transition: transform 0.18s ease-out, opacity 0.18s ease-out;
    }
    .fab-add::before,
    .fab-add::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      background: var(--fab-text);
      border-radius: 1px;
    }
    .fab-add::before { width: 14px; height: 2px; transform: translate(-50%, -50%); }
    .fab-add::after  { width: 2px; height: 14px; transform: translate(-50%, -50%); }
    .fab-add.fab-enter { transform: scale(0.4); opacity: 0; }
    .fab-add.fab-leave { transform: scale(0.4); opacity: 0; pointer-events: none; }

    /* Tile-picker (Leaflet layers control) enter/leave animation */
    .leaflet-control-layers {
      transform-origin: top right;
      transition: transform 0.18s ease-out, opacity 0.18s ease-out;
    }
    .leaflet-control-layers.tile-pick-enter,
    .leaflet-control-layers.tile-pick-leave {
      transform: scale(0.5);
      opacity: 0;
    }
    .fab-add:hover { transform: scale(1.05); }

    body.map-chrome-hidden .leaflet-control-container,
    body.map-chrome-hidden .fab-add,
    body.map-chrome-hidden .map-panel { display: none !important; }
    /* Per-control persistent toggles (Settings > Appearance > On-map controls).
       Animate opacity/transform rather than display:none so the toggle is
       visible. The spacebar (.map-chrome-hidden) above still hard-hides. */
    .map-panel { transform-origin: bottom left; transition: transform 0.18s ease-out, opacity 0.18s ease-out; }
    .leaflet-control-zoom { transform-origin: top left; transition: transform 0.18s ease-out, opacity 0.18s ease-out; }
    body.hide-map-filter .map-panel,
    body.hide-map-zoom .leaflet-control-zoom {
      opacity: 0;
      transform: scale(0.5);
      pointer-events: none;
    }

    /* "Pick on map" inline button for the Add Place form */
    .pick-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.4rem;
    }
    .pick-row button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      padding: 0.35rem 0.7rem;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .pick-row button:hover { color: var(--text); border-color: var(--border-hover); }

    /* "Add new" toggle for category/region selects */
    .select-or-new { display: flex; flex-direction: column; gap: 0.4rem; }
    .select-or-new .new-input[hidden] { display: none; }

    /* Settings modal sub-sections */
    .modal h3.settings-h {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-hover, var(--border));
    }
    .modal [data-panel] > h3.settings-h:first-child {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    /* Toggle switch: stylized checkbox with a sliding knob.
       Markup: <input type="checkbox" class="settings-toggle"> */
    .modal input[type="checkbox"].settings-toggle {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      width: 36px;
      height: 20px;
      margin: 0;
      background: var(--border);
      border: 1px solid var(--border-hover, var(--border));
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex: 0 0 auto;
    }
    .modal input[type="checkbox"].settings-toggle::after {
      content: '';
      position: absolute;
      top: 1px;
      left: 1px;
      width: 16px;
      height: 16px;
      background: var(--surface);
      border-radius: 50%;
      transition: transform 0.15s, background 0.15s;
    }
    .modal input[type="checkbox"].settings-toggle:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .modal input[type="checkbox"].settings-toggle:checked::after {
      transform: translateX(16px);
      background: var(--surface);
    }
    .modal input[type="checkbox"].settings-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .settings-inline-row > .settings-toggle { justify-self: start; }

    .session-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .session-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
    }
    .session-meta { flex: 1; min-width: 0; }
    .session-device { font-size: 0.78rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    .session-current {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      border: 1px solid rgba(40,202,65,0.3);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }
    .session-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; }
    .session-revoke {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--red);
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
    }
    .session-revoke:hover:not(:disabled) { border-color: var(--red); }
    .session-revoke:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-x {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 1.6rem;
      height: 1.6rem;
      padding: 0;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-x:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
    .btn-x:disabled { opacity: 0.4; cursor: not-allowed; }
    .modal input.dirty { border-color: var(--accent); }
    .row-tag {
      font-size: 0.7rem;
      color: var(--muted);
      flex: 0 0 5rem;
      text-align: right;
    }
    .row-tag.dirty {
      color: var(--accent);
      animation: rowTagIn 0.2s ease-out;
    }
    @keyframes rowTagIn {
      from { opacity: 0; transform: translateX(6px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .radio-row {
      display: flex;
      row-gap: 0.4rem;
      column-gap: 1rem;
      flex-wrap: wrap;
    }
    /* Two-column row pairing two selects (or two columns of settings) side-by-side. */
    .settings-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1rem;
      align-items: end;
    }
    .settings-grid-2 > * { margin: 0; }
    .settings-grid-2 > label { margin-top: 0.75rem; margin-bottom: 0.3rem; }
    /* Inline label + control row: label left (fixed width), control fills the rest.
       Wraps on narrow viewports so the control drops under the label. */
    .settings-inline-row {
      display: grid;
      /* Fixed label column so the control side starts at the same x in every
         row — pill groups line up across rows. Width is tuned to fit "Trail
         line thickness" while leaving enough room for 3 pill-style options. */
      grid-template-columns: 9rem 1fr;
      gap: 0.5rem 0.75rem;
      align-items: center;
      margin-top: 0.75rem;
    }
    /* Out-specifies the later `.modal label { margin-top/bottom: ... }` rule. */
    .modal .settings-inline-row > label { margin: 0; }
    .settings-inline-row > .radio-row { margin: 0; column-gap: 0.75rem; }
    .settings-inline-row > select { width: 100%; }
    /* Rows whose right-hand control is a slide toggle: switch from grid to
       flex so the toggle can sit immediately to the left of the label. */
    .settings-inline-row:has(> .settings-toggle) {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .settings-inline-row:has(> .settings-toggle) > .settings-toggle {
      order: -1;
      flex: 0 0 auto;
    }
    .settings-inline-row:has(> .settings-toggle) > label {
      flex: 1;
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      line-height: 1;
    }
    /* Two-column wrapper for stacking related toggles side by side. */
    .toggle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1rem;
      margin-top: 0.5rem;
    }
    .toggle-grid > .settings-inline-row { margin-top: 0; }
    .radio-row label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
    }
    .radio-row input { width: auto; }
    /* Pill variant of radio-row: each option is a clickable pill, the checked
       one picks up the accent border + background. Single-select. */
    .radio-row.radio-pills > label {
      padding: 0.35rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .radio-row.radio-pills > label:hover { border-color: var(--border-hover); color: var(--text); }
    .radio-row.radio-pills > label:has(input:checked) {
      border-color: var(--accent);
      color: var(--text);
      background: color-mix(in srgb, var(--accent) 12%, var(--surface2));
    }
    .radio-row.radio-pills input { display: none; }
    /* Clickable star rating: filled stars use accent, empty are muted.
       Hovering the row previews the rating up to the cursor via .preview. */
    .star-rating {
      display: inline-flex;
      gap: 0.15rem;
      font-size: 1.25rem;
      line-height: 1;
      user-select: none;
    }
    .star-rating .star { color: var(--muted); cursor: pointer; transition: color 0.1s, transform 0.1s; }
    .star-rating .star.filled,
    .star-rating .star.preview { color: var(--accent); }
    .star-rating .star:hover { transform: scale(1.1); }
    .star-rating .star-clear {
      align-self: center;
      margin-left: 0.5rem;
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: underline;
      cursor: pointer;
    }
    .star-rating .star-clear:hover { color: var(--text); }
    .star-rating[data-value=""] .star-clear { visibility: hidden; }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: var(--backdrop);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: modal-backdrop-in 120ms ease-out;
    }
    .modal-backdrop > .modal { animation: modal-in 140ms ease-out; }
    .modal-backdrop.closing { animation: modal-backdrop-out 100ms ease-in forwards; pointer-events: none; }
    .modal-backdrop.closing > .modal { animation: modal-out 100ms ease-in forwards; }
    @keyframes modal-backdrop-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modal-backdrop-out { to { opacity: 0; } }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: none; }
    }
    @keyframes modal-out {
      to { opacity: 0; transform: scale(0.97); }
    }
    .modal [data-panel]:not([hidden]) { animation: tab-fade-in 160ms ease-out; }
    @keyframes tab-fade-in {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .modal-backdrop, .modal-backdrop > .modal,
      .modal-backdrop.closing, .modal-backdrop.closing > .modal,
      .modal [data-panel]:not([hidden]),
      .fab-add { animation: none !important; transition: none !important; }
    }
    .modal {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 440px;
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 10px 40px var(--shadow);
    }
    .modal .modal-close-floating {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.2rem;
      z-index: 1;
    }
    .modal .modal-close-floating:hover { color: var(--text); }
    .modal h2 {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal h2 .modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
    }
    .modal h2 .modal-close:hover { color: var(--text); }
    .modal-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .modal-backdrop:has(#settings-tabs) { align-items: flex-start; padding-top: 3rem; padding-bottom: 3rem; }
    .modal-backdrop:has(#settings-tabs) .modal { max-height: calc(100vh - 6rem); }
    /* Pin the Add modal to the top so switching Place <-> Trail (different
       form heights) doesn't shift the modal vertically. The body itself
       animates height between renders. */
    .modal-backdrop:has(#add-tabs) { align-items: flex-start; padding-top: 4rem; padding-bottom: 4rem; }
    .modal-backdrop:has(#add-tabs) .modal { max-height: calc(100vh - 8rem); scrollbar-gutter: stable; }
    #add-body { overflow: hidden; transition: height 0.25s ease; }
    .modal .modal-desc { font-size: 0.85rem; color: var(--text); margin-top: 0.4rem; }
    .modal .file-picker { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.5rem; }
    .modal .file-picker .file-name { font-size: 0.85rem; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* Collapsible block. Toggle the .expanded class to animate height + opacity.
       Uses grid-template-rows 0fr -> 1fr (smooth, no max-height guessing). */
    .collapsible {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      transition: grid-template-rows 0.25s ease, opacity 0.25s ease;
    }
    .collapsible.expanded { grid-template-rows: 1fr; opacity: 1; }
    .collapsible > .collapsible-inner { overflow: hidden; min-height: 0; }
    .modal input[type="file"].file-input-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    .modal .backup-sub { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .modal .modal-success { font-size: 0.85rem; color: var(--green, #6db26d); margin-top: 0.5rem; }
    .modal h3.sessions-h { display: flex; align-items: baseline; gap: 0.75rem; }
    .modal button.sessions-revoke-others:not(h2 .modal-close) { margin-left: auto; font-size: 0.75rem; font-weight: 400; background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 0; letter-spacing: 0; }
    .modal button.sessions-revoke-others:not(h2 .modal-close):hover:not(:disabled) { color: var(--text); text-decoration: underline; }
    .modal .modal-tabs button:not(.modal-close) {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .modal .modal-tabs button:not(.modal-close).active { color: var(--text); border-bottom-color: var(--accent); }
    .modal .modal-tabs button:not(.modal-close):hover:not(.active) { color: var(--text); }
    .modal label {
      display: block;
      font-size: 0.8rem;
      color: var(--text);
      margin-bottom: 0.3rem;
      margin-top: 0.75rem;
    }
    .modal input[type="text"],
    .modal input[type="password"],
    .modal input[type="number"],
    .modal input[type="file"],
    .modal input[type="url"],
    .modal input[type="email"],
    .modal input[type="date"],
    .modal textarea,
    .modal select {
      width: 100%;
      padding: 0.5rem 0.7rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 300;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
    /* Suppress the browser-native spinner on number inputs (Lat/Long) — the
       up/down arrows aren't theme-aware and look out of place. */
    .modal input[type="number"] { appearance: textfield; -moz-appearance: textfield; }
    .modal input[type="number"]::-webkit-inner-spin-button,
    .modal input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .modal textarea { min-height: 60px; resize: vertical; }
    .modal .row { display: flex; gap: 0.5rem; }
    .modal .row > * { flex: 1; }
    .modal .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem; }
    .modal .checkbox-row input { width: auto; }
    .modal .checkbox-row label { margin: 0; text-transform: none; letter-spacing: 0; font-size: 0.8rem; color: var(--text); }
    .feature-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .feature-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .feature-pill { position: relative; }
    .modal label.feature-pill {
      display: inline-flex;
      font-size: 0.8rem;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      margin: 0;
    }
    .modal label.feature-pill.active { color: var(--text); }
    .feature-pill > input[type="checkbox"] { display: none !important; }
    .feature-pill:hover { border-color: var(--border-hover); color: var(--text); }
    .feature-pill.active {
      color: var(--text);
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, var(--surface2));
    }
    .modal .modal-error {
      margin-top: 0.75rem;
      padding: 0.5rem 0.7rem;
      background: rgba(255,95,87,0.1);
      border: 1px solid rgba(255,95,87,0.3);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 0.75rem;
      display: none;
    }

    /* Inline warning that sits to the left of the action buttons. */

    /* All non-close buttons inside a modal get the bordered look. The

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/vendor/leaflet-tilelayer-nogap/L.TileLayer.NoGap.js"></script>
  <script src="/vendor/leaflet.markercluster/leaflet.markercluster.js"></script>
  <script src="/vendor/leaflet-gpx/gpx.min.js"></script>
  <script src="/vendor/leaflet-elevation/leaflet-elevation.js"></script>
  <script>
    // ----- Shared -----
    // Tableau 20 categorical palette, reordered: indices 0-9 are the saturated
    // hues in hue-spread order (blue, orange, green, red, teal, purple, gold,
    // pink, brown, gray) so the first N categories get maximally different
    // colors. Indices 10-19 are the paler siblings of the same hues in the
    // same order, used as fallback once 10+ categories accumulate.
    // COLORS_LIGHT are HSL-darkened to L=30% for legibility on light surfaces;
    // saturation preserved so gray stays gray.
    const COLORS       = ['#4e79a7', '#f28e2c', '#59a14f', '#e15759', '#499894', '#b07aa1', '#b6992d', '#d37295', '#9d7660', '#79706e', '#a0cbe8', '#ffbe7d', '#8cd17d', '#ff9d9a', '#86bcb6', '#d4a6c8', '#f1ce63', '#fabfd2', '#d7b5a6', '#bab0ab'];
    const COLORS_LIGHT = ['#314c68', '#904c09', '#396732', '#821719', '#326765', '#603955', '#7b671e', '#752441', '#5f473a', '#504a49', '#1e567b', '#994c00', '#357128', '#990500', '#37625e', '#673259', '#8c6d0d', '#8e0b35', '#6a412f', '#544a45'];
    if (COLORS.length !== COLORS_LIGHT.length) console.warn('COLORS and COLORS_LIGHT length mismatch');
    const TRACK_COLORS = COLORS;
    const ROUTE_COLOR = '#6aaeee';
    const GPX_NS = 'http://www.topografix.com/GPX/1/1';
    const DATA_FILES = { siteConfig: 'site-config.json' };

    // viewer mode: 'public' when the URL is /u/<username>/..., else 'owner'
    // (read+write against /api/places etc. for the signed-in user).
    function detectViewer() {
      const m = (location.pathname || '/').match(/^\/u\/([A-Za-z0-9_-]+)(?:\/|$)/);
      if (m) return { mode: 'public', username: m[1] };
      return { mode: 'owner', username: null };
    }

    function dataUrl(kind) {
      // kind: 'places' | 'routes' | 'metadata'
      const v = state.viewer;
      if (v && v.mode === 'public') return apiUrl('/u/' + encodeURIComponent(v.username) + '/' + kind);
      return apiUrl('/' + kind);
    }

    function categoryLabelsUrl() {
      const v = state.viewer;
      if (v && v.mode === 'public') return apiUrl('/u/' + encodeURIComponent(v.username) + '/category-labels');
      return apiUrl('/me/category-labels');
    }

    function gpxUrlFor(file) {
      const v = state.viewer;
      if (v && v.mode === 'public') return apiUrl('/u/' + encodeURIComponent(v.username) + '/gpx/' + file);
      return apiUrl('/gpx/' + file);
    }

    function isReadOnly() {
      return !!(state.viewer && state.viewer.mode === 'public');
    }

    let _trailColorCache = null;
    function trailStatusColor(completed) {
      // Cache both values per theme; applyTheme() invalidates. Avoids one
      // getComputedStyle (and forced style recalc) per polyline draw.
      if (!_trailColorCache) {
        const cs = getComputedStyle(document.documentElement);
        _trailColorCache = {
          completed: cs.getPropertyValue('--completed').trim() || '#a3be8c',
          planned:   cs.getPropertyValue('--planned').trim()   || '#bf616a',
        };
      }
      return completed ? _trailColorCache.completed : _trailColorCache.planned;
    }

    function fetchJson(url, fallback) {
      return fetch(url).then(r => r.ok ? r.json() : fallback).catch(() => fallback);
    }

    // Pill-style radio group: each option renders as a single-select pill.
    function radioPillsHtml(name, options, selected) {
      return '<div class="radio-row radio-pills">' +
        options.map(([v, l]) =>
          '<label><input type="radio" name="' + name + '" value="' + v + '"' + (selected === v ? ' checked' : '') + '>' + l + '</label>'
        ).join('') + '</div>';
    }

    // Clickable 1-5 star widget. Reads/writes value via dataset on the wrapper.
    function starRatingHtml(name, current) {
      const val = current ? String(current) : '';
      let html = '<div class="star-rating" data-name="' + name + '" data-value="' + escapeHtml(val) + '">';
      for (let i = 1; i <= 5; i++) {
        const filled = current && i <= current;
        // ★ for filled, ☆ for empty — distinct glyphs make the state obvious
        // regardless of color contrast in the active theme.
        html += '<span class="star' + (filled ? ' filled' : '') + '" data-v="' + i + '">' + (filled ? '&#9733;' : '&#9734;') + '</span>';
      }
      html += '<a href="#" class="star-clear">clear</a>';
      html += '</div>';
      return html;
    }
    function wireStarRating(name) {
      const wrap = document.querySelector('.star-rating[data-name="' + name + '"]');
      if (!wrap) return;
      const stars = wrap.querySelectorAll('.star');
      const FILLED = '★';
      const EMPTY = '☆';
      // Set both class and glyph so the state is unmistakable.
      const setStar = (s, on, preview) => {
        s.classList.toggle('filled', on && !preview);
        s.classList.toggle('preview', !!preview);
        s.innerHTML = (on || preview) ? FILLED : EMPTY;
      };
      const paint = (n, preview) => stars.forEach(s => {
        setStar(s, !preview && (+s.dataset.v) <= n, preview && (+s.dataset.v) <= n);
      });
      const repaint = () => {
        const cur = parseInt(wrap.dataset.value, 10) || 0;
        stars.forEach(s => setStar(s, (+s.dataset.v) <= cur, false));
      };
      stars.forEach(star => {
        star.addEventListener('mouseenter', function() { paint(+this.dataset.v, true); });
        star.addEventListener('mouseleave', repaint);
        star.addEventListener('click', function() {
          const v = +this.dataset.v;
          wrap.dataset.value = (wrap.dataset.value == String(v) ? '' : String(v));
          repaint();
        });
      });
      const clear = wrap.querySelector('.star-clear');
      if (clear) clear.addEventListener('click', function(e) {
        e.preventDefault();
        wrap.dataset.value = '';
        repaint();
      });
    }
    function readStarRating(name) {
      const wrap = document.querySelector('.star-rating[data-name="' + name + '"]');
      return wrap ? wrap.dataset.value : '';
    }

    function selectOrNewHtml(id, options, current, labelFn, emptyLabel, newPlaceholder) {
      const labelOf = labelFn || (v => v);
      // When emptyLabel is set, an empty-string option is allowed at the top
      // and `required` is dropped from the select (the field is optional).
      const hasEmpty = emptyLabel != null;
      const isEmpty = current == null || current === '';
      const inList = !isEmpty && options.includes(current);
      const opts = options.map(v =>
        '<option value="' + escapeHtml(v) + '"' + (v === current ? ' selected' : '') + '>' + escapeHtml(labelOf(v)) + '</option>'
      ).join('');
      const newSelected = (!isEmpty && !inList) ? ' selected' : '';
      const inputValue = (!isEmpty && !inList) ? escapeHtml(current) : '';
      const inputHidden = isEmpty || inList;
      // The empty option exists so "no selection" is a valid state, but it's
      // hidden from the dropdown list — the select just shows blank when it's
      // selected. Picking a real option replaces the placeholder.
      const emptyOpt = hasEmpty
        ? '<option value="" hidden' + (isEmpty ? ' selected' : '') + '>' + escapeHtml(emptyLabel) + '</option>'
        : '';
      const requiredAttr = hasEmpty ? '' : ' required';
      return '<div class="select-or-new" data-id="' + id + '">' +
        '<select id="' + id + '"' + requiredAttr + '>' + emptyOpt + opts +
          '<option value="__new__"' + newSelected + '>+ Add new</option>' +
        '</select>' +
        '<input type="text" class="new-input" id="' + id + '-new" placeholder="' + escapeHtml(newPlaceholder || 'New value') + '" value="' + inputValue + '"' + (inputHidden ? ' hidden' : '') + '>' +
      '</div>';
    }

    function wireSelectOrNew(id) {
      const sel = document.getElementById(id);
      const input = document.getElementById(id + '-new');
      if (!sel || !input) return;
      const sync = () => {
        input.hidden = sel.value !== '__new__';
        input.required = sel.value === '__new__';
      };
      sel.addEventListener('change', sync);
      sync();
    }

    function readSelectOrNew(id) {
      const sel = document.getElementById(id);
      const input = document.getElementById(id + '-new');
      if (!sel) return '';
      if (sel.value === '__new__') return (input.value || '').trim();
      return sel.value;
    }

    function readPlaceFormFields(prefix) {
      const $ = id => document.getElementById(prefix + '-' + id);
      const val = id => { const el = $(id); return el ? el.value : ''; };
      const category = readSelectOrNew(prefix + '-category');
      const sourcesRaw = val('sources').trim();
      const sources = sourcesRaw ? sourcesRaw.split('\n').map(s => s.trim()).filter(Boolean) : null;
      const lat = parseFloat(val('lat'));
      const lon = parseFloat(val('lon'));
      if (Number.isNaN(lat) || Number.isNaN(lon)) {
        return { error: 'Pick a location on the map (or enter coordinates manually).' };
      }
      const payload = {
        name: val('name').trim(),
        lat,
        lon,
        visited: $('visited').checked,
      };
      if (category) payload.category = category;
      const country = val('country').trim();
      const note = val('note').trim();
      const localName = val('local-name').trim();
      const dateVisited = val('date-visited').trim();
      const ratingRaw = readStarRating(prefix + '-rating');
      if (country) payload.country = country;
      if (note) payload.note = note;
      if (localName) payload.local_name = localName;
      if (sources && sources.length) payload.sources = sources;
      // Visit-only metadata: ignore if the visited toggle is off.
      if (payload.visited) {
        if (dateVisited) payload.date_visited = dateVisited;
        if (ratingRaw) payload.rating = parseInt(ratingRaw, 10);
      }
      return { payload };
    }

    function panelSectionHtml(id, label) {
      return '<div class="panel-section collapsed" id="' + id + '-section">' +
        '<div class="panel-section-header" data-section="' + id + '-section">' + label +
        '<span class="panel-section-actions">' +
        '<span class="panel-action" id="' + id + '-toggle-all">Toggle</span>' +
        '<span class="section-arrow">&#x25BC;</span>' +
        '</span></div>' +
        '<div class="panel-section-body" id="' + id + '-body"></div>' +
        '</div>';
    }

    const DEFAULT_CONFIG = {
      brand: 'Ferd',
      features: { places: true, trails: true },
      default_view: { center: [45, 10], zoom: 4 },
      default_view_trails: { center: [59.5, 6.5], zoom: 10 },
      category_labels: {},
      api_base: '/api',
    };

    function placesAvailable() { return state.config.features.places !== false; }
    function trailsAvailable() { return state.config.features.trails !== false; }
    function getHiddenFeatures() {
      try {
        const raw = localStorage.getItem('hidden-features');
        return raw ? new Set(JSON.parse(raw)) : new Set();
      } catch { return new Set(); }
    }
    function setFeatureHidden(name, hidden) {
      const s = getHiddenFeatures();
      if (hidden) s.add(name); else s.delete(name);
      try { localStorage.setItem('hidden-features', JSON.stringify([...s])); } catch {}
    }
    function placesEnabled() { return placesAvailable() && !getHiddenFeatures().has('places'); }
    function trailsEnabled() { return trailsAvailable() && !getHiddenFeatures().has('trails'); }

    function getPref(key, def) {
      try { const v = localStorage.getItem(key); return v === null ? def : v; }
      catch { return def; }
    }
    const SYNCED_PREF_KEYS = new Set(['theme', 'mode', 'pin-style', 'marker-size', 'trail-weight', 'tile-filter']);
    function setPref(key, val) {
      try { localStorage.setItem(key, val); } catch {}
      if (SYNCED_PREF_KEYS.has(key) && state.auth && state.auth.authenticated) {
        state.serverPrefs[key] = val;
        fetch(apiUrl('/me/prefs'), {
          method: 'PUT',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(state.serverPrefs),
        }).catch(() => {});
      }
    }
    function loadSyncedPrefs() {
      if (!state.auth || !state.auth.authenticated) return Promise.resolve();
      return fetch(apiUrl('/me/prefs'), { credentials: 'same-origin' })
        .then(r => r.ok ? r.json() : null)
        .then(prefs => {
          if (!prefs || typeof prefs !== 'object') return;
          state.serverPrefs = Object.assign({}, prefs);
          for (const key of SYNCED_PREF_KEYS) {
            if (key in prefs) {
              try { localStorage.setItem(key, prefs[key]); } catch {}
            }
          }
          try { applyTheme(getStoredTheme(), getStoredMode()); } catch {}
        })
        .catch(() => {});
    }
    function bindRadioPref(name, prefKey, onChange) {
      document.querySelectorAll('input[name="' + name + '"]').forEach(r => {
        r.addEventListener('change', function() {
          if (!this.checked) return;
          setPref(prefKey, this.value);
          if (onChange) onChange(this.value);
        });
      });
    }
    function getDefaultTileLayer() { return getPref('tile-layer', 'Satellite'); }
    function getShowTilePicker() { return getPref('tile-picker', 'true') !== 'false'; }
    function getShowMapAddButton() { return getPref('map-add-button', 'true') !== 'false'; }
    function getShowFilterPanel() { return getPref('map-filter', 'true') !== 'false'; }
    function getShowZoomControls() { return getPref('map-zoom', 'true') !== 'false'; }
    function applyControlVisibility() {
      document.body.classList.toggle('hide-map-filter', !getShowFilterPanel());
      document.body.classList.toggle('hide-map-zoom', !getShowZoomControls());
    }
    function getRememberView() { return getPref('remember-view', 'true') !== 'false'; }
    function getUnits() { return getPref('units', 'metric'); }
    function getClusterPlaces() { return getPref('cluster-places', 'true') !== 'false'; }
    // Optional form fields — let the user hide ones they never use. All default ON.
    function getShowField(name) { return getPref('show-' + name, 'true') !== 'false'; }
    function isImperial() { return getUnits() === 'imperial'; }
    function loadStoredView() {
      try {
        const raw = localStorage.getItem('last-view');
        if (!raw) return null;
        const v = JSON.parse(raw);
        return (v && Array.isArray(v.center) && typeof v.zoom === 'number') ? v : null;
      } catch { return null; }
    }
    function saveStoredView(view) {
      try { localStorage.setItem('last-view', JSON.stringify(view)); } catch {}
    }

    function refreshTabVisibility() {
      const tabPlaces = document.getElementById('tab-places');
      const tabTrails = document.getElementById('tab-trails');
      if (tabPlaces) tabPlaces.style.display = placesEnabled() ? '' : 'none';
      if (tabTrails) tabTrails.style.display = trailsEnabled() ? '' : 'none';
    }

    // Skip tile loads during zoom animations. Default true is wasteful:
    // each zoom level transition requests its own batch of tiles while
    // the gesture is still in flight, competing with the animation.
    if (window.L && L.TileLayer && L.TileLayer.mergeOptions) {
      L.TileLayer.mergeOptions({ updateWhenZooming: false });
    }

    const state = {
      config: DEFAULT_CONFIG,
      auth: { authenticated: false, username: null, is_admin: false, published: false, registration_open: true, publishing_open: true, has_users: false, requires_setup_token: false },
      serverPrefs: {},
      viewer: detectViewer(),
      currentMap: null,
      currentElevation: null,
      // data
      places: null,
      manifest: null,
      categoryColors: {},
      categoryColorsLight: {},
      // browse-list state
      groupBy: 'category',
      // unified-map filter state
      hiddenCategories: new Set(),
      hiddenRegions: new Set(),
      showVisited: true,
      showWant: true,
      showCompleted: true,
      showPlanned: true,
      showPlaces: true,
      showTrails: true,
      // unified-map layer refs
      _placeMarkers: null,
      _placeClusterGroup: null,
      _trailLayers: null,        // [{ route, layer, completed }]
      _trailGroupCompleted: null,
      _trailGroupPlanned: null,
    };

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function categoryFallbackLabel(slug) {
      return slug.replace(/-/g, ' ').replace(/^./, function(c) { return c.toUpperCase(); });
    }

    function displayCategory(cat) {
      if (!cat) return 'Uncategorized';
      const labels = (state.config && state.config.category_labels) || {};
      const entry = labels[cat];
      if (entry && entry.label) return entry.label;
      return categoryFallbackLabel(cat);
    }

    function displayRegion(name) {
      return name || 'No region';
    }

    function domainFromUrl(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); }
      catch { return url; }
    }

    function slugify(s) {
      if (!s) return '';
      const cleaned = s
        .toLowerCase()
        .replace(/æ/g, 'ae').replace(/ø/g, 'o').replace(/å/g, 'a')
        .replace(/ä/g, 'a').replace(/ö/g, 'o').replace(/ü/g, 'u').replace(/ß/g, 'ss')
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
      return cleaned || encodeURIComponent(s.toLowerCase());
    }

    function assignPlaceSlugs(places) {
      if (!places) return;
      const used = new Set();
      for (const p of places) {
        const base = slugify(p.name);
        let slug = base;
        let n = 2;
        while (used.has(slug)) { slug = base + '-' + n; n++; }
        used.add(slug);
        p._slug = slug;
      }
    }

    function assignTrailSlugs(manifest) {
      if (!manifest || !manifest.regions) return;
      const used = new Set();
      for (const region of manifest.regions) {
        region._slug = slugify(region.name);
        for (const route of region.routes) {
          const base = region._slug + '/' + slugify(route.name);
          let slug = base;
          let n = 2;
          while (used.has(slug)) { slug = base + '-' + n; n++; }
          used.add(slug);
          route._slug = slug;
        }
      }
    }

    function renderSources(sources) {
      if (!sources || sources.length === 0) return '';
      return sources.map(s => {
        let url;
        try { url = new URL(s, location.href); } catch { return escapeHtml(s); }
        if (url.protocol !== 'http:' && url.protocol !== 'https:') return escapeHtml(s);
        return '<a href="' + escapeHtml(url.href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(domainFromUrl(s)) + ' &#x2197;</a>';
      }).join(' &middot; ');
    }

    // Sort category slugs alphabetically, but always push uncategorized ('') last
    // so legends/filters don't lead with the fallback bucket.
    function sortedCategorySlugs(slugs) {
      return [...slugs].sort((a, b) => {
        if (a === '') return 1;
        if (b === '') return -1;
        return a.localeCompare(b);
      });
    }

    function assignCategoryColors(places) {
      // Colors are stable per slug: stored alongside the label in
      // category-labels.json. Unstored slugs get the next free index
      // (highest stored + 1, mod palette length) so adding a new category
      // never reshuffles the existing ones.
      const cats = [...new Set(places.map(p => p.category))]
        .filter(c => c !== '').sort();
      const labels = (state.config && state.config.category_labels) || {};
      let nextIdx = 0;
      for (const slug in labels) {
        const c = labels[slug] && labels[slug].color;
        if (typeof c === 'number' && c + 1 > nextIdx) nextIdx = c + 1;
      }
      const dark = {}, light = {};
      const newAssignments = {};
      for (const c of cats) {
        const entry = labels[c];
        let idx;
        if (entry && typeof entry.color === 'number') {
          idx = entry.color;
        } else {
          idx = nextIdx % COLORS.length;
          nextIdx += 1;
          newAssignments[c] = idx;
        }
        dark[c] = COLORS[idx];
        light[c] = COLORS_LIGHT[idx];
      }
      const mutedDark = getComputedStyle(document.documentElement).getPropertyValue('--muted').trim() || '#888';
      dark[''] = mutedDark;
      light[''] = mutedDark;
      if (Object.keys(newAssignments).length) persistAssignedCategoryColors(newAssignments);
      return { dark, light };
    }

    function persistAssignedCategoryColors(newAssignments) {
      if (isReadOnly()) return;
      if (!state.auth || !state.auth.authenticated) return;
      const labels = state.config.category_labels = state.config.category_labels || {};
      const payload = {};
      for (const slug in labels) {
        const lbl = (labels[slug] && labels[slug].label) || categoryFallbackLabel(slug);
        payload[slug] = { label: lbl };
        if (typeof labels[slug].color === 'number') payload[slug].color = labels[slug].color;
      }
      for (const slug in newAssignments) {
        const existingLabel = (labels[slug] && labels[slug].label) || categoryFallbackLabel(slug);
        labels[slug] = { label: existingLabel, color: newAssignments[slug] };
        payload[slug] = { label: existingLabel, color: newAssignments[slug] };
      }
      api('PUT', '/me/category-labels', { category_labels: payload }).catch(function() {
        // Best-effort: if the write fails, the same indices will be re-assigned
        // (deterministically) the next time assignCategoryColors runs.
      });
    }

    function createTileLayers() {
      return {
        'OpenTopoMap': L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
          maxZoom: 17, subdomains: 'abc',
          attribution: 'Map: <a href="https://opentopomap.org">OpenTopoMap</a> &middot; Data: <a href="https://openstreetmap.org">OSM</a>',
        }),
        'CyclOSM': L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
          maxZoom: 20, subdomains: 'abc',
          attribution: '<a href="https://github.com/cyclosm/cyclosm-cartocss-style/releases">CyclOSM</a> &middot; <a href="https://openstreetmap.org">OSM</a>',
        }),
        'Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
          maxZoom: 19,
          attribution: '<a href="https://www.esri.com">Esri</a>',
        }),
        'Dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 20, subdomains: 'abcd',
          attribution: '<a href="https://carto.com/attributions">CARTO</a> &middot; <a href="https://openstreetmap.org">OSM</a>',
        }),
        'OpenStreetMap': L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '<a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
        }),
      };
    }

    function addTileLayersToMap(map) {
      const layers = createTileLayers();
      const def = getDefaultTileLayer();
      (layers[def] || layers['Satellite']).addTo(map);
      state.tilePickerLayers = layers;
      state.tilePickerCtrl = null;
      if (getShowTilePicker()) {
        state.tilePickerCtrl = L.control.layers(layers, null, { position: 'topright' }).addTo(map);
      }
    }

    function cleanupMap() {
      if (state.currentElevation) {
        const controls = Array.isArray(state.currentElevation) ? state.currentElevation : [state.currentElevation];
        for (const ctrl of controls) { try { ctrl.remove(); } catch (e) {} }
        state.currentElevation = null;
      }
      if (state.currentMap) {
        state.currentMap.remove();
        state.currentMap = null;
      }
      state.tilePickerCtrl = null;
      state.tilePickerLayers = null;
      state._placeMarkers = null;
      state._placeClusterGroup = null;
      state._trailLayers = null;
      state._trailGroupCompleted = null;
      state._trailGroupPlanned = null;
    }

    function formatDistance(m) {
      if (isImperial()) {
        const mi = m / 1609.344;
        return mi >= 0.1 ? mi.toFixed(1) + ' mi' : Math.round(m * 3.28084) + ' ft';
      }
      return m >= 1000 ? (m / 1000).toFixed(1) + ' km' : Math.round(m) + ' m';
    }
    function formatElevation(m) {
      if (isImperial()) return Math.round(m * 3.28084) + ' ft';
      return Math.round(m) + ' m';
    }

    function setActiveTab(view) {
      ['places', 'trails'].forEach(v => {
        document.getElementById('tab-' + v).classList.toggle('active', v === view);
      });
    }

    function setCrumb(text, showBack) {
      document.getElementById('nav-crumb').textContent = text ? ' / ' + text : '';
      document.getElementById('nav-back').style.display = showBack ? 'inline' : 'none';
    }

    function createMarkerIcon(color, visited) {
      const size = getMarkerSize(), cx = size / 2, cy = size / 2;
      const style = getPinStyle();
      let svg, iconSize, iconAnchor;
      if (style === 'pin') {
        const w = size + 4;
        const h = Math.round(w * 33 / 24);
        if (visited) {
          svg = '<svg viewBox="0 0 24 33" width="' + w + '" height="' + h + '">' +
            '<line x1="12" y1="14" x2="12" y2="33" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round"/>' +
            '<circle cx="12" cy="9" r="7" fill="' + color + '"/>' +
            '</svg>';
        } else {
          svg = '<svg viewBox="-1.5 -1.5 27 36" width="' + w + '" height="' + h + '">' +
            '<line x1="12" y1="14" x2="12" y2="33" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round"/>' +
            '<circle cx="12" cy="9" r="7" fill="' + color + '" fill-opacity="0.25" stroke="' + color + '" stroke-width="2"/>' +
            '</svg>';
        }
        iconSize = [w, h];
        iconAnchor = [w / 2, h];
      } else if (style === 'dot') {
        const r = Math.max(3, Math.round(size * 0.35));
        svg = '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + color + '"' + (visited ? '' : ' fill-opacity="0.5"') + '/>' +
          '</svg>';
        iconSize = [size, size];
        iconAnchor = [size / 2, size / 2];
      } else if (style === 'tag') {
        const w = size + 6;
        const h = Math.round(w * 24 / 22);
        const flagPath = 'M0 0 L22 0 L22 10 L2 10 L2 24 L0 24 Z';
        if (visited) {
          svg = '<svg viewBox="0 0 22 24" width="' + w + '" height="' + h + '">' +
            '<path d="' + flagPath + '" fill="' + color + '"/>' +
            '</svg>';
        } else {
          svg = '<svg viewBox="-1.5 -1.5 25 27" width="' + w + '" height="' + h + '">' +
            '<path d="' + flagPath + '" fill="' + color + '" fill-opacity="0.25" stroke="' + color + '" stroke-width="2"/>' +
            '</svg>';
        }
        iconSize = [w, h];
        iconAnchor = [1, h];
      } else if (visited) {
        svg = '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (size/2 - 1) + '" fill="' + color + '"/>' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (size/2 - 1) + '" fill="none" stroke="#fff" stroke-width="1" opacity="0.6"/>' +
          '</svg>';
        iconSize = [size, size];
        iconAnchor = [size / 2, size / 2];
      } else {
        svg = '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (size/2 - 2) + '" fill="' + color + '" fill-opacity="0.25"/>' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (size/2 - 2) + '" fill="none" stroke="' + color + '" stroke-width="2"/>' +
          '</svg>';
        iconSize = [size, size];
        iconAnchor = [size / 2, size / 2];
      }
      return L.divIcon({ className: '', html: svg, iconSize: iconSize, iconAnchor: iconAnchor });
    }

    // Apply current pin-style + marker-size to all live place markers without
    // rebuilding the map. Falls back to a full router pass if markers aren't
    // mounted (e.g. on the trail-detail view).
    function refreshPlaceMarkerIcons() {
      if (!state._placeMarkers) { wrappedRouter(); return; }
      for (const m of state._placeMarkers) {
        const p = m._placeData;
        if (!p) continue;
        m.setIcon(createMarkerIcon(state.categoryColors[p.category], p.visited));
      }
    }

    // Apply current trail-weight to all live trail polylines without rebuilding.
    function refreshTrailWeights() {
      if (!state._trailLayers) { wrappedRouter(); return; }
      const w = 4 * getTrailWeightFactor();
      for (const t of state._trailLayers) {
        try { t.layer.setStyle({ weight: w }); } catch (e) {}
      }
    }

    const SHARE_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>';

    function shareCornerHtml(type, id) {
      return '<a href="#" class="popup-share-corner popup-share" data-type="' + type + '" data-id="' + escapeHtml(id) + '" title="Copy link to clipboard" aria-label="Copy link">' + SHARE_ICON_SVG + '</a>';
    }

    function placePopupHtml(p) {
      const color = state.categoryColors[p.category];
      const colorLight = state.categoryColorsLight[p.category];
      const catStyle = '--c:' + color + ';--cl:' + colorLight;
      let html = shareCornerHtml('place', p._slug || p.name);
      html += '<div class="popup-name">' + escapeHtml(p.name) + (p.local_name ? ' <span class="popup-local cat-text" style="' + catStyle + '">&middot; ' + escapeHtml(p.local_name) + '</span>' : '') + '</div>';
      if (p.note) html += '<div class="popup-note">' + escapeHtml(p.note) + '</div>';
      if (p.sources && p.sources.length) html += '<div class="popup-sources">' + renderSources(p.sources) + '</div>';
      html += '<div class="popup-meta">' +
        '<span class="cat-text" style="' + catStyle + '">' + escapeHtml(displayCategory(p.category)) + '</span>' +
        '<span style="color:' + (p.visited ? 'var(--green)' : 'var(--red)') + '">' + (p.visited ? 'Visited' : 'Want to visit') + '</span>' +
        (state.auth.authenticated && !isReadOnly() ? '<a href="#" class="popup-edit" data-place="' + escapeHtml(p.name) + '">Edit</a>' : '') +
      '</div>';
      return html;
    }

    function createPlaceMarker(p) {
      const color = state.categoryColors[p.category];
      const marker = L.marker([p.lat, p.lon], { icon: createMarkerIcon(color, p.visited) });
      marker.bindPopup(placePopupHtml(p), { closeButton: false });
      marker.on('click', (function(slug) {
        return function() { history.replaceState(null, '', focusHash('place', slug)); };
      })(p._slug || p.name));
      marker.bindTooltip(escapeHtml(p.name), { direction: 'top', offset: [0, -6] });
      marker._placeData = p;
      return marker;
    }

    // Refresh place markers in-place after label edits or bulk-clears. Avoids
    // the full router rebuild (which blinks the map). Mirrors what changed:
    // category color palette, marker icon (if a place's category changed),
    // popup HTML (labels), and the filter panel legend.
    function refreshPlacesPresentation() {
      if (state._placeMarkers && state.places) {
        const cc = assignCategoryColors(state.places);
        state.categoryColors = cc.dark;
        state.categoryColorsLight = cc.light;
        for (const m of state._placeMarkers) {
          const p = m._placeData;
          if (!p) continue;
          m.setIcon(createMarkerIcon(state.categoryColors[p.category], p.visited));
          m.setPopupContent(placePopupHtml(p));
        }
        if (typeof refreshFilterPanel === 'function') refreshFilterPanel();
      }
      if ((location.hash || '#/').startsWith('#/places')) wrappedRouter();
    }

    // Incrementally reconcile place markers with state.places after a CRUD write.
    // Falls back to a full marker rebuild if the category palette shifted (a new
    // category can re-index the color assignments). Skips when no map is mounted.
    function syncPlacesOnMap(prevColors) {
      if (!state._placeClusterGroup || !state._placeMarkers) return;
      const newColors = state.categoryColors || {};
      const prev = prevColors || {};
      let paletteChanged = false;
      const keys = new Set([...Object.keys(prev), ...Object.keys(newColors)]);
      for (const k of keys) {
        if (prev[k] !== newColors[k]) { paletteChanged = true; break; }
      }
      const oldByName = new Map(state._placeMarkers.map(m => [m._placeData.name, m]));
      const next = [];
      for (const p of (state.places || [])) {
        const existing = !paletteChanged ? oldByName.get(p.name) : null;
        if (existing && JSON.stringify(existing._placeData) === JSON.stringify(p)) {
          next.push(existing);
        } else {
          next.push(createPlaceMarker(p));
        }
      }
      state._placeMarkers = next;
      refreshFilterPanel();
      applyMapFilters();
    }

    const DIFFICULTY_LABELS = { easy: 'Easy', moderate: 'Moderate', hard: 'Hard', expert: 'Expert' };

    function trailMetadataKey(route, regionName) {
      // The manifest keys metadata by the on-disk region directory, not the
      // display name. For a trail in a region, route.file is "Region/Trail.gpx"
      // and we use the first segment. For a no-region (root-level) trail,
      // route.file is just "Trail.gpx" and the key omits the region prefix.
      const file = route.file || '';
      if (!file.includes('/')) return route.name;
      return file.split('/')[0] + '/' + route.name;
    }

    function ratingStarsText(rating) {
      // Returns HTML, not plain text, so the empty stars stay glyph-identical
      // to the filled ones (☆ and ★ render at different widths in most fonts).
      if (!rating) return '';
      const filled = '★'.repeat(rating);
      const empty = 5 - rating;
      if (!empty) return filled;
      return filled + '<span style="opacity:0.35">' + '★'.repeat(empty) + '</span>';
    }

    function trailPopupHtml(route, region, color) {
      const regionName = region.name;
      let html = shareCornerHtml('trail', route._slug || route.key);
      html += '<a class="popup-name popup-name-link" href="#/trails/route/' + encodeURIComponent(route.key) + '">' + escapeHtml(route.name) + (route.local_name ? ' <span class="popup-local">&middot; ' + escapeHtml(route.local_name) + '</span>' : '') + '</a>';
      // First meta line: difficulty / rating / date arranged left / center / right.
      // Render each slot even if empty so the columns hold their position.
      const diffSlot = route.difficulty ? escapeHtml(DIFFICULTY_LABELS[route.difficulty] || route.difficulty) : '';
      const rateSlot = route.rating ? '<span title="' + route.rating + '/5">' + ratingStarsText(route.rating) + '</span>' : '';
      const dateSlot = route.date_hiked ? escapeHtml(route.date_hiked) : '';
      if (diffSlot || rateSlot || dateSlot) {
        html += '<div class="popup-summary">' +
          '<span>' + diffSlot + '</span>' +
          '<span>' + rateSlot + '</span>' +
          '<span>' + dateSlot + '</span>' +
        '</div>';
      }
      if (route.tags && route.tags.length) {
        html += '<div class="popup-tags">' + route.tags.map(t => '#' + escapeHtml(t)).join(' ') + '</div>';
      }
      if (route.notes) html += '<div class="popup-note">' + escapeHtml(route.notes) + '</div>';
      if (route.source) {
        let safeHref = '';
        try {
          const u = new URL(route.source, location.href);
          if (u.protocol === 'http:' || u.protocol === 'https:') safeHref = u.href;
        } catch {}
        if (safeHref) {
          html += '<div class="popup-sources popup-sources-center"><a href="' + escapeHtml(safeHref) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(domainFromUrl(route.source)) + '</a></div>';
        }
      }
      html += '<div class="popup-meta">' +
        '<span style="color:' + color + '">' + (route.completed ? 'Completed' : 'Planned') + '</span>' +
        '<span>' + escapeHtml(displayRegion(regionName)) + '</span>' +
        (state.auth.authenticated && !isReadOnly() ?
          '<a href="#" class="popup-trail-edit" data-key="' + escapeHtml(route.key) + '">Edit</a>'
        : '') +
        '</div>';
      return html;
    }

    function deleteTrail(route, regionName) {
      if (!confirm('Delete trail "' + route.name + '" (' + displayRegion(regionName) + ')? This removes the GPX file.')) return Promise.resolve(false);
      return api('DELETE', '/gpx', { region: regionName, name: route.name })
        .then(() => refreshRoutes())
        .then(() => true)
        .catch(err => { alert('Failed: ' + err.message); return false; });
    }

    function findRouteByKey(key) {
      if (!state.manifest) return null;
      for (const region of state.manifest.regions) {
        for (const route of region.routes) {
          if (route.key === key) return { route, region };
        }
      }
      return null;
    }

    function openEditTrailMetadataModal(route, regionName) {
      const key = trailMetadataKey(route, regionName);
      const currentRegion = regionName || '';

        .map(r => r.name).filter(Boolean).sort((a, b) => a.localeCompare(b));
