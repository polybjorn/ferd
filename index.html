          html += '<div class="place-text">';
          html += '<div class="name">' + escapeHtml(p.name) + '</div>';
          if (p.note) html += '<div class="note">' + escapeHtml(p.note) + '</div>';
          html += '</div></div>';
        }
        html += '</div></div>';
      }
      if (!html) html = '<div class="loading">No matches</div>';
      document.getElementById('place-list').innerHTML = html;
    }

    // ----- Trails browse list -----
    function renderTrailsIndex() {
      setActiveTab('trails');
      setCrumb('', false);
      cleanupMap();
      const app = document.getElementById('app');
      if (!state.manifest) { document.getElementById('nav-info').innerHTML = ''; app.innerHTML = '<div class="loading">Loading routes...</div>'; return; }

      const regions = state.manifest.regions;
      const allRoutes = regions.flatMap(r => r.routes);
      const total = allRoutes.length;
      const completed = allRoutes.filter(r => r.completed).length;

      document.getElementById('nav-info').innerHTML =
        '<div class="nav-group">' +
        '<div class="nav-stat"><span class="value">' + completed + '/' + total + ' completed</span></div>' +
        '<div class="nav-stat"><span class="value">' + regions.length + ' regions</span></div>' +
        '</div>';

      let html = '<div class="region-grid">';
      for (const region of regions) {
        const regionCompleted = region.routes.filter(r => r.completed).length;
        html += '<div class="region-group fade-in">';
        html += '<div class="region-label">';
        html += escapeHtml(region.name);
        html += '<span class="route-count">(' + regionCompleted + '/' + region.routes.length + ')</span>';
        html += '</div>';
        html += '<div class="route-grid">';
        for (const route of region.routes) {
          const href = '#/trails/route/' + encodeURIComponent(route.key);
          const statusClass = route.completed ? 'completed' : 'planned';
          html += '<div class="route-card" onclick="location.hash=\'' + href.replace(/'/g, "\\'") + '\'">';
          html += '<span class="status-dot ' + statusClass + '"></span>';
          html += '<span class="name">' + escapeHtml(route.name) + '</span>';
          html += '</div>';
        }
        html += '</div></div>';
      }
      html += '</div>';
      app.innerHTML = html;
    }

    // ----- Trail detail (elevation) -----
    function parseGpxTracks(xmlText) {
      const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
      const ns = 'http://www.topografix.com/GPX/1/1';
      let tracks = doc.getElementsByTagNameNS(ns, 'trk');
      if (tracks.length === 0) tracks = doc.getElementsByTagName('trk');
      const result = [];
      for (let i = 0; i < tracks.length; i++) {
        const trk = tracks[i];
        const nameEl = trk.getElementsByTagNameNS(ns, 'name')[0] || trk.getElementsByTagName('name')[0];
        const name = nameEl ? nameEl.textContent : 'Track ' + (i + 1);
        const points = [];
        let trkpts = trk.getElementsByTagNameNS(ns, 'trkpt');
        if (trkpts.length === 0) trkpts = trk.getElementsByTagName('trkpt');
        for (let j = 0; j < trkpts.length; j++) {
          const pt = trkpts[j];
          const lat = parseFloat(pt.getAttribute('lat'));
          const lon = parseFloat(pt.getAttribute('lon'));
          const eleEl = pt.getElementsByTagNameNS(ns, 'ele')[0] || pt.getElementsByTagName('ele')[0];
          const ele = eleEl ? parseFloat(eleEl.textContent) : null;
          points.push({ lat, lon, ele });
        }
        result.push({ name, points });
      }
      return result;
    }

    function computeTrackStats(points) {
      let distance = 0, gain = 0, loss = 0, maxEle = -Infinity;
      for (let i = 1; i < points.length; i++) {
        const prev = points[i - 1], curr = points[i];
        distance += L.latLng(prev.lat, prev.lon).distanceTo(L.latLng(curr.lat, curr.lon));
        if (curr.ele !== null && prev.ele !== null) {
          const diff = curr.ele - prev.ele;
          if (diff > 0) gain += diff; else loss -= diff;
          if (curr.ele > maxEle) maxEle = curr.ele;
        }
      }
      if (points.length > 0 && points[0].ele !== null && points[0].ele > maxEle) maxEle = points[0].ele;
      return { distance, gain, loss, maxEle };
    }

    function trackToGeoJSON(track) {
      return {
        type: 'Feature',
        geometry: { type: 'LineString', coordinates: track.points.map(p => [p.lon, p.lat, p.ele]) },
        properties: {},
      };
    }

    function populateStats(s) {
      const items = [{ l: 'Dist', v: formatDistance(s.dist) }];
      if (s.tracks) items.unshift({ l: 'Tracks', v: s.tracks });
      if (s.gain !== undefined) {
        const hours = (s.dist / 1000) / 5 + s.gain / 600;
        const h = Math.floor(hours), m = Math.round((hours - h) * 60);
        items.push({ l: 'Gain', v: '+' + formatElevation(s.gain) });
        items.push({ l: 'Loss', v: '-' + formatElevation(s.loss) });
        items.push({ l: 'Peak', v: formatElevation(s.max) });
        items.push({ l: 'Est.', v: h > 0 ? h + 'h ' + m + 'min' : m + 'min' });
      }
      const navEl = document.getElementById('nav-stats-dynamic');
      if (navEl) navEl.innerHTML = items.map(i => '<div class="nav-stat"><span class="label">' + i.l + '</span><span class="value">' + i.v + '</span></div>').join('');
      const mobEl = document.getElementById('mobile-stats');
      if (mobEl) {
        let metaHtml = '';
        if (s.status) {
          const sc = s.completed ? 'var(--completed)' : 'var(--planned)';
          metaHtml += '<div class="stat"><span class="value" style="color:' + sc + '">' + s.status + '</span></div>';
          if (s.region) metaHtml += '<div class="stat"><span class="value">' + s.region + '</span></div>';
        }
        const dataHtml = items.map(i => '<div class="stat"><span class="label">' + i.l + '</span><span class="value">' + i.v + '</span></div>').join('');
        mobEl.innerHTML = '<div class="stats-meta">' + metaHtml + '</div><div class="stats-data">' + dataHtml + '</div>';
      }
    }

    function renderTrailDetail(routeKey) {
      setActiveTab('trails');
      cleanupMap();
      const app = document.getElementById('app');
      if (!state.manifest) { app.innerHTML = '<div class="loading">Loading routes...</div>'; return; }

      let route = null, regionName = '';
      for (const region of state.manifest.regions) {
        for (const r of region.routes) {
          if (r.key === routeKey) { route = r; regionName = region.name; break; }
        }
        if (route) break;
      }
      if (!route) { setCrumb('Not found', true); app.innerHTML = '<div class="loading">Route not found</div>'; return; }

      setCrumb(route.name, true);

      const color = ROUTE_COLOR;
      const statusLabel = route.completed ? 'Completed' : 'Planned';

      let navHtml = '';
      navHtml += '<div class="nav-group nav-route-meta">';
      navHtml += '<div class="nav-stat"><span class="value" style="color:' + (route.completed ? 'var(--completed)' : 'var(--planned)') + '">' + statusLabel + '</span></div>';
      navHtml += '<div class="nav-stat"><span class="value">' + escapeHtml(regionName) + '</span></div>';
      navHtml += '</div>';
      navHtml += '<div class="nav-group" id="nav-stats-dynamic"></div>';
      if (route.source) {
        navHtml += '<div class="nav-group">';
        navHtml += '<div class="nav-stat"><span class="value"><a href="' + escapeHtml(route.source) + '" target="_blank" rel="noopener">Source &#x2197;</a></span></div>';
        navHtml += '</div>';
      }
      document.getElementById('nav-info').innerHTML = navHtml;

      const isMultiTrack = route.trackCount && route.trackCount > 1;

      let html = '<div class="detail-layout">';
      html += '<div id="map"></div>';
      html += '<div class="mobile-stats" id="mobile-stats"></div>';
      if (isMultiTrack) {
        html += '<div id="track-legend"></div>';
        html += '<div id="multi-elevation-container"></div>';
      } else {
        if (route.hasElevation) html += '<div class="elevation-wrap" id="elevation-container"></div>';
        else html += '<div class="no-elevation-notice">No elevation data available for this route</div>';
      }
      html += '</div>';
      app.innerHTML = html;

      const dvt = state.config.default_view_trails || DEFAULT_CONFIG.default_view_trails;
      const map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
        maxBounds: [[-90, -200], [90, 200]],
        maxBoundsViscosity: 1.0
      }).setView(dvt.center, dvt.zoom);
      L.control.attribution({ prefix: false }).addTo(map);
      state.currentMap = map;
      addTileLayersToMap(map);

      if (route.plannedFile && route.completed) {
        new L.GPX('gpx/' + route.plannedFile, {
          async: true,
          polyline_options: { color: ROUTE_COLOR, opacity: 0.35, weight: 4 * getTrailWeightFactor(), dashArray: '8 6' },
          markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
        }).addTo(map);
      }

      if (isMultiTrack) renderMultiTrack(map, route);
      else renderSingleTrack(map, route, color);
    }

    function renderSingleTrack(map, route, color) {
      let elevationControl = null;
      if (route.hasElevation) {
        elevationControl = L.control.elevation({
          theme: 'custom-theme',
          detached: true,
          elevationDiv: '#elevation-container',
          height: 200,
          imperial: isImperial(),
          slope: false, speed: false, acceleration: false, time: false,
          legend: false, summary: false, ruler: false, downloadLink: false,
          almostOver: false, distanceMarkers: false,
          polyline: { color: color, opacity: 0.9, weight: 5 * getTrailWeightFactor() },
        }).addTo(map);
        state.currentElevation = elevationControl;
      }

      const gpxUrl = 'gpx/' + route.file;
      new L.GPX(gpxUrl, {
        async: true,
        polyline_options: { color: color, opacity: 0.9, weight: 5 * getTrailWeightFactor() },
        markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
      }).on('loaded', function(e) {
        const gpx = e.target;
        const bounds = gpx.getBounds();
        if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });

        const layers = [];
        gpx.eachLayer(function(layer) { if (layer.getLatLngs) layers.push(layer); });
        if (layers.length > 0) {
          const latlngs = layers[0].getLatLngs();
          const flat = Array.isArray(latlngs[0]) ? latlngs.flat() : latlngs;
          if (flat.length > 1) addStartEndMarkers(map, flat[0], flat[flat.length - 1]);
        }

        const dist = gpx.get_distance();
        const stats = { dist: dist, status: route.completed ? 'Completed' : 'Planned', completed: route.completed, region: route.key.split('/')[0] };
        if (route.hasElevation) {
          stats.gain = gpx.get_elevation_gain();
          stats.loss = gpx.get_elevation_loss();
          stats.max = gpx.get_elevation_max();
        }
        populateStats(stats);
      }).on('addline', function(e) {
        if (elevationControl) elevationControl.addData(e.line);
      }).addTo(map);
    }

    function renderMultiTrack(map, route) {
      fetch('gpx/' + route.file)
        .then(r => r.text())
        .then(function(xmlText) {
          const tracks = parseGpxTracks(xmlText);
          if (tracks.length === 0) return;

          const elevHeight = 200;
          const elevControls = [];
          const allStats = [];
          const bounds = L.latLngBounds();

          const container = document.getElementById('multi-elevation-container');
          if (container) {
            let panelsHtml = '';
            for (let i = 0; i < tracks.length; i++) {
              const tc = TRACK_COLORS[i % TRACK_COLORS.length];
              const collapsed = i > 0 ? ' collapsed' : '';
              panelsHtml += '<div class="elevation-track-panel' + collapsed + '" style="--track-color:' + tc + '">';
              panelsHtml += '<div class="elevation-track-label" onclick="var p=this.parentElement;if(p.classList.contains(\'collapsed\')){p.parentElement.querySelectorAll(\'.elevation-track-panel:not(.collapsed)\').forEach(function(s){s.classList.add(\'collapsed\')});p.classList.remove(\'collapsed\')}else{p.classList.add(\'collapsed\')}"><span class="color-dot" style="background:' + tc + '"></span>' + escapeHtml(tracks[i].name) + '</div>';
              panelsHtml += '<div class="elevation-track-chart" id="elevation-track-' + i + '"></div>';
              panelsHtml += '</div>';
            }
            container.innerHTML = panelsHtml;
          }

          for (let i = 0; i < tracks.length; i++) {
            const track = tracks[i];
            const tc = TRACK_COLORS[i % TRACK_COLORS.length];
            const stats = computeTrackStats(track.points);
            allStats.push(stats);
            for (const p of track.points) bounds.extend([p.lat, p.lon]);
            const latlngs = track.points.map(p => [p.lat, p.lon]);
            L.polyline(latlngs, { color: tc, opacity: 0.9, weight: 5 * getTrailWeightFactor() }).addTo(map);
            const hasEle = track.points.some(p => p.ele !== null);
            if (hasEle && container) {
              const ctrl = L.control.elevation({
                theme: 'custom-theme', detached: true,
                elevationDiv: '#elevation-track-' + i,
                height: elevHeight,
                imperial: isImperial(),
                slope: false, speed: false, acceleration: false, time: false,
                legend: false, summary: false, ruler: false, downloadLink: false,
                almostOver: false, distanceMarkers: false,
                polyline: false,
              }).addTo(map);
              ctrl.addData(trackToGeoJSON(track));
              elevControls.push(ctrl);
            }
          }
          state.currentElevation = elevControls;
          if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });
          const firstTrack = tracks[0];
          const lastTrack = tracks[tracks.length - 1];
          if (firstTrack.points.length > 0 && lastTrack.points.length > 0) {
            const sp = firstTrack.points[0];
            const ep = lastTrack.points[lastTrack.points.length - 1];
            addStartEndMarkers(map, L.latLng(sp.lat, sp.lon), L.latLng(ep.lat, ep.lon));
          }
          const legendEl = document.getElementById('track-legend');
          if (legendEl) {
            let legendHtml = '';
            for (let i = 0; i < tracks.length; i++) {
              const tc = TRACK_COLORS[i % TRACK_COLORS.length];
              const s = allStats[i];
              legendHtml += '<div class="track-legend-item">';
              legendHtml += '<span class="track-legend-color" style="background:' + tc + '"></span>';
              legendHtml += '<span class="track-name">' + escapeHtml(tracks[i].name) + '</span>';
              legendHtml += '<span class="track-stat">' + formatDistance(s.distance) + '</span>';
              if (s.gain > 0) legendHtml += '<span class="track-stat">+' + formatElevation(s.gain) + '</span>';
              legendHtml += '</div>';
            }
            legendEl.innerHTML = legendHtml;
          }
          const totals = allStats.reduce((acc, s) => ({
            distance: acc.distance + s.distance, gain: acc.gain + s.gain, loss: acc.loss + s.loss, maxEle: Math.max(acc.maxEle, s.maxEle)
          }), { distance: 0, gain: 0, loss: 0, maxEle: -Infinity });
          const ps = { dist: totals.distance, tracks: tracks.length, status: route.completed ? 'Completed' : 'Planned', completed: route.completed, region: route.key.split('/')[0] };
          if (totals.gain > 0) { ps.gain = totals.gain; ps.loss = totals.loss; ps.max = totals.maxEle; }
          populateStats(ps);
        });
    }

    // ----- Router -----
    function focusHash(type, slug) { return '#/' + type + '/' + slug; }

    function parseFocus(hash) {
      const base = hash.split('?')[0];
      if (base.startsWith('#/place/')) {
        const slug = decodeURIComponent(base.slice('#/place/'.length));
        const place = (state.places || []).find(p => p._slug === slug || p.name === slug);
        return { type: 'place', name: place ? place.name : slug };
      }
      if (base.startsWith('#/trail/')) {
        const slug = decodeURIComponent(base.slice('#/trail/'.length));
        if (state.manifest && state.manifest.regions) {
          for (const r of state.manifest.regions) {
            for (const route of r.routes) {
              if (route._slug === slug || route.key === slug) return { type: 'trail', name: route.key };
            }
          }
        }
        return { type: 'trail', name: slug };
      }
      // Legacy: #/?focus=type:id
      const q = hash.split('?')[1];
      if (q) {
        const params = new URLSearchParams(q);
        const focus = params.get('focus');
        if (focus) {
          const colon = focus.indexOf(':');
          if (colon !== -1) return { type: focus.slice(0, colon), name: decodeURIComponent(focus.slice(colon + 1)) };
        }
      }
      return null;
    }

    function router() {
      const hash = location.hash || '#/';
      const base = hash.split('?')[0];
      if (base.startsWith('#/place/') || base.startsWith('#/trail/')) return renderUnifiedMap(parseFocus(hash));
      if (base === '#/' || base === '#' || base === '#/map') return renderUnifiedMap(parseFocus(hash));
      if (base === '#/places') {
        if (!placesEnabled()) { location.hash = '#/'; return; }
        return renderPlacesIndex();
      }
      if (base === '#/trails') {
        if (!trailsEnabled()) { location.hash = '#/'; return; }
        return renderTrailsIndex();
      }
      if (base.startsWith('#/trails/route/')) {
        if (!trailsEnabled()) { location.hash = '#/'; return; }
        const key = decodeURIComponent(base.replace('#/trails/route/', ''));
        return renderTrailDetail(key);
      }
      renderUnifiedMap(null);
    }
    window.addEventListener('hashchange', router);

    // ----- Theme -----
    const THEMES = ['catppuccin', 'dracula', 'gruvbox', 'nord', 'rose-pine', 'solarized', 'tokyo-night'];
    const MODES = ['system', 'light', 'dark'];
    (function migrateTheme() {
      try {
        const old = localStorage.getItem('atlas-theme');
        if (old && MODES.includes(old)) {
          localStorage.setItem('atlas-mode', old);
          localStorage.setItem('atlas-theme', 'nord');
        } else if (old && !THEMES.includes(old)) {
          localStorage.setItem('atlas-theme', 'nord');
        }
      } catch {}
    })();
    function getStoredTheme() {
      try {
        const v = localStorage.getItem('atlas-theme');
        return THEMES.includes(v) ? v : 'nord';
      } catch { return 'nord'; }
    }
    function getStoredMode() {
      try {
        const v = localStorage.getItem('atlas-mode');
        return MODES.includes(v) ? v : 'system';
      } catch { return 'system'; }
    }
    function applyTheme(theme, mode) {
      const eff = mode === 'system'
        ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        : mode;
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-mode', eff);
    }
    const PIN_STYLES = ['ring', 'pin', 'dot', 'tag'];
    function getPinStyle() {
      try {
        const v = localStorage.getItem('atlas-pin-style');
        return PIN_STYLES.includes(v) ? v : 'ring';
      } catch { return 'ring'; }
    }
    const MARKER_SIZES = { small: 14, default: 18, large: 24 };
    const TRAIL_WEIGHT_FACTORS = { thin: 0.7, default: 1, thick: 1.4 };
    const TILE_FILTERS = ['none', 'desaturated', 'muted'];
    function getMarkerSizeKey() {
      try {
        const v = localStorage.getItem('atlas-marker-size');
        return MARKER_SIZES[v] ? v : 'default';
      } catch { return 'default'; }
    }
    function getMarkerSize() { return MARKER_SIZES[getMarkerSizeKey()]; }
    function getTrailWeightKey() {
      try {
        const v = localStorage.getItem('atlas-trail-weight');
        return TRAIL_WEIGHT_FACTORS[v] ? v : 'default';
      } catch { return 'default'; }
    }
    function getTrailWeightFactor() { return TRAIL_WEIGHT_FACTORS[getTrailWeightKey()]; }
    function getTileFilter() {
      try {
        const v = localStorage.getItem('atlas-tile-filter');
        return TILE_FILTERS.includes(v) ? v : 'none';
      } catch { return 'none'; }
    }
    function applyTileFilter(v) { document.documentElement.setAttribute('data-tile-filter', v); }
    applyTheme(getStoredTheme(), getStoredMode());
    applyTileFilter(getTileFilter());
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
        if (getStoredMode() === 'system') applyTheme(getStoredTheme(), 'system');
      });
    }

    // ----- Auth + API client -----
    function apiUrl(path) {
      const base = (state.config.api_base || '/api').replace(/\/$/, '');
      return base + path;
    }

    function api(method, path, body) {
      const opts = { method, credentials: 'same-origin', headers: {} };
      if (body !== undefined && !(body instanceof Blob)) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      } else if (body instanceof Blob) {
        opts.body = body;
      }
      return fetch(apiUrl(path), opts).then(async r => {
        let data = null;
        try { data = await r.json(); } catch {}
        if (!r.ok) {
          const err = new Error((data && data.error) || ('HTTP ' + r.status));
          err.status = r.status;
          err.body = data;
          throw err;
        }
        return data;
      });
    }

    function refreshAuthState() {
      return fetch(apiUrl('/state'), { credentials: 'same-origin' })
        .then(r => r.ok ? r.json() : null)
        .then(s => { if (s) state.auth = s; renderAuthWidget(); })
        .catch(() => { renderAuthWidget(); });
    }

    function renderAuthWidget() {
      const el = document.getElementById('auth-widget');
      if (!el) return;
      if (state.auth.authenticated) {
        el.innerHTML =
          '<button id="auth-menu-btn" title="Account menu">' +
            '<span>Menu</span><span class="caret">&#x25BE;</span>' +
          '</button>' +
          '<div class="auth-menu" id="auth-menu" hidden>' +
            '<div class="auth-menu-header">Signed in as<strong>' + escapeHtml(state.auth.username) + '</strong></div>' +
            '<button data-action="settings">Settings</button>' +
            '<button data-action="signout">Sign out</button>' +
          '</div>';
        const btn = document.getElementById('auth-menu-btn');
        const menu = document.getElementById('auth-menu');
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          menu.hidden = !menu.hidden;
        });
        menu.addEventListener('click', function(e) {
          const action = e.target.closest('button[data-action]');
          if (!action) return;
          menu.hidden = true;
          if (action.dataset.action === 'signout') {
            api('POST', '/logout').then(refreshAuthState).then(router);
          } else if (action.dataset.action === 'settings') {
            openSettingsModal();
          }
        });
        document.addEventListener('click', function closer(e) {
          if (!el.contains(e.target)) {
            menu.hidden = true;
            document.removeEventListener('click', closer);
          }
        });
      } else {
        el.innerHTML = '<button id="auth-signin">Sign in</button>';
        document.getElementById('auth-signin').addEventListener('click', openSignInModal);
      }
    }

    // ----- Settings modal -----
    function deviceLabel(ua) {
      if (!ua) return 'Unknown device';
      const s = ua.toLowerCase();
      if (s.includes('iphone')) return 'iPhone';
      if (s.includes('ipad')) return 'iPad';
      if (s.includes('android')) return 'Android';
      if (s.includes('mac os x') || s.includes('macintosh')) return 'macOS';
      if (s.includes('windows')) return 'Windows';
      if (s.includes('linux')) return 'Linux';
      if (s.startsWith('curl/')) return 'curl';
      return ua.slice(0, 32) + (ua.length > 32 ? '…' : '');
    }
    function timeAgo(unixSec) {
      const d = Math.max(0, Math.floor(Date.now() / 1000) - unixSec);
      if (d < 60) return d + 's ago';
      if (d < 3600) return Math.floor(d / 60) + 'm ago';
      if (d < 86400) return Math.floor(d / 3600) + 'h ago';
      if (d < 86400 * 30) return Math.floor(d / 86400) + 'd ago';
      const dt = new Date(unixSec * 1000);
      return dt.toISOString().slice(0, 10);
    }

        nord: 'Nord',

        gruvbox: 'Gruvbox',
        catppuccin: 'Catppuccin',

      };
      openModal(

        ((placesAvailable() || trailsAvailable()) ?
          '<h3 class="settings-h">Visible features</h3>' +

          ).join('') +
        '</div>' +
        '<label>Map tile style</label>' +
        '<div class="radio-row">' +
          [['none', 'None'], ['desaturated', 'Desaturated'], ['muted', 'Muted']].map(([v, l]) =>
            '<label><input type="radio" name="tile-filter" value="' + v + '"' + (tileFilter === v ? ' checked' : '') + '> ' + l + '</label>'
          ).join('') +
        '</div>' +
        '<h3 class="settings-h">Password</h3>' +
        '<form id="settings-pw-form">' +
          '<label for="s-current">Current password</label>' +
          '<input type="password" id="s-current" autocomplete="current-password" required>' +
          '<label for="s-new">New password</label>' +
          '<input type="password" id="s-new" autocomplete="new-password" required>' +
          '<div class="hint">12 to 256 characters. Other sessions on this account will be signed out.</div>' +
          '<div class="modal-error" id="s-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="submit" class="primary" id="s-submit">Change password</button>' +
          '</div>' +
        '</form>' +
        '<h3 class="settings-h">Active sessions</h3>' +
        '<div id="s-sessions">Loading&hellip;</div>' +
        (isOp && placesAvailable() ?
          '<h3 class="settings-h">Categories</h3>' +
          '<div class="hint">Edit display labels for place categories. Unlabeled slugs fall back to title case.</div>' +
          '<div class="modal-actions" style="margin-top:0.5rem"><button type="button" id="s-manage-cats">Manage categories</button></div>'
        : '') +
        (isOp ?
          '<h3 class="settings-h">Registration</h3>' +
          '<div class="checkbox-row"><input type="checkbox" id="s-reg"' + (regOpen ? ' checked' : '') + '><label for="s-reg">Allow new users to register</label></div>' +

            const nw = document.getElementById('s-new').value;
            const submit = document.getElementById('s-submit');
            submit.disabled = true;
            api('POST', '/change-password', { current_password: cur, new_password: nw })

                document.getElementById('s-current').value = '';
                document.getElementById('s-new').value = '';
                submit.disabled = false;
                submit.textContent = 'Password changed';
                setTimeout(() => { submit.textContent = 'Change password'; }, 2000);
                renderSessions();

              .catch(err => {
                submit.disabled = false;
                const e = document.getElementById('s-error');
                e.textContent = err.message;
                e.classList.add('visible');
              });

                .catch(err => { alert('Failed: ' + err.message); this.checked = !this.checked; });
            });

          renderSessions();
          const themeSel = document.getElementById('s-theme');
          if (themeSel) themeSel.addEventListener('change', function() {
            try { localStorage.setItem('atlas-theme', this.value); } catch {}
            applyTheme(this.value, getStoredMode());
          });
          const modeSel = document.getElementById('s-mode');
          if (modeSel) modeSel.addEventListener('change', function() {
            try { localStorage.setItem('atlas-mode', this.value); } catch {}
            applyTheme(getStoredTheme(), this.value);
          });
          document.querySelectorAll('input[name="pin-style"]').forEach(r => {
            r.addEventListener('change', function() {
              if (!this.checked) return;
              setPref('atlas-pin-style', this.value);
              wrappedRouter();
            });
          });
          document.querySelectorAll('input[name="marker-size"]').forEach(r => {
            r.addEventListener('change', function() {
              if (!this.checked) return;
              setPref('atlas-marker-size', this.value);
              wrappedRouter();
            });
          });
          document.querySelectorAll('input[name="trail-weight"]').forEach(r => {
            r.addEventListener('change', function() {
              if (!this.checked) return;
              setPref('atlas-trail-weight', this.value);
              wrappedRouter();
            });
          });
          document.querySelectorAll('input[name="tile-filter"]').forEach(r => {
            r.addEventListener('change', function() {
              if (!this.checked) return;
              setPref('atlas-tile-filter', this.value);

            });

          ['places', 'trails'].forEach(function(feat) {
            const cb = document.getElementById('s-feat-' + feat);
            if (!cb) return;
            cb.addEventListener('change', function() {
              setFeatureHidden(feat, !this.checked);
              const pill = this.closest('.feature-pill');
              if (pill) pill.classList.toggle('active', this.checked);
              refreshTabVisibility();
              wrappedRouter();
            });

          const tileSel = document.getElementById('s-tile');
          if (tileSel) tileSel.addEventListener('change', function() {
            setPref('atlas-tile-layer', this.value);
            wrappedRouter();
          });
          [['s-cluster', 'atlas-cluster-places'], ['s-remember-view', 'atlas-remember-view']].forEach(function([id, key]) {
            const cb = document.getElementById(id);
            if (!cb) return;
            cb.addEventListener('change', function() {
              setPref(key, this.checked ? 'true' : 'false');
              const pill = this.closest('.feature-pill');
              if (pill) pill.classList.toggle('active', this.checked);
              if (key === 'atlas-remember-view' && !this.checked) {
                try { localStorage.removeItem('atlas-last-view'); } catch {}
              }
              wrappedRouter();
            });
          });
          document.querySelectorAll('input[name="units"]').forEach(r => {
            r.addEventListener('change', function() {
              if (!this.checked) return;
              setPref('atlas-units', this.value);
              wrappedRouter();

          if (manageCats) manageCats.addEventListener('click', openManageCategoriesModal);

    function openManageCategoriesModal() {
      const labels = state.config.category_labels || {};
      const slugsFromPlaces = state.places ? [...new Set(state.places.map(p => p.category))] : [];
      const allSlugs = [...new Set([...Object.keys(labels), ...slugsFromPlaces])].sort();
      const rows = allSlugs.map(slug => ({ slug, display: labels[slug] || '' }));

      openModal(
        '<h2>Manage categories<button class="modal-close">&times;</button></h2>' +
        '<div class="hint">Set a display label for each slug. Clear a label to fall back to title case. Slugs in use by places cannot be removed here.</div>' +
        '<div id="cat-rows" style="margin-top:0.75rem"></div>' +
        '<div class="hint" style="margin-top:1rem">Add new label</div>' +
        '<div class="row" style="margin-top:0.25rem">' +
          '<input type="text" id="cat-new-slug" placeholder="slug (e.g. waterfall)">' +
          '<input type="text" id="cat-new-display" placeholder="Display (e.g. Waterfalls)">' +
          '<button type="button" id="cat-add" style="flex:0 0 auto">Add</button>' +
        '</div>' +
        '<div class="modal-error" id="cat-error"></div>' +
        '<div class="modal-actions" style="margin-top:1rem">' +
          '<button type="button" class="modal-close">Cancel</button>' +
          '<button type="button" class="primary" id="cat-save">Save</button>' +
        '</div>',
        function() {
          const inUse = new Set(slugsFromPlaces);
          function rerender() {
            const container = document.getElementById('cat-rows');
            if (!rows.length) {
              container.innerHTML = '<div class="hint">No categories yet.</div>';
              return;
            }
            container.innerHTML = rows.map((r, i) => {
              const removable = !inUse.has(r.slug);
              return '<div class="row" style="margin-top:0.4rem;align-items:center">' +
                '<input type="text" value="' + escapeHtml(r.slug) + '" disabled style="flex:0 0 35%">' +
                '<input type="text" data-i="' + i + '" class="cat-display" value="' + escapeHtml(r.display) + '" placeholder="(falls back to title case)">' +
                '<button type="button" data-i="' + i + '" class="cat-remove" style="flex:0 0 auto"' + (removable ? '' : ' disabled title="In use by places"') + '>Remove</button>' +
              '</div>';
            }).join('');
            container.querySelectorAll('.cat-display').forEach(inp => {
              inp.addEventListener('input', function() {
                rows[+this.dataset.i].display = this.value;
              });
            });
            container.querySelectorAll('.cat-remove').forEach(btn => {
              btn.addEventListener('click', function() {
                if (this.disabled) return;
                rows.splice(+this.dataset.i, 1);
                rerender();
              });
            });
          }
          rerender();

          document.getElementById('cat-add').addEventListener('click', function() {
            const slug = document.getElementById('cat-new-slug').value.trim();
            const display = document.getElementById('cat-new-display').value.trim();
            const err = document.getElementById('cat-error');
            err.classList.remove('visible');
            if (!slug) { err.textContent = 'Slug required'; err.classList.add('visible'); return; }
            if (rows.some(r => r.slug === slug)) { err.textContent = 'Slug already exists'; err.classList.add('visible'); return; }
            rows.push({ slug, display });
            rows.sort((a, b) => a.slug.localeCompare(b.slug));
            document.getElementById('cat-new-slug').value = '';
            document.getElementById('cat-new-display').value = '';
            rerender();
          });

          document.getElementById('cat-save').addEventListener('click', function() {
            const submit = this;
            submit.disabled = true;
            const payload = {};
            for (const r of rows) {
              if (r.display.trim()) payload[r.slug] = r.display.trim();
            }
            api('PUT', '/site-config/category-labels', { category_labels: payload })
              .then(res => {
                state.config.category_labels = res.category_labels || payload;
                closeModal();
                wrappedRouter();
              })
              .catch(err => {
                submit.disabled = false;
                const e = document.getElementById('cat-error');
                e.textContent = err.message;
                e.classList.add('visible');
              });
          });
        }
      );
    }

    function renderSessions() {
      const el = document.getElementById('s-sessions');
      if (!el) return;
      api('GET', '/sessions').then(data => {
        if (!data.sessions || !data.sessions.length) {
          el.innerHTML = '<div class="hint">No sessions.</div>';
          return;
        }
        el.innerHTML = '<ul class="session-list">' + data.sessions.map(s => {
          const label = escapeHtml(deviceLabel(s.user_agent));
          const ip = s.ip ? escapeHtml(s.ip) : '?';
          const ago = escapeHtml(timeAgo(s.last_seen_at || s.created_at));
          const current = s.current ? '<span class="session-current">This device</span>' : '';
          const revoke = s.current ? '' : '<button class="session-revoke" data-id="' + escapeHtml(s.id) + '">Revoke</button>';
          return '<li class="session-row">' +
            '<div class="session-meta">' +
              '<div class="session-device">' + label + ' ' + current + '</div>' +
              '<div class="session-sub">' + ip + ' &middot; ' + ago + '</div>' +
            '</div>' +
            revoke +
          '</li>';
        }).join('') + '</ul>';
        el.querySelectorAll('.session-revoke').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = this.dataset.id;
            this.disabled = true;
            api('POST', '/sessions/revoke', { id: id })
              .then(renderSessions)
              .catch(err => { this.disabled = false; alert('Failed: ' + err.message); });
          });
        });
      }).catch(() => {
        el.innerHTML = '<div class="hint">Could not load sessions.</div>';
      });
    }

    function refreshPlaces() {
      return fetch('places.json').then(r => r.ok ? r.json() : []).then(data => {
        state.places = data;
        assignPlaceSlugs(state.places);
        const cc = assignCategoryColors(data);
        state.categoryColors = cc.dark;
        state.categoryColorsLight = cc.light;
      });
    }

    function refreshRoutes() {
      return fetch('routes.json').then(r => r.ok ? r.json() : null).then(data => {
        if (!data) return;
        data.regions.sort((a, b) => a.name.localeCompare(b.name));
        for (const region of data.regions) region.routes.sort((a, b) => a.name.localeCompare(b.name));
        state.manifest = data;
        assignTrailSlugs(state.manifest);
      });
    }

    // ----- Modal infrastructure -----
    function openModal(html, onMount) {
      const root = document.getElementById('modal-root');
      root.innerHTML = '<div class="modal-backdrop" id="modal-backdrop"><div class="modal">' + html + '</div></div>';
      const backdrop = document.getElementById('modal-backdrop');
      backdrop.addEventListener('click', function(e) { if (e.target === backdrop) closeModal(); });
      backdrop.querySelectorAll('.modal-close').forEach(el => el.addEventListener('click', closeModal));
      document.addEventListener('keydown', escClose);
      if (onMount) onMount(backdrop);
    }
    function closeModal() {
      document.getElementById('modal-root').innerHTML = '';
      document.removeEventListener('keydown', escClose);
    }
    function escClose(e) { if (e.key === 'Escape') closeModal(); }
    function showModalError(msg) {
      const el = document.querySelector('.modal-error');
      if (el) { el.textContent = msg; el.classList.add('visible'); }
    }

    // ----- Sign-in / register modal -----
    function openSignInModal() {
      const canRegister = state.auth.registration_open;
      let mode = state.auth.has_users ? 'login' : 'register';
      openModal(
        '<h2><span id="modal-title">Sign in</span><button class="modal-close">&times;</button></h2>' +
        '<div class="modal-tabs" id="auth-tabs">' +
          '<button data-mode="login" class="active">Sign in</button>' +
          (canRegister ? '<button data-mode="register">Register</button>' : '') +
        '</div>' +
        '<form id="auth-form">' +
          '<label for="auth-username">Username</label>' +
          '<input type="text" id="auth-username" autocomplete="username" required>' +
          '<label for="auth-password">Password</label>' +
          '<input type="password" id="auth-password" autocomplete="current-password" required>' +
          '<div id="setup-token-row" hidden>' +
            '<label for="auth-setup-token">Setup token</label>' +
            '<input type="text" id="auth-setup-token" autocomplete="off">' +
            '<div class="hint">Required for first registration. Check the API server logs.</div>' +
          '</div>' +
          '<div class="hint" id="auth-hint"></div>' +
          '<div class="modal-error" id="auth-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="button" class="modal-close">Cancel</button>' +
            '<button type="submit" class="primary" id="auth-submit">Sign in</button>' +
          '</div>' +
        '</form>',
        function() {
          setMode(mode);
          document.querySelectorAll('#auth-tabs button[data-mode]').forEach(b => {
            b.addEventListener('click', function() { setMode(this.dataset.mode); });
          });
          document.getElementById('auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            submit();
          });
          document.getElementById('auth-username').focus();
        }
      );

      function setMode(m) {
        mode = m;
        document.querySelectorAll('#auth-tabs button[data-mode]').forEach(b => {
          b.classList.toggle('active', b.dataset.mode === m);
        });
        document.getElementById('modal-title').textContent = m === 'register' ? 'Register' : 'Sign in';
        document.getElementById('auth-submit').textContent = m === 'register' ? 'Register' : 'Sign in';
        document.getElementById('auth-password').setAttribute('autocomplete', m === 'register' ? 'new-password' : 'current-password');
        document.getElementById('auth-hint').textContent = m === 'register' ? 'Password must be 12 to 256 characters.' : '';
        const tokenRow = document.getElementById('setup-token-row');
        const tokenInput = document.getElementById('auth-setup-token');
        const needsToken = m === 'register' && state.auth.requires_setup_token;
        tokenRow.hidden = !needsToken;
        if (tokenInput) tokenInput.required = needsToken;
      }
      function submit() {
        const u = document.getElementById('auth-username').value.trim();
        const p = document.getElementById('auth-password').value;
        const payload = { username: u, password: p };
        if (mode === 'register' && state.auth.requires_setup_token) {
          payload.setup_token = document.getElementById('auth-setup-token').value.trim();
        }
        const submitBtn = document.getElementById('auth-submit');
        submitBtn.disabled = true;
        api('POST', '/' + mode, payload)
          .then(() => refreshAuthState())
          .then(() => { closeModal(); router(); })
          .catch(err => { submitBtn.disabled = false; showModalError(err.message); });
      }
    }

    // ----- Add place / GPX modal -----
    function openAddModal(prefillCoords, initialTab) {
      const showPlaces = placesEnabled();
      const showTrails = trailsEnabled();
      if (!showPlaces && !showTrails) return;
      let tab = initialTab || (showPlaces ? 'place' : 'trail');
      if (tab === 'place' && !showPlaces) tab = 'trail';
      if (tab === 'trail' && !showTrails) tab = 'place';
      openModal(
        '<h2>Add <button class="modal-close">&times;</button></h2>' +
        (showPlaces && showTrails ?
          '<div class="modal-tabs" id="add-tabs">' +
            '<button data-tab="place"' + (tab === 'place' ? ' class="active"' : '') + '>Place</button>' +
            '<button data-tab="trail"' + (tab === 'trail' ? ' class="active"' : '') + '>Trail (GPX)</button>' +
          '</div>'
          : '') +
        '<div id="add-body"></div>',
        function() {
          document.querySelectorAll('#add-tabs button[data-tab]').forEach(b => {
            b.addEventListener('click', function() {
              tab = this.dataset.tab;
              document.querySelectorAll('#add-tabs button[data-tab]').forEach(x => x.classList.toggle('active', x.dataset.tab === tab));
              renderTab();
            });
          });
          renderTab();
        }
      );

      function renderTab() {
        const body = document.getElementById('add-body');
        if (tab === 'place') body.innerHTML = placeFormHtml();
        else body.innerHTML = gpxFormHtml();
        if (tab === 'place') wirePlaceForm();
        else wireGpxForm();
      }

      function placeFormHtml() {
        const cats = Object.keys(state.categoryColors).sort();
        const c = prefillCoords;
        return '<form id="place-form">' +
          '<label for="p-name">Name</label>' +
          '<input type="text" id="p-name" required>' +
          '<div class="row">' +
            '<div><label for="p-lat">Latitude</label><input type="number" id="p-lat" step="any" required value="' + (c ? c.lat.toFixed(6) : '') + '"></div>' +
            '<div><label for="p-lon">Longitude</label><input type="number" id="p-lon" step="any" required value="' + (c ? c.lng.toFixed(6) : '') + '"></div>' +
          '</div>' +
          '<div class="pick-row"><button type="button" id="pick-on-map">Pick on map</button></div>' +
          '<label for="p-category">Category</label>' +
          selectOrNewHtml('p-category', cats, displayCategory) +
          '<label for="p-country">Country (optional)</label>' +
          '<input type="text" id="p-country">' +
          '<label for="p-note">Note (optional)</label>' +
          '<textarea id="p-note"></textarea>' +
          '<label for="p-local-name">Local name (optional)</label>' +
          '<input type="text" id="p-local-name">' +
          '<label for="p-sources">Sources (optional, one URL per line)</label>' +
          '<textarea id="p-sources" placeholder="https://example.com/source"></textarea>' +
          '<div class="checkbox-row"><input type="checkbox" id="p-visited"><label for="p-visited">I&rsquo;ve visited this place</label></div>' +
          '<div class="modal-error" id="add-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="button" class="modal-close">Cancel</button>' +
            '<button type="submit" class="primary" id="place-submit">Add place</button>' +
          '</div>' +
        '</form>';
      }

      function gpxFormHtml() {
        const regions = state.manifest ? state.manifest.regions.map(r => r.name).sort() : [];
        return '<form id="gpx-form">' +
          '<label for="g-file">GPX file</label>' +
          '<input type="file" id="g-file" accept=".gpx,application/gpx+xml,text/xml" required>' +
          '<label for="g-region">Region</label>' +
          selectOrNewHtml('g-region', regions, null) +
          '<label for="g-name">Trail name</label>' +
          '<input type="text" id="g-name" required placeholder="will be the filename">' +
          '<div class="hint">Server will strip PII (timestamps, author, creator) before saving.</div>' +
          '<div class="modal-error" id="add-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="button" class="modal-close">Cancel</button>' +
            '<button type="submit" class="primary" id="gpx-submit">Upload trail</button>' +
          '</div>' +
        '</form>';
      }

      function selectOrNewHtml(id, options, labelFn) {
        const opts = options.map(v => '<option value="' + escapeHtml(v) + '">' + escapeHtml(labelFn ? labelFn(v) : v) + '</option>').join('');
        // No empty placeholder: first real option preselects; if no options exist,
        // the "Add new" entry preselects and reveals the input on mount.
        return '<div class="select-or-new" data-id="' + id + '">' +
          '<select id="' + id + '" required>' +
            opts +
            '<option value="__new__">+ Add new&hellip;</option>' +
          '</select>' +
          '<input type="text" class="new-input" id="' + id + '-new" placeholder="Type new value" hidden>' +
        '</div>';
      }

      function wireSelectOrNew(id) {
        const sel = document.getElementById(id);
        const input = document.getElementById(id + '-new');
        if (!sel || !input) return;
        const sync = () => {
          if (sel.value === '__new__') {
            input.hidden = false;
            input.required = true;
          } else {
            input.hidden = true;
            input.required = false;
            input.value = '';
          }
        };
        sel.addEventListener('change', sync);
        sync();  // handle the case where "+ Add new…" is the only/initial choice
      }

      function readSelectOrNew(id) {
        const sel = document.getElementById(id);
        const input = document.getElementById(id + '-new');
        if (!sel) return '';
        if (sel.value === '__new__') return (input.value || '').trim();
        return sel.value;
      }

      function wirePlaceForm() {
        wireSelectOrNew('p-category');
        document.getElementById('pick-on-map').addEventListener('click', function() {
          closeModal();
          enterPickCoordsMode();
        });
        document.getElementById('place-form').addEventListener('submit', function(e) {
          e.preventDefault();
          const sourcesRaw = document.getElementById('p-sources').value.trim();
          const sources = sourcesRaw ? sourcesRaw.split('\n').map(s => s.trim()).filter(Boolean) : null;
          const category = readSelectOrNew('p-category');
          if (!category) { showModalError('Pick or add a category.'); return; }
          const payload = {
            name: document.getElementById('p-name').value.trim(),
            lat: parseFloat(document.getElementById('p-lat').value),
            lon: parseFloat(document.getElementById('p-lon').value),
            category: category,
            visited: document.getElementById('p-visited').checked,
          };
          const country = document.getElementById('p-country').value.trim();
          const note = document.getElementById('p-note').value.trim();
          const localName = document.getElementById('p-local-name').value.trim();
          if (country) payload.country = country;
          if (note) payload.note = note;
          if (localName) payload.local_name = localName;
          if (sources && sources.length) payload.sources = sources;
          const submitBtn = document.getElementById('place-submit');
          submitBtn.disabled = true;
          api('POST', '/places', payload)
            .then(() => refreshPlaces())
            .then(() => { closeModal(); router(); })
            .catch(err => { submitBtn.disabled = false; showModalError(err.message); });
        });
      }

      function wireGpxForm() {
        wireSelectOrNew('g-region');
        document.getElementById('gpx-form').addEventListener('submit', function(e) {
          e.preventDefault();
          const file = document.getElementById('g-file').files[0];
          const region = readSelectOrNew('g-region');
          const name = document.getElementById('g-name').value.trim();
          if (!file) { showModalError('Pick a GPX file first.'); return; }
          if (!region) { showModalError('Pick or add a region.'); return; }
          const submitBtn = document.getElementById('gpx-submit');
          submitBtn.disabled = true;
          const qs = '?region=' + encodeURIComponent(region) + '&name=' + encodeURIComponent(name);
          fetch(apiUrl('/gpx') + qs, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/gpx+xml' },
            body: file,
          }).then(async r => {
            const data = await r.json().catch(() => null);
            if (!r.ok) throw new Error((data && data.error) || 'HTTP ' + r.status);
            return data;
          })
          .then(() => refreshRoutes())
          .then(() => { closeModal(); router(); })
          .catch(err => { submitBtn.disabled = false; showModalError(err.message); });
        });
      }
    }

    // ----- Pick coordinates on the map -----
    function enterPickCoordsMode() {
      // Make sure we're on the unified map. If not, navigate there first.
      const base = (location.hash || '#/').split('?')[0];
      if (base !== '#/' && base !== '#/map' && base !== '#') {
        location.hash = '#/';
        setTimeout(enterPickCoordsMode, 250);
        return;
      }
      const banner = document.createElement('div');
      banner.className = 'pick-coords-banner';
      banner.textContent = 'Click on the map to set coordinates (or click here to cancel)';
      banner.addEventListener('click', cleanup);
      document.body.appendChild(banner);
      const map = state.currentMap;
      if (!map) { cleanup(); return; }
      function onClick(e) {
        cleanup();
        openAddModal(e.latlng);
      }
      function cleanup() {
        map.off('click', onClick);
        if (banner.parentNode) banner.parentNode.removeChild(banner);
        if (map.getContainer()) map.getContainer().style.cursor = '';
      }
      map.getContainer().style.cursor = 'crosshair';
      map.once('click', onClick);
    }

    // Floating "+" button on the unified map view, when authed.
    function maybeMountFab() {
      const app = document.getElementById('app');
      const existing = app.querySelector('.fab-add');
      if (existing) existing.remove();
      if (!state.auth.authenticated) return;
      const base = (location.hash || '#/').split('?')[0];
      if (!(base === '#/' || base === '#' || base === '#/map')) return;
      if (!placesEnabled() && !trailsEnabled()) return;
      const fab = document.createElement('button');
      fab.className = 'fab-add';
      fab.title = placesEnabled() && trailsEnabled()
        ? 'Add place or trail'
        : (placesEnabled() ? 'Add place' : 'Add trail');
      fab.innerHTML = '+';
      fab.addEventListener('click', function() { openAddModal(null); });
      app.appendChild(fab);
    }

    // Hook into router so the FAB re-mounts on each view change.
    const _origRouter = typeof router !== 'undefined' ? router : null;
    function wrappedRouter() {
      if (_origRouter) _origRouter(); else router();
      maybeMountFab();
    }
    window.removeEventListener('hashchange', router);
    window.addEventListener('hashchange', wrappedRouter);

    // Spacebar: toggle map chrome (FAB, filter panel, leaflet controls).
    document.addEventListener('keydown', function(e) {
      if (e.key !== ' ' && e.code !== 'Space') return;
      if (!state.currentMap) return;
      if (document.getElementById('modal-root').children.length) return;
      const t = e.target;
      const tag = t && t.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || (t && t.isContentEditable)) return;
      e.preventDefault();
      document.body.classList.toggle('map-chrome-hidden');
    });

    // Long-press on the map (touch only): same toggle as spacebar.
    let lastPointerType = 'mouse';
    document.addEventListener('pointerdown', function(e) { lastPointerType = e.pointerType; }, true);
    document.addEventListener('contextmenu', function(e) {
      if (lastPointerType !== 'touch' && lastPointerType !== 'pen') return;
      if (!state.currentMap) return;
      if (document.getElementById('modal-root').children.length) return;
      const t = e.target;
      if (!t.closest('.leaflet-container')) return;
      if (t.closest('.leaflet-marker-icon, .leaflet-control, .leaflet-popup, .map-panel')) return;
      e.preventDefault();
      document.body.classList.toggle('map-chrome-hidden');
      if (navigator.vibrate) navigator.vibrate(15);
    });

    // ----- Init -----
    function applyConfig(cfg) {
      state.config = Object.assign({}, DEFAULT_CONFIG, cfg || {});
      state.config.features = Object.assign({}, DEFAULT_CONFIG.features, (cfg && cfg.features) || {});
      document.title = state.config.brand || 'Atlas';
      const brandEl = document.getElementById('nav-brand-text');
      if (brandEl) brandEl.textContent = state.config.brand || 'Atlas';
      refreshTabVisibility();
    }

    fetch('site-config.json')
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
      .then(function(cfg) {
        applyConfig(cfg);
        const placesP = placesAvailable()
          ? fetch('places.json').then(r => r.ok ? r.json() : Promise.reject()).catch(() => null)
          : Promise.resolve(null);
        const routesP = trailsAvailable()
          ? fetch('routes.json').then(r => r.ok ? r.json() : Promise.reject()).catch(() => null)
          : Promise.resolve(null);
        const stateP = fetch(apiUrl('/state'), { credentials: 'same-origin' })
          .then(r => r.ok ? r.json() : null).catch(() => null);
        return Promise.all([placesP, routesP, stateP]);
      })
      .then(function([places, routes, authState]) {
        if (places) {
          state.places = places;
          assignPlaceSlugs(state.places);
          const cc = assignCategoryColors(places);
          state.categoryColors = cc.dark;
          state.categoryColorsLight = cc.light;
        }
        if (routes) {
          routes.regions.sort((a, b) => a.name.localeCompare(b.name));
          for (const region of routes.regions) region.routes.sort((a, b) => a.name.localeCompare(b.name));
          state.manifest = routes;
          assignTrailSlugs(state.manifest);
        }
        if (authState) state.auth = authState;
        renderAuthWidget();
        if ((placesAvailable() && !state.places) && (trailsAvailable() && !state.manifest)) {
          document.getElementById('app').innerHTML = '<div class="loading">Failed to load data</div>';
          return;
        }
        wrappedRouter();
      });
  </script>
</body>
