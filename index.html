            const cb = document.getElementById('s-feat-' + feat);
            if (!cb) return;
            cb.addEventListener('change', function() {
              setFeatureHidden(feat, !this.checked);
              const pill = this.closest('.feature-pill');
              if (pill) pill.classList.toggle('active', this.checked);
              refreshTabVisibility();
              // Layer groups are pre-built; apply visibility in place to avoid
              // tearing down the map (which would blink while Settings is open).
              if (state.currentMap) applyMapFilters();
              else wrappedRouter();
            });
          });
          const tileSel = document.getElementById('s-tile');
          if (tileSel) tileSel.addEventListener('change', function() {
            setPref('tile-layer', this.value);
            wrappedRouter();
          });
          [['s-cluster', 'cluster-places'], ['s-remember-view', 'remember-view'], ['s-tile-picker', 'tile-picker'], ['s-map-add', 'map-add-button'], ['s-map-filter', 'map-filter'], ['s-map-zoom', 'map-zoom']].forEach(function([id, key]) {
            const cb = document.getElementById(id);
            if (!cb) return;
            cb.addEventListener('change', function() {
              setPref(key, this.checked ? 'true' : 'false');
              const pill = this.closest('.feature-pill');
              if (pill) pill.classList.toggle('active', this.checked);
              if (key === 'remember-view') {
                // Pure persistence preference: only affects save/load on the
                // next navigation, no current-view rebuild needed.
                if (!this.checked) {
                  try { localStorage.removeItem('last-view'); } catch {}
                }
                return;
              }
              if (key === 'cluster-places') {
                swapPlaceClusterGroup();
                return;
              }
              // Tile-picker is a pure on-map control add/remove; no need to
              // rebuild the map (which causes a visible blink).
              if (key === 'tile-picker') {
                if (state.currentMap && state.tilePickerLayers) {
                  if (this.checked && !state.tilePickerCtrl) {
                    const ctrl = L.control.layers(state.tilePickerLayers, null, { position: 'topright' }).addTo(state.currentMap);
                    state.tilePickerCtrl = ctrl;
                    playEnter(ctrl.getContainer(), 'tile-pick-enter');
                  } else if (!this.checked && state.tilePickerCtrl) {
                    const ctrl = state.tilePickerCtrl;
                    state.tilePickerCtrl = null;
                    playLeave(ctrl.getContainer(), 'tile-pick-leave', () => state.currentMap.removeControl(ctrl));
                  }
                }
                return;
              }
              // Map add-button is a single DOM node; mount/unmount in place
              // instead of re-running the router (which would blink the map).
              if (key === 'map-add-button') {
                maybeMountFab();
                return;
              }
              // Filter panel + zoom controls hide via body classes; no map work.
              if (key === 'map-filter' || key === 'map-zoom') {
                applyControlVisibility();
                return;
              }
              wrappedRouter();
            });
          });
          // Units only affect formatting (distance/elevation in popups + detail view).
          // No need to tear down the map — the next render naturally picks up the
          // new units. Avoiding wrappedRouter here removes the modal-open blink.
          bindRadioPref('units', 'units');
          const manageCats = document.getElementById('s-manage-cats');
          if (manageCats) manageCats.addEventListener('click', openManageCategoriesModal);
          const manageRegions = document.getElementById('s-manage-regions');
          if (manageRegions) manageRegions.addEventListener('click', openManageRegionsModal);
          document.querySelectorAll('.feature-pill input[data-field]').forEach(cb => {
            cb.addEventListener('change', function() {
              setPref('show-' + this.dataset.field, this.checked ? 'true' : 'false');
              const pill = this.closest('.feature-pill');
              if (pill) pill.classList.toggle('active', this.checked);
            });
          });
          const exportBtn = document.getElementById('s-export');
          if (exportBtn) exportBtn.addEventListener('click', function() {
            const errBox = document.getElementById('s-export-error');
            errBox.classList.remove('visible');
            const originalLabel = exportBtn.textContent;
            exportBtn.disabled = true;
            exportBtn.textContent = 'Exporting…';
            fetch(apiUrl('/me/export'), { credentials: 'same-origin' }).then(async r => {
              if (!r.ok) {
                let msg = 'HTTP ' + r.status;
                try { const j = await r.json(); if (j && j.error) msg = j.error; } catch {}
                throw new Error(msg);
              }
              const disp = r.headers.get('Content-Disposition') || '';
              const m = /filename="([^"]+)"/.exec(disp);
              const fname = m ? m[1] : 'ferd-export.zip';
              const blob = await r.blob();
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = fname;
              document.body.appendChild(a);
              a.click();
              a.remove();
              URL.revokeObjectURL(url);
            }).catch(err => {
              errBox.textContent = err.message;
              errBox.classList.add('visible');
            }).finally(() => {
              exportBtn.disabled = false;
              exportBtn.textContent = originalLabel;
            });
          });
          const revokeOthersBtn = document.getElementById('s-revoke-others');
          if (revokeOthersBtn) revokeOthersBtn.addEventListener('click', function() {
            if (!confirm('Sign out all other sessions for this account?')) return;
            this.disabled = true;
            api('POST', '/sessions/revoke-others')
              .then(renderSessions)
              .catch(err => { alert('Failed: ' + err.message); })
              .finally(() => { this.disabled = false; });
          });
          const pickBtn = document.getElementById('s-import-pick');
          const fileInputEl = document.getElementById('s-import-file');
          const fileNameEl = document.getElementById('s-import-name');
          if (pickBtn) pickBtn.addEventListener('click', function() { fileInputEl.click(); });
          if (fileInputEl) fileInputEl.addEventListener('change', function() {
            const f = this.files && this.files[0];
            if (f) {
              fileNameEl.textContent = f.name;
              fileNameEl.classList.add('has-file');
            } else {
              fileNameEl.textContent = 'No file selected';
              fileNameEl.classList.remove('has-file');
            }
            const successEl = document.getElementById('s-import-success');
            if (successEl) successEl.hidden = true;
          });
          const importBtn = document.getElementById('s-import');
          if (importBtn) importBtn.addEventListener('click', function() {
            const fileInput = document.getElementById('s-import-file');
            const errBox = document.getElementById('s-import-error');
            const file = fileInput.files && fileInput.files[0];
            errBox.classList.remove('visible');
            if (!file) {
              errBox.textContent = 'Choose a zip file first.';
              errBox.classList.add('visible');
              return;
            }
            const mode = document.querySelector('input[name="import-mode"]:checked').value;
            if (mode === 'replace' && !confirm('Replace all current places, trails, and preferences with the contents of this zip?')) {
              return;
            }
            importBtn.disabled = true;
            const originalLabel = importBtn.textContent;
            importBtn.textContent = 'Importing…';
            fetch(apiUrl('/me/import?mode=' + mode), {
              method: 'POST',
              credentials: 'same-origin',
              headers: { 'Content-Type': 'application/zip' },
              body: file,
            }).then(async r => {
              const data = await r.json().catch(() => null);
              if (!r.ok) throw new Error((data && data.error) || ('HTTP ' + r.status));
              return data;
            }).then(data => {
              const c = data.imported || {};
              const successEl = document.getElementById('s-import-success');
              const parts = [];
              if (c.places) parts.push(c.places + ' places');
              if (c.gpx)    parts.push(c.gpx    + ' trails');
              successEl.textContent = parts.length
                ? 'Imported ' + parts.join(', ') + '.'
                : 'Nothing was imported.';
              successEl.hidden = false;
              fileInputEl.value = '';
              fileNameEl.textContent = 'No file selected';
              fileNameEl.classList.remove('has-file');
              Promise.all([refreshPlaces(), refreshRoutes()]).then(() => { wrappedRouter(); });
              importBtn.disabled = false;
              importBtn.textContent = originalLabel;
            }).catch(err => {
              importBtn.disabled = false;
              importBtn.textContent = originalLabel;
              errBox.textContent = err.message;
              errBox.classList.add('visible');
            });
          });
          document.querySelectorAll('#settings-tabs button[data-tab]').forEach(b => {
            b.addEventListener('click', function() {
              const tab = this.dataset.tab;
              document.querySelectorAll('#settings-tabs button[data-tab]').forEach(x =>
                x.classList.toggle('active', x.dataset.tab === tab));
              document.querySelectorAll('.modal [data-panel]').forEach(p => {
                p.hidden = p.dataset.panel !== tab;
              });
              if (tab === 'logs') renderAdminLogs();
            });
          });
          const clearBtn = document.getElementById('s-logs-clear');
          if (clearBtn) {
            clearBtn.addEventListener('click', function() {
              openConfirmModal({
                title: 'Clear audit log',
                body: 'This permanently deletes all logged events. Continue?',
                confirmLabel: 'Clear all',
                danger: true,
              }).then(ok => {
                if (!ok) return;
                clearBtn.disabled = true;
                api('DELETE', '/admin/logs')
                  .then(() => renderAdminLogs())
                  .catch(err => alert('Failed: ' + err.message))
                  .then(() => { clearBtn.disabled = false; });
              });
            });
          }
        }
      );
    }

    function slugifyCategory(s) {
      return (s || '').toLowerCase().trim()
        .replace(/[^a-z0-9_-]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 64);
    }

    function openManageCategoriesModal() {
      const labels = state.config.category_labels || {};
      // Uncategorized ('') isn't a manageable slug — drop it.
      const slugsFromPlaces = state.places ? [...new Set(state.places.map(p => p.category).filter(Boolean))] : [];
      const allSlugs = [...new Set([...Object.keys(labels), ...slugsFromPlaces])].sort();
      const placeCountBySlug = {};
      if (state.places) {
        for (const p of state.places) {
          if (!p.category) continue;
          placeCountBySlug[p.category] = (placeCountBySlug[p.category] || 0) + 1;
        }
      }
      const rows = allSlugs.map(slug => {
        const display = (labels[slug] && labels[slug].label) || '';
        return { slug, display, original: display, count: placeCountBySlug[slug] || 0 };
      });

      openModal(
        '<h2>Manage categories<button class="modal-close">&times;</button></h2>' +
        '<h3 class="settings-h" style="margin-top:0.75rem">Add</h3>' +
        '<div class="row" style="margin-top:0.25rem">' +
          '<input type="text" id="cat-new-display" placeholder="e.g. Waterfalls">' +
          '<button type="button" class="primary" id="cat-add" style="flex:0 0 auto">Add</button>' +
        '</div>' +
        '<div class="hint" id="cat-new-slug-preview" hidden></div>' +
        '<div class="modal-error" id="cat-error"></div>' +
        '<h3 class="settings-h" style="margin-top:1.25rem">Categories</h3>' +
        '<div id="cat-rows"></div>' +
        '<div class="modal-actions" style="margin-top:1rem">' +
          '<div id="cat-clear-warning" class="action-warning" hidden></div>' +
          '<button type="button" class="primary" id="cat-save" hidden>Save</button>' +
        '</div>',
        function() {
          const inUse = new Set(slugsFromPlaces);
          const pendingClears = new Set();  // in-use slugs the user removed; will bulk-clear on Save
          const initialRowKeys = new Set(rows.map(r => r.slug));
          function hasChanges() {
            if (pendingClears.size) return true;
            // Added or label-edited?
            if (rows.length !== initialRowKeys.size) return true;
            for (const r of rows) {
              if (!initialRowKeys.has(r.slug)) return true;
              if (r.display !== r.original) return true;
            }
            return false;
          }
          function refreshSaveBtn() {
            const btn = document.getElementById('cat-save');
            if (btn) btn.hidden = !hasChanges();
          }
          function refreshClearWarning() {
            const banner = document.getElementById('cat-clear-warning');
            if (!banner) return;
            if (!pendingClears.size) { banner.hidden = true; return; }
            const slugs = [...pendingClears];
            const total = state.places.filter(p => slugs.includes(p.category)).length;
            const slugList = slugs.map(s => '"' + s + '"').join(', ');
            banner.textContent = 'On Save: ' + total + ' place' + (total === 1 ? '' : 's') + ' will lose their category (' + slugList + ').';
            banner.hidden = false;
          }
          function rerender() {
            const container = document.getElementById('cat-rows');
            if (!rows.length) {
              container.innerHTML = '<div class="hint">No categories yet.</div>';
              return;
            }
            container.innerHTML = rows.map((r, i) => {
              const dirty = r.display !== r.original;
              const tag = dirty ? '<span class="row-tag dirty">edited</span>'
                        : r.count === 0 ? '<span class="row-tag">unused</span>'
                        : '<span class="row-tag">' + r.count + ' place' + (r.count === 1 ? '' : 's') + '</span>';
              return '<div style="display:flex;gap:0.6rem;align-items:center;margin-top:0.5rem">' +
                '<input type="text" data-i="' + i + '" class="cat-display' + (dirty ? ' dirty' : '') + '" value="' + escapeHtml(r.display) + '" placeholder="(falls back to title case)" title="' + escapeHtml('slug: ' + r.slug) + '" style="flex:1;min-width:0">' +
                tag +
                '<button type="button" data-i="' + i + '" class="cat-remove btn-x" aria-label="Remove" title="Remove" style="flex:0 0 auto">&times;</button>' +
              '</div>';
            }).join('');
            container.querySelectorAll('.cat-display').forEach(inp => {
              inp.addEventListener('input', function() {
                const i = +this.dataset.i;
                const r = rows[i];
                r.display = this.value;
                const dirty = r.display !== r.original;
                this.classList.toggle('dirty', dirty);
                // Update the tag in this row without a full rerender (avoids
                // stealing focus while typing).
                const tagEl = this.parentElement.querySelector('.row-tag');
                if (!tagEl) return;
                if (dirty) {
                  tagEl.textContent = 'edited';
                  tagEl.classList.add('dirty');
                } else {
                  tagEl.classList.remove('dirty');
                  tagEl.textContent = r.count === 0
                    ? 'unused'
                    : (r.count + ' place' + (r.count === 1 ? '' : 's'));
                }
                refreshSaveBtn();
              });
            });
            container.querySelectorAll('.cat-remove').forEach(btn => {
              btn.addEventListener('click', function() {
                if (this.disabled) return;
                const i = +this.dataset.i;
                const slug = rows[i].slug;
                if (inUse.has(slug)) pendingClears.add(slug);
                rows.splice(i, 1);
                rerender();
                refreshClearWarning();
                refreshSaveBtn();
              });
            });
          }
          rerender();
          refreshSaveBtn();

          const newDisplay = document.getElementById('cat-new-display');
          const slugPreview = document.getElementById('cat-new-slug-preview');
          newDisplay.addEventListener('input', function() {
            const s = slugifyCategory(this.value);
            if (s) {
              slugPreview.innerHTML = 'Will be saved as slug <code>' + escapeHtml(s) + '</code>.';
              slugPreview.hidden = false;
            } else {
              slugPreview.hidden = true;
            }
          });

          document.getElementById('cat-add').addEventListener('click', function() {
            const display = newDisplay.value.trim();
            const err = document.getElementById('cat-error');
            err.classList.remove('visible');
            if (!display) { err.textContent = 'Display label required'; err.classList.add('visible'); return; }
            const slug = slugifyCategory(display);
            if (!slug) { err.textContent = 'Display label has no usable letters or digits for a slug'; err.classList.add('visible'); return; }
            if (rows.some(r => r.slug === slug)) { err.textContent = 'A category with slug "' + slug + '" already exists'; err.classList.add('visible'); return; }
            rows.push({ slug, display, original: '', count: 0 });
            rows.sort((a, b) => a.slug.localeCompare(b.slug));
            newDisplay.value = '';
            slugPreview.hidden = true;
            rerender();
            refreshSaveBtn();
          });

          document.getElementById('cat-save').addEventListener('click', function() {
            const submit = this;
            submit.disabled = true;
            const payload = {};
            for (const r of rows) {
              const label = r.display.trim();
              if (!label) continue;
              // Send only {label}; the server preserves any previously-assigned
              // color for this slug (Manage Categories doesn't surface colors).
              payload[r.slug] = { label };
            }
            // Bulk-clear any in-use slugs the user removed, then PUT labels.
            // Clear failures abort the save so the label map and place data
            // don't get out of sync.
            const clears = [...pendingClears].map(slug =>
              api('POST', '/places/clear-category', { category: slug })
            );
            Promise.all(clears)
              .then(() => api('PUT', '/me/category-labels', { category_labels: payload }))
              .then(res => {
                state.config.category_labels = res.category_labels || payload;
                if (pendingClears.size && state.places) {
                  // The server cleared `category` for these slugs; mirror it
                  // locally so we don't have to refetch and rebuild markers.
                  for (const p of state.places) {
                    if (pendingClears.has(p.category)) p.category = '';
                  }
                }
                refreshPlacesPresentation();
                closeTopModal();
              })
              .catch(err => {
                submit.disabled = false;
                const e = document.getElementById('cat-error');
                e.textContent = err.message;
                e.classList.add('visible');
              });
          });
        }
      );
    }

    function openManageRegionsModal() {
      const regions = (state.manifest && state.manifest.regions) ? state.manifest.regions : [];
      // Exclude the synthetic no-region group; it's not a renamable directory.
      const rows = regions
        .filter(r => r.name)
        .map(r => ({ name: r.name, original: r.name, count: r.routes.length }))
        .sort((a, b) => a.name.localeCompare(b.name));
      // Empty regions: Save calls delete-region. Non-empty regions: Save calls
      // clear-region, which moves the trails to "No region" and removes the dir.
      const pendingDeletes = new Set();   // empty regions removed by X
      const pendingClears = new Set();    // non-empty regions removed by X

      openModal(
        '<h2>Manage regions<button class="modal-close">&times;</button></h2>' +
        '<h3 class="settings-h" style="margin-top:0.75rem">Regions</h3>' +
        '<div id="rgn-rows"></div>' +
        '<div id="rgn-empty" class="hint" hidden>No regions yet. Upload a trail with a region to create one.</div>' +
        '<div class="modal-error" id="rgn-error"></div>' +
        '<div class="modal-actions" style="margin-top:1rem">' +
          '<div id="rgn-clear-warning" class="action-warning" hidden></div>' +
          '<button type="button" class="primary" id="rgn-save" hidden>Save</button>' +
        '</div>',
        function() {
          function hasChanges() {
            if (pendingDeletes.size || pendingClears.size) return true;
            for (const r of rows) if (r.name !== r.original) return true;
            return false;
          }
          function refreshSaveBtn() {
            const btn = document.getElementById('rgn-save');
            if (btn) btn.hidden = !hasChanges();
          }
          function refreshClearWarning() {
            const banner = document.getElementById('rgn-clear-warning');
            if (!banner) return;
            if (!pendingClears.size) { banner.hidden = true; return; }
            const slugs = [...pendingClears];
            const total = slugs.reduce((n, name) => {
              const region = regions.find(x => x.name === name);
              return n + (region ? region.routes.length : 0);
            }, 0);
            const slugList = slugs.map(s => '"' + s + '"').join(', ');
            banner.textContent = 'On Save: ' + total + ' trail' + (total === 1 ? '' : 's') +
              ' will move to No region (' + slugList + ').';
            banner.hidden = false;
          }
          function rerender() {
            const container = document.getElementById('rgn-rows');
            const emptyMsg = document.getElementById('rgn-empty');
            if (!rows.length) {
              container.innerHTML = '';
              emptyMsg.hidden = false;
              return;
            }
            emptyMsg.hidden = true;
            container.innerHTML = rows.map((r, i) => {
              const dirty = r.name !== r.original;
              const empty = r.count === 0;
              const tag = dirty ? '<span class="row-tag dirty">edited</span>'
                        : empty ? '<span class="row-tag">empty</span>'
                        : '<span class="row-tag">' + r.count + ' trail' + (r.count === 1 ? '' : 's') + '</span>';
              const xTitle = empty ? 'Remove empty region' : 'Remove region (trails will move to No region)';
              return '<div style="display:flex;gap:0.6rem;align-items:center;margin-top:0.5rem">' +
                '<input type="text" data-i="' + i + '" class="rgn-name' + (dirty ? ' dirty' : '') + '" value="' + escapeHtml(r.name) + '" style="flex:1;min-width:0">' +
                tag +
                '<button type="button" data-i="' + i + '" class="rgn-remove btn-x" aria-label="Remove" title="' + xTitle + '" style="flex:0 0 auto">&times;</button>' +
              '</div>';
            }).join('');
            container.querySelectorAll('.rgn-name').forEach(inp => {
              inp.addEventListener('input', function() {
                const i = +this.dataset.i;
                const r = rows[i];
                r.name = this.value;
                const dirty = r.name !== r.original;
                this.classList.toggle('dirty', dirty);
                const tagEl = this.parentElement.querySelector('.row-tag');
                if (!tagEl) return;
                if (dirty) {
                  tagEl.textContent = 'edited';
                  tagEl.classList.add('dirty');
                } else {
                  tagEl.classList.remove('dirty');
                  tagEl.textContent = r.count === 0 ? 'empty' : (r.count + ' trail' + (r.count === 1 ? '' : 's'));
                }
                refreshSaveBtn();
              });
            });
            container.querySelectorAll('.rgn-remove').forEach(btn => {
              btn.addEventListener('click', function() {
                if (this.disabled) return;
                const i = +this.dataset.i;
                const r = rows[i];
                if (r.count === 0) pendingDeletes.add(r.original);
                else pendingClears.add(r.original);
                rows.splice(i, 1);
                rerender();
                refreshSaveBtn();
                refreshClearWarning();
              });
            });
          }
          rerender();
          refreshSaveBtn();

          document.getElementById('rgn-save').addEventListener('click', function() {
            const submit = this;
            submit.disabled = true;
            const err = document.getElementById('rgn-error');
            err.classList.remove('visible');

            // Build the list of renames. Reject if any new name collides with
            // an existing (non-renamed) region or with another rename target.
            const renames = [];
            const seen = new Set(rows.map(r => r.name.trim().toLowerCase()));
            if (seen.size !== rows.length) {
              err.textContent = 'Two regions have the same name.';
              err.classList.add('visible');
              submit.disabled = false;
              return;
            }
            for (const r of rows) {
              const trimmed = r.name.trim();
              if (!trimmed) {
                err.textContent = 'Region name cannot be empty.';
                err.classList.add('visible');
                submit.disabled = false;
                return;
              }
              if (trimmed !== r.original) renames.push({ from: r.original, to: trimmed });
            }

            // Run clears + deletes first so a rename can reuse a freed name.
            const clears = [...pendingClears].map(name =>
              api('POST', '/regions/clear', { name })
            );
            const deletes = [...pendingDeletes].map(name =>
              api('POST', '/regions/delete', { name })
            );
            Promise.all([...clears, ...deletes])
              .then(() => Promise.all(renames.map(r => api('POST', '/regions/rename', r))))
              .then(() => refreshRoutes())
              .then(() => { wrappedRouter(); closeTopModal(); })
              .catch(e => {
                submit.disabled = false;
                err.textContent = e.message;
                err.classList.add('visible');
              });
          });
        }
      );
    }

    function renderSessions() {
      const el = document.getElementById('s-sessions');
      if (!el) return;
      api('GET', '/sessions').then(data => {
        const others = data.sessions ? data.sessions.filter(s => !s.current) : [];
        const revokeOthersBtn = document.getElementById('s-revoke-others');
        if (revokeOthersBtn) revokeOthersBtn.hidden = others.length === 0;
        if (!data.sessions || !data.sessions.length) {
          el.innerHTML = '<div class="hint">No sessions.</div>';
          return;
        }
        el.innerHTML = '<ul class="session-list">' + data.sessions.map(s => {
          const label = escapeHtml(deviceLabel(s.user_agent));
          const ip = s.ip ? escapeHtml(s.ip) : '?';
          const ago = escapeHtml(timeAgo(s.last_seen_at || s.created_at));
          const current = s.current ? '<span class="session-current">This device</span>' : '';
          const revoke = s.current ? '' : '<button class="session-revoke" data-id="' + escapeHtml(s.id) + '">Revoke</button>';
          const sub = s.current ? ip : (ip + ' &middot; ' + ago);
          return '<li class="session-row">' +
            '<div class="session-meta">' +
              '<div class="session-device">' + label + ' ' + current + '</div>' +
              '<div class="session-sub">' + sub + '</div>' +
            '</div>' +
            revoke +
          '</li>';
        }).join('') + '</ul>';
        el.querySelectorAll('.session-revoke').forEach(btn => {
          btn.addEventListener('click', function() {
            const id = this.dataset.id;
            this.disabled = true;
            api('POST', '/sessions/revoke', { id: id })
              .then(renderSessions)
              .catch(err => { this.disabled = false; alert('Failed: ' + err.message); });
          });
        });
      }).catch(() => {
        el.innerHTML = '<div class="hint">Could not load sessions.</div>';
      });
    }

    function formatBytes(n) {
      if (!n || n < 1024) return (n || 0) + ' B';
      const units = ['KB', 'MB', 'GB', 'TB'];
      let v = n / 1024;
      let i = 0;
      while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
      return (v >= 10 ? v.toFixed(0) : v.toFixed(1)) + ' ' + units[i];
    }

    function renderAdminStats() {
      const el = document.getElementById('s-admin-stats');
      if (!el) return;
      api('GET', '/admin/stats').then(s => {
        const tiles = [
          ['Users', s.users],
          ['Published', s.published_users],
          ['Places', s.places],
          ['Trails', s.trails],
          ['Files', formatBytes(s.data_bytes)],
          ['Database', formatBytes(s.db_bytes)],
        ];
        el.innerHTML = tiles.map(([lbl, v]) =>
          '<div class="stat-card"><div class="stat-val">' + escapeHtml(String(v)) + '</div>' +

        ).join('');
      }).catch(() => {
        el.innerHTML = '<div class="hint" style="grid-column:1/-1">Could not load stats.</div>';
      });

    function renderAdminUsers() {
      const el = document.getElementById('s-admin-users');
      if (!el) return;
      api('GET', '/admin/users').then(data => {
        const users = data.users || [];
        if (!users.length) {
          el.innerHTML = '<div class="hint">No users.</div>';
          return;
        }
        const meName = state.auth.username;
        // Sort: current user first, then other admins, then everyone else by id.
        users.sort((a, b) => {
          if (a.username === meName) return -1;
          if (b.username === meName) return 1;
          if (a.is_admin !== b.is_admin) return a.is_admin ? -1 : 1;
          return a.id - b.id;
        });
        const admins = users.filter(u => u.is_admin);
        const members = users.filter(u => !u.is_admin);
        const renderRow = u => {
          const isSelf = u.username === meName;
          return '<li class="user-row' + (isSelf ? ' self' : '') + '" data-uid="' + u.id + '" data-uname="' + escapeHtml(u.username) + '">' +
            '<span class="user-name">' +
              escapeHtml(u.username) +
              (u.published ? '<span class="user-flag on">Public</span>' : '') +
            '</span>' +
            '<div class="user-actions">' +
              (u.published ? '<button data-act="unpublish">Unpublish</button>' : '') +
              (u.sessions ? '<button data-act="revoke">Revoke</button>' : '') +
              (isSelf ? '' : '<button data-act="role" data-promote="' + (u.is_admin ? '0' : '1') + '">' + (u.is_admin ? 'Demote' : 'Promote') + '</button>') +
              (isSelf ? '' : '<button data-act="delete" class="danger-btn">Delete</button>') +
            '</div>' +
            '<div class="user-counts">' +
              '<span><b>' + u.sessions + '</b>sessions</span>' +

              '<span><b>' + u.trails + '</b>trails</span>' +
            '</div>' +
          '</li>';

            '<ul class="user-list">' + members.map(renderRow).join('') + '</ul>';

          btn.addEventListener('click', () => handleAdminUserAction(btn));

    function formatLogRow(r) {
      const d = r.details || {};
      const actor = r.actor ? '<span class="log-name">' + escapeHtml(r.actor) + '</span>' : '<span class="log-name muted">anon</span>';
      const target = r.target ? '<span class="log-name">' + escapeHtml(r.target) + '</span>' : '';
      const plural = (n, w) => n + ' ' + w + (n === 1 ? '' : 's');
      const reason = d.reason === 'no_such_user' ? 'unknown user'
                   : d.reason === 'bad_password' ? 'wrong password'
                   : (d.reason || '').replace(/_/g, ' ');
      let msg, detail = '';
      switch (r.action) {
        case 'auth.login_success':
          msg = actor + ' signed in';
          detail = d.ip || '';
          break;
        case 'auth.login_failure':
          msg = 'Failed sign-in for ' + (target || '<span class="log-name muted">unknown</span>');
          detail = [reason, d.ip].filter(Boolean).join(' · ');
          break;
        case 'auth.register':
          msg = actor + ' registered' + (d.first_user ? ' (first user)' : '');
          detail = d.ip || '';
          break;
        case 'user.publish_toggle':
          msg = actor + (d.published ? ' made map public' : ' made map private');
          break;
        case 'user.import':
          msg = actor + ' imported ' + (d.places || 0) + ' places, ' + (d.gpx || 0) + ' trails';
          detail = d.mode + ' mode';
          break;
        case 'admin.user_role_change':
          msg = actor + ' ' + (d.is_admin ? 'promoted ' : 'demoted ') + target;
          break;
        case 'admin.user_force_unpublish':
          msg = actor + ' force-unpublished ' + target;
          break;
        case 'admin.user_revoke_sessions':
          msg = actor + ' revoked ' + plural(d.removed || 0, 'session') + ' for ' + target;
          break;
        case 'admin.user_delete':
          msg = actor + ' deleted ' + target;
          detail = d.cleanup_warning || '';
          break;
        case 'admin.unpublish_all':
          msg = actor + ' force-unpublished all users';
          detail = plural(d.affected || 0, 'user') + ' affected';
          break;
        case 'admin.publishing_gate':
          msg = actor + ' ' + (d.mode === 'open' ? 'opened' : 'closed') + ' publishing';
          break;
        case 'admin.registration_gate':
          msg = actor + ' ' + (d.mode === 'open' ? 'opened' : 'closed') + ' registration';
          break;
        case 'admin.logs_clear':
          msg = actor + ' cleared the audit log';
          break;
        default:
          msg = escapeHtml(r.action) + (r.actor ? ' by ' + actor : '');
          try { detail = JSON.stringify(d); } catch (_) {}
      }
      return { msg, detail };
    }

    function renderAdminLogs(beforeId) {
      const el = document.getElementById('s-admin-logs');
      if (!el) return;
      const append = beforeId != null;
      const qs = '?limit=100' + (beforeId != null ? '&before_id=' + beforeId : '');
      api('GET', '/admin/logs' + qs).then(data => {
        const logs = data.logs || [];
        if (!append && !logs.length) {
          el.innerHTML = '<div class="hint">No events recorded yet.</div>';
          return;
        }
        const rowHtml = logs.map(r => {
          const isFail = r.action === 'auth.login_failure';

          return '<li class="log-row' + (isFail ? ' log-fail' : '') + '">' +
            '<div class="log-head">' +
              '<span class="log-msg">' + parts.msg + '</span>' +
              '<span class="log-time" title="' + new Date(r.ts * 1000).toISOString() + '">' + timeAgo(r.ts) + '</span>' +
            '</div>' +
            (parts.detail ? '<div class="log-details">' + escapeHtml(parts.detail) + '</div>' : '') +
          '</li>';
        }).join('');
        if (append) {
          const list = el.querySelector('.log-list');
          if (list) list.insertAdjacentHTML('beforeend', rowHtml);

          el.innerHTML = '<ul class="log-list">' + rowHtml + '</ul>';

        if (oldBtn) oldBtn.remove();
        if (data.next_before_id) {
          const btn = document.createElement('button');
          btn.type = 'button';

    function handleAdminUserAction(btn) {
      const row = btn.closest('.user-row');
      const uid = row.dataset.uid;
      const uname = row.dataset.uname;
      const act = btn.dataset.act;
      const refresh = () => { renderAdminUsers(); renderAdminStats(); };
      const fail = err => alert('Failed: ' + err.message);
      if (act === 'unpublish') {
        openConfirmModal({
          title: 'Force unpublish ' + uname,
          body: uname + '\'s map will no longer be reachable at the public URL. They can republish if global publishing is on.',
          confirmLabel: 'Unpublish',
        }).then(ok => {
          if (!ok) return;
          btn.disabled = true;
          api('POST', '/admin/users/' + uid + '/unpublish').then(refresh).catch(fail);
        });
      } else if (act === 'revoke') {
        openConfirmModal({
          title: 'Revoke sessions for ' + uname,
          body: 'Signs ' + uname + ' out on every device they are currently signed in on.',
          confirmLabel: 'Revoke',
        }).then(ok => {
          if (!ok) return;
          btn.disabled = true;
          api('POST', '/admin/users/' + uid + '/revoke-sessions').then(refresh).catch(fail);
        });
      } else if (act === 'role') {
        const promote = btn.dataset.promote === '1';
        openConfirmModal({
          title: (promote ? 'Promote ' : 'Demote ') + uname,
          body: promote
            ? uname + ' will get full admin access, including this Admin tab and the ability to delete other users.'
            : uname + ' will lose admin access on their next request.',
          confirmLabel: promote ? 'Promote' : 'Demote',
        }).then(ok => {
          if (!ok) return;
          btn.disabled = true;
          api('POST', '/admin/users/' + uid + '/role', { is_admin: promote }).then(refresh).catch(fail);
        });
      } else if (act === 'delete') {
        openConfirmModal({
          title: 'Delete user ' + uname,
          body: 'Permanently removes ' + uname + ', all their sessions, and their data folder (places, trails, preferences). This cannot be undone.',
          confirmLabel: 'Delete user',
          danger: true,
        }).then(ok => {
          if (!ok) return;
          btn.disabled = true;
          api('DELETE', '/admin/users/' + uid).then(resp => {
            if (resp && resp.cleanup_warning) {
              alert('User deleted, but data folder cleanup incomplete: ' + resp.cleanup_warning);
            }
            refresh();
          }).catch(fail);
        });
      }
    }

    function openConfirmModal({ title, body, confirmLabel, danger }) {
      return new Promise(resolve => {
        let settled = false;
        let onEnter = null;
        const finish = ok => {
          if (settled) return;
          settled = true;
          if (onEnter) document.removeEventListener('keydown', onEnter, true);
          closeTopModal();
          resolve(ok);
        };
        const html =
          '<h2>' + escapeHtml(title) + '<button class="modal-close">&times;</button></h2>' +
          '<div class="modal-desc" style="font-size:0.85rem">' + escapeHtml(body) + '</div>' +
          '<div class="modal-actions">' +
            '<button type="button" data-role="cancel">Cancel</button>' +
            '<button type="button" class="' + (danger ? 'danger-btn' : 'primary') + '" data-role="ok">' + escapeHtml(confirmLabel || 'Confirm') + '</button>' +
          '</div>';
        openModal(html, backdrop => {
          const modal = backdrop.querySelector('.modal');
          if (modal) modal.style.maxWidth = '380px';
          backdrop.querySelector('[data-role="ok"]').addEventListener('click', () => finish(true));
          backdrop.querySelector('[data-role="cancel"]').addEventListener('click', () => finish(false));
          // Enter to confirm: only while this confirm is the topmost modal.
          onEnter = e => {
            if (e.key !== 'Enter') return;
            if (modalStack[modalStack.length - 1] && modalStack[modalStack.length - 1].backdrop !== backdrop) return;
            e.preventDefault();
            finish(true);
          };
          document.addEventListener('keydown', onEnter, true);
        }, () => finish(false));
      });
    }

    function refreshPlaces() {
      return fetchJson(dataUrl('places'), []).then(data => {
        state.places = Array.isArray(data) ? data : [];
        assignPlaceSlugs(state.places);
        const cc = assignCategoryColors(state.places);
        state.categoryColors = cc.dark;
        state.categoryColorsLight = cc.light;
      });

    function refreshRoutes() {
      return fetchJson(dataUrl('routes'), null).then(data => {
        if (!data || !Array.isArray(data.regions)) return;
        data.regions.sort((a, b) => a.name.localeCompare(b.name));
        for (const region of data.regions) region.routes.sort((a, b) => a.name.localeCompare(b.name));
        state.manifest = data;
        assignTrailSlugs(state.manifest);
      });
    }

    // ----- Modal infrastructure -----
    // Modals form a stack: each open call appends a new backdrop, each close
    // removes the topmost. This avoids the race that the innerHTML-replace
    // approach had (closeModal in-flight while openModal mounts the next one)
    // and lets confirm dialogs sit on top of an existing modal without
    // wiping its listeners.
    const MODAL_CLOSE_MS = 100;
    const modalStack = [];

    function openModal(html, onMount, onClose) {
      const root = document.getElementById('modal-root');
      const wrap = document.createElement('div');
      wrap.innerHTML = '<div class="modal-backdrop"><div class="modal">' + html + '</div></div>';
      const backdrop = wrap.firstElementChild;
      // Each modal lives a notch above the one below it so stacking is
      // explicit (the .modal-backdrop CSS rule has z-index: 2000).
      backdrop.style.zIndex = 2000 + modalStack.length * 10;
      root.appendChild(backdrop);
      const entry = { backdrop, onClose: null };
      // Default close behavior: tear down this backdrop. onClose overrides
      // run instead and may call closeModal()/closeTopModal() themselves.
      entry.onClose = onClose
        ? () => onClose()
        : () => closeTopModal();
      modalStack.push(entry);
      backdrop.addEventListener('click', e => { if (e.target === backdrop) entry.onClose(); });
      backdrop.querySelectorAll('.modal-close').forEach(el => el.addEventListener('click', () => entry.onClose()));
      if (modalStack.length === 1) document.addEventListener('keydown', escClose);
      if (onMount) onMount(backdrop);
      return backdrop;
    }

    function closeTopModal() {
      const entry = modalStack.pop();
      if (!entry) return;
      entry.backdrop.classList.add('closing');
      setTimeout(() => {
        if (entry.backdrop.parentElement) entry.backdrop.parentElement.removeChild(entry.backdrop);
      }, MODAL_CLOSE_MS);
      if (modalStack.length === 0) document.removeEventListener('keydown', escClose);
    }

    // Public alias preserved for the many callers in this file.
    function closeModal() { closeTopModal(); }

    function escClose(e) {
      if (e.key !== 'Escape') return;
      const top = modalStack[modalStack.length - 1];
      if (top) top.onClose();
    }
    function showModalError(msg) {
      const el = document.querySelector('.modal-error');
      if (el) { el.textContent = msg; el.classList.add('visible'); }
    }

    // ----- Sign-in / register modal -----
    function openSignInModal() {
      const canRegister = state.auth.registration_open;
      let mode = state.auth.has_users ? 'login' : 'register';
      openModal(
        '<h2><span id="modal-title">Sign in</span><button class="modal-close">&times;</button></h2>' +
        '<div class="modal-tabs" id="auth-tabs">' +
          '<button data-mode="login" class="active">Sign in</button>' +
          (canRegister ? '<button data-mode="register">Register</button>' : '') +
        '</div>' +
        '<form id="auth-form">' +
          '<label for="auth-username">Username</label>' +
          '<input type="text" id="auth-username" autocomplete="username" required>' +
          '<label for="auth-password">Password</label>' +
          '<input type="password" id="auth-password" autocomplete="current-password" required>' +
          '<div id="setup-token-row" hidden>' +
            '<label for="auth-setup-token">Setup token</label>' +
            '<input type="text" id="auth-setup-token" autocomplete="off">' +
            '<div class="hint">Required for first registration. Check the API server logs.</div>' +
          '</div>' +
          '<div class="hint" id="auth-hint"></div>' +
          '<div class="modal-error" id="auth-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="submit" class="primary" id="auth-submit">Sign in</button>' +
          '</div>' +
        '</form>',
        function() {
          setMode(mode);
          document.querySelectorAll('#auth-tabs button[data-mode]').forEach(b => {
            b.addEventListener('click', function() { setMode(this.dataset.mode); });
          });
          document.getElementById('auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            submit();
          });
          document.getElementById('auth-username').focus();
        }
      );

      function setMode(m) {
        mode = m;
        document.querySelectorAll('#auth-tabs button[data-mode]').forEach(b => {
          b.classList.toggle('active', b.dataset.mode === m);
        });
        document.getElementById('modal-title').textContent = m === 'register' ? 'Register' : 'Sign in';
        document.getElementById('auth-submit').textContent = m === 'register' ? 'Register' : 'Sign in';
        document.getElementById('auth-password').setAttribute('autocomplete', m === 'register' ? 'new-password' : 'current-password');
        document.getElementById('auth-hint').textContent = m === 'register' ? 'Password must be at least 12 characters.' : '';
        const tokenRow = document.getElementById('setup-token-row');
        const tokenInput = document.getElementById('auth-setup-token');
        const needsToken = m === 'register' && state.auth.requires_setup_token;
        tokenRow.hidden = !needsToken;
        if (tokenInput) tokenInput.required = needsToken;
      }
      function submit() {
        const u = document.getElementById('auth-username').value.trim();
        const p = document.getElementById('auth-password').value;
        const payload = { username: u, password: p };
        if (mode === 'register' && state.auth.requires_setup_token) {
          payload.setup_token = document.getElementById('auth-setup-token').value.trim();
        }
        const submitBtn = document.getElementById('auth-submit');
        submitBtn.disabled = true;
        api('POST', '/' + mode, payload)
          .then(() => refreshAuthState())
          .then(() => loadSyncedPrefs())
          .then(() => { closeModal(); return loadDataAndRender(); })
          .catch(err => { submitBtn.disabled = false; showModalError(err.message); });
      }
    }

    // ----- Add place / GPX modal -----
    function openAddModal(prefillCoords, initialTab) {
      const showPlaces = placesEnabled();
      const showTrails = trailsEnabled();
      if (!showPlaces && !showTrails) return;
      let tab = initialTab || (showPlaces ? 'place' : 'trail');
      if (tab === 'place' && !showPlaces) tab = 'trail';
      if (tab === 'trail' && !showTrails) tab = 'place';
      openModal(
        '<button class="modal-close modal-close-floating" aria-label="Close">&times;</button>' +
        (showPlaces && showTrails ?
          '<div class="modal-tabs" id="add-tabs">' +
            '<button data-tab="place"' + (tab === 'place' ? ' class="active"' : '') + '>Place</button>' +
            '<button data-tab="trail"' + (tab === 'trail' ? ' class="active"' : '') + '>Trail</button>' +
          '</div>'
          : '') +
        '<div id="add-body"></div>',
        function() {
          document.querySelectorAll('#add-tabs button[data-tab]').forEach(b => {
            b.addEventListener('click', function() {
              tab = this.dataset.tab;
              document.querySelectorAll('#add-tabs button[data-tab]').forEach(x => x.classList.toggle('active', x.dataset.tab === tab));
              renderTab();
            });
          });
          renderTab();
        }
      );

      function renderTab() {
        const body = document.getElementById('add-body');
        const firstRender = body.dataset.rendered !== '1';
        const oldH = firstRender ? 0 : body.offsetHeight;
        body.innerHTML = tab === 'place' ? placeFormHtml() : gpxFormHtml();
        if (tab === 'place') wirePlaceForm();
        else wireGpxForm();
        body.dataset.rendered = '1';
        if (firstRender) return;
        // Measure the new content size, then animate from old to new height.
        // After the transition completes, release back to auto so the form can
        // grow naturally (e.g. when the Completed extras expand).
        body.style.height = 'auto';
        const newH = body.offsetHeight;
        body.style.height = oldH + 'px';
        body.offsetHeight;  // force reflow so the transition catches the change
        body.style.height = newH + 'px';
        const onEnd = function(e) {
          if (e.target !== body || e.propertyName !== 'height') return;
          body.style.height = 'auto';
          body.removeEventListener('transitionend', onEnd);
        };
        body.addEventListener('transitionend', onEnd);
      }

      function placeFormHtml() {
        // Exclude the uncategorized bucket ('') — "no category" is already the
        // default state of the empty placeholder option.
        const cats = sortedCategorySlugs(Object.keys(state.categoryColors).filter(c => c !== ''));

          : '') +
          '<label>Coordinates</label>' +
          '<div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.5rem">' +
            '<button type="button" class="primary" id="pick-on-map" style="flex:0 0 auto">' + (c ? 'Re-pick on map' : 'Pick on map') + '</button>' +
            (c
              ? '<span id="p-coords-display" style="font-size:0.78rem;color:var(--text)">' + c.lat.toFixed(6) + ', ' + c.lng.toFixed(6) + '</span>'
              : '<a href="#" id="p-coords-manual" style="font-size:0.7rem;color:var(--muted);text-decoration:underline">or enter manually</a>') +
          '</div>' +
          '<div class="collapsible" id="p-coords-fields">' +
            '<div class="collapsible-inner">' +
              '<div class="row" style="margin-top:0.4rem">' +
                '<div><label for="p-lat">Latitude</label><input type="number" id="p-lat" step="any" value="' + (c ? c.lat.toFixed(6) : '') + '"></div>' +
                '<div><label for="p-lon">Longitude</label><input type="number" id="p-lon" step="any" value="' + (c ? c.lng.toFixed(6) : '') + '"></div>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<label for="p-category">Category</label>' +
          selectOrNewHtml('p-category', cats, null, displayCategory, '', 'New category name') +
          '<label for="p-country">Country (optional)</label>' +
          '<input type="text" id="p-country">' +
          (getShowField('note') ?
            '<label for="p-note">Note (optional)</label>' +
            '<textarea id="p-note" style="min-height:40px"></textarea>'
          : '') +
          '<label for="p-sources">Sources (optional, one URL per line)</label>' +
          '<textarea id="p-sources" style="min-height:40px" placeholder="https://example.com/source"></textarea>' +
          '<div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem">' +
            '<input type="checkbox" class="settings-toggle" id="p-visited">' +
            '<label for="p-visited" style="margin:0">I&rsquo;ve visited this place</label>' +
          '</div>' +
          ((getShowField('date') || getShowField('rating')) ?
            '<div class="collapsible" id="p-visited-extras">' +
              '<div class="collapsible-inner">' +
                (getShowField('date') ?
                  '<label for="p-date-visited">Date visited</label>' +
                  '<input type="date" id="p-date-visited">'
                : '') +
                (getShowField('rating') ?
                  '<label for="p-rating">Rating</label>' +
                  starRatingHtml('p-rating', '')
                : '') +
              '</div>' +
            '</div>'
          : '') +
          '<div class="modal-error" id="add-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="submit" class="primary" id="place-submit">Add place</button>' +
          '</div>' +
        '</form>';
      }

      function gpxFormHtml() {
        // Skip the synthetic no-region group ("") when listing existing regions.
        const regions = state.manifest ? state.manifest.regions.map(r => r.name).filter(Boolean).sort() : [];
        return '<form id="gpx-form">' +
          '<label for="g-name">Name</label>' +
          '<input type="text" id="g-name" required placeholder="e.g. Summit Loop">' +
          (getShowField('native-name') ?
            '<label for="g-local-name">Native name (optional)</label>' +
            '<input type="text" id="g-local-name" placeholder="e.g. 金閣寺路">'
          : '') +
          '<label>GPX file</label>' +
          '<div class="file-picker">' +
            '<input type="file" id="g-file" accept=".gpx,application/gpx+xml,text/xml" class="file-input-hidden" required>' +
            '<button type="button" class="primary" id="g-file-pick">Choose file</button>' +
            '<span class="file-name" id="g-file-name">No file selected</span>' +
          '</div>' +
          '<label for="g-region">Region</label>' +
          selectOrNewHtml('g-region', regions, null, null, '', 'New region name') +
          '<label for="g-difficulty">Difficulty</label>' +
          radioPillsHtml('g-difficulty', [['', 'None'], ['easy', 'Easy'], ['moderate', 'Moderate'], ['hard', 'Hard'], ['expert', 'Expert']], '') +
          '<label for="g-tags">Tags (comma-separated, lowercase)</label>' +
          '<input type="text" id="g-tags" placeholder="summit, panorama, via-ferrata">' +
          (getShowField('note') ?
            '<label for="g-notes">Notes (optional)</label>' +
            '<textarea id="g-notes" style="min-height:40px" maxlength="2000"></textarea>'
          : '') +
          '<label for="g-source">Source URL (optional)</label>' +
          '<input type="url" id="g-source" placeholder="https://example.com/trail">' +
          '<div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem">' +
            '<input type="checkbox" class="settings-toggle" id="g-strip-pii">' +
            '<label for="g-strip-pii" title="Removes timestamps, author, and creator from the GPX file" style="margin:0">Strip personal data from GPX</label>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem">' +
            '<input type="checkbox" class="settings-toggle" id="g-completed">' +
            '<label for="g-completed" style="margin:0">I&rsquo;ve completed this trail</label>' +
          '</div>' +
          ((getShowField('date') || getShowField('rating')) ?
            '<div class="collapsible" id="g-completed-extras">' +
              '<div class="collapsible-inner">' +
                (getShowField('date') ?
                  '<label for="g-date">Date hiked</label>' +
                  '<input type="date" id="g-date">'
                : '') +
                (getShowField('rating') ?
                  '<label for="g-rating">Rating</label>' +
                  starRatingHtml('g-rating', '')
                : '') +
              '</div>' +
            '</div>'
          : '') +
          '<div class="modal-error" id="add-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="submit" class="primary" id="gpx-submit">Upload trail</button>' +
          '</div>' +
        '</form>';
      }

      function wirePlaceForm() {
        wireSelectOrNew('p-category');
        wireStarRating('p-rating');
        const visitedCb = document.getElementById('p-visited');
        const visitedExtras = document.getElementById('p-visited-extras');
        if (visitedCb && visitedExtras) {
          visitedCb.addEventListener('change', function() {
            visitedExtras.classList.toggle('expanded', this.checked);
          });
        }
        document.getElementById('pick-on-map').addEventListener('click', function() {
          closeModal();
          enterPickCoordsMode();
        });
        // "or enter manually" reveals the lat/lon inputs with the same
        // collapsible animation used elsewhere.
        const manualLink = document.getElementById('p-coords-manual');
        const coordsBox = document.getElementById('p-coords-fields');
        // If coords were prefilled (user came from a map pick), keep the
        // inputs available immediately so the user can fine-tune.
        if (prefillCoords) coordsBox.classList.add('expanded');
        if (manualLink && coordsBox) {
          manualLink.addEventListener('click', function(e) {
            e.preventDefault();
            coordsBox.classList.add('expanded');
            this.style.display = 'none';
          });
          if (coordsBox.classList.contains('expanded')) manualLink.style.display = 'none';
        }
        document.getElementById('place-form').addEventListener('submit', function(e) {
          e.preventDefault();
          const r = readPlaceFormFields('p');
          if (r.error) { showModalError(r.error); return; }
          const submitBtn = document.getElementById('place-submit');
          submitBtn.disabled = true;
          const prevColors = Object.assign({}, state.categoryColors);
          api('POST', '/places', r.payload)
            .then(() => refreshPlaces())
            .then(() => { closeModal(); syncPlacesOnMap(prevColors); })
            .catch(err => { submitBtn.disabled = false; showModalError(err.message); });
        });
      }

      function wireGpxForm() {
        wireSelectOrNew('g-region');
        wireStarRating('g-rating');
        const fileInput = document.getElementById('g-file');
        const filePick = document.getElementById('g-file-pick');
        const fileName = document.getElementById('g-file-name');
        if (filePick) filePick.addEventListener('click', function() { fileInput.click(); });
        if (fileInput) fileInput.addEventListener('change', function() {
          const f = this.files && this.files[0];
          if (f) {
            fileName.textContent = f.name;
            fileName.classList.add('has-file');
          } else {
            fileName.textContent = 'No file selected';
            fileName.classList.remove('has-file');
          }
        });
        const completedCb = document.getElementById('g-completed');
        const completedExtras = document.getElementById('g-completed-extras');
        if (completedCb && completedExtras) {
          completedCb.addEventListener('change', function() {
            completedExtras.classList.toggle('expanded', this.checked);
          });
        }
        document.getElementById('gpx-form').addEventListener('submit', function(e) {
          e.preventDefault();
          const file = document.getElementById('g-file').files[0];
          const region = readSelectOrNew('g-region');
          const name = document.getElementById('g-name').value.trim();
          if (!file) { showModalError('Pick a GPX file first.'); return; }
          const stripPii = document.getElementById('g-strip-pii').checked;
          const completed = document.getElementById('g-completed').checked;
          // Default is "planned": file lands as <name>.planned.gpx, rendered as a
          // dashed overlay. Toggling "completed" saves the walked variant.
          const storedName = completed ? name : (name + '.planned');

          // Optional metadata. date_hiked + rating only apply to completed trails.
          // Each field may be hidden by user preference; guard with optional chaining.
          const get = id => { const el = document.getElementById(id); return el ? el.value : ''; };
          const source = get('g-source').trim();
          const notes = get('g-notes');
          const localName = get('g-local-name').trim();
          const difficulty = (document.querySelector('input[name="g-difficulty"]:checked') || {}).value || '';
          const tags = get('g-tags').split(',').map(t => t.trim()).filter(Boolean);
          const metadata = {};
          if (source) metadata.source = source;
          if (notes.trim()) metadata.notes = notes;
          if (localName) metadata.local_name = localName;
          if (difficulty) metadata.difficulty = difficulty;
          if (tags.length) metadata.tags = tags;
          if (completed) {
            const dateVal = get('g-date').trim();
            const ratingRaw = readStarRating('g-rating');
            if (dateVal) metadata.date_hiked = dateVal;
            if (ratingRaw) metadata.rating = parseInt(ratingRaw, 10);
          }
          const metaKey = region ? region + '/' + name : name;

          const submitBtn = document.getElementById('gpx-submit');
          submitBtn.disabled = true;
          let qs = (region ? '?region=' + encodeURIComponent(region) + '&' : '?') + 'name=' + encodeURIComponent(storedName);
          if (stripPii) qs += '&strip_pii=true';
          fetch(apiUrl('/gpx') + qs, {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/gpx+xml' },
            body: file,
          }).then(async r => {
            const data = await r.json().catch(() => null);
            if (!r.ok) throw new Error((data && data.error) || 'HTTP ' + r.status);
            return data;
          })
          .then(() => {
            if (Object.keys(metadata).length === 0) return null;
            return api('PUT', '/metadata', { key: metaKey, metadata: metadata });
          })
          .then(() => refreshRoutes())
          .then(() => { closeModal(); router(); })
          .catch(err => { submitBtn.disabled = false; showModalError(err.message); });
        });
      }
    }

    // ----- Pick coordinates on the map -----
    function enterPickCoordsMode() {
      // Make sure we're on the unified map. If not, navigate there first.
      const base = (location.hash || '#/').split('?')[0];
      if (base !== '#/' && base !== '#/map' && base !== '#') {
        location.hash = '#/';
        setTimeout(enterPickCoordsMode, 250);
        return;
      }
      const banner = document.createElement('div');
      banner.className = 'pick-coords-banner';
      banner.textContent = 'Click on the map to set coordinates (or click here to cancel)';
      banner.addEventListener('click', cleanup);
      document.body.appendChild(banner);
      const map = state.currentMap;
      if (!map) { cleanup(); return; }
      function onClick(e) {
        cleanup();
        openAddModal(e.latlng);
      }
      function cleanup() {
        map.off('click', onClick);
        if (banner.parentNode) banner.parentNode.removeChild(banner);
        if (map.getContainer()) map.getContainer().style.cursor = '';
      }
      map.getContainer().style.cursor = 'crosshair';
      map.once('click', onClick);
    }

    // Floating "+" button on the unified map view, when authed.
    function maybeMountFab() {
      const app = document.getElementById('app');
      const existing = app.querySelector('.fab-add:not(.fab-leave)');
      const base = (location.hash || '#/').split('?')[0];
      const shouldShow = state.auth.authenticated
        && !isReadOnly()
        && getShowMapAddButton()
        && (base === '#/' || base === '#' || base === '#/map')
        && (placesEnabled() || trailsEnabled());
      const fabTitle = placesEnabled() && trailsEnabled()
        ? 'Add place or trail'
        : (placesEnabled() ? 'Add place' : 'Add trail');
      if (shouldShow && existing) {
        existing.title = fabTitle;
        return;
      }
      if (!shouldShow && existing) {
        playLeave(existing, 'fab-leave', () => existing.remove());
        return;
      }
      if (!shouldShow) return;
      const fab = document.createElement('button');
      fab.className = 'fab-add';
      fab.title = fabTitle;
      fab.setAttribute('aria-label', fabTitle);
      fab.addEventListener('click', function() { openAddModal(null); });
      app.appendChild(fab);
      playEnter(fab, 'fab-enter');
    }

    // Hook into router so the FAB re-mounts on each view change.
    const _origRouter = typeof router !== 'undefined' ? router : null;
    function wrappedRouter() {
      if (_origRouter) _origRouter(); else router();
      maybeMountFab();
    }
    window.removeEventListener('hashchange', router);
    window.addEventListener('hashchange', wrappedRouter);

    // Spacebar: toggle map chrome (FAB, filter panel, leaflet controls).
    document.addEventListener('keydown', function(e) {
      if (e.key !== ' ' && e.code !== 'Space') return;
      if (!state.currentMap) return;
      if (document.getElementById('modal-root').children.length) return;
      const t = e.target;
      const tag = t && t.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || (t && t.isContentEditable)) return;
      e.preventDefault();
      document.body.classList.toggle('map-chrome-hidden');
    });

    // Long-press on the map (touch only): same toggle as spacebar.
    let lastPointerType = 'mouse';
    document.addEventListener('pointerdown', function(e) { lastPointerType = e.pointerType; }, true);
    document.addEventListener('contextmenu', function(e) {
      if (lastPointerType !== 'touch' && lastPointerType !== 'pen') return;
      if (!state.currentMap) return;
      if (document.getElementById('modal-root').children.length) return;
      const t = e.target;
      if (!t.closest('.leaflet-container')) return;
      if (t.closest('.leaflet-marker-icon, .leaflet-control, .leaflet-popup, .map-panel')) return;
      e.preventDefault();
      document.body.classList.toggle('map-chrome-hidden');
      if (navigator.vibrate) navigator.vibrate(15);
    });

    // ----- Init -----
    function applyConfig(cfg) {
      state.config = Object.assign({}, DEFAULT_CONFIG, cfg || {});
      state.config.features = Object.assign({}, DEFAULT_CONFIG.features, (cfg && cfg.features) || {});
      document.title = state.config.brand || 'Ferd';
      const brandEl = document.getElementById('nav-brand-text');
      if (brandEl) brandEl.textContent = state.config.brand || 'Ferd';
      refreshTabVisibility();
    }

    function loadDataAndRender() {
      const v = state.viewer;
      const placesP = placesAvailable()
        ? fetchJson(dataUrl('places'), null).catch(() => null)
        : Promise.resolve(null);
      const routesP = trailsAvailable()
        ? fetchJson(dataUrl('routes'), null).catch(() => null)
        : Promise.resolve(null);
      const labelsP = placesAvailable()
        ? fetchJson(categoryLabelsUrl(), null).catch(() => null)
        : Promise.resolve(null);
      return Promise.all([placesP, routesP, labelsP]).then(function([places, routes, labels]) {
        if (labels && labels.category_labels) {
          state.config.category_labels = labels.category_labels;
        }
        if (Array.isArray(places)) {
          // Normalize: missing/empty category is the "uncategorized" bucket
          // (key ''), so the rest of the UI can treat p.category as a plain
          // string without sprinkling null checks everywhere.
          for (const p of places) { if (p.category == null) p.category = ''; }
          state.places = places;
          assignPlaceSlugs(state.places);
          const cc = assignCategoryColors(places);
          state.categoryColors = cc.dark;
          state.categoryColorsLight = cc.light;
        }
        if (routes && Array.isArray(routes.regions)) {
          routes.regions.sort((a, b) => a.name.localeCompare(b.name));
          for (const region of routes.regions) region.routes.sort((a, b) => a.name.localeCompare(b.name));
          state.manifest = routes;
          assignTrailSlugs(state.manifest);
        }
        if ((placesAvailable() && !state.places) && (trailsAvailable() && !state.manifest)) {
          if (v.mode === 'public') {
            document.getElementById('app').innerHTML = '<div class="loading">Map not found, or owner has not published it.</div>';
            return;
          }
          document.getElementById('app').innerHTML = '<div class="loading">Failed to load data</div>';
          return;
        }
        wrappedRouter();
      });
    }

    fetchJson(DATA_FILES.siteConfig, null)
      .then(function(cfg) {
        applyConfig(cfg);
        return fetch(apiUrl('/state'), { credentials: 'same-origin' })
          .then(r => r.ok ? r.json() : null).catch(() => null);
      })
      .then(function(authState) {
        if (authState) state.auth = authState;
        renderAuthWidget();
        const v = state.viewer;
        if (v.mode === 'owner' && !state.auth.authenticated) {
          document.getElementById('app').innerHTML =
            '<div class="loading">Sign in to view your map.</div>';
          openSignInModal();
          return;
        }
        return loadSyncedPrefs().then(() => loadDataAndRender());
      });

    // PWA: offline indicator + service worker registration + update toast.
    (function() {
      const offlineBanner = document.getElementById('pwa-offline-banner');
      const updateBanner = document.getElementById('pwa-update-banner');
      const updateBtn = document.getElementById('pwa-update-btn');

      function syncOnline() {
        offlineBanner.classList.toggle('visible', !navigator.onLine);
      }
      window.addEventListener('online', syncOnline);
      window.addEventListener('offline', syncOnline);
      syncOnline();

      if (!('serviceWorker' in navigator)) return;

      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });

      function promptUpdate(worker) {
        updateBanner.classList.add('visible');
        updateBtn.onclick = () => worker.postMessage({ type: 'SKIP_WAITING' });
      }

      navigator.serviceWorker.register('/sw.js').then((reg) => {
        if (reg.waiting) promptUpdate(reg.waiting);
        reg.addEventListener('updatefound', () => {
          const worker = reg.installing;
          if (!worker) return;
          worker.addEventListener('statechange', () => {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              promptUpdate(worker);
            }
          });
        });
      }).catch(() => { /* registration failed; app still works online */ });
    })();
  </script>
