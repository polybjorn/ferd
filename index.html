        '</div>';
      }
      if (route.tags && route.tags.length) {
        html += '<div class="popup-tags">' + route.tags.map(t => '#' + escapeHtml(t)).join(' ') + '</div>';
      }
      if (route.notes && getShowField('note')) html += '<div class="popup-note">' + escapeHtml(route.notes) + '</div>';
      html += '<div class="popup-meta">' +
        '<span style="color:' + color + '">' + (route.completed ? 'Completed' : 'Planned') + '</span>' +
        '<span>' + escapeHtml(displayRegion(regionName)) + '</span>' +
        '</div>';
      return html;
    }

    function deleteTrail(route, regionName) {
      if (!confirm('Delete route "' + route.name + '" (' + displayRegion(regionName) + ')? This removes the GPX file.')) return Promise.resolve(false);
      return api('DELETE', '/gpx', { region: regionName, name: route.name })
        .then(() => refreshRoutes())
        .then(() => true)
        .catch(err => { alert('Failed: ' + err.message); return false; });
    }

    function findRouteByKey(key) {
      if (!state.manifest) return null;
      for (const region of state.manifest.regions) {
        for (const route of region.routes) {
          if (route.key === key) return { route, region };
        }
      }
      return null;
    }

    function openEditTrailMetadataModal(route, regionName) {
      const key = routeMetadataKey(route, regionName);
      const currentRegion = regionName || '';
      const allRegions = ((state.manifest && state.manifest.regions) || [])
        .map(r => r.name).filter(Boolean).sort((a, b) => a.localeCompare(b));
      const regionOptions = [
        '<option value=""' + (currentRegion === '' ? ' selected' : '') + '>(No region)</option>',
        ...allRegions.map(r =>
          '<option value="' + escapeHtml(r) + '"' + (r === currentRegion ? ' selected' : '') + '>' + escapeHtml(r) + '</option>'
        ),
        '<option value="__new__">(Add new region&hellip;)</option>',
      ].join('');
      openModal(
        '<h2>Edit route<button class="modal-close">&times;</button></h2>' +
        '<form id="route-meta-form">' +
          '<label for="tm-name">Name</label>' +
          '<input type="text" id="tm-name" required maxlength="64" value="' + escapeHtml(route.name) + '">' +
          (getShowField('local-name') ?
            '<label for="tm-local-name">Local name (optional)</label>' +
            '<input type="text" id="tm-local-name" placeholder="e.g. 金閣寺路" value="' + escapeHtml(route.local_name || '') + '">'
          : '') +
          '<label for="tm-region">Region</label>' +
          '<select id="tm-region">' + regionOptions + '</select>' +
          '<input type="text" id="tm-region-new" placeholder="New region name" maxlength="64" hidden>' +
          '<label for="tm-difficulty">Difficulty</label>' +
          radioPillsHtml('tm-difficulty', [['', 'None'], ['easy', 'Easy'], ['moderate', 'Moderate'], ['hard', 'Hard'], ['expert', 'Expert']], route.difficulty || '') +
          '<label for="tm-tags">Tags (comma-separated, lowercase)</label>' +
          '<input type="text" id="tm-tags" value="' + escapeHtml((route.tags || []).join(', ')) + '" placeholder="summit, panorama, via-ferrata">' +
          (getShowField('note') ?
            '<label for="tm-notes">Notes</label>' +
            '<textarea id="tm-notes" maxlength="2000">' + escapeHtml(route.notes || '') + '</textarea>'
          : '') +
          '<label for="tm-source">Source URL (optional)</label>' +
          '<input type="url" id="tm-source" value="' + escapeHtml(route.source || '') + '" placeholder="https://example.com/route">' +
          '<div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem">' +
            '<input type="checkbox" class="settings-toggle" id="tm-completed"' + (route.completed ? ' checked' : '') + '>' +
            '<label for="tm-completed" style="margin:0">I&rsquo;ve completed this route</label>' +
          '</div>' +
          ((getShowField('date') || getShowField('rating')) ?
            '<div class="collapsible' + (route.completed ? ' expanded' : '') + '" id="tm-completed-extras">' +
              '<div class="collapsible-inner">' +
                (getShowField('date') ?
                  '<label for="tm-date">Date completed</label>' +
                  '<input type="date" id="tm-date" value="' + escapeHtml(route.date_completed || '') + '">'
                : '') +
                (getShowField('rating') ?
                  '<label for="tm-rating">Rating</label>' +
                  starRatingHtml('tm-rating', route.rating || '')
                : '') +
              '</div>' +
            '</div>'
          : '') +
          '<div class="modal-error" id="tm-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="button" class="session-revoke" id="tm-delete">Delete</button>' +
            '<span style="flex:1"></span>' +
            '<button type="submit" class="primary" id="tm-submit">Save</button>' +
          '</div>' +
        '</form>',
        function() {
          wireStarRating('tm-rating');
          const regionSel = document.getElementById('tm-region');
          const regionNewInput = document.getElementById('tm-region-new');
          regionSel.addEventListener('change', function() {
            const adding = this.value === '__new__';
            regionNewInput.hidden = !adding;
            if (adding) regionNewInput.focus();
          });
          const tmCompletedCb = document.getElementById('tm-completed');
          const tmCompletedExtras = document.getElementById('tm-completed-extras');
          if (tmCompletedCb && tmCompletedExtras) {
            tmCompletedCb.addEventListener('change', function() {
              tmCompletedExtras.classList.toggle('expanded', this.checked);
            });
          }
          document.getElementById('tm-delete').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            deleteTrail(route, regionName).then(function(deleted) {
              if (deleted) { closeModal(); wrappedRouter(); }
              else { btn.disabled = false; }
            });
          });
          document.getElementById('route-meta-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const get = id => { const el = document.getElementById(id); return el ? el.value : ''; };
            const dateVal = get('tm-date').trim();
            const ratingRaw = readStarRating('tm-rating');
            const difficulty = (document.querySelector('input[name="tm-difficulty"]:checked') || {}).value || '';
            const tagsRaw = get('tm-tags');
            const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
            const source = get('tm-source').trim();
            const notes = get('tm-notes');
            const localName = get('tm-local-name').trim();
            const metadata = {};
            if (dateVal) metadata.date_completed = dateVal;
            if (ratingRaw) metadata.rating = parseInt(ratingRaw, 10);
            if (difficulty) metadata.difficulty = difficulty;
            if (tags.length) metadata.tags = tags;
            if (source) metadata.source = source;
            if (notes.trim()) metadata.notes = notes;
            if (localName) metadata.local_name = localName;
            const newName = get('tm-name').trim();
            if (!newName) {
              showModalError('Name is required');
              return;
            }
            const targetRegion = regionSel.value === '__new__'
              ? regionNewInput.value.trim()
              : regionSel.value;
            if (regionSel.value === '__new__' && !targetRegion) {
              showModalError('Enter a new region name');
              return;
            }
            const needsMove = targetRegion !== currentRegion || newName !== route.name;
            const newCompleted = tmCompletedCb ? tmCompletedCb.checked : !!route.completed;
            const needsCompletedFlip = newCompleted !== !!route.completed;
            const submit = document.getElementById('tm-submit');
            submit.disabled = true;
            let chain = Promise.resolve(key);
            if (needsCompletedFlip) {
              chain = chain.then(k => api('POST', '/gpx/set-completed', { key: k, completed: newCompleted }).then(() => k));
            }
            if (needsMove) {
              chain = chain.then(k => api('POST', '/gpx/move', { key: k, new_region: targetRegion, new_name: newName }).then(r => r.new_key));
            }
            chain
              .then(finalKey => api('PUT', '/metadata', { key: finalKey, metadata: metadata }))
              .then(() => refreshRoutes())
              .then(() => { closeModal(); wrappedRouter(); })
              .catch(err => { submit.disabled = false; showModalError(err.message); });
          });
        }
      );
    }

    function addStartEndMarkers(map, startLatLng, endLatLng) {
      const startIcon = L.divIcon({ className: 'marker-start', html: '<svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="6" fill="#00e05a" stroke="#fff" stroke-width="2"/></svg>', iconSize: [16, 16], iconAnchor: [8, 8] });
      const endIcon = L.divIcon({ className: 'marker-end', html: '<svg viewBox="0 0 32 32" width="32" height="32"><rect x="4" y="2" width="2" height="28" rx="1" fill="#fff" stroke="#2d333b" stroke-width="0.5"/><path d="M6 3h12c1 0 1.5.5 1 1.5L17 8l2 3.5c.5 1 0 1.5-1 1.5H6V3z" fill="#fff" stroke="#2d333b" stroke-width="0.5"/><rect x="7" y="4" width="4.5" height="4" fill="#2d333b"/><rect x="11.5" y="4" width="4.5" height="4" fill="#fff"/><rect x="7" y="8" width="4.5" height="4" fill="#fff"/><rect x="11.5" y="8" width="4.5" height="4" fill="#2d333b"/></svg>', iconSize: [32, 32], iconAnchor: [5, 30] });
      L.marker(startLatLng, { icon: startIcon }).bindPopup('Start').addTo(map);
      L.marker(endLatLng, { icon: endIcon }).bindPopup('End').addTo(map);
    }

    // ----- Unified map -----
    function renderUnifiedMap(focus) {
      setActiveTab('map');
      setCrumb('', false);
      const prevView = state.currentMap
        ? { center: state.currentMap.getCenter(), zoom: state.currentMap.getZoom() }
        : null;
      // If any filter is active, ignore the persisted "remember last view" so
      // the initial fit zooms to the filtered subset instead of restoring an
      // unrelated location.
      const anyFilterActive = (state.hiddenRegions && state.hiddenRegions.size > 0)
        || (state.hiddenCategories && state.hiddenCategories.size > 0)
        || !state.showVisited || !state.showWant
        || !state.showCompleted || !state.showPlanned;
      const storedView = (!prevView && getRememberView() && !anyFilterActive) ? loadStoredView() : null;
      cleanupMap();

      const app = document.getElementById('app');
      app.innerHTML = '<div id="map"></div>';

      const dv = prevView || storedView || ((!placesEnabled() && routesEnabled())
        ? (state.config.default_view_routes || DEFAULT_CONFIG.default_view_routes)
        : (state.config.default_view || DEFAULT_CONFIG.default_view));
      const map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
        maxBounds: [[-90, -200], [90, 200]],
        maxBoundsViscosity: 1.0,
        markerZoomAnimation: false,
        // Continuous wheel/trackpad zoom (vendor/leaflet-smoothwheelzoom).
        // Disable Leaflet's stepped scrollWheelZoom in favor of the
        // smooth handler, which animates zoom level continuously via rAF.
        scrollWheelZoom: false,
        smoothWheelZoom: true,
        smoothSensitivity: 1.5,
        renderer: L.svg()
      }).setView(dv.center, dv.zoom);
      L.control.attribution({ prefix: false }).addTo(map);
      state.currentMap = map;
      // Counter-scale route stroke widths during zoom. 'zoom' covers
      // mobile pinch (fires per frame); zoomanim kicks off a brief rAF
      // loop to cover the desktop 250ms CSS animation where 'zoom'
      // doesn't fire until the end.
      // 'move' fires after all 'zoom' listeners on each _move() call, so
      // by the time we run, the SVG renderer has already applied its new
      // CSS scale transform - we read the freshest value to counter-scale
      // against. Also covers pan-only frames.
      map.on('move', adjustTrailStrokes);
      map.on('zoomend moveend', adjustTrailStrokes);
      map.on('zoomanim', function() {
        const start = performance.now();
        const tick = () => {
          if (!state.currentMap) return;
          adjustTrailStrokes();
          if (performance.now() - start < 270) {
            requestAnimationFrame(tick);
          }
        };
        requestAnimationFrame(tick);
      });
      addTileLayersToMap(map);

      if (getRememberView()) {
        map.on('moveend zoomend', function() {
          const c = map.getCenter();
          saveStoredView({ center: [c.lat, c.lng], zoom: map.getZoom() });
        });
      }

      // Places
      const clusterGroup = createPlaceLayerGroup();

      const placeRecords = [];
      const placeBounds = L.latLngBounds();
      let focusPlace = null;

      // Build the record list regardless of the Visible-features toggle so
      // that the toggle can flip layer visibility without a map rebuild.
      // The canvas layer is only added to the map by applyMapFilters when
      // placesEnabled() is true.
      if (state.places) {
        for (const p of state.places) {
          placeRecords.push(p);
          if (placesEnabled()) {
            const filteredOut = state.hiddenCategories.has(p.category)
              || (p.visited && !state.showVisited)
              || (!p.visited && !state.showWant);
            if (!filteredOut) placeBounds.extend([p.lat, p.lon]);
          }
          if (focus && focus.type === 'place' && (focus.slug ? focus.slug === p._slug : focus.name === p.name)) focusPlace = p;
        }
      }

      state._placeRecords = placeRecords;
      state._placeClusterGroup = clusterGroup;

      // Routes: two groups by status
      const groupCompleted = L.featureGroup();
      const groupPlanned = L.featureGroup();
      const routeLayers = [];
      const routeBounds = L.latLngBounds();
      let focusTrailKey = (focus && focus.type === 'route') ? focus.name : null;
      let focusTrailLayer = null;

      // Lazy GPX loading. Building one polyline per route up-front grows
      // linearly with the manifest; viewport-based on-demand loading keeps
      // the working set bounded regardless of total route count. The
      // manifest's per-route bbox is still used synchronously for initial
      // fit, so the map opens at the right area without waiting on any
      // GPX fetch.
      const routeDescriptors = [];
      const loadedRouteKeys = new Set();
      const pendingRouteKeys = new Set();
      if (state.manifest) {
        for (const region of state.manifest.regions) {
          for (const route of region.routes) {
            const color = routeStatusColor(route.completed);
            const parent = route.completed ? groupCompleted : groupPlanned;
            const gpxUrl = gpxUrlFor(route.file);
            routeDescriptors.push({ route, region, color, parent, gpxUrl });
            const visibleStatus = route.completed ? state.showCompleted : state.showPlanned;
            if (route.bbox && route.bbox.length === 4
                && !state.hiddenRegions.has(region.name)
                && visibleStatus) {
              routeBounds.extend([route.bbox[0], route.bbox[1]]);
              routeBounds.extend([route.bbox[2], route.bbox[3]]);
            }
          }
        }
      }

      state._routeLayers = routeLayers;
      state._routeGroupCompleted = groupCompleted;
      state._routeGroupPlanned = groupPlanned;

      // Map-level near-tap detector: stock Leaflet only fires polyline
      // click when the tap lands within ~1px of the stroke, which is
      // brutal on touch. Walk visible routes on every map click and
      // pick the closest segment within ~18px; if found, behave as if
      // the user had hit the polyline exactly.
      const NEAR_TAP_PX = 18;
      function pointSegDistSq(p, a, b) {
        const dx = b.x - a.x, dy = b.y - a.y;
        const len2 = dx * dx + dy * dy;
        if (!len2) { const ax = p.x - a.x, ay = p.y - a.y; return ax * ax + ay * ay; }
        let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
        if (t < 0) t = 0; else if (t > 1) t = 1;
        const cx = a.x + t * dx, cy = a.y + t * dy;
        return (p.x - cx) * (p.x - cx) + (p.y - cy) * (p.y - cy);
      }
      function isLayerVisible(record) {
        if (state.hiddenRegions.has(record.region)) return false;
        return record.completed ? state.showCompleted : state.showPlanned;
      }
      function findNearTrail(containerPt) {
        if (!state._routeLayers || !state._routeLayers.length) return null;
        let best = null, bestDist = NEAR_TAP_PX * NEAR_TAP_PX;
        const visit = function(layer, record) {
          if (layer.getLatLngs && !layer.eachLayer) {
            const raw = layer.getLatLngs();
            const flat = Array.isArray(raw) && Array.isArray(raw[0]) ? [].concat.apply([], raw) : raw;
            for (let i = 0; i < flat.length - 1; i++) {
              const a = map.latLngToContainerPoint(flat[i]);
              const b = map.latLngToContainerPoint(flat[i + 1]);
              const d2 = pointSegDistSq(containerPt, a, b);
              if (d2 < bestDist) { bestDist = d2; best = record; }
            }
          }
          if (layer.eachLayer) layer.eachLayer(function(sub) { visit(sub, record); });
        };
        for (const record of state._routeLayers) {
          if (!isLayerVisible(record)) continue;
          visit(record.layer, record);
        }
        return best;
      }
      map.on('click', function(e) {
        const best = findNearTrail(e.containerPoint);
        if (best) {
          const slug = best.route._slug || best.route.key;
          history.replaceState(null, '', focusHash('route', slug));
          best.layer.openPopup(e.latlng);
        }
      });
      // Right-click on the map: hit-test for a place pin first (canvas
      // layer), then a route polyline (near-tap detector). The first hit
      // wins; if nothing's under the cursor the browser context menu shows.
      map.on('contextmenu', function(e) {
        const cg = state._placeClusterGroup;
        if (cg && typeof cg._hitTest === 'function') {
          const target = cg._hitTest(e.containerPoint);
          if (target && !target.properties.cluster) {
            L.DomEvent.preventDefault(e.originalEvent);
            L.DomEvent.stopPropagation(e.originalEvent);
            openMapPlaceContextMenu(target.properties.place, e.originalEvent, map);
            return;
          }
        }
        const best = findNearTrail(e.containerPoint);
        if (best) {
          L.DomEvent.preventDefault(e.originalEvent);
          L.DomEvent.stopPropagation(e.originalEvent);
          openMapRouteContextMenu(best.route, best.region, e.originalEvent, map);
        }
      });
      // Show the pointer cursor across the full near-tap zone, not just
      // the 1-2px polyline stroke. mousemove on Leaflet fires only when
      // the cursor moves over the map, so this stays cheap.
      let _nearCursor = false;
      map.on('mousemove', function(e) {
        const near = !!findNearTrail(e.containerPoint);
        if (near === _nearCursor) return;
        _nearCursor = near;
        map.getContainer().classList.toggle('route-near-cursor', near);
      });

      function loadRouteLazy(desc) {
        if (loadedRouteKeys.has(desc.route.key) || pendingRouteKeys.has(desc.route.key)) return;
        pendingRouteKeys.add(desc.route.key);
        fetchGpxText(desc.gpxUrl).then(function(text) {
          const gpxLayer = new L.GPX(text, {
            async: true,
            polyline_options: { color: desc.color, opacity: 0.85, weight: 4 * getTrailWeightFactor(), className: 'route-line' },
            // Waypoints hidden on the index map; revealed in detail view only.
            markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
          });
          gpxLayer.on('loaded', function(e) {
            const b = e.target.getBounds();
            if (b.isValid()) routeBounds.extend(b);
            if (focusTrailKey && desc.route.key === focusTrailKey) {
              focusTrailLayer = e.target;
              if (b.isValid()) map.fitBounds(b, { padding: [40, 40] });
            }
            applyNonScalingStroke(e.target);
            // Cache the renderer the first time a route loads so
            // adjustTrailStrokes can force a re-project on smooth-zoom
            // frames. All polylines on the index map share one renderer.
            if (!state._routeRenderer) {
              const findRenderer = function(layer) {
                if (layer._renderer) return layer._renderer;
                if (typeof layer.eachLayer === 'function') {
                  let found = null;
                  layer.eachLayer(function(sub) { if (!found) found = findRenderer(sub); });
                  return found;
                }
                return null;
              };
              state._routeRenderer = findRenderer(e.target);
            }
          }).on('error', function(e) {
            console.warn('[ferd] gpx parse failed for', desc.gpxUrl, e && e.err);
            try { desc.parent.removeLayer(gpxLayer); } catch (_) {}
          }).bindPopup(
            routePopupHtml(desc.route, desc.region, desc.color),
            { closeButton: false }
          ).on('click', (function(slug) {
            return function(ev) {
              // Stop propagation so the map-level near-tap handler
              // doesn't fire a duplicate replaceState + popup toggle.
              if (ev && ev.originalEvent) L.DomEvent.stopPropagation(ev.originalEvent);
              history.replaceState(null, '', focusHash('route', slug));
            };
          })(desc.route._slug || desc.route.key));
          routeLayers.push({ route: desc.route, region: desc.region.name, layer: gpxLayer, completed: desc.route.completed });
          loadedRouteKeys.add(desc.route.key);
          pendingRouteKeys.delete(desc.route.key);
          applyMapFilters();
        }).catch(function(err) {
          pendingRouteKeys.delete(desc.route.key);
          console.warn('[ferd] gpx fetch failed for', desc.gpxUrl, err);
        });
      }

      // Skip routes whose bbox would render smaller than this many pixels
      // at the current zoom; they'd be visual noise on a continent-zoom view.
      const MIN_ROUTE_VISIBLE_PX = 6;
      function routeShouldLoad(desc, paddedBounds, mapZoom) {
        const b = desc.route.bbox;
        if (!b || b.length !== 4) return true; // no bbox info, conservative
        const sw = L.latLng(b[0], b[1]);
        const ne = L.latLng(b[2], b[3]);
        if (!paddedBounds.intersects(L.latLngBounds(sw, ne))) return false;
        const sp = map.project(sw, mapZoom);
        const np = map.project(ne, mapZoom);
        const dx = Math.abs(np.x - sp.x);
        const dy = Math.abs(np.y - sp.y);
        return Math.sqrt(dx * dx + dy * dy) >= MIN_ROUTE_VISIBLE_PX;
      }
      function evaluateVisibleRoutes() {
        if (!map._loaded) return;
        const padded = map.getBounds().pad(0.5);
        const zoom = map.getZoom();
        for (const desc of routeDescriptors) {
          if (loadedRouteKeys.has(desc.route.key) || pendingRouteKeys.has(desc.route.key)) continue;
          if (focusTrailKey && desc.route.key === focusTrailKey) { loadRouteLazy(desc); continue; }
          if (routeShouldLoad(desc, padded, zoom)) loadRouteLazy(desc);
        }
      }
      let _routeEvalTimer = null;
      function scheduleTrailEval() {
        if (_routeEvalTimer) clearTimeout(_routeEvalTimer);
        _routeEvalTimer = setTimeout(evaluateVisibleRoutes, 150);
      }
      map.on('moveend', scheduleTrailEval);
      // Kick an initial evaluation: when the map opens at a stored or
      // focus view, no moveend fires after we register the listener, so
      // visible routes would only load on the user's first pan.
      scheduleTrailEval();

      applyMapFilters();

      // Initial bounds: places + routes, prefer focus
      if (focusPlace) {
        // On reload at a place URL, keep the user's prior view (prevView /
        // storedView) instead of forcing a zoom-in to the place. Opening the
        // popup is enough acknowledgement; zooming would push every other
        // marker out of the viewport, which reads as "the overlays vanished".
        const restoredView = !!(prevView || storedView);
        setTimeout(function() {
          if (restoredView) {
            L.popup({ closeButton: false })
              .setLatLng([focusPlace.lat, focusPlace.lon])
              .setContent(placePopupHtml(focusPlace))
              .openOn(map);
          } else {
            revealPlaceMarker(map, focusPlace);
          }
        }, 300);
      } else if (!focusTrailKey && !prevView && !storedView) {
        const combined = L.latLngBounds();
        if (placeBounds.isValid()) combined.extend(placeBounds);
        if (routeBounds.isValid()) combined.extend(routeBounds);
        if (combined.isValid()) map.fitBounds(combined, { padding: [40, 40] });
      }

      // Filter panel
      const PanelControl = L.Control.extend({
        options: { position: 'bottomleft' },
        onAdd: function() {
          const div = L.DomUtil.create('div', 'map-panel');
          div.id = 'map-panel';
          const searchPlaceholder = placesEnabled() && routesEnabled()
            ? 'Search places + routes...'
            : (placesEnabled() ? 'Search places...' : 'Search routes...');
          div.innerHTML =
            '<div class="panel-search" id="map-search">' +
            '<input type="text" id="map-search-input" placeholder="' + searchPlaceholder + '">' +
            '<div class="map-search-results" id="map-search-results"></div>' +
            '</div>' +
            (placesEnabled() ? panelSectionHtml('places', 'Places') : '') +
            (routesEnabled() ? panelSectionHtml('routes', 'Routes') : '');
          L.DomEvent.disableClickPropagation(div);
          L.DomEvent.disableScrollPropagation(div);
          return div;
        }
      });
      if (placesEnabled() || routesEnabled()) {
        map.addControl(new PanelControl());
        bindFilterPanel();
        refreshFilterPanel();
        initUnifiedSearch(map);
      }
    }

    function refreshFilterPanel() {
      const placesBody = document.getElementById('places-body');
      if (placesBody) {
        const cats = sortedCategorySlugs(Object.keys(state.categoryColors));
        let html = '<div class="legend-cats">';
        for (const cat of cats) {
          const color = state.categoryColors[cat];
          const hidden = state.hiddenCategories.has(cat);
          html += '<div class="legend-item' + (hidden ? ' disabled' : '') + '" data-cat="' + escapeHtml(cat) + '">';
          html += '<span class="legend-dot" style="background:' + color + '"></span>';
          html += escapeHtml(displayCategory(cat));
          html += '</div>';
        }
        html += '</div>';
        html += '<div class="legend-status">';
        html += '<div class="status-chip' + (state.showVisited ? ' active' : '') + '" data-filter="visited">Visited</div>';
        html += '<div class="status-chip' + (state.showWant ? ' active' : '') + '" data-filter="want">Want</div>';
        html += '</div>';
        placesBody.innerHTML = html;
      }

      const routesBody = document.getElementById('routes-body');
      if (routesBody) {
        let html = '<div class="legend-cats" style="grid-template-columns:1fr">';
        html += '<div class="legend-item' + (state.showCompleted ? '' : ' disabled') + '" data-route-status="completed">';
        html += '<span class="legend-line completed"></span>Completed';
        html += '</div>';
        html += '<div class="legend-item' + (state.showPlanned ? '' : ' disabled') + '" data-route-status="planned">';
        html += '<span class="legend-line planned"></span>Planned';
        html += '</div>';
        html += '</div>';
        const regions = state.manifest && state.manifest.regions ? state.manifest.regions.map(r => r.name) : [];
        if (regions.length) {
          html += '<div class="legend-cats" style="margin-top:0.4rem">';
          for (const r of regions) {
            const hidden = state.hiddenRegions.has(r);
            html += '<div class="legend-item' + (hidden ? ' disabled' : '') + '" data-region="' + escapeHtml(r) + '">';
            html += escapeHtml(displayRegion(r));
            html += '</div>';
          }
          html += '</div>';
        }
        routesBody.innerHTML = html;
      }
    }

    function bindFilterPanel() {
      // Section collapse
      document.querySelectorAll('.panel-section-header').forEach(function(h) {
        h.addEventListener('click', function(e) {
          if (e.target.closest('.panel-action')) return;
          document.getElementById(this.dataset.section).classList.toggle('collapsed');
        });
      });

      // Toggle-all (places)
      const placesToggle = document.getElementById('places-toggle-all');
      if (placesToggle) placesToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const cats = Object.keys(state.categoryColors);
        const allOn = state.hiddenCategories.size === 0 && state.showVisited && state.showWant;
        if (allOn) {
          cats.forEach(c => state.hiddenCategories.add(c));
          state.showVisited = false; state.showWant = false;
        } else {
          state.hiddenCategories.clear();
          state.showVisited = true; state.showWant = true;
        }
        refreshFilterPanel();
        applyMapFilters();
      });

      // Toggle-all (routes) - mirrors Places: covers regions + completed/planned.
      const routesToggle = document.getElementById('routes-toggle-all');
      if (routesToggle) routesToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const regions = state.manifest ? state.manifest.regions.map(r => r.name) : [];
        const allOn = state.hiddenRegions.size === 0 && state.showCompleted && state.showPlanned;
        if (allOn) {
          regions.forEach(r => state.hiddenRegions.add(r));
          state.showCompleted = false; state.showPlanned = false;
        } else {
          state.hiddenRegions.clear();
          state.showCompleted = true; state.showPlanned = true;
        }
        refreshFilterPanel();
        applyMapFilters();
      });

      // Delegated clicks on the body elements (survive innerHTML refresh)
      const placesBody = document.getElementById('places-body');
      if (placesBody) placesBody.addEventListener('click', function(e) {
        const cat = e.target.closest('.legend-item[data-cat]');
        if (cat) {
          const c = cat.dataset.cat;
          if (state.hiddenCategories.has(c)) { state.hiddenCategories.delete(c); cat.classList.remove('disabled'); }
          else { state.hiddenCategories.add(c); cat.classList.add('disabled'); }
          pulseChip(cat);
          applyMapFilters();
          return;
        }
        const chip = e.target.closest('.status-chip[data-filter]');
        if (chip) {
          if (chip.dataset.filter === 'visited') state.showVisited = !state.showVisited;
          else state.showWant = !state.showWant;
          chip.classList.toggle('active');
          pulseChip(chip);
          applyMapFilters();
        }
      });

      const routesBody = document.getElementById('routes-body');
      if (routesBody) routesBody.addEventListener('click', function(e) {
        const item = e.target.closest('.legend-item[data-route-status]');
        if (item) {
          const s = item.dataset.routeStatus;
          if (s === 'completed') state.showCompleted = !state.showCompleted;
          else state.showPlanned = !state.showPlanned;
          item.classList.toggle('disabled');
          pulseChip(item);
          applyMapFilters();
          return;
        }
        const region = e.target.closest('.legend-item[data-region]');
        if (region) {
          const r = region.dataset.region;
          if (state.hiddenRegions.has(r)) { state.hiddenRegions.delete(r); region.classList.remove('disabled'); }
          else { state.hiddenRegions.add(r); region.classList.add('disabled'); }
          pulseChip(region);
          applyMapFilters();
        }
      });
    }

    // ----- Edit place modal -----
    function openEditPlaceModal(place) {
      // Exclude the uncategorized bucket ('') from the picker — "no category"
      // is the default state of the empty option, not a pickable category.
      const cats = sortedCategorySlugs(Object.keys(state.categoryColors).filter(c => c !== ''));
      const sourcesText = (place.sources || []).join('\n');
      openModal(
        '<h2>Edit place<button class="modal-close">&times;</button></h2>' +
        '<form id="edit-place-form">' +
          '<label for="e-name">Name</label>' +
          '<input type="text" id="e-name" required value="' + escapeHtml(place.name) + '">' +
          (getShowField('local-name') ?
            '<label for="e-local-name">Local name (optional)</label>' +
            '<input type="text" id="e-local-name" placeholder="e.g. 東京" value="' + escapeHtml(place.local_name || '') + '">'
          : '') +
          '<div class="row">' +
            '<div><label for="e-lat">Latitude</label><input type="number" id="e-lat" step="any" required value="' + place.lat + '"></div>' +
            '<div><label for="e-lon">Longitude</label><input type="number" id="e-lon" step="any" required value="' + place.lon + '"></div>' +
          '</div>' +
          '<div style="margin-top:0.25rem;text-align:right"><button type="button" class="primary" id="e-pick-on-map">Pick on map</button></div>' +
          '<label for="e-category">Category</label>' +
          selectOrNewHtml('e-category', cats, place.category, displayCategory, '', 'New category name') +
          '<label for="e-country">Country (optional)</label>' +
          '<input type="text" id="e-country" value="' + escapeHtml(place.country || '') + '">' +
          (getShowField('note') ?
            '<label for="e-note">Note (optional)</label>' +
            '<textarea id="e-note" style="min-height:40px">' + escapeHtml(place.note || '') + '</textarea>'
          : '') +
          (getShowField('image') ?
            '<label for="e-image">Image URL (optional)</label>' +
            '<input type="url" id="e-image" value="' + escapeHtml(place.image || '') + '" placeholder="https://example.com/photo.jpg">'
          : '') +
          '<label for="e-sources">Sources (optional, one URL per line)</label>' +
          '<textarea id="e-sources" style="min-height:40px">' + escapeHtml(sourcesText) + '</textarea>' +
          '<div style="display:flex;align-items:center;gap:0.75rem;margin-top:0.75rem">' +
            '<input type="checkbox" class="settings-toggle" id="e-visited"' + (place.visited ? ' checked' : '') + '>' +
            '<label for="e-visited" style="margin:0">I&rsquo;ve visited this place</label>' +
          '</div>' +
          ((getShowField('date') || getShowField('rating')) ?
            '<div class="collapsible' + (place.visited ? ' expanded' : '') + '" id="e-visited-extras">' +
              '<div class="collapsible-inner">' +
                (getShowField('date') ?
                  '<label for="e-date-visited">Date visited</label>' +
                  '<input type="date" id="e-date-visited" value="' + escapeHtml(place.date_visited || '') + '">'
                : '') +
                (getShowField('rating') ?
                  '<label for="e-rating">Rating</label>' +
                  starRatingHtml('e-rating', place.rating || '')
                : '') +
              '</div>' +
            '</div>'
          : '') +
          '<div class="modal-error" id="edit-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="button" class="session-revoke" id="e-delete">Delete</button>' +
            '<span style="flex:1"></span>' +
            '<button type="submit" class="primary" id="e-submit">Save</button>' +
          '</div>' +
        '</form>',
        function() {
          wireSelectOrNew('e-category');
          wireStarRating('e-rating');
          const eVisitedCb = document.getElementById('e-visited');
          const eVisitedExtras = document.getElementById('e-visited-extras');
          if (eVisitedCb && eVisitedExtras) {
            eVisitedCb.addEventListener('change', function() {
              eVisitedExtras.classList.toggle('expanded', this.checked);
            });
          }
          document.getElementById('e-pick-on-map').addEventListener('click', function() {
            // Snapshot current form values so they survive the close+reopen
            // around the map click. Lat/lon get overwritten with the pick.
            const snapshot = readPlaceFormFields('e');
            const draft = Object.assign({}, place, snapshot.payload || {});
            closeModal();
            enterPickCoordsMode(function(latlng) {
              // Same rounding as readPlaceFormFields on save, so the form
              // shows the value that will actually be stored.
              draft.lat = Math.round(latlng.lat * 1e5) / 1e5;
              draft.lon = Math.round(latlng.lng * 1e5) / 1e5;
              openEditPlaceModal(draft);
            });
          });
          document.getElementById('e-delete').addEventListener('click', function() {
            if (!confirm('Delete place "' + place.name + '"?')) return;
            this.disabled = true;
            const prevColors = Object.assign({}, state.categoryColors);
            api('DELETE', '/places', { id: place.id })
              .then(() => refreshPlaces())
              .then(() => { closeModal(); syncPlacesOnMap(prevColors); if (document.getElementById('place-list')) renderPlaceList(); })
              .catch(err => { this.disabled = false; showModalError(err.message); });
          });
          document.getElementById('edit-place-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const r = readPlaceFormFields('e');
            if (r.error) { showModalError(r.error); return; }
            // Preserve the catalog lineage tag across edits; the form has no
            // input for it, but it shouldn't disappear on a rename/note change.
            if (place.from_catalog) r.payload.from_catalog = place.from_catalog;
            const submit = document.getElementById('e-submit');
            submit.disabled = true;
            const prevColors = Object.assign({}, state.categoryColors);
            api('PUT', '/places', { id: place.id, place: r.payload })
              .then(() => refreshPlaces())
              .then(() => { closeModal(); syncPlacesOnMap(prevColors); if (document.getElementById('place-list')) renderPlaceList(); })
              .catch(err => { submit.disabled = false; showModalError(err.message); });
          });
        }
      );
    }

    // Pan/zoom to a place marker and open its popup. With clustering on, a plain
    // setView+openPopup leaves the marker buried inside an unexpanded cluster;
    // zoomToShowLayer breaks the cluster apart first.
    function revealPlaceMarker(map, place) {
      const cg = state._placeClusterGroup;
      if (cg && typeof cg.revealPlace === 'function') {
        cg.revealPlace(place);
      } else {
        map.setView([place.lat, place.lon], Math.max(map.getZoom(), 12));
        L.popup({ closeButton: false })
          .setLatLng([place.lat, place.lon])
          .setContent(placePopupHtml(place))
          .openOn(map);
      }
    }

    // Force a style recalc so a class change is observed as a transition start
    // rather than batched away. Used for entry animations and for restarting
    // a keyframe animation on repeated triggers.
    function forceReflow(el) { void el.offsetWidth; }

    // Append `cls` then strip it on the next tick so the element animates
    // from the .cls state to its base state. Caller-controlled CSS transition.
    function playEnter(el, cls) {
      if (!el) return;
      el.classList.add(cls);
      forceReflow(el);
      el.classList.remove(cls);
    }

    // Add `cls` (typically a transform/opacity off state), call `done` after
    // either the resulting transition ends or `fallbackMs` elapses, whichever
    // is first. Guarantees `done` runs exactly once.
    function playLeave(el, cls, done, fallbackMs) {
      if (!el) { done(); return; }
      el.classList.add(cls);
      let fired = false;
      const fire = () => { if (fired) return; fired = true; done(); };
      el.addEventListener('transitionend', fire, { once: true });
      setTimeout(fire, fallbackMs || 300);
    }

    function pulseChip(el) {
      if (!el) return;
      el.classList.remove('pulse');
      // Force reflow so the animation restarts on repeated clicks.
      forceReflow(el);
      el.classList.add('pulse');
      el.addEventListener('animationend', () => el.classList.remove('pulse'), { once: true });
    }

    // Canvas-rendered place layer. Owns clustering via supercluster, draws
    // all places and clusters to a single <canvas>, hit-tests clicks and
    // hovers. Replaces the L.markerClusterGroup + L.marker DOM model so
    // pinch-zoom doesn't pay per-element compositing cost.
    const PlaceCanvasLayer = L.Layer.extend({
      options: {
        pane: 'placeCanvasPane',
        clusterRadius: 40,
        clickHitRadius: 14,
      },

      initialize: function(options) {
        L.setOptions(this, options);
        this._places = [];
        this._supercluster = null;
        this._visibleFeatures = null;
        this._useClusters = true;
      },

      setPlaces: function(places) {
        this._places = (places || []).slice();
        this._rebuildIndex();
        this._redraw();
        return this;
      },

      setUseClusters: function(useClusters) {
        if (this._useClusters === useClusters) return this;
        this._useClusters = useClusters;
        this._rebuildIndex();
        this._redraw();
        return this;
      },

      redraw: function() { this._redraw(); return this; },

      // Open a popup at the given place. If currently clustered, zoom in
      // first via supercluster's expansion zoom so the popup makes sense.
      revealPlace: function(place, onShown) {
        const map = this._map;
        if (!map) return;
        const zoom = Math.floor(map.getZoom());
        let targetZoom = Math.max(zoom, 12);
        if (this._supercluster && this._useClusters) {
          const features = this._getCurrentFeatures();
          for (const f of features) {
            if (!f.properties.cluster) continue;
            const id = f.properties.cluster_id;
            try {
              const leaves = this._supercluster.getLeaves(id, Infinity);
              if (leaves.some(l => l.properties.place === place
                  || l.properties.place.name === place.name)) {
                targetZoom = Math.min(map.getMaxZoom() || 18,
                  this._supercluster.getClusterExpansionZoom(id));
                break;
              }
            } catch (_) { /* ignore */ }
          }
        }
        const open = () => {
          L.popup({ closeButton: false })
            .setLatLng([place.lat, place.lon])
            .setContent(placePopupHtml(place))
            .openOn(map);
          if (typeof onShown === 'function') onShown();
        };
        if (Math.floor(map.getZoom()) !== targetZoom) {
          map.once('moveend', open);
          map.setView([place.lat, place.lon], targetZoom);
        } else {
          map.setView([place.lat, place.lon], targetZoom);
          setTimeout(open, 60);
        }
      },

      onAdd: function(map) {
        this._map = map;
        if (!map.getPane(this.options.pane)) {
          const p = map.createPane(this.options.pane);
          p.style.zIndex = 450; // above tile pane (200), below marker pane (600)
        }
        this._canvas = L.DomUtil.create('canvas',
          'place-canvas-layer',
          map.getPane(this.options.pane));
        // setTransform math (offset + scale) assumes a top-left transform
        // origin; default of 50% 50% would scale around the canvas center
        // and miscalculate every pin position during pinch/zoom.
        this._canvas.style.transformOrigin = '0 0';
        // Canvas sits above the SVG overlay pane (zIndex 450 vs 400) so it
        // would swallow clicks intended for route polylines underneath.
        // Hit detection happens against map clicks in _onClick, not the
        // canvas itself, so pointer events on the canvas are unnecessary.
        this._canvas.style.pointerEvents = 'none';
        this._sizeCanvas();
        // Mobile pinch + pan fire 'move' continuously and we redraw each
        // frame at the current zoom (pins at fixed size, positions track).
        // Desktop wheel zoom is a 250ms CSS animation during which 'move'
        // does not fire; _onZoomAnim drives a rAF loop that redraws at
        // interpolated zoom/center for the same effect.
        map.on('move', this._redraw, this);
        map.on('zoomanim', this._onZoomAnim, this);
        map.on('zoomend', this._stopZoomAnim, this);
        map.on('resize', this._redraw, this);
        map.on('click', this._onClick, this);
        map.on('mousemove', this._onMouseMove, this);
        this._redraw();
        return this;
      },

      onRemove: function(map) {
        if (this._canvas && this._canvas.parentNode) {
          this._canvas.parentNode.removeChild(this._canvas);
        }
        map.off('move', this._redraw, this);
        map.off('zoomanim', this._onZoomAnim, this);
        map.off('zoomend', this._stopZoomAnim, this);
        map.off('resize', this._redraw, this);
        map.off('click', this._onClick, this);
        map.off('mousemove', this._onMouseMove, this);
        this._stopZoomAnim();
        this._map = null;
        return this;
      },


      _sizeCanvas: function() {
        const map = this._map;
        const size = map.getSize();
        const dpr = window.devicePixelRatio || 1;
        this._canvas.width = size.x * dpr;
        this._canvas.height = size.y * dpr;
        this._canvas.style.width = size.x + 'px';
        this._canvas.style.height = size.y + 'px';
        this._dpr = dpr;
      },

      _onResize: function() { this._sizeCanvas(); this._redraw(); },

      _rebuildIndex: function() {
        if (!this._places.length || !this._useClusters || typeof Supercluster === 'undefined') {
          this._supercluster = null;
          return;
        }
        const features = this._places.map((p, i) => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lon, p.lat] },
          properties: { place: p, _idx: i }
        }));
        this._supercluster = new Supercluster({
          radius: this.options.clusterRadius,
          maxZoom: 18,
        });
        this._supercluster.load(features);
      },

      _getCurrentFeatures: function() {
        const map = this._map;
        if (!map) return [];
        const bounds = map.getBounds();
        if (this._supercluster && this._useClusters) {
          const bbox = [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()];
          return this._supercluster.getClusters(bbox, Math.floor(map.getZoom()));
        }
        return this._places
          .filter(p => bounds.contains([p.lat, p.lon]))
          .map(p => ({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [p.lon, p.lat] },
            properties: { place: p }
          }));
      },

      _redraw: function() {
        this._drawAt(null, null);
      },

      // Draw at a specific zoom/center, or null/null to use the map's
      // current state. Used by _onZoomAnim's rAF loop to render at
      // interpolated zoom during the 250ms desktop animation.
      _drawAt: function(zoom, center) {
        const map = this._map;
        if (!map || !this._canvas) return;
        const useInterp = (zoom != null && center != null);
        const z = useInterp ? zoom : map.getZoom();
        const c = useInterp ? center : map.getCenter();

        const ctx = this._canvas.getContext('2d');
        const dpr = this._dpr || 1;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const size = map.getSize();
        ctx.clearRect(0, 0, size.x, size.y);

        // Position the canvas at viewport top-left in layer coords.
        // During interpolation we hold the canvas at the current map's
        // layer origin; pin positions are computed at the interpolated
        // zoom/center via project().
        const topLeft = map.containerPointToLayerPoint([0, 0]);
        L.DomUtil.setPosition(this._canvas, topLeft);

        // Compute pixel origin for the (possibly interpolated) zoom/center.
        const crs = map.options.crs;
        const projCenter = crs.latLngToPoint(c, z);
        const halfSize = size.divideBy(2);
        const pixelOrigin = projCenter.subtract(halfSize)._round();

        const features = this._getCurrentFeatures();
        this._visibleFeatures = features;
        const markerSize = (typeof getMarkerSize === 'function') ? getMarkerSize() : 18;
        const pinStyle = (typeof getPinStyle === 'function') ? getPinStyle() : 'ring';
        const catColors = (state && state.categoryColors) || {};
        for (const f of features) {
          const coords = f.geometry.coordinates;
          const projected = crs.latLngToPoint(L.latLng(coords[1], coords[0]), z);
          const pt = projected.subtract(pixelOrigin);
          if (f.properties.cluster) {
            this._drawCluster(ctx, pt, f.properties.point_count);
          } else {
            const place = f.properties.place;
            const color = catColors[place.category] || '#888';
            this._drawMarker(ctx, pt, place, color, markerSize, pinStyle);
          }
        }
      },

      // Desktop wheel zoom: zoomanim fires once with the target zoom and
      // center. The map then CSS-animates over 250ms. 'move' doesn't fire
      // during that window, so we manually interpolate and redraw the
      // canvas each frame to keep pins tracking at constant size.
      _onZoomAnim: function(e) {
        if (!this._map) return;
        this._stopZoomAnim();
        const startZoom = this._map.getZoom();
        const startCenter = this._map.getCenter();
        const targetZoom = e.zoom;
        const targetCenter = L.latLng(e.center);
        const startTime = performance.now();
        const duration = 250;
        // Leaflet's tile transition uses CSS `cubic-bezier(0, 0, 0.25, 1)`.
        // Match it exactly via Newton's method so pins track tiles through
        // the animation. A polynomial ease-out approximation diverges by
        // ~5% mid-animation, visible as drift+snap on every desktop zoom.
        const easeLeaflet = function(t) {
          let s = t;
          for (let i = 0; i < 6; i++) {
            const sm = 1 - s;
            const x = 0.75 * sm * s * s + s * s * s;
            const dx = 1.5 * s + 0.75 * s * s;
            if (Math.abs(dx) < 1e-6) break;
            s -= (x - t) / dx;
            if (s < 0) s = 0; else if (s > 1) s = 1;
          }
          const sm = 1 - s;
          return 3 * sm * s * s + s * s * s;
        };
        // Leaflet's tile transform interpolates SCALE linearly between
        // 1 and the target scale (CSS transition on the transform
        // property). Mapping that to zoom is logarithmic, not linear:
        // at progress 0.5 of a +1 zoom step the visual scale is 1.5,
        // not 2^0.5 = 1.414. Interpolating zoom linearly here put pins
        // at the wrong fractional zoom relative to the tiles, which
        // showed up as the drift-during-zoom you saw.
        const targetScale = Math.pow(2, targetZoom - startZoom);
        const tick = () => {
          if (!this._map) return;
          const elapsed = performance.now() - startTime;
          const t = Math.min(elapsed / duration, 1);
          const eased = easeLeaflet(t);
          const scaleAtP = 1 + eased * (targetScale - 1);
          const interpZoom = startZoom + Math.log2(scaleAtP);
          const interpCenter = L.latLng(
            startCenter.lat + (targetCenter.lat - startCenter.lat) * eased,
            startCenter.lng + (targetCenter.lng - startCenter.lng) * eased
          );
          this._drawAt(interpZoom, interpCenter);
          if (t < 1) {
            this._zoomAnimRaf = requestAnimationFrame(tick);
          } else {
            this._zoomAnimRaf = null;
          }
        };
        this._zoomAnimRaf = requestAnimationFrame(tick);
      },

      _stopZoomAnim: function() {
        if (this._zoomAnimRaf) {
          cancelAnimationFrame(this._zoomAnimRaf);
          this._zoomAnimRaf = null;
        }
      },

      _drawCluster: function(ctx, pt, count) {
        let r;
        if (count >= 100) r = 22;
        else if (count >= 10) r = 18;
        else r = 15;
        const cs = getComputedStyle(document.documentElement);
        const fill = cs.getPropertyValue('--cluster-fill').trim() || 'rgba(136,192,208,0.6)';
        const halo = cs.getPropertyValue('--cluster-halo').trim() || 'rgba(136,192,208,0.25)';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, r + 5, 0, 2 * Math.PI);
        ctx.fillStyle = halo;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, r, 0, 2 * Math.PI);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(count), pt.x, pt.y);
      },

      _drawMarker: function(ctx, pt, place, color, size, style) {
        const r = Math.max(3, (size / 2) - 2);
        const visited = !!place.visited;
        if (style === 'dot') {
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, r, 0, 2 * Math.PI);
          ctx.fillStyle = visited ? color : this._withAlpha(color, 0.5);
          ctx.fill();
        } else if (style === 'pin') {
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(pt.x, pt.y);
          ctx.lineTo(pt.x, pt.y + size);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, r, 0, 2 * Math.PI);
          if (visited) { ctx.fillStyle = color; ctx.fill(); }
          else { ctx.fillStyle = this._withAlpha(color, 0.25); ctx.fill(); ctx.stroke(); }
        } else if (style === 'tag') {
          const w = size;
          const h = size * 1.1;
          ctx.beginPath();
          ctx.moveTo(pt.x, pt.y);
          ctx.lineTo(pt.x, pt.y + h);
          ctx.strokeStyle = color;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.beginPath();
          ctx.rect(pt.x, pt.y, w, size * 0.55);
          if (visited) { ctx.fillStyle = color; ctx.fill(); }
          else {
            ctx.fillStyle = this._withAlpha(color, 0.25);
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        } else {
          // 'ring' (default)
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, r, 0, 2 * Math.PI);
          if (visited) {
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.6;
            ctx.stroke();
            ctx.globalAlpha = 1;
          } else {
            ctx.fillStyle = this._withAlpha(color, 0.25);
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }
      },

      _withAlpha: function(hex, alpha) {
        if (!hex || hex[0] !== '#') return hex;
        let r, g, b;
        if (hex.length === 4) {
          r = parseInt(hex[1] + hex[1], 16);
          g = parseInt(hex[2] + hex[2], 16);
          b = parseInt(hex[3] + hex[3], 16);
        } else {
          r = parseInt(hex.slice(1, 3), 16);
          g = parseInt(hex.slice(3, 5), 16);
          b = parseInt(hex.slice(5, 7), 16);
        }
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      },

      _hitTest: function(point) {
        if (!this._visibleFeatures) return null;
        const map = this._map;
        let best = null;
        let bestDist = Infinity;
        for (const f of this._visibleFeatures) {
          const coords = f.geometry.coordinates;
          const pt = map.latLngToContainerPoint([coords[1], coords[0]]);
          const dx = point.x - pt.x;
          const dy = point.y - pt.y;
          const distSq = dx * dx + dy * dy;
          const r = f.properties.cluster
            ? this.options.clickHitRadius * 1.6
            : this.options.clickHitRadius;
          if (distSq <= r * r && distSq < bestDist) {
            best = f;
            bestDist = distSq;
          }
        }
        return best;
      },

      _onClick: function(e) {
        const target = this._hitTest(e.containerPoint);
        if (!target) return;
        L.DomEvent.stopPropagation(e.originalEvent);
        if (target.properties.cluster) {
          const id = target.properties.cluster_id;
          const expandZoom = this._supercluster.getClusterExpansionZoom(id);
          const coords = target.geometry.coordinates;
          this._map.setView([coords[1], coords[0]],
            Math.min(this._map.getMaxZoom() || 18, expandZoom));
        } else {
          const place = target.properties.place;
          history.replaceState(null, '', focusHash('place', place._slug || place.name));
          L.popup({ closeButton: false })
            .setLatLng([place.lat, place.lon])
            .setContent(placePopupHtml(place))
            .openOn(this._map);
        }
      },

      _onMouseMove: function(e) {
        // Skip on touch devices (no real hover).
        if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
        const target = this._hitTest(e.containerPoint);
        this._map.getContainer().style.cursor = target ? 'pointer' : '';
      },

    });

    function createPlaceLayerGroup() {
      const layer = new PlaceCanvasLayer();
      layer.setUseClusters(getClusterPlaces());
      return layer;
    }

    // Apply the clustering preference to the live canvas layer; no map rebuild.
    function swapPlaceClusterGroup() {
      const cg = state._placeClusterGroup;
      if (!cg || typeof cg.setUseClusters !== 'function') return;
      cg.setUseClusters(getClusterPlaces());
    }

    function applyMapFilters() {
      const map = state.currentMap;
      if (!map) return;

      // Places
      const cg = state._placeClusterGroup;
      if (cg) {
        const filtered = [];
        if (placesEnabled() && state._placeRecords) {
          for (const p of state._placeRecords) {
            if (state.hiddenCategories.has(p.category)) continue;
            if (p.visited && !state.showVisited) continue;
            if (!p.visited && !state.showWant) continue;
            filtered.push(p);
          }
        }
        cg.setPlaces(filtered);
        if (placesEnabled()) {
          if (!map.hasLayer(cg)) map.addLayer(cg);
        } else if (map.hasLayer(cg)) {
          map.removeLayer(cg);
        }
      }

      // Routes
      const gc = state._routeGroupCompleted;
      const gp = state._routeGroupPlanned;
      if (gc && gp && state._routeLayers) {
        gc.clearLayers();
        gp.clearLayers();
        if (routesEnabled()) {
          for (const t of state._routeLayers) {
            if (state.hiddenRegions.has(t.region)) continue;
            if (t.completed && !state.showCompleted) continue;
            if (!t.completed && !state.showPlanned) continue;
            (t.completed ? gc : gp).addLayer(t.layer);
          }
          if (!map.hasLayer(gc)) map.addLayer(gc);
          if (!map.hasLayer(gp)) map.addLayer(gp);
        } else {
          if (map.hasLayer(gc)) map.removeLayer(gc);
          if (map.hasLayer(gp)) map.removeLayer(gp);
        }
      }
    }

    function initUnifiedSearch(map) {
      const input = document.getElementById('map-search-input');
      const results = document.getElementById('map-search-results');

      function render(q) {
        if (!q) { results.classList.remove('visible'); results.innerHTML = ''; return; }
        const lower = q.toLowerCase();
        const placeMatches = state.places ? state.places.filter(p =>
          p.name.toLowerCase().includes(lower)
          || (p.note && p.note.toLowerCase().includes(lower))
          || p.category.toLowerCase().includes(lower)
          || (p.country && p.country.toLowerCase().includes(lower))
        ).slice(0, 6) : [];
        const routeMatches = state.manifest ? state.manifest.regions.flatMap(r =>
          r.routes.filter(route => route.name.toLowerCase().includes(lower) || r.name.toLowerCase().includes(lower)).map(route => ({ route, region: r.name }))
        ).slice(0, 6) : [];

        if (!placeMatches.length && !routeMatches.length) {
          results.classList.remove('visible');
          results.innerHTML = '';
          return;
        }

        let html = '';
        for (const p of placeMatches) {
          const color = state.categoryColors[p.category];
          html += '<div class="map-search-result" data-type="place" data-name="' + escapeHtml(p.name) + '">';
          html += '<span class="result-dot" style="background:' + color + '"></span>';
          html += escapeHtml(p.name);
          html += '<span class="result-meta">' + escapeHtml(p.country || '') + '</span></div>';
        }
        for (const t of routeMatches) {
          const statusClass = t.route.completed ? 'completed' : 'planned';
          html += '<div class="map-search-result" data-type="route" data-key="' + escapeHtml(t.route.key) + '">';
          html += '<span class="result-line ' + statusClass + '"></span>';
          html += escapeHtml(t.route.name);
          html += '<span class="result-meta">' + escapeHtml(t.region) + '</span></div>';
        }
        results.innerHTML = html;
        results.classList.add('visible');
      }

      input.addEventListener('input', function() { render(this.value.trim()); });

      results.addEventListener('click', function(e) {
        const row = e.target.closest('.map-search-result');
        if (!row) return;
        if (row.dataset.type === 'place') {
          const name = row.dataset.name;
          const place = (state._placeRecords || []).find(p => p.name === name);
          if (place) {
            revealPlaceMarker(map, place);
            history.replaceState(null, '', '#/?focus=place:' + encodeURIComponent(name));
          }
        } else {
          const key = row.dataset.key;
          const entry = (state._routeLayers || []).find(t => t.route.key === key);
          history.replaceState(null, '', '#/?focus=route:' + encodeURIComponent(key));
          if (entry) {
            // Route is already loaded - fit to its actual bounds and open
            // the popup directly.
            const layers = [];
            entry.layer.eachLayer(l => { if (l.getBounds) layers.push(l); });
            if (layers.length) {
              const b = layers[0].getBounds();
              if (b.isValid()) map.fitBounds(b, { padding: [40, 40] });
              if (entry.layer.openPopup) entry.layer.openPopup(b.getCenter());
            }
          } else {
            // Not loaded yet (lazy-loaded by viewport intersection). Fit
            // to the manifest bbox so the viewport intersects the route,
            // which kicks off the load.
            let route = null;
            if (state.manifest) {
              for (const r of state.manifest.regions) {
                const found = r.routes.find(rt => rt.key === key);
                if (found) { route = found; break; }
              }
            }
            if (route && route.bbox && route.bbox.length === 4) {
              const b = L.latLngBounds([route.bbox[0], route.bbox[1]], [route.bbox[2], route.bbox[3]]);
              if (b.isValid()) map.fitBounds(b, { padding: [40, 40] });
            }
          }
        }
        input.value = '';
        results.classList.remove('visible');
        results.innerHTML = '';
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('#map-search')) results.classList.remove('visible');
      });
    }

    // ----- Places browse list -----
    // Fields the catalog "owns" - personal status (visited / date_visited /
    // rating / from_catalog / runtime annotations) is preserved on refresh.
    const CATALOG_TRACKED_FIELDS = ['name', 'lat', 'lon', 'category', 'country', 'local_name', 'note', 'image', 'image_focus', 'sources'];
    const CATALOG_FIELD_LABELS = { name: 'Name', lat: 'Latitude', lon: 'Longitude', category: 'Category', country: 'Country', local_name: 'Local name', note: 'Note', image: 'Image', image_focus: 'Image focus', sources: 'Sources' };

    // Returns { entry, changes: [{field, before, after}] } when the upstream
    // catalog entry for a place's from_catalog has diverged from the local
    // copy, else null. Catalog source is the client-side cache populated on
    // boot; if it isn't loaded yet, returns null (no false-positive indicator).
    function findCatalogUpdate(place) {
      if (!place || !place.from_catalog) return null;
      if (!Array.isArray(state._catalogCache)) return null;
      const entry = state._catalogCache.find(e => e && e.name === place.from_catalog);
      if (!entry) return null;
      const norm = v => {
        if (v === undefined || v === null) return null;
        if (typeof v === 'string') return v.trim() || null;
        if (Array.isArray(v)) return v.length ? v.map(norm) : null;
        return v;
      };
      const eq = (a, b) => {
        if (a === b) return true;
        if (a === null || b === null) return a === b;
        if (Array.isArray(a) && Array.isArray(b)) {
          if (a.length !== b.length) return false;
          return a.every((x, i) => eq(x, b[i]));
        }
        return false;
      };
      const skip = (place && place.catalog_skip) || {};
      const changes = [];
      for (const f of CATALOG_TRACKED_FIELDS) {
        const a = norm(place[f]);
        const b = norm(entry[f]);
        if (eq(a, b)) continue;
        // Skipped: hide the diff while the catalog value still matches what
        // the user dismissed. If the catalog value has moved on, surface it
        // again as a fresh update.
        if (f in skip && eq(norm(skip[f]), b)) continue;
        changes.push({ field: f, before: place[f], after: entry[f] });
      }
      return changes.length ? { entry, changes } : null;
    }

    function formatCatalogDiffValue(v, field, focus) {
      if (v === null || v === undefined || v === '') return '<em style="color:var(--muted)">(none)</em>';
      if (field === 'image') {
        const url = String(v);
        const focusAttr = focus && /^(top|bottom|center|left|right|\d{1,3}%\s+\d{1,3}%)$/.test(String(focus).trim())
          ? ' style="object-position: ' + String(focus).trim() + '"'
          : '';
        return '<img class="catalog-diff-image" src="' + escapeHtml(url) + '"' + focusAttr +
          ' alt="" loading="lazy" referrerpolicy="no-referrer" title="' + escapeHtml(url) +
          '" onerror="this.replaceWith(Object.assign(document.createElement(\'span\'),{textContent:this.title,style:\'color:var(--muted);font-size:0.7rem;word-break:break-all\'}))">';
      }
      if (Array.isArray(v)) return v.map(x => escapeHtml(String(x))).join('<br>');
      return escapeHtml(String(v));
    }

    function renderCatalogDiff(changes, opts) {
      const selectable = !!(opts && opts.selectable);
      // Pair image with its focus so the thumbnail previews the actual crop.
      // `before` focus comes from the place (current state), `after` from the catalog entry.
      const focusChange = changes.find(c => c.field === 'image_focus');
      const place = opts && opts.place;
      const entry = opts && opts.entry;
      const beforeFocus = focusChange ? focusChange.before : (place ? place.image_focus : undefined);
      const afterFocus = focusChange ? focusChange.after : (entry ? entry.image_focus : undefined);
      return '<div class="catalog-diff">' + changes.map(c => {
        const check = selectable
          ? '<input type="checkbox" class="catalog-diff-check" data-field="' + escapeHtml(c.field) + '">'
          : '';
        const bf = c.field === 'image' ? beforeFocus : undefined;
        const af = c.field === 'image' ? afterFocus : undefined;
        return '<label class="catalog-diff-field' + (selectable ? ' selectable' : '') + '">' +
          check +
          '<span class="catalog-diff-label">' + escapeHtml(CATALOG_FIELD_LABELS[c.field] || c.field) + '</span>' +
          '<span>' +
            '<div class="catalog-diff-old">' + formatCatalogDiffValue(c.before, c.field, bf) + '</div>' +
            '<div class="catalog-diff-new">' + formatCatalogDiffValue(c.after, c.field, af) + '</div>' +
          '</span>' +
        '</label>';
      }).join('') + '</div>';
    }

    function placesWithCatalogUpdates() {
      return (state.places || []).filter(p => findCatalogUpdate(p));
    }

    // Update a single rendered place card in place: name, note, badge state.
    // Used after Apply / Keep so the list doesn't visibly re-render.
    function updatePlaceCardAfterCatalogChange(place) {
      if (!place) return;
      const card = document.querySelector('.place-card[data-place-slug="' + (place._slug || '') + '"]');
      if (!card) return;
      const nameEl = card.querySelector('.name');
      if (nameEl) nameEl.textContent = place.name;
      const placeText = card.querySelector('.place-text');
      if (placeText) {
        let noteEl = placeText.querySelector('.note');
        if (place.note) {
          if (!noteEl) {
            noteEl = document.createElement('div');
            noteEl.className = 'note';
            placeText.appendChild(noteEl);
          }
          noteEl.textContent = place.note;
        } else if (noteEl) {
          noteEl.remove();
        }
      }
      const upd = findCatalogUpdate(place);
      const badge = card.querySelector('.catalog-mark');
      if (badge) {
        badge.classList.toggle('update-available', !!upd);
        badge.title = upd
          ? 'Catalog updated this entry (' + upd.changes.length + ' field' + (upd.changes.length === 1 ? '' : 's') + '). Click to review.'
          : 'Imported from the site catalog';
      }
      // If the user is filtered to "Updates available" and this place no longer
      // has any, fade the card out so the list reflects the filter. If that
      // leaves the group empty, fade the group header out too.
      if (state.placeFilters && state.placeFilters.catalog === 'updates-available' && !upd) {
        const group = card.closest('.category-group');
        card.style.transition = 'opacity 0.2s ease';
        card.style.opacity = '0';
        setTimeout(() => {
          card.remove();
          if (group && !group.querySelector('.place-card')) {
            group.style.transition = 'opacity 0.2s ease';
            group.style.opacity = '0';
            setTimeout(() => group.remove(), 220);
          }
        }, 220);
      }
    }

    // Build the refreshed place object. `applyFields` (set of field names) is
    // the user's selection from the per-field checkboxes; for fields outside
    // that set we keep the local value and record the upstream value in
    // `catalog_skip` so we don't re-prompt until the catalog changes again.
    // When `applyFields` is omitted, every catalog-tracked field is applied
    // (used by the bulk-refresh path).
    function buildCatalogRefreshPayload(place, entry, changes, applyFields) {
      const next = {};
      const applyAll = !applyFields;
      for (const f of CATALOG_TRACKED_FIELDS) {
        const ev = entry[f];
        const apply = applyAll || applyFields.has(f);
        if (apply) {
          if (ev !== undefined && ev !== null && ev !== '') next[f] = ev;
        } else {
          // Keep local value (or absence) for this field.
          if (place[f] !== undefined && place[f] !== null && place[f] !== '') next[f] = place[f];
        }
      }
      if (place.visited) next.visited = true;
      if (place.date_visited) next.date_visited = place.date_visited;
      if (place.rating) next.rating = place.rating;
      next.from_catalog = entry.name;
      // Carry over prior skips, drop any whose catalog value is now being
      // applied (no longer needed) or where the catalog has moved away from
      // the recorded snapshot (it will surface as a fresh diff next round).
      const prevSkip = place.catalog_skip || {};
      const nextSkip = {};
      const norm = v => {
        if (v === undefined || v === null) return null;
        if (typeof v === 'string') return v.trim() || null;
        if (Array.isArray(v)) return v.length ? v.map(norm) : null;
        return v;
      };
      const eq = (a, b) => {
        if (a === b) return true;
        if (a === null || b === null) return a === b;
        if (Array.isArray(a) && Array.isArray(b)) return a.length === b.length && a.every((x, i) => eq(x, b[i]));
        return false;
      };
      for (const f in prevSkip) {
        if (applyAll || applyFields.has(f)) continue;
        if (!eq(norm(prevSkip[f]), norm(entry[f]))) continue;
        nextSkip[f] = prevSkip[f];
      }
      // Add new skips for the currently-shown diff fields the user kept local.
      if (changes && !applyAll) {
        for (const c of changes) {
          if (applyFields.has(c.field)) continue;
          const v = entry[c.field];
          nextSkip[c.field] = (v === undefined ? null : v);
        }
      }
      if (Object.keys(nextSkip).length) next.catalog_skip = nextSkip;
      return next;
    }

    function openCatalogBulkUpdateModal() {
      const pending = placesWithCatalogUpdates();
      if (!pending.length) { alert('No catalog updates available.'); return; }
      const head = pending.slice(0, 8).map(p => {
        const r = findCatalogUpdate(p);
        const n = r ? r.changes.length : 0;
        return '<li>' + escapeHtml(p.name) + ' <span style="color:var(--muted)">(' + n + ' field' + (n === 1 ? '' : 's') + ')</span></li>';
      }).join('');
      const more = pending.length > 8 ? '<li style="color:var(--muted)">+ ' + (pending.length - 8) + ' more</li>' : '';
      openModal(
        '<h2>Refresh from catalog<button class="modal-close">&times;</button></h2>' +
        '<div class="modal-desc">' + pending.length + ' place' + (pending.length === 1 ? '' : 's') + ' will be refreshed. Visit status, date, and rating are preserved.</div>' +
        '<ul style="font-size:0.78rem;margin:0.6rem 0 0.4rem;padding-left:1.2rem">' + head + more + '</ul>' +
        '<div class="modal-error" id="catalog-bulk-error"></div>' +
        '<div class="modal-actions" style="display:flex;align-items:center;gap:0.6rem">' +
          '<span id="catalog-bulk-status" style="font-size:0.75rem;color:var(--muted);flex:1"></span>' +
          '<button type="button" data-role="cancel">Cancel</button>' +
          '<button type="button" class="primary" id="catalog-bulk-confirm">Refresh all</button>' +
        '</div>',
        function(backdrop) {
          backdrop.querySelector('[data-role="cancel"]').addEventListener('click', () => closeModal());
          document.getElementById('catalog-bulk-confirm').addEventListener('click', function() {
            const btn = this;
            const status = document.getElementById('catalog-bulk-status');
            btn.disabled = true;
            const errors = [];
            let i = 0;
            (function next() {
              if (i >= pending.length) {
                refreshPlaces().then(() => {
                  refreshPlacesPresentation();
                  closeModal();
                  if (errors.length) alert('Refresh complete with errors:\n' + errors.join('\n'));
                }).catch(err => { btn.disabled = false; alert('Failed: ' + err.message); });
                return;
              }
              const place = pending[i];
              const result = findCatalogUpdate(place);
              status.textContent = 'Refreshing ' + (i + 1) + ' of ' + pending.length + '…';
              if (!result) { i++; return next(); }
              api('PUT', '/places', { id: place.id, place: buildCatalogRefreshPayload(place, result.entry, result.changes) })
                .catch(err => errors.push((place.name) + ': ' + err.message))
                .then(() => { i++; next(); });
            })();
          });
        }
      );
    }

    function openCatalogUpdateModal(place) {
      const result = findCatalogUpdate(place);
      if (!result) {
        // Badge was tagged update-available but the cache shifted (admin
        // toggled baseline off, or another tab refreshed). Treat as no-op.
        alert('No catalog updates for this place.');
        return;
      }
      const { entry, changes } = result;
      openModal(
        '<h2>Update from catalog<button class="modal-close">&times;</button></h2>' +
        renderCatalogDiff(changes, { selectable: true, place, entry }) +
        '<div class="modal-actions">' +
          '<button type="button" class="primary" id="catalog-update-skip" style="margin-right:auto">Keep all</button>' +
          '<button type="button" class="primary" id="catalog-update-confirm">' +
            '<span class="lbl-default">Apply all</span>' +
            '<span class="lbl-alt">Apply</span>' +
          '</button>' +
        '</div>',
        function(backdrop) {
          const applyBtn = document.getElementById('catalog-update-confirm');
          const skipBtn = document.getElementById('catalog-update-skip');
          function selectedFields() {
            const set = new Set();
            backdrop.querySelectorAll('.catalog-diff-check').forEach(cb => {
              if (cb.checked) set.add(cb.dataset.field);
            });
            return set;
          }
          function syncButtons() {
            const any = selectedFields().size > 0;
            applyBtn.classList.add('primary');
            applyBtn.classList.toggle('has-selection', any);
            skipBtn.classList.toggle('primary', !any);
            skipBtn.disabled = any;
          }
          backdrop.querySelectorAll('.catalog-diff-check').forEach(cb => cb.addEventListener('change', syncButtons));
          function submit(applyFields, btn) {
            btn.disabled = true;
            api('PUT', '/places', { id: place.id, place: buildCatalogRefreshPayload(place, entry, changes, applyFields) })
              .then(() => refreshPlaces())
              .then(() => {
