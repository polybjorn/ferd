    .leaflet-div-icon { background: transparent; border: none; }
    [data-tile-filter="desaturated"] .leaflet-tile { filter: saturate(0.5); }
    [data-tile-filter="muted"] .leaflet-tile { filter: saturate(0.35) brightness(0.95) contrast(0.95); }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-weight: 300;
    }


    a { color: var(--accent); text-decoration: none; }
    a:hover { opacity: 0.8; }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 1rem;
      padding: 0 1.5rem;
      height: 50px;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-self: end;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.05em;
      white-space: nowrap;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      justify-self: start;
    }
    .nav-brand a { color: var(--text); text-decoration: none; }
    #nav-back { display: none; opacity: 0.5; margin-right: 0.4rem; }
    #nav-crumb { color: var(--muted); }

    .nav-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 0;
      white-space: nowrap;
      justify-self: center;
    }

    .nav-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .nav-group + .nav-group {
      margin-left: 0.5rem;
      padding-left: 1.25rem;
      border-left: 1px solid var(--border);
    }

    .nav-stat { display: flex; align-items: center; gap: 0.3rem; }
    .nav-stat .label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav-stat .value { font-weight: 300; color: var(--text); }
    .nav-stat a { color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
    .nav-stat a:hover { text-decoration: underline; }

    /* View tabs */
    .view-tabs {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      flex-shrink: 0;
      justify-self: end;
    }
    .view-tabs a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      padding: 0.4rem 0.7rem;
      transition: background 0.15s, color 0.15s;
    }
    .view-tabs a + a { border-left: 1px solid var(--border); }
    .view-tabs a:hover { color: var(--text); opacity: 1; }
    .view-tabs a.active { background: var(--surface2); color: var(--text); }

    /* App container */
    #app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      height: calc(100vh - 50px);
      overflow-y: overlay;
      padding: 2rem 1.5rem 2rem;
      box-sizing: border-box;
    }

    #app:has(#map),
    #app:has(.detail-layout) {
      overflow: hidden;
      padding: 0;
      position: relative;
      max-width: none;
    }

    /* Index grids (places + trails) */
    .category-grid,
    .region-grid {
      columns: 2;
      column-gap: 1.5rem;
    }

    .category-group,
    .region-group {
      margin-bottom: 1.5rem;
      break-inside: avoid;
    }

    .category-group:only-child,
    .region-group:only-child { column-span: all; }

    .category-label,
    .region-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .place-count,
    .route-count {
      font-size: 0.65rem;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .category-grid, .region-grid { columns: 1; }
    }

    /* Places index */
    .index-controls {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      align-items: center;
    }

    .index-controls input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 0.6rem 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 300;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .index-controls input[type="text"]::placeholder { color: var(--muted); }
    .index-controls input[type="text"]:focus { border-color: var(--accent); }

    .group-toggle {
      display: flex;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .group-toggle button {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 400;
      font-family: inherit;
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.03em;
    }
    .group-toggle button + button { border-left: 1px solid var(--border); }
    .group-toggle button.active { background: var(--surface2); color: var(--text); }
    .group-toggle button:hover:not(.active) { color: var(--text); }

    .place-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.5rem;
    }

    .place-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .place-card:hover { border-color: var(--border-hover); }
    .place-card .status-dot { margin-top: 0.35rem; }
    .place-card .place-text { min-width: 0; flex: 1; }
    .place-card .name { font-size: 0.85rem; font-weight: 300; }
    .place-card .note { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.visited { background: var(--green); }
    .status-dot.want { background: var(--red); }
    .status-dot.completed { background: var(--completed); }
    .status-dot.planned { background: var(--planned); }

    /* Trails index */
    .route-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.5rem;
    }

    .route-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .route-card:hover { border-color: var(--border-hover); }
    .route-card .name {
      font-size: 0.85rem;
      font-weight: 300;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Map view */
    #map {
      width: 100%;
      height: 100%;
      background: var(--surface);
      box-sizing: border-box;
    }

    .map-panel {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      min-width: 200px;
      max-width: 260px;
    }

    .panel-search {
      padding: 0.45rem 0.65rem;
      position: relative;
    }

    .panel-search input {
      width: 100%;
      padding: 0.4rem 0.6rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.7rem;
      font-weight: 300;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .panel-search input::placeholder { color: var(--muted); }
    .panel-search input:focus { border-color: var(--accent); }

    .map-search-results {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      margin-bottom: 0.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 240px;
      overflow-y: auto;
      display: none;
    }
    .map-search-results.visible { display: block; }
    .map-search-result {
      padding: 0.45rem 0.75rem;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text);
    }
    .map-search-result:hover { background: var(--surface2); }
    .map-search-result .result-dot,
    .map-search-result .result-line {
      flex-shrink: 0;
    }
    .map-search-result .result-dot { width: 6px; height: 6px; border-radius: 50%; }
    .map-search-result .result-line { width: 12px; height: 2px; border-radius: 1px; }
    .map-search-result .result-meta { color: var(--muted); margin-left: auto; font-size: 0.6rem; }

    /* Filter panel sections */
    .panel-section {
      border-top: 1px solid var(--border);
    }

    .panel-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      user-select: none;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.03em;
    }
    .panel-section-header .section-arrow {
      font-size: 0.55rem;
      color: var(--muted);
      transition: transform 0.15s;
    }
    .panel-section.collapsed .section-arrow { transform: rotate(-90deg); }
    .panel-section.collapsed .panel-section-body { display: none; }

    .panel-section-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .panel-action {
      font-size: 0.6rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
    }
    .panel-action:hover { color: var(--text); }

    .panel-section-body {
      border-top: 1px solid var(--border);
      padding: 0.4rem 0.65rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .legend-cats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.15rem 0.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.65rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
      padding: 0.15rem 0;
    }
    .legend-item.disabled { opacity: 0.35; }

    .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .legend-line { width: 14px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    .legend-status {
      display: flex;
      justify-content: center;
      gap: 0.35rem;
      margin-top: 0.25rem;
      padding-top: 0.35rem;
      border-top: 1px solid var(--border);
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.6rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      padding: 0.2rem 0.45rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      transition: opacity 0.15s, border-color 0.15s;
    }
    .status-chip.active { border-color: var(--border-hover); color: var(--text); }
    .status-chip:hover { border-color: var(--border-hover); }

    /* Trails detail view */
    .detail-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0;
      max-width: none;
      margin: 0 auto;
      box-sizing: border-box;
    }
    .detail-layout #map {
      flex: 1;
      min-height: 200px;
    }

    .elevation-wrap {
      margin-top: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 0;
      overflow: hidden;
      background: var(--surface);
      flex-shrink: 0;
    }
    .elevation-wrap .elevation-detached { margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; }
    .elevation-wrap .elevation-detached svg { width: 100% !important; display: block; margin-top: -8px; margin-bottom: -20px; }
    .elevation-wrap .elevation-detached .elevation-summary { display: none !important; }
    .elevation-wrap .elevation-detached .elevation-toggle-icon { display: none !important; }

    .mobile-stats {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: var(--muted);
      flex-shrink: 0;
    }
    .mobile-stats .stats-meta { display: flex; gap: 0.5rem; align-items: center; }
    .mobile-stats .stats-data { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .mobile-stats .stat { display: flex; align-items: center; gap: 0.25rem; white-space: nowrap; }
    .mobile-stats .stat .label { font-size: 0.55rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .mobile-stats .stat .value { color: var(--text); font-weight: 300; }

    .no-elevation-notice {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.75rem;
    }

    /* Multi-track */
    #track-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .track-legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .track-legend-color {
      width: 16px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .track-legend-item .track-name { color: var(--text); font-weight: 400; }
    .track-legend-item .track-stat { font-size: 0.6rem; }

    #multi-elevation-container {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 50vh;
    }
    .elevation-track-panel {
      border: 1px solid var(--border);
      overflow: hidden;
      background: var(--surface);
    }
    .elevation-track-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.3rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
    }
    .elevation-track-label::after {
      content: '';
      margin-left: auto;
      border: 4px solid transparent;
      border-top: 5px solid var(--muted);
      transition: transform 0.15s;
    }
    .elevation-track-panel.collapsed .elevation-track-label::after { transform: rotate(-90deg); }
    .elevation-track-panel .elevation-track-chart { transition: max-height 0.2s ease; overflow: hidden; }
    .elevation-track-panel.collapsed .elevation-track-chart { max-height: 0 !important; }
    .elevation-track-label .color-dot { width: 8px; height: 3px; border-radius: 2px; }
    .elevation-track-panel .elevation-detached { margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; }
    .elevation-track-panel .elevation-detached svg { width: 100% !important; display: block; margin-top: -8px; margin-bottom: -20px; }
    .elevation-track-panel .elevation-detached .elevation-summary { display: none !important; }
    .elevation-track-panel .elevation-detached .elevation-toggle-icon { display: none !important; }
    .elevation-track-panel .elevation-control .area { fill: var(--track-color, var(--accent)); fill-opacity: 0.35; stroke: var(--track-color, var(--accent)); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Leaflet overrides */
    .leaflet-bar { border-radius: var(--radius) !important; }
    .leaflet-bar a:first-child { border-radius: var(--radius) var(--radius) 0 0 !important; }
    .leaflet-bar a:last-child { border-radius: 0 0 var(--radius) var(--radius) !important; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface2) !important; }

    .leaflet-top .leaflet-control, .leaflet-bottom .leaflet-control { margin: 5px !important; }
    .leaflet-control-attribution {
      background: var(--attribution-bg) !important;
      color: var(--muted) !important;
      font-size: 0.6rem !important;
      border-radius: var(--radius) !important;
    }
    .leaflet-control-attribution a { color: var(--accent) !important; }

    .leaflet-tooltip {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      font-size: 0.8rem;
      font-weight: 300;
      white-space: pre;
      box-shadow: 0 2px 8px var(--shadow) !important;
    }
    .leaflet-tooltip-top::before { border-top-color: var(--border) !important; }
    .leaflet-tooltip-bottom::before { border-bottom-color: var(--border) !important; }

    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-radius: var(--radius) !important;
      box-shadow: 0 2px 8px var(--shadow) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { font-size: 0.8rem; font-weight: 300; margin: 10px 14px; position: relative; }
    .leaflet-popup-content a { color: var(--accent); }
    .leaflet-popup-content .popup-name { font-weight: 400; font-size: 0.85rem; margin-bottom: 0.25rem; padding-right: 4.5rem; }
    .leaflet-popup-content .popup-share-corner {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 0.7rem;
      color: inherit;
      cursor: pointer;
      opacity: 0.7;
    }
    .leaflet-popup-content .popup-share-corner:hover { opacity: 1; }
    .leaflet-popup-content .popup-local { font-size: 0.75rem; color: var(--muted); font-weight: 300; font-style: italic; }
    .leaflet-popup-content .cat-text { color: var(--c); }
    [data-mode="light"] .leaflet-popup-content .cat-text { color: var(--cl); }
    .leaflet-popup-content .popup-note { color: var(--muted); font-size: 0.75rem; }
    .leaflet-popup-content .popup-sources { font-size: 0.65rem; margin-top: 0.3rem; }
    .leaflet-popup-content .popup-sources a { color: var(--accent); }
    .leaflet-popup-content .popup-meta {
      margin-top: 0.5rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .leaflet-popup-content .popup-meta a { color: inherit; cursor: pointer; text-transform: none; letter-spacing: normal; font-size: 0.7rem; }

    .leaflet-control-layers { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) !important; color: var(--text) !important; padding: 0 !important; }
    .leaflet-control-layers-toggle { width: 36px !important; height: 36px !important; padding: 6px !important; background-size: 24px 24px !important; }
    .leaflet-control-layers label { color: var(--text); }
    .leaflet-control-layers-separator { border-color: var(--border) !important; }

    /* Cluster overrides */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background: var(--cluster-halo) !important;
    }
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
      background: var(--cluster-fill) !important;
      color: #fff !important;
      font-weight: 400;
      font-size: 0.75rem;
    }

    /* Elevation control */
    .elevation-control .background { fill: var(--surface); }
    .elevation-control .area { fill: var(--accent); fill-opacity: 0.35; stroke: var(--accent); }
    .elevation-control .axis text { fill: var(--text); font-size: 10px; text-shadow: none; paint-order: normal; stroke: none; }
    .elevation-control .axis line, .elevation-control .axis path { stroke: var(--border); }
    .elevation-control .mouse-focus-line { stroke: var(--text); }
    .elevation-detached:not(:hover) .mouse-focus-line,
    .elevation-detached:not(:hover) .mouse-focus-label { display: none; }
    .leaflet-elevation-pane .elevation-summary { background: var(--surface) !important; color: var(--text) !important; }
    .elevation-control .close-button, .elevation-control .elevation-toggle-icon, .elevation-detached .leaflet-close { display: none !important; }
    .leaflet-overlay-pane .leaflet-interactive { filter: drop-shadow(0 0 3px rgba(0,0,0,0.5)); }
    .marker-start, .marker-end { background: none !important; border: none !important; }

    @media (max-width: 900px) {
      #app { padding: 1rem 1rem 3rem; }
      .place-grid, .route-grid { grid-template-columns: 1fr; }
      .detail-layout { padding: 0; }
      nav { padding: 0.6rem 1rem; gap: 0.5rem; }
      .nav-info { gap: 0.4rem; flex-wrap: wrap; }
      .nav-group { gap: 0.4rem; }
      .nav-group + .nav-group { padding-left: 0.4rem; }
      .nav-stat .label { font-size: 0.5rem; }
      .nav-route-meta { display: none; }
      #nav-stats-dynamic { display: none; }
      .mobile-stats { display: flex; }
      #track-legend { gap: 0.4rem; padding: 0.4rem 0.5rem; }
      .track-legend-item .track-stat { display: none; }
      #multi-elevation-container { max-height: 40vh; }
      .map-panel { max-width: calc(100vw - 40px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease both; }

    /* Auth widget in nav */
    .auth-widget {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
      font-size: 0.7rem;
      position: relative;
    }
    .auth-widget button, .auth-widget a {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      padding: 0.35rem 0.6rem;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.15s, border-color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .auth-widget button:hover, .auth-widget a:hover {
      color: var(--text);
      border-color: var(--border-hover);
      opacity: 1;
    }
    .auth-widget .caret { font-size: 0.55rem; opacity: 0.7; }
    .auth-menu {
      position: absolute;
      top: calc(100% + 0.4rem);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      min-width: 160px;
      z-index: 1500;
      padding: 0.25rem;
    }
    .auth-menu[hidden] { display: none; }
    .auth-menu .auth-menu-header {
      padding: 0.5rem 0.7rem 0.4rem;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.25rem;
    }
    .auth-menu .auth-menu-header strong { color: var(--text); font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 0.8rem; display: block; margin-top: 0.15rem; }
    .auth-menu button {
      display: flex;
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.75rem;
      text-align: left;
      padding: 0.5rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      justify-content: flex-start;
    }
    .auth-menu button:hover { background: var(--surface2); color: var(--text); border-color: transparent; }

    /* Floating add button */
    .fab-add {
      position: absolute;
      bottom: 2rem;
      right: 0.75rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--fab-text);
      border: none;
      font-size: 1.5rem;
      font-weight: 400;
      cursor: pointer;
      box-shadow: 0 4px 14px var(--shadow);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    .fab-add:hover { transform: scale(1.05); }

    body.map-chrome-hidden .leaflet-control-container,
    body.map-chrome-hidden .fab-add,
    body.map-chrome-hidden .map-panel { display: none !important; }

    /* "Pick on map" inline button for the Add Place form */
    .pick-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.4rem;
    }
    .pick-row button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      padding: 0.35rem 0.7rem;
      border-radius: var(--radius);
      cursor: pointer;
    }
    .pick-row button:hover { color: var(--text); border-color: var(--border-hover); }

    /* "Add new" toggle for category/region selects */
    .select-or-new { display: flex; flex-direction: column; gap: 0.4rem; }
    .select-or-new .new-input[hidden] { display: none; }

    /* Settings modal sub-sections */
    .modal h3.settings-h {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .modal h3.settings-h:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .session-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .session-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface2);
    }
    .session-meta { flex: 1; min-width: 0; }
    .session-device { font-size: 0.78rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    .session-current {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      border: 1px solid rgba(40,202,65,0.3);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
    }
    .session-sub { font-size: 0.65rem; color: var(--muted); margin-top: 0.15rem; }
    .session-revoke {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--red);
      font-size: 0.7rem;
      padding: 0.3rem 0.6rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: inherit;
    }
    .session-revoke:hover:not(:disabled) { border-color: var(--red); }
    .session-revoke:disabled { opacity: 0.5; cursor: not-allowed; }

    .radio-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .radio-row label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
    }
    .radio-row input { width: auto; }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: var(--backdrop);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 440px;
      max-height: calc(100vh - 2rem);
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 10px 40px var(--shadow);
    }
    .modal h2 {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal h2 .modal-close {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
    }
    .modal h2 .modal-close:hover { color: var(--text); }
    .modal-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .modal-tabs button {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .modal-tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
    .modal-tabs button:hover:not(.active) { color: var(--text); }
    .modal label {
      display: block;
      font-size: 0.8rem;
      color: var(--text);
      margin-bottom: 0.3rem;
      margin-top: 0.75rem;
    }
    .modal input[type="text"],
    .modal input[type="password"],
    .modal input[type="number"],
    .modal input[type="file"],
    .modal textarea,
    .modal select {
      width: 100%;
      padding: 0.5rem 0.7rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 300;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--accent); }
    .modal textarea { min-height: 60px; resize: vertical; }
    .modal .row { display: flex; gap: 0.5rem; }
    .modal .row > * { flex: 1; }
    .modal .checkbox-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem; }
    .modal .checkbox-row input { width: auto; }
    .modal .checkbox-row label { margin: 0; text-transform: none; letter-spacing: 0; font-size: 0.8rem; color: var(--text); }
    .feature-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .feature-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .feature-pill { position: relative; }
    .modal label.feature-pill {
      display: inline-flex;
      font-size: 0.8rem;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      margin: 0;
    }
    .modal label.feature-pill.active { color: var(--text); }
    .feature-pill > input[type="checkbox"] { display: none !important; }
    .feature-pill:hover { border-color: var(--border-hover); color: var(--text); }
    .feature-pill.active {
      color: var(--text);
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, var(--surface2));
    }
    .modal .modal-error {
      margin-top: 0.75rem;
      padding: 0.5rem 0.7rem;
      background: rgba(255,95,87,0.1);
      border: 1px solid rgba(255,95,87,0.3);
      border-radius: var(--radius);
      color: var(--red);
      font-size: 0.75rem;
      display: none;
    }
    .modal .modal-error.visible { display: block; }
    .modal .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }
    .modal button:not(h2 .modal-close) {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.5rem 0.9rem;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .modal button.primary {
      background: var(--accent);
      color: var(--fab-text);
      border-color: var(--accent);
    }
    .modal button:not(h2 .modal-close):hover:not(:disabled) { color: var(--text); border-color: var(--border-hover); }
    .modal button.primary:hover { opacity: 0.9; color: var(--fab-text); }
    .modal button:not(h2 .modal-close):disabled { opacity: 0.4; cursor: not-allowed; }
    .modal .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }
    .pick-coords-banner {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: var(--fab-text);
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.75rem;
      z-index: 1500;
      box-shadow: 0 2px 8px var(--shadow);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">
      <a href="#/" id="nav-home"><span id="nav-back">&larr;</span><span id="nav-brand-text">Atlas</span></a><span id="nav-crumb"></span>
    </span>
    <div class="nav-info" id="nav-info"></div>
    <div class="nav-right">
      <div class="view-tabs">
        <a href="#/places" data-view="places" id="tab-places">Places</a>
        <a href="#/trails" data-view="trails" id="tab-trails">Trails</a>
      </div>
      <div class="auth-widget" id="auth-widget"></div>
    </div>
  </nav>
  <div id="app"><div class="loading">Loading...</div></div>
  <div id="modal-root"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.2/gpx.min.js"></script>
  <script src="https://unpkg.com/@raruto/leaflet-elevation@2.5.2/dist/leaflet-elevation.js"></script>
  <script>
    // ----- Shared -----
    const COLORS       = ['#6aaeee', '#c792ea', '#ffbd2e', '#89ddff', '#f78c6c', '#c3e88d', '#ff5370', '#82b1ff', '#f07178', '#c17e70'];
    const COLORS_LIGHT = ['#1e6fbf', '#7e3fb0', '#8f6200', '#0e7490', '#b34a20', '#4d7a1f', '#c41142', '#2952c4', '#b8313a', '#7a3e30'];
    if (COLORS.length !== COLORS_LIGHT.length) console.warn('COLORS and COLORS_LIGHT length mismatch');
    const TRACK_COLORS = COLORS;
    const ROUTE_COLOR = '#6aaeee';
    const COMPLETED_COLOR = '#00e05a';
    const PLANNED_COLOR = '#ff6b6b';

    const DEFAULT_CONFIG = {
      brand: 'Atlas',
      features: { places: true, trails: true },
      default_view: { center: [45, 10], zoom: 4 },
      default_view_trails: { center: [59.5, 6.5], zoom: 10 },
      category_labels: {},
      api_base: '/api',
    };

    function placesAvailable() { return state.config.features.places !== false; }
    function trailsAvailable() { return state.config.features.trails !== false; }
    function getHiddenFeatures() {
      try {
        const raw = localStorage.getItem('atlas-hidden-features');
        return raw ? new Set(JSON.parse(raw)) : new Set();
      } catch { return new Set(); }
    }
    function setFeatureHidden(name, hidden) {
      const s = getHiddenFeatures();
      if (hidden) s.add(name); else s.delete(name);
      try { localStorage.setItem('atlas-hidden-features', JSON.stringify([...s])); } catch {}
    }
    function placesEnabled() { return placesAvailable() && !getHiddenFeatures().has('places'); }
    function trailsEnabled() { return trailsAvailable() && !getHiddenFeatures().has('trails'); }

    function getPref(key, def) {
      try { const v = localStorage.getItem(key); return v === null ? def : v; }
      catch { return def; }
    }
    function setPref(key, val) { try { localStorage.setItem(key, val); } catch {} }
    function getDefaultTileLayer() { return getPref('atlas-tile-layer', 'Satellite'); }
    function getRememberView() { return getPref('atlas-remember-view', 'true') !== 'false'; }
    function getUnits() { return getPref('atlas-units', 'metric'); }
    function getClusterPlaces() { return getPref('atlas-cluster-places', 'true') !== 'false'; }
    function isImperial() { return getUnits() === 'imperial'; }
    function loadStoredView() {
      try {
        const raw = localStorage.getItem('atlas-last-view');
        if (!raw) return null;
        const v = JSON.parse(raw);
        return (v && Array.isArray(v.center) && typeof v.zoom === 'number') ? v : null;
      } catch { return null; }
    }
    function saveStoredView(view) {
      try { localStorage.setItem('atlas-last-view', JSON.stringify(view)); } catch {}
    }

    function refreshTabVisibility() {
      const tabPlaces = document.getElementById('tab-places');
      const tabTrails = document.getElementById('tab-trails');
      if (tabPlaces) tabPlaces.style.display = placesEnabled() ? '' : 'none';
      if (tabTrails) tabTrails.style.display = trailsEnabled() ? '' : 'none';
    }

    const state = {
      config: DEFAULT_CONFIG,
      auth: { authenticated: false, username: null, is_operator: false, registration_open: true, has_users: false, requires_setup_token: false },
      currentMap: null,
      currentElevation: null,
      // data
      places: null,
      manifest: null,
      categoryColors: {},
      categoryColorsLight: {},
      // browse-list state
      groupBy: 'category',
      // unified-map filter state
      hiddenCategories: new Set(),
      showVisited: true,
      showWant: true,
      showCompleted: true,
      showPlanned: true,
      showPlaces: true,
      showTrails: true,
      // unified-map layer refs
      _placeMarkers: null,
      _placeClusterGroup: null,
      _trailLayers: null,        // [{ route, layer, completed }]
      _trailGroupCompleted: null,
      _trailGroupPlanned: null,
    };

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function displayCategory(cat) {
      const labels = (state.config && state.config.category_labels) || {};
      return labels[cat] || cat.charAt(0).toUpperCase() + cat.slice(1);
    }

    function domainFromUrl(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); }
      catch { return url; }
    }

    function slugify(s) {
      if (!s) return '';
      const cleaned = s
        .toLowerCase()
        .replace(/æ/g, 'ae').replace(/ø/g, 'o').replace(/å/g, 'a')
        .replace(/ä/g, 'a').replace(/ö/g, 'o').replace(/ü/g, 'u').replace(/ß/g, 'ss')
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
      return cleaned || encodeURIComponent(s.toLowerCase());
    }

    function assignPlaceSlugs(places) {
      if (!places) return;
      const used = new Set();
      for (const p of places) {
        const base = slugify(p.name);
        let slug = base;
        let n = 2;
        while (used.has(slug)) { slug = base + '-' + n; n++; }
        used.add(slug);
        p._slug = slug;
      }
    }

    function assignTrailSlugs(manifest) {
      if (!manifest || !manifest.regions) return;
      const used = new Set();
      for (const region of manifest.regions) {
        region._slug = slugify(region.name);
        for (const route of region.routes) {
          const base = region._slug + '/' + slugify(route.name);
          let slug = base;
          let n = 2;
          while (used.has(slug)) { slug = base + '-' + n; n++; }
          used.add(slug);
          route._slug = slug;
        }
      }
    }

    function renderSources(sources) {
      if (!sources || sources.length === 0) return '';
      return sources.map(s => {
        let url;
        try { url = new URL(s, location.href); } catch { return escapeHtml(s); }
        if (url.protocol !== 'http:' && url.protocol !== 'https:') return escapeHtml(s);
        return '<a href="' + escapeHtml(url.href) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(domainFromUrl(s)) + ' &#x2197;</a>';
      }).join(' &middot; ');
    }

    function assignCategoryColors(places) {
      const cats = [...new Set(places.map(p => p.category))].sort();
      const dark = {}, light = {};
      cats.forEach((c, i) => {
        const idx = i % COLORS.length;
        dark[c] = COLORS[idx];
        light[c] = COLORS_LIGHT[idx];
      });
      return { dark, light };
    }

    function createTileLayers() {
      return {
        'OpenTopoMap': L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
          maxZoom: 17, subdomains: 'abc',
          attribution: 'Map: <a href="https://opentopomap.org">OpenTopoMap</a> &middot; Data: <a href="https://openstreetmap.org">OSM</a>',
        }),
        'CyclOSM': L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', {
          maxZoom: 20, subdomains: 'abc',
          attribution: '<a href="https://github.com/cyclosm/cyclosm-cartocss-style/releases">CyclOSM</a> &middot; <a href="https://openstreetmap.org">OSM</a>',
        }),
        'Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
          maxZoom: 19,
          attribution: '<a href="https://www.esri.com">Esri</a>',
        }),
        'Dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          maxZoom: 20, subdomains: 'abcd',
          attribution: '<a href="https://carto.com/attributions">CARTO</a> &middot; <a href="https://openstreetmap.org">OSM</a>',
        }),
        'OpenStreetMap': L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '<a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
        }),
      };
    }

    function addTileLayersToMap(map) {
      const layers = createTileLayers();
      const def = getDefaultTileLayer();
      (layers[def] || layers['Satellite']).addTo(map);
      L.control.layers(layers, null, { position: 'topright' }).addTo(map);
    }

    function cleanupMap() {
      if (state.currentElevation) {
        const controls = Array.isArray(state.currentElevation) ? state.currentElevation : [state.currentElevation];
        for (const ctrl of controls) { try { ctrl.remove(); } catch (e) {} }
        state.currentElevation = null;
      }
      if (state.currentMap) {
        state.currentMap.remove();
        state.currentMap = null;
      }
      state._placeMarkers = null;
      state._placeClusterGroup = null;
      state._trailLayers = null;
      state._trailGroupCompleted = null;
      state._trailGroupPlanned = null;
    }

    function formatDistance(m) {
      if (isImperial()) {
        const mi = m / 1609.344;
        return mi >= 0.1 ? mi.toFixed(1) + ' mi' : Math.round(m * 3.28084) + ' ft';
      }
      return m >= 1000 ? (m / 1000).toFixed(1) + ' km' : Math.round(m) + ' m';
    }
    function formatElevation(m) {
      if (isImperial()) return Math.round(m * 3.28084) + ' ft';
      return Math.round(m) + ' m';
    }

    function setActiveTab(view) {
      ['places', 'trails'].forEach(v => {
        document.getElementById('tab-' + v).classList.toggle('active', v === view);
      });
    }

    function setCrumb(text, showBack) {
      document.getElementById('nav-crumb').textContent = text ? ' / ' + text : '';
      document.getElementById('nav-back').style.display = showBack ? 'inline' : 'none';
    }

    function createMarkerIcon(color, visited) {
      const size = getMarkerSize(), cx = size / 2, cy = size / 2;
      const style = getPinStyle();
      let svg, iconSize, iconAnchor;
      if (style === 'pin') {
        const w = size + 4;
        const h = Math.round(w * 33 / 24);
        const pinPath = 'M12 0C5.37 0 0 5.37 0 12c0 9 12 21 12 21s12-12 12-21C24 5.37 18.63 0 12 0z';
        if (visited) {
          svg = '<svg viewBox="0 0 24 33" width="' + w + '" height="' + h + '">' +
            '<path d="' + pinPath + '" fill="' + color + '"/>' +
            '<circle cx="12" cy="12" r="4" fill="#fff"/>' +
            '</svg>';
        } else {
          svg = '<svg viewBox="-1.5 -1.5 27 36" width="' + w + '" height="' + h + '">' +
            '<path d="' + pinPath + '" fill="' + color + '" fill-opacity="0.25" stroke="' + color + '" stroke-width="2"/>' +
            '</svg>';
        }
        iconSize = [w, h];
        iconAnchor = [w / 2, h];
      } else if (style === 'dot') {
        const r = Math.max(3, Math.round(size * 0.35));
        svg = '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + color + '"' + (visited ? '' : ' fill-opacity="0.5"') + '/>' +
          '</svg>';
        iconSize = [size, size];
        iconAnchor = [size / 2, size / 2];
      } else if (style === 'tag') {
        const w = size + 6;
        const h = Math.round(w * 24 / 22);
        const flagPath = 'M0 0 L22 0 L22 10 L2 10 L2 24 L0 24 Z';
        if (visited) {
          svg = '<svg viewBox="0 0 22 24" width="' + w + '" height="' + h + '">' +
            '<path d="' + flagPath + '" fill="' + color + '"/>' +
            '</svg>';
        } else {
          svg = '<svg viewBox="-1.5 -1.5 25 27" width="' + w + '" height="' + h + '">' +
            '<path d="' + flagPath + '" fill="' + color + '" fill-opacity="0.25" stroke="' + color + '" stroke-width="2"/>' +
            '</svg>';
        }
        iconSize = [w, h];
        iconAnchor = [1, h];
      } else if (visited) {
        svg = '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (size/2 - 1) + '" fill="' + color + '"/>' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (size/2 - 1) + '" fill="none" stroke="#fff" stroke-width="1" opacity="0.6"/>' +
          '</svg>';
        iconSize = [size, size];
        iconAnchor = [size / 2, size / 2];
      } else {
        svg = '<svg viewBox="0 0 ' + size + ' ' + size + '" width="' + size + '" height="' + size + '">' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (size/2 - 2) + '" fill="' + color + '" fill-opacity="0.25"/>' +
          '<circle cx="' + cx + '" cy="' + cy + '" r="' + (size/2 - 2) + '" fill="none" stroke="' + color + '" stroke-width="2"/>' +
          '</svg>';
        iconSize = [size, size];
        iconAnchor = [size / 2, size / 2];
      }
      return L.divIcon({ className: '', html: svg, iconSize: iconSize, iconAnchor: iconAnchor });
    }

    function addStartEndMarkers(map, startLatLng, endLatLng) {
      const startIcon = L.divIcon({ className: 'marker-start', html: '<svg viewBox="0 0 16 16" width="16" height="16"><circle cx="8" cy="8" r="6" fill="#00e05a" stroke="#fff" stroke-width="2"/></svg>', iconSize: [16, 16], iconAnchor: [8, 8] });
      const endIcon = L.divIcon({ className: 'marker-end', html: '<svg viewBox="0 0 32 32" width="32" height="32"><rect x="4" y="2" width="2" height="28" rx="1" fill="#fff" stroke="#2d333b" stroke-width="0.5"/><path d="M6 3h12c1 0 1.5.5 1 1.5L17 8l2 3.5c.5 1 0 1.5-1 1.5H6V3z" fill="#fff" stroke="#2d333b" stroke-width="0.5"/><rect x="7" y="4" width="4.5" height="4" fill="#2d333b"/><rect x="11.5" y="4" width="4.5" height="4" fill="#fff"/><rect x="7" y="8" width="4.5" height="4" fill="#fff"/><rect x="11.5" y="8" width="4.5" height="4" fill="#2d333b"/></svg>', iconSize: [32, 32], iconAnchor: [5, 30] });
      L.marker(startLatLng, { icon: startIcon }).bindPopup('Start').addTo(map);
      L.marker(endLatLng, { icon: endIcon }).bindPopup('End').addTo(map);
    }

    // ----- Unified map -----
    function renderUnifiedMap(focus) {
      setActiveTab('map');
      setCrumb('', false);
      document.getElementById('nav-info').innerHTML = '';
      const prevView = state.currentMap
        ? { center: state.currentMap.getCenter(), zoom: state.currentMap.getZoom() }
        : null;
      const storedView = (!prevView && getRememberView()) ? loadStoredView() : null;
      cleanupMap();

      const app = document.getElementById('app');
      app.innerHTML = '<div id="map"></div>';

      const dv = prevView || storedView || ((!placesEnabled() && trailsEnabled())
        ? (state.config.default_view_trails || DEFAULT_CONFIG.default_view_trails)
        : (state.config.default_view || DEFAULT_CONFIG.default_view));
      const map = L.map('map', {
        zoomControl: true,
        attributionControl: false,
        maxBounds: [[-90, -200], [90, 200]],
        maxBoundsViscosity: 1.0
      }).setView(dv.center, dv.zoom);
      L.control.attribution({ prefix: false }).addTo(map);
      state.currentMap = map;
      addTileLayersToMap(map);

      if (getRememberView()) {
        map.on('moveend zoomend', function() {
          const c = map.getCenter();
          saveStoredView({ center: [c.lat, c.lng], zoom: map.getZoom() });
        });
      }

      // Places
      const useClusters = getClusterPlaces();
      const clusterGroup = useClusters
        ? L.markerClusterGroup({
            maxClusterRadius: 40,
            spiderfyOnMaxZoom: true,
            showCoverageOnHover: false,
          })
        : L.featureGroup();
      if (useClusters) {
        clusterGroup.on('clustermouseover', function(e) {
          const names = e.layer.getAllChildMarkers().map(m => m._placeData.name).sort().slice(0, 10);
          const total = e.layer.getChildCount();
          let label = names.join('\n');
          if (total > 10) label += '\n+' + (total - 10) + ' more';
          e.layer.bindTooltip(label, { direction: 'top', sticky: true }).openTooltip();
        });
      }

      const placeMarkers = [];
      const placeBounds = L.latLngBounds();
      let focusPlace = null;

      if (state.places && placesEnabled()) {
        for (const p of state.places) {
          const color = state.categoryColors[p.category];
          const colorLight = state.categoryColorsLight[p.category];
          const catStyle = '--c:' + color + ';--cl:' + colorLight;
          const marker = L.marker([p.lat, p.lon], { icon: createMarkerIcon(color, p.visited) });
          let popupHtml = '<a href="#" class="popup-share-corner popup-share" data-type="place" data-id="' + escapeHtml(p._slug || p.name) + '">Copy link</a>';
          popupHtml += '<div class="popup-name">' + escapeHtml(p.name) + (p.local_name ? ' <span class="popup-local cat-text" style="' + catStyle + '">&middot; ' + escapeHtml(p.local_name) + '</span>' : '') + '</div>';
          if (p.note) popupHtml += '<div class="popup-note">' + escapeHtml(p.note) + '</div>';
          if (p.sources && p.sources.length) popupHtml += '<div class="popup-sources">' + renderSources(p.sources) + '</div>';
          popupHtml += '<div class="popup-meta">' +
            '<span class="cat-text" style="' + catStyle + '">' + escapeHtml(p.category) + '</span>' +
            '<span style="color:' + (p.visited ? 'var(--green)' : 'var(--red)') + '">' + (p.visited ? 'Visited' : 'Want to visit') + '</span>' +
            (state.auth.authenticated ? '<a href="#" class="popup-edit" data-place="' + escapeHtml(p.name) + '">Edit</a>' : '') +
          '</div>';
          marker.bindPopup(popupHtml, { closeButton: false });
          marker.on('click', (function(slug) {
            return function() { history.replaceState(null, '', focusHash('place', slug)); };
          })(p._slug || p.name));
          marker.bindTooltip(escapeHtml(p.name), { direction: 'top', offset: [0, -6] });
          marker._placeData = p;
          placeMarkers.push(marker);
          placeBounds.extend([p.lat, p.lon]);
          if (focus && focus.type === 'place' && focus.name === p.name) focusPlace = marker;
        }
      }

      state._placeMarkers = placeMarkers;
      state._placeClusterGroup = clusterGroup;

      // Trails: two groups by status
      const groupCompleted = L.featureGroup();
      const groupPlanned = L.featureGroup();
      const trailLayers = [];
      const trailBounds = L.latLngBounds();
      let focusTrailKey = (focus && focus.type === 'trail') ? focus.name : null;
      let focusTrailLayer = null;

      if (state.manifest && trailsEnabled()) {
        for (const region of state.manifest.regions) {
          for (const route of region.routes) {
            const color = route.completed ? COMPLETED_COLOR : PLANNED_COLOR;
            const parent = route.completed ? groupCompleted : groupPlanned;
            const gpxUrl = 'gpx/' + route.file;
            const gpxLayer = new L.GPX(gpxUrl, {
              async: true,
              polyline_options: { color: color, opacity: 0.85, weight: 4 * getTrailWeightFactor() },
              markers: { startIcon: null, endIcon: null, wptIcons: { '': null }, wptTypeIcons: { '': null } },
            });
            gpxLayer.on('loaded', function(e) {
              const b = e.target.getBounds();
              if (b.isValid()) trailBounds.extend(b);
              if (focusTrailKey && route.key === focusTrailKey) {
                focusTrailLayer = e.target;
                if (b.isValid()) map.fitBounds(b, { padding: [40, 40] });
              }
            }).bindPopup(
              '<a href="#" class="popup-share-corner popup-share" data-type="trail" data-id="' + escapeHtml(route._slug || route.key) + '">Copy link</a>' +
              '<div class="popup-name">' + escapeHtml(route.name) + '</div>' +
              '<div class="popup-sources"><a href="#/trails/route/' + encodeURIComponent(route.key) + '">View details &#x2197;</a></div>' +
              '<div class="popup-meta">' +
                '<span style="color:' + color + '">' + (route.completed ? 'Completed' : 'Planned') + '</span>' +
                '<span>' + escapeHtml(region.name) + '</span>' +
                (state.auth.authenticated ? '<a href="#" class="popup-trail-delete" data-region="' + escapeHtml(region.name) + '" data-name="' + escapeHtml(route.name) + '">Delete</a>' : '') +
              '</div>',
              { closeButton: false }
            ).on('click', (function(slug) {
              return function() { history.replaceState(null, '', focusHash('trail', slug)); };
            })(route._slug || route.key));
            parent.addLayer(gpxLayer);
            trailLayers.push({ route, region: region.name, layer: gpxLayer, completed: route.completed });
          }
        }
      }

      state._trailLayers = trailLayers;
      state._trailGroupCompleted = groupCompleted;
      state._trailGroupPlanned = groupPlanned;

      applyMapFilters();

      // Initial bounds: places + trails, prefer focus
      if (focusPlace) {
        setTimeout(function() {
          map.setView([focusPlace._placeData.lat, focusPlace._placeData.lon], 12);
          focusPlace.openPopup();
        }, 300);
      } else if (!focusTrailKey && !prevView && !storedView) {
        const combined = L.latLngBounds();
        if (placeBounds.isValid()) combined.extend(placeBounds);
        if (trailBounds.isValid()) combined.extend(trailBounds);
        if (combined.isValid()) map.fitBounds(combined, { padding: [40, 40] });
      }

      // Filter panel
      const PanelControl = L.Control.extend({
        options: { position: 'bottomleft' },
        onAdd: function() {
          const div = L.DomUtil.create('div', 'map-panel');
          div.id = 'map-panel';
          const searchPlaceholder = placesEnabled() && trailsEnabled()
            ? 'Search places + trails...'
            : (placesEnabled() ? 'Search places...' : 'Search trails...');
          div.innerHTML =
            '<div class="panel-search" id="map-search">' +
            '<input type="text" id="map-search-input" placeholder="' + searchPlaceholder + '">' +
            '<div class="map-search-results" id="map-search-results"></div>' +
            '</div>' +
            (placesEnabled() ?
              '<div class="panel-section collapsed" id="places-section">' +
              '<div class="panel-section-header" data-section="places-section">Places' +
              '<span class="panel-section-actions">' +
              '<span class="panel-action" id="places-toggle-all">Toggle</span>' +
              '<span class="section-arrow">&#x25BC;</span>' +
              '</span>' +
              '</div>' +
              '<div class="panel-section-body" id="places-body"></div>' +
              '</div>'
              : '') +
            (trailsEnabled() ?
              '<div class="panel-section collapsed" id="trails-section">' +
              '<div class="panel-section-header" data-section="trails-section">Trails' +
              '<span class="panel-section-actions">' +
              '<span class="panel-action" id="trails-toggle-all">Toggle</span>' +
              '<span class="section-arrow">&#x25BC;</span>' +
              '</span>' +
              '</div>' +
              '<div class="panel-section-body" id="trails-body"></div>' +
              '</div>'
              : '');
          L.DomEvent.disableClickPropagation(div);
          L.DomEvent.disableScrollPropagation(div);
          return div;
        }
      });
      if (placesEnabled() || trailsEnabled()) {
        map.addControl(new PanelControl());
        bindFilterPanel();
        refreshFilterPanel();
        initUnifiedSearch(map);
      }
      bindPopupActions(map);

      // Nav summary
      const placeCount = state.places ? state.places.length : 0;
      const trailCount = state.manifest ? state.manifest.regions.reduce((n, r) => n + r.routes.length, 0) : 0;
      let stats = '';
      if (placesEnabled()) stats += '<div class="nav-stat"><span class="value">' + placeCount + ' places</span></div>';
      if (trailsEnabled()) stats += '<div class="nav-stat"><span class="value">' + trailCount + ' trails</span></div>';
      document.getElementById('nav-info').innerHTML = '<div class="nav-group">' + stats + '</div>';
    }

    function refreshFilterPanel() {
      const placesBody = document.getElementById('places-body');
      if (placesBody) {
        const cats = Object.keys(state.categoryColors).sort();
        let html = '<div class="legend-cats">';
        for (const cat of cats) {
          const color = state.categoryColors[cat];
          const hidden = state.hiddenCategories.has(cat);
          html += '<div class="legend-item' + (hidden ? ' disabled' : '') + '" data-cat="' + escapeHtml(cat) + '">';
          html += '<span class="legend-dot" style="background:' + color + '"></span>';
          html += escapeHtml(displayCategory(cat));
          html += '</div>';
        }
        html += '</div>';
        html += '<div class="legend-status">';
        html += '<div class="status-chip' + (state.showVisited ? ' active' : '') + '" data-filter="visited">Visited</div>';
        html += '<div class="status-chip' + (state.showWant ? ' active' : '') + '" data-filter="want">Want</div>';
        html += '</div>';
        placesBody.innerHTML = html;
      }

      const trailsBody = document.getElementById('trails-body');
      if (trailsBody) {
        let html = '<div class="legend-cats" style="grid-template-columns:1fr">';
        html += '<div class="legend-item' + (state.showCompleted ? '' : ' disabled') + '" data-trail-status="completed">';
        html += '<span class="legend-line" style="background:' + COMPLETED_COLOR + '"></span>Completed';
        html += '</div>';
        html += '<div class="legend-item' + (state.showPlanned ? '' : ' disabled') + '" data-trail-status="planned">';
        html += '<span class="legend-line" style="background:' + PLANNED_COLOR + '"></span>Planned';
        html += '</div>';
        html += '</div>';
        trailsBody.innerHTML = html;
      }
    }

    function bindFilterPanel() {
      // Section collapse
      document.querySelectorAll('.panel-section-header').forEach(function(h) {
        h.addEventListener('click', function(e) {
          if (e.target.closest('.panel-action')) return;
          document.getElementById(this.dataset.section).classList.toggle('collapsed');
        });
      });

      // Toggle-all (places)
      const placesToggle = document.getElementById('places-toggle-all');
      if (placesToggle) placesToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const cats = Object.keys(state.categoryColors);
        const allOn = state.hiddenCategories.size === 0 && state.showVisited && state.showWant;
        if (allOn) {
          cats.forEach(c => state.hiddenCategories.add(c));
          state.showVisited = false; state.showWant = false;
        } else {
          state.hiddenCategories.clear();
          state.showVisited = true; state.showWant = true;
        }
        refreshFilterPanel();
        applyMapFilters();
      });

      // Toggle-all (trails)
      const trailsToggle = document.getElementById('trails-toggle-all');
      if (trailsToggle) trailsToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const allOn = state.showCompleted && state.showPlanned;
        state.showCompleted = !allOn;
        state.showPlanned = !allOn;
        refreshFilterPanel();
        applyMapFilters();
      });

      // Delegated clicks on the body elements (survive innerHTML refresh)
      const placesBody = document.getElementById('places-body');
      if (placesBody) placesBody.addEventListener('click', function(e) {
        const cat = e.target.closest('.legend-item[data-cat]');
        if (cat) {
          const c = cat.dataset.cat;
          if (state.hiddenCategories.has(c)) { state.hiddenCategories.delete(c); cat.classList.remove('disabled'); }
          else { state.hiddenCategories.add(c); cat.classList.add('disabled'); }
          applyMapFilters();
          return;
        }
        const chip = e.target.closest('.status-chip[data-filter]');
        if (chip) {
          if (chip.dataset.filter === 'visited') state.showVisited = !state.showVisited;
          else state.showWant = !state.showWant;
          chip.classList.toggle('active');
          applyMapFilters();
        }
      });

      const trailsBody = document.getElementById('trails-body');
      if (trailsBody) trailsBody.addEventListener('click', function(e) {
        const item = e.target.closest('.legend-item[data-trail-status]');
        if (!item) return;
        const s = item.dataset.trailStatus;
        if (s === 'completed') state.showCompleted = !state.showCompleted;
        else state.showPlanned = !state.showPlanned;
        item.classList.toggle('disabled');
        applyMapFilters();
      });
    }

    function bindPopupActions(map) {
      // Delegated click on popup contents. Leaflet popups are rendered into the
      // map container, so a single delegated handler covers all of them.
      map.getContainer().addEventListener('click', function(e) {
        const edit = e.target.closest('.popup-edit');
        if (edit) {
          e.preventDefault();
          const name = edit.dataset.place;
          const place = state.places.find(p => p.name === name);
          if (place) {
            map.closePopup();
            openEditPlaceModal(place);
          }
          return;
        }
        const share = e.target.closest('.popup-share');
        if (share) {
          e.preventDefault();
          const type = share.dataset.type;
          const id = share.dataset.id;
          const url = location.origin + location.pathname + focusHash(type, id);
          const done = () => {
            const original = share.textContent;
            share.textContent = 'Copied!';
            setTimeout(() => { share.textContent = original; }, 1500);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(done, () => prompt('Copy this link:', url));
          } else {
            prompt('Copy this link:', url);
          }
          return;
        }
        const trailDel = e.target.closest('.popup-trail-delete');
        if (trailDel) {
          e.preventDefault();
          const region = trailDel.dataset.region;
          const name = trailDel.dataset.name;
          if (!confirm('Delete trail "' + name + '" (region: ' + region + ')? This removes the GPX file.')) return;
          api('DELETE', '/gpx', { region: region, name: name })
            .then(() => refreshRoutes())
            .then(() => { map.closePopup(); router(); })
            .catch(err => alert('Failed: ' + err.message));
        }
      });
    }

    // ----- Edit place modal -----
    function openEditPlaceModal(place) {
      const cats = Object.keys(state.categoryColors).sort();
      const sourcesText = (place.sources || []).join('\n');
      openModal(
        '<h2>Edit place<button class="modal-close">&times;</button></h2>' +
        '<form id="edit-place-form">' +
          '<label for="e-name">Name</label>' +
          '<input type="text" id="e-name" required value="' + escapeHtml(place.name) + '">' +
          '<div class="row">' +
            '<div><label for="e-lat">Latitude</label><input type="number" id="e-lat" step="any" required value="' + place.lat + '"></div>' +
            '<div><label for="e-lon">Longitude</label><input type="number" id="e-lon" step="any" required value="' + place.lon + '"></div>' +
          '</div>' +
          '<label for="e-category">Category</label>' +
          editSelectOrNewHtml('e-category', cats, place.category) +
          '<label for="e-country">Country (optional)</label>' +
          '<input type="text" id="e-country" value="' + escapeHtml(place.country || '') + '">' +
          '<label for="e-note">Note (optional)</label>' +
          '<textarea id="e-note">' + escapeHtml(place.note || '') + '</textarea>' +
          '<label for="e-local-name">Local name (optional)</label>' +
          '<input type="text" id="e-local-name" value="' + escapeHtml(place.local_name || '') + '">' +
          '<label for="e-sources">Sources (optional, one URL per line)</label>' +
          '<textarea id="e-sources">' + escapeHtml(sourcesText) + '</textarea>' +
          '<div class="checkbox-row"><input type="checkbox" id="e-visited"' + (place.visited ? ' checked' : '') + '><label for="e-visited">I&rsquo;ve visited this place</label></div>' +
          '<div class="modal-error" id="edit-error"></div>' +
          '<div class="modal-actions">' +
            '<button type="button" class="session-revoke" id="e-delete">Delete</button>' +
            '<span style="flex:1"></span>' +
            '<button type="button" class="modal-close">Cancel</button>' +
            '<button type="submit" class="primary" id="e-submit">Save</button>' +
          '</div>' +
        '</form>',
        function() {
          wireEditSelectOrNew('e-category');
          document.getElementById('e-delete').addEventListener('click', function() {
            if (!confirm('Delete place "' + place.name + '"?')) return;
            this.disabled = true;
            api('DELETE', '/places', { name: place.name })
              .then(() => refreshPlaces())
              .then(() => { closeModal(); router(); })
              .catch(err => {
                this.disabled = false;
                document.getElementById('edit-error').textContent = err.message;
                document.getElementById('edit-error').classList.add('visible');
              });
          });
          document.getElementById('edit-place-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const sel = document.getElementById('e-category');
            const inp = document.getElementById('e-category-new');
            const category = sel.value === '__new__' ? (inp.value || '').trim() : sel.value;
            if (!category) { showModalError('Pick or add a category.'); return; }
            const sourcesRaw = document.getElementById('e-sources').value.trim();
            const sources = sourcesRaw ? sourcesRaw.split('\n').map(s => s.trim()).filter(Boolean) : null;
            const payload = {
              name: document.getElementById('e-name').value.trim(),
              lat: parseFloat(document.getElementById('e-lat').value),
              lon: parseFloat(document.getElementById('e-lon').value),
              category: category,
              visited: document.getElementById('e-visited').checked,
            };
            const country = document.getElementById('e-country').value.trim();
            const note = document.getElementById('e-note').value.trim();
            const localName = document.getElementById('e-local-name').value.trim();
            if (country) payload.country = country;
            if (note) payload.note = note;
            if (localName) payload.local_name = localName;
            if (sources && sources.length) payload.sources = sources;
            const submit = document.getElementById('e-submit');
            submit.disabled = true;
            api('PUT', '/places', { original_name: place.name, place: payload })
              .then(() => refreshPlaces())
              .then(() => { closeModal(); router(); })
              .catch(err => { submit.disabled = false; showModalError(err.message); });
          });
        }
      );

      function showModalError(msg) {
        const el = document.getElementById('edit-error');
        if (el) { el.textContent = msg; el.classList.add('visible'); }
      }
    }

    function editSelectOrNewHtml(id, options, current) {
      const inOptions = options.includes(current);
      const opts = options.map(v => '<option value="' + escapeHtml(v) + '"' + (v === current ? ' selected' : '') + '>' + escapeHtml(displayCategory(v)) + '</option>').join('');
      const newSelected = !inOptions ? ' selected' : '';
      return '<div class="select-or-new" data-id="' + id + '">' +
        '<select id="' + id + '" required>' +
          opts +
          '<option value="__new__"' + newSelected + '>+ Add new&hellip;</option>' +
        '</select>' +
        '<input type="text" class="new-input" id="' + id + '-new" placeholder="Type new value" value="' + (inOptions ? '' : escapeHtml(current)) + '"' + (inOptions ? ' hidden' : '') + '>' +
      '</div>';
    }
    function wireEditSelectOrNew(id) {
      const sel = document.getElementById(id);
      const input = document.getElementById(id + '-new');
      if (!sel || !input) return;
      const sync = () => {
        if (sel.value === '__new__') {
          input.hidden = false;
          input.required = true;
        } else {
          input.hidden = true;
          input.required = false;
        }
      };
      sel.addEventListener('change', sync);
      sync();
    }

    function applyMapFilters() {
      const map = state.currentMap;
      if (!map) return;

      // Places
      const cg = state._placeClusterGroup;
      if (cg) {
        cg.clearLayers();
        if (state._placeMarkers) {
          for (const m of state._placeMarkers) {
            const p = m._placeData;
            if (state.hiddenCategories.has(p.category)) continue;
            if (p.visited && !state.showVisited) continue;
            if (!p.visited && !state.showWant) continue;
            cg.addLayer(m);
          }
        }
        if (!map.hasLayer(cg)) map.addLayer(cg);
      }

      // Trails
      const gc = state._trailGroupCompleted;
      const gp = state._trailGroupPlanned;
      if (gc) {
        if (state.showCompleted && !map.hasLayer(gc)) map.addLayer(gc);
        else if (!state.showCompleted && map.hasLayer(gc)) map.removeLayer(gc);
      }
      if (gp) {
        if (state.showPlanned && !map.hasLayer(gp)) map.addLayer(gp);
        else if (!state.showPlanned && map.hasLayer(gp)) map.removeLayer(gp);
      }
    }

    function initUnifiedSearch(map) {
      const input = document.getElementById('map-search-input');
      const results = document.getElementById('map-search-results');

      function render(q) {
        if (!q) { results.classList.remove('visible'); results.innerHTML = ''; return; }
        const lower = q.toLowerCase();
        const placeMatches = state.places ? state.places.filter(p =>
          p.name.toLowerCase().includes(lower)
          || (p.note && p.note.toLowerCase().includes(lower))
          || p.category.toLowerCase().includes(lower)
          || (p.country && p.country.toLowerCase().includes(lower))
        ).slice(0, 6) : [];
        const trailMatches = state.manifest ? state.manifest.regions.flatMap(r =>
          r.routes.filter(route => route.name.toLowerCase().includes(lower) || r.name.toLowerCase().includes(lower)).map(route => ({ route, region: r.name }))
        ).slice(0, 6) : [];

        if (!placeMatches.length && !trailMatches.length) {
          results.classList.remove('visible');
          results.innerHTML = '';
          return;
        }

        let html = '';
        for (const p of placeMatches) {
          const color = state.categoryColors[p.category];
          html += '<div class="map-search-result" data-type="place" data-name="' + escapeHtml(p.name) + '">';
          html += '<span class="result-dot" style="background:' + color + '"></span>';
          html += escapeHtml(p.name);
          html += '<span class="result-meta">' + escapeHtml(p.country || '') + '</span></div>';
        }
        for (const t of trailMatches) {
          const color = t.route.completed ? COMPLETED_COLOR : PLANNED_COLOR;
          html += '<div class="map-search-result" data-type="trail" data-key="' + escapeHtml(t.route.key) + '">';
          html += '<span class="result-line" style="background:' + color + '"></span>';
          html += escapeHtml(t.route.name);
          html += '<span class="result-meta">' + escapeHtml(t.region) + '</span></div>';
        }
        results.innerHTML = html;
        results.classList.add('visible');
      }

      input.addEventListener('input', function() { render(this.value.trim()); });

      results.addEventListener('click', function(e) {
        const row = e.target.closest('.map-search-result');
        if (!row) return;
        if (row.dataset.type === 'place') {
          const name = row.dataset.name;
          const marker = state._placeMarkers.find(m => m._placeData.name === name);
          if (marker) {
            const p = marker._placeData;
            map.setView([p.lat, p.lon], 12);
            marker.openPopup();
            history.replaceState(null, '', '#/?focus=place:' + encodeURIComponent(name));
          }
        } else {
          const key = row.dataset.key;
          const entry = state._trailLayers.find(t => t.route.key === key);
          if (entry) {
            // Find inner polyline bounds via the GPX layer
            const layers = [];
            entry.layer.eachLayer(l => { if (l.getBounds) layers.push(l); });
            if (layers.length) {
              const b = layers[0].getBounds();
              if (b.isValid()) map.fitBounds(b, { padding: [40, 40] });
              if (entry.layer.openPopup) entry.layer.openPopup(b.getCenter());
            }
            history.replaceState(null, '', '#/?focus=trail:' + encodeURIComponent(key));
          }
        }
        input.value = '';
        results.classList.remove('visible');
        results.innerHTML = '';
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('#map-search')) results.classList.remove('visible');
      });
    }

    // ----- Places browse list -----
    function renderPlacesIndex() {
      setActiveTab('places');
      setCrumb('', false);
      cleanupMap();
      const app = document.getElementById('app');
      if (!state.places) { document.getElementById('nav-info').innerHTML = ''; app.innerHTML = '<div class="loading">Loading places...</div>'; return; }

      const places = state.places;
      const visited = places.filter(p => p.visited).length;
      const total = places.length;
      const cats = Object.keys(state.categoryColors).sort();

      document.getElementById('nav-info').innerHTML =
        '<div class="nav-group">' +
        '<div class="nav-stat"><span class="value">' + visited + '/' + total + ' visited</span></div>' +
        '<div class="nav-stat"><span class="value">' + cats.length + ' categories</span></div>' +
        '<div class="nav-stat"><span class="value">' + [...new Set(places.map(p => p.country).filter(Boolean))].length + ' countries</span></div>' +
        '</div>';

      app.innerHTML =
        '<div class="index-controls">' +
        '<input type="text" id="search-input" placeholder="Filter places...">' +
        '<div class="group-toggle">' +
        '<button data-group="category"' + (state.groupBy === 'category' ? ' class="active"' : '') + '>Category</button>' +
        '<button data-group="country"' + (state.groupBy === 'country' ? ' class="active"' : '') + '>Country</button>' +
        '</div>' +
        '</div>' +
        '<div class="category-grid" id="place-list"></div>';
      renderPlaceList('');

      document.getElementById('search-input').addEventListener('input', function() { renderPlaceList(this.value); });
      document.querySelector('.group-toggle').addEventListener('click', function(e) {
        if (!e.target.dataset.group) return;
        state.groupBy = e.target.dataset.group;
        this.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.group === state.groupBy));
        const input = document.getElementById('search-input');
        renderPlaceList(input ? input.value : '');
      });
    }

    function renderPlaceList(query) {
      const q = query.toLowerCase().trim();
      const byCategory = state.groupBy === 'category';
      const filtered = q
        ? state.places.filter(p => p.name.toLowerCase().includes(q) || (p.note && p.note.toLowerCase().includes(q)) || p.category.toLowerCase().includes(q) || (p.country && p.country.toLowerCase().includes(q)))
        : state.places;
      const grouped = {};
      for (const p of filtered) {
        const key = byCategory ? p.category : (p.country || 'Other');
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(p);
      }
      const keys = Object.keys(grouped).sort();
      let html = '';
      for (const key of keys) {
        const items = grouped[key];
        const keyVisited = items.filter(p => p.visited).length;
        html += '<div class="category-group fade-in">';
        html += '<div class="category-label">';
        html += escapeHtml(byCategory ? displayCategory(key) : key);
        html += '<span class="place-count">(' + keyVisited + '/' + items.length + ')</span>';
        html += '</div>';
        html += '<div class="place-grid">';
        for (const p of items) {
          const statusClass = p.visited ? 'visited' : 'want';
          const href = '#/?focus=place:' + encodeURIComponent(p.name);
          html += '<div class="place-card" onclick="location.hash=\'' + href.replace(/'/g, "\\'") + '\'">';
          html += '<span class="status-dot ' + statusClass + '"></span>';
